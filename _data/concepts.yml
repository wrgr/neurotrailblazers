  - slug: ultrastructure-annotation
    title: Ultrastructure Annotation
    track: core-concepts-methods
    user_needs:
      - reading EM confidently
      - improving annotation consistency
    summary: Use compartment, organelle, and synaptic cues to make reproducible interpretation decisions.
    explanation: Combine multiple ultrastructural cues across slices and label uncertainty explicitly instead of forcing hard calls.
