# Expertise levels for journal paper summaries
expertise_levels:
  - id: beginner
    label: "Beginner"
    description: "No prior neuroscience or connectomics background; needs plain-language context."
  - id: intermediate
    label: "Intermediate"
    description: "Familiar with basic neuroscience and EM concepts; can follow methods sections."
  - id: advanced
    label: "Advanced"
    description: "Active researcher or advanced trainee; interested in methodological details and limitations."
