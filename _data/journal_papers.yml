  - 'Fig. 4: bouton composition quantification'
  - 'Fig. 6: multi-synapse bouton examples'
  discussion_prompts:
  - How would you validate whether modern automated segmentation correctly identifies the bouton features measured in this
    study?
  - What does the multi-synapse bouton finding imply for how we weight edges in a connectome graph?
  related_content:
  - /content-library/neuroanatomy/axon-biology/
  - /content-library/neuroanatomy/synapse-classification/
  summaries:
    beginner: This paper used serial electron microscopy to reconstruct the fine branches of axons in the hippocampus in 3D.
      The authors showed that the small swellings (boutons) along axons, where synapses form, are highly variable in size
      and contents. It's an early example of the kind of detailed wiring analysis that modern connectomics does at larger
      scales.
    intermediate: Shepherd and Harris performed serial section EM reconstruction of Schaffer collateral axons in rat CA1,
      providing quantitative data on bouton volumes, vesicle counts, mitochondria presence, and multi-synapse bouton frequencies.
      They found that only ~40% of boutons contain mitochondria, with important implications for sustained transmission.
    advanced: 'This study established quantitative priors that remain useful for validating automated reconstructions: mean
      bouton volume (~0.1 μm³), vesicle density (~200 per bouton), and the fraction of en passant versus terminal boutons.
      The finding that multi-synapse boutons synapse onto different postsynaptic neurons has implications for how edge weights
      should be computed in connectome graphs.'
- id: fiala-harris-2001
  title: Cylindrical Diameters Method for Calibrating Section Thickness in Serial Electron Microscopy
  authors: Fiala JC, Harris KM
  year: 2001
  journal: Journal of Microscopy
  doi: 10.1046/j.1365-2818.2001.00926.x
  dimension: neuroanatomy
  tags:
  - imaging:serial-section
  - imaging:electron-microscopy
  - methodology:benchmark
  - neuroanatomy:microtubule
  - data-storage:alignment
  key_figures:
  - 'Fig. 1: geometry of oblique microtubule sections'
  - 'Fig. 2: calibration curve'
  discussion_prompts:
  - Does your automated pipeline account for section-to-section thickness variation?
  - What other structures could serve as internal calibration references?
  related_content:
  - /content-library/imaging/em-principles/
  - /content-library/infrastructure/reconstruction-pipeline/
  summaries:
    beginner: When scientists cut brain tissue into very thin slices for electron microscopy, they need to know exactly how
      thick each slice is to build accurate 3D reconstructions. This paper describes a clever method for measuring slice thickness
      by looking at tube-shaped structures (microtubules) that run through the tissue at known diameters.
    intermediate: 'Fiala and Harris present a calibration method exploiting the known ~25 nm diameter of microtubules to estimate
      section thickness from their elliptical profiles in oblique sections. This addresses a chronic problem in serial section
      EM: nominal microtome settings often differ from actual section thickness by 10-30%.'
    advanced: This paper is important for anyone working on alignment and voxel calibration in serial section datasets. The
      statistical framework provides a principled alternative to fold-based or interference-based calibration. Modern connectomics
      pipelines should incorporate analogous calibration steps, particularly for ATUM-SEM where section thickness variation
      can be significant.
- id: kasthuri-2015
  title: Saturated Reconstruction of a Volume of Neocortex
  authors: Kasthuri N, Hayworth KJ, Berger DR, et al.
  year: 2015
  journal: Cell
  doi: 10.1016/j.cell.2015.06.054
  dimension: neuroanatomy
  tags:
  - neuroanatomy:synapse
  - neuroanatomy:dendrite
