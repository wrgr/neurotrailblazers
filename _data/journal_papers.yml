    ocar:
    opportunity: |
      Combinatorial sparse wiring of principal neurons in associative brain regions is thought to optimize stimulus representation, but the developmental mechanisms that establish the correct number and identity of presynaptic partners onto Kenyon cells are not understood.
    challenge: |
      Establishing precise sparse convergence of inputs onto thousands of Kenyon cells requires coordination across many presynaptic axons, and understanding how this is achieved requires quantitative analysis of synapse formation during development in a system where the final connectivity can be measured.
    action: |
      The authors combined developmental and ultrastructural approaches to study how presynaptic plasticity during Drosophila mushroom body development establishes the sparse combinatorial innervation of Kenyon cells, examining synapse formation and the regulation of presynaptic partner number.
    resolution: |
      Presynaptic developmental plasticity enables robust establishment of sparse wiring despite variability in individual axon trajectories. The study identified mechanisms by which presynaptic neurons adjust their connection number to achieve the sparse combinatorial innervation that optimizes associative coding.
    future_work: |
      Identifying the molecular signals that mediate the presynaptic plasticity and determining how robust wiring is achieved even when individual neuronal development is perturbed remain open questions.
  plain_language_summary: ""
  summaries:
    beginner: |
        The fly brain has a region for learning called the mushroom body, where each main neuron receives inputs from only a random few of many possible input neurons. This study examined how the brain reliably sets up this sparse wiring pattern during development.
    intermediate: |
        This study investigates the developmental mechanisms that establish sparse combinatorial innervation of Kenyon cells in the Drosophila mushroom body. The authors demonstrate that presynaptic plasticity during development allows robust achievement of the sparse wiring needed for efficient associative coding, even in the face of developmental variability.
    advanced: |
        Using quantitative ultrastructural analysis, this study establishes that sparse wiring of Kenyon cells in the Drosophila mushroom body is achieved through presynaptic developmental plasticity rather than rigid deterministic wiring rules. The results constrain theoretical models of sparse coding by showing that the circuit is robust to developmental noise while maintaining the combinatorial specificity needed for high-dimensional stimulus representation; a limitation is that the molecular mechanisms of presynaptic adjustment remain uncharacterized.
  discussion_prompts:
  - |
    How does presynaptic versus postsynaptic developmental plasticity differ mechanistically, and what are the advantages of presynaptic regulation for establishing sparse combinatorial wiring?
    - |
    What predictions does the sparse coding theory make about the optimal number of inputs per Kenyon cell, and how do the developmental mechanisms observed relate to achieving this optimum?
    - |
    How might disruption of the developmental plasticity mechanisms identified here affect associative learning performance, and how could this be tested experimentally?
    - id: a-brainwide-atlas-of-synapses-across-the-mouse-life-span
    title: "A brainwide atlas of synapses across the mouse life span"
    authors: "Cizeron, Qiu, Koniaris et al."
    year: 2020
