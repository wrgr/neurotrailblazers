    ocar:
    opportunity: |
      Spatial transcriptomics — mapping which genes are expressed where in tissue — required methods that could identify many RNA targets simultaneously within intact cells. Existing in situ hybridization methods were limited in multiplexing capacity or required reverse transcription steps that introduced complexity.
    challenge: |
      Achieving highly multiplexed, spatially resolved RNA detection in single cells required a method that could reliably identify many target RNAs with low background, without reverse transcription, and with sufficient sensitivity to detect low-abundance transcripts across diverse cell and tissue types.
    action: |
      The authors developed BOLORAMIS (Barcoded Oligonucleotides Ligated On RNA Amplified for Multiplexed and parallel In Situ analyses), a reverse-transcription-free method using padlock probes and rolling circle amplification to detect specific RNA sequences in situ with barcoded readout. They validated the method in diverse cell types and human cerebral organoids.
    resolution: |
      BOLORAMIS enabled targeted, multiplexed in situ RNA detection with high specificity and sensitivity in both coding and non-coding RNAs. The method was validated in human cell lines and brain organoids, providing a tool for spatially resolved transcriptomic characterization relevant to cell-type identification in neuroscience.
    future_work: |
      Scaling BOLORAMIS to genome-wide coverage and integrating it with structural imaging for combined transcriptomic and connectomic characterization would extend its impact significantly.
  plain_language_summary: |
    To understand what type a cell is, scientists look at which genes are active inside it. This paper developed a method to detect many specific RNA molecules directly inside intact cells without removing them from tissue — like reading bar codes on items while they are still on the store shelf — enabling cell-type identification in brain tissue.
  summaries:
    beginner: |
        Different types of brain cells make different sets of proteins by reading different genes. This paper developed a way to identify which genes are active in individual cells in intact tissue by tagging specific RNA molecules with molecular barcodes, helping researchers identify cell types without destroying the tissue.
    intermediate: |
        BOLORAMIS uses padlock probe hybridization and rolling circle amplification to detect and barcode specific RNA targets in situ, without reverse transcription. Validated in human cell lines and cerebral organoids, it provides a multiplexed spatial transcriptomics approach relevant to cell-type identification in neuroscience tissues — complementing structural connectomics with molecular characterization.
    advanced: |
        The BOLORAMIS method exploits the specificity of padlock probe ligation (requiring perfect complementarity at the probe junction) combined with rolling circle amplification to generate bright, localizable fluorescent signals from individual RNA molecules in situ. The approach avoids reverse transcription, reducing false positives from genomic DNA and simplifying the protocol. For connectomics, spatial transcriptomics methods like BOLORAMIS are increasingly important for linking EM-identified neuron morphologies and connectivity to transcriptomically-defined cell types — a key step toward a unified cell-type taxonomy.
  discussion_prompts:
  - |
    How could BOLORAMIS or similar spatial transcriptomics methods be integrated with EM connectomics to jointly characterize cell identity and synaptic connectivity?
    - |
    What are the trade-offs between targeted in situ methods like BOLORAMIS and untargeted spatial transcriptomics approaches (e.g., Visium, MERFISH) for characterizing neural cell types?
    - |
    How many transcriptomic markers are needed to reliably identify the cell types present in a connectomics dataset, and how should those markers be selected?
