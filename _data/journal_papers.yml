- id: lillicrap-2020
  title: Backpropagation and the brain
  authors: Lillicrap TP, Santoro A, Marris L, et al.
  year: 2020
  journal: Nature Reviews Neuroscience
  doi: 10.1038/s41583-020-0277-3
  dimension: neuroai
  tags:
  - "neuroai:deep-learning"
  - "neuroai:bio-inspired-architecture"
  - "neuroai:neural-network"
  key_figures:
  - "Fig. 1: backpropagation vs biological alternatives"
  - "Fig. 3: feedback alignment"
  discussion_prompts:
  - What connectomics evidence bears on whether the brain implements backpropagation-like credit assignment?
  - How do feedback connection patterns in connectomics data constrain learning rule theories?
  related_content:
  - /content-library/connectomics/neuroai-bridge/
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: >-
      Artificial neural networks learn by 'backpropagation' — sending error signals backward through the network. But can
      real brains do this? This review explores whether the brain has its own version of backpropagation and what the anatomical
      evidence says.
    intermediate: >-
      Lillicrap et al. review the biological plausibility of backpropagation and alternative credit assignment mechanisms.
      They discuss feedback alignment, target propagation, and dendritic computation as biologically plausible learning algorithms,
      connecting each to anatomical and physiological evidence.
    advanced: >-
      For connectomics, this paper motivates analysis of feedback connection patterns: are feedback projections random (feedback
      alignment) or structured (backpropagation-like)? The connectivity statistics of top-down versus bottom-up pathways in
      connectome datasets can directly test these theories.
  ocar:
    opportunity: >-
      Backpropagation is the dominant learning algorithm in artificial neural networks, but whether the brain implements anything
      analogous remained an open and contentious question with direct implications for both neuroscience and AI.
    challenge: >-
      The standard backpropagation algorithm requires biologically implausible features including symmetric forward and backward
      weights, and evaluating alternatives requires detailed knowledge of feedback connection anatomy that was largely unavailable.
    action: >-
      Lillicrap et al. reviewed the biological plausibility of backpropagation and systematically evaluated alternative credit
      assignment mechanisms including feedback alignment, target propagation, and dendritic computation, connecting each to
      available anatomical and physiological evidence.
    resolution: >-
      The review clarified which aspects of backpropagation are biologically implausible and identified testable predictions
      that connectomics data can address, particularly whether feedback projections are random (supporting feedback alignment)
      or structured (supporting backpropagation-like learning).
    future_work: >-
      Analyzing feedback versus feedforward connectivity statistics in large-scale connectomics datasets to directly test
      these credit assignment theories is a key priority.
