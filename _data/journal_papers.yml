    ocar:
    opportunity: |
      Tracking the life cycle and trafficking of specific proteins in living cells and then visualizing them by electron microscopy in the same experiment requires a labeling strategy compatible with both live fluorescence and EM ultrastructure.
    challenge: |
      Standard fluorescent proteins and EM contrast agents are typically incompatible — fluorescence is lost during EM fixation and heavy metal staining, while EM-compatible labels (e.g., DAB-based) are not fluorescent. Bridging this gap for dynamic protein tracking was technically non-trivial.
    action: |
      The authors used tetracysteine (TC) tags fused to connexin proteins, which can be sequentially labeled with different biarsenical fluorophores (FlAsH and ReAsH) in living cells. By labeling at different time points, they could distinguish older from newer connexin molecules. ReAsH was then used as a photosensitizer to generate DAB contrast for electron microscopy in the same specimens.
    resolution: |
      The study demonstrated that TC-tag biarsenical labeling enables both multicolor live imaging of connexin trafficking dynamics and subsequent EM visualization of the same labeled structures, linking dynamic behavior to ultrastructural context. This correlative light-EM (CLEM) approach revealed connexin trafficking through gap junction plaques.
    future_work: |
      Extending TC-tag and related genetically encoded EM tags to other protein families and developing brighter, more photostable CLEM probes that work in thick tissue sections remain active areas of development.
  plain_language_summary: |
    Scientists want to watch proteins move around inside living cells and then zoom in to see the fine structure of where they end up — but the tools for live imaging and electron microscopy are normally incompatible. This paper used a clever chemical tag that can first fluoresce in different colors (to show which proteins are old and which are new) and then generate the contrast needed for electron microscopy. It opened the door to correlating protein dynamics with ultrastructure.
  summaries:
    beginner: |
        This paper describes a way to track proteins in living cells using fluorescent labels and then look at the same cells under an electron microscope. Special chemical tags attached to connexin proteins (which form pores between cells) allowed the researchers to label old and new protein separately, then switch to EM mode to see the fine structure. This kind of correlative approach is increasingly used in connectomics to link molecular identity with ultrastructure.
    intermediate: |
        Tetracysteine-biarsenical labeling provides a genetically encoded, correlative light-EM tag by exploiting FlAsH/ReAsH dyes that bind to CCPGCC motifs and can generate photooxidized DAB precipitate for EM contrast. This paper applied the technique to connexin43 in gap junction trafficking, distinguishing protein cohorts by age using sequential labeling. CLEM approaches like this are directly relevant to connectomics efforts to identify specific synaptic proteins and gap junctions in EM volumes.
    advanced: |
        The TC-FlAsH/ReAsH system achieves correlative imaging through ReAsH-mediated singlet oxygen production under intense illumination, oxidizing DAB to an osmiophilic polymer visible in TEM. Key limitations include background labeling from non-specific biarsenical binding and the need for reducing agents (EDT/BAL) during labeling to maintain cell viability. In modern connectomics contexts, this work contributed to the broader CLEM toolkit alongside MiniSOG, APEX2, and HRP-based genetically encoded EM tags, which are used to identify specific cell types or synaptic specializations within EM volumes without relying solely on morphological criteria.
  discussion_prompts:
  - |
    How do genetically encoded EM tags like TC-ReAsH or APEX2 complement morphology-based cell-type identification in EM connectomics volumes?
    - |
    What are the trade-offs between different correlative light-EM approaches (biarsenical tags, MiniSOG, diaminobenzidine photooxidation) for identifying specific synaptic proteins in brain tissue?
    - |
    How might CLEM strategies be integrated into large-volume automated EM pipelines to add molecular specificity at scale?
    - id: ferroptosis-an-iron-dependent-form-of-nonapoptotic-cell-deat
    title: "Ferroptosis: An Iron-Dependent Form of Nonapoptotic Cell Death"
    authors: "Dixon, Lemberg, Lamprecht et al."
    year: 2012
    journal: ""
    doi: 10.1016/j.cell.2012.03.042
    dimension: cell-types
    reading_phase: 2_core_methods
