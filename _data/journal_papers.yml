- id: motta-2019
  title: Dense connectomic reconstruction in layer 4 of the somatosensory cortex
  authors: Motta A, Berning M, Boergens KM, et al.
  year: 2019
  journal: Science
  doi: 10.1126/science.aay3134
  dimension: neuroanatomy
  tags:
  - "neuroanatomy:axon"
  - "neuroanatomy:dendrite"
  - "neuroanatomy:synapse"
  - "case-studies:mouse"
  - "case-studies:dense-reconstruction"
  - "methodology:ground-truth"
  key_figures:
  - "Fig. 1: dense reconstruction overview"
  - "Fig. 2: thalamocortical axon targeting"
  - "Fig. 4: connectivity motif analysis"
  discussion_prompts:
  - How do the connectivity motifs observed here compare with those predicted by random connectivity models?
  - What are the specific challenges of dense reconstruction in cortical neuropil versus retinal tissue?
  related_content:
  - /content-library/neuroanatomy/axon-biology/
  - /content-library/neuroanatomy/synapse-classification/
  summaries:
    beginner: >-
      This paper reconstructed the dense wiring of a piece of mouse brain in the region that processes touch information from
      the whiskers. By tracing all the neurons and their connections, the authors could see how long-distance axons arriving
      from the thalamus connect to local neurons.
    intermediate: >-
      Motta et al. performed dense connectomic reconstruction of layer 4 of mouse barrel cortex using SBEM. They reconstructed
      ~90 neurons with complete local arbors, identified ~3,000 synapses, and classified thalamocortical versus intracortical
      axons. Specific connectivity motifs (reciprocal connections, common input) occur at rates above chance.
    advanced: >-
      This study advanced dense cortical reconstruction by combining automated segmentation with systematic error quantification
      and ground-truth validation. The analysis of thalamocortical axon targeting revealed laminar and cell-type specificity
      that could not be resolved with sparse reconstructions. The dataset serves as a benchmark for evaluating automated reconstruction
      pipelines on cortical neuropil.
  ocar:
    opportunity: >-
      Dense cortical connectomics had been demonstrated in retina, but cortical neuropil is denser and less stereotyped, and
      the connectivity rules governing thalamocortical versus intracortical wiring in barrel cortex were unknown at synaptic
      resolution.
    challenge: >-
      Cortical neuropil is extremely dense with intermingled processes from many cell types, making both automated segmentation
      and manual proofreading substantially more difficult than in retinal tissue.
    action: >-
      Motta et al. performed dense reconstruction of layer 4 mouse barrel cortex using SBEM, reconstructing approximately
      90 neurons with complete local arbors and approximately 3,000 synapses, with systematic error quantification and ground-truth
      validation.
    resolution: >-
      The study revealed that thalamocortical axons show laminar and cell-type targeting specificity, and that connectivity
      motifs like reciprocal connections occur above chance, findings only accessible through dense reconstruction.
    future_work: >-
