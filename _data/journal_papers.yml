  - /content-library/connectomics/graph-representations/
  summaries:
    beginner: This is the paper that coined the word 'connectome.' The authors argued that neuroscience needs a systematic
      effort to map all the brain's wiring, like the Human Genome Project mapped all our genes.
    intermediate: Sporns et al. introduced the term 'connectome' and outlined a program for mapping structural connectivity
      using diffusion MRI tractography combined with cortical parcellation. They discuss how graph-theoretic analysis of such
      networks could reveal organizational principles.
    advanced: 'Established the conceptual framework for macro-scale connectomics, distinct from but complementary to micro-scale
      EM connectomics. Key contributions: formal definition of the connectome as a comprehensive structural description at
      a given scale, and the recognition that connectomes exist at multiple scales.'
  ocar:
    opportunity: Neuroscience lacked a unifying term and conceptual framework for the comprehensive mapping of brain connectivity, and there was no articulated vision for a systematic brain-wiring mapping effort analogous to the Human Genome Project.
    challenge: Defining what a 'connectome' should encompass required grappling with the multi-scale nature of brain connectivity — from individual synapses to macroscopic fiber tracts — and proposing methods that could realistically achieve comprehensive mapping.
    action: Sporns, Tononi, and Kotter coined the term 'connectome,' formally defined it as a comprehensive structural description of brain connectivity at a given scale, and outlined a program for mapping it using diffusion MRI tractography combined with cortical parcellation.
    resolution: The paper launched the field of macro-scale connectomics by providing both the conceptual framework and the terminology that unified subsequent efforts, and critically recognized that connectomes exist at multiple scales from synapses to brain regions.
    future_work: Bridging micro-scale EM connectomics with macro-scale MRI connectomics and understanding what information is lost at coarser spatial scales remain fundamental challenges.
