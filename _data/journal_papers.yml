      intermediate: "Funke et al. train a CNN to predict local affinities (probabilities that adjacent voxels share the same label) and introduce a structured loss that backpropagates through a differentiable approximation of the downstream watershed segmentation. This end-to-end-aware training closes the gap between voxel-level prediction accuracy and actual segmentation metrics like variation of information."
      advanced: "The structured loss is derived from a PDE relaxation of the discrete segmentation objective, allowing gradient flow from segmentation-level metrics back to network weights. The method outperforms per-voxel-loss baselines on CREMI and FIB-25 benchmarks and demonstrates that optimizing a surrogate that better approximates the true evaluation metric yields consistent gains in adapted Rand index and variation of information."

  - id: lee-2017
    title: "Superhuman accuracy on the SNEMI3D connectomics challenge"
    authors: "Lee K, Zung J, Li P, et al."
    year: 2017
    journal: "arXiv:1706.00120"
    doi: null
