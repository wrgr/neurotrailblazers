  summaries:
    beginner: Brain diseases might be caused not by problems in one brain region but by disrupted connections between regions.
      This review shows how connectomics can reveal network-level changes in conditions like schizophrenia, Alzheimer's disease,
      and autism.
    intermediate: Fornito et al. review evidence that brain disorders are associated with specific patterns of network disruption,
      not just localized damage. They discuss the hub vulnerability hypothesis — that highly connected brain regions are disproportionately
      affected in neurological and psychiatric conditions.
    advanced: This review connects macro-scale MRI connectomics to clinical neuroscience. For EM connectomics, the key implication
      is that micro-scale wiring abnormalities (e.g., altered E/I balance, synaptic density changes) may propagate through
      network architecture to produce macro-scale network disruptions.
  ocar:
    opportunity: Neurological and psychiatric disorders were traditionally studied as localized brain lesions, but growing evidence suggested that many conditions involve distributed network-level disruptions that require a connectomics perspective.
    challenge: Linking disease-related network disruptions to underlying mechanisms requires distinguishing cause from consequence and integrating findings across different scales — from molecular changes to macro-scale network alterations.
    action: Fornito et al. reviewed evidence for network-level disruptions across multiple brain disorders including schizophrenia, Alzheimer's disease, and autism, and proposed the hub vulnerability hypothesis — that highly connected brain regions are disproportionately affected.
    resolution: The review established the framework for clinical connectomics, demonstrating that disease impacts are organized by network topology and that hub regions are preferentially vulnerable, with implications for understanding disease progression.
    future_work: Understanding how micro-scale wiring abnormalities detectable by EM propagate through network architecture to produce macro-scale disruptions visible by MRI is a key cross-scale challenge.
