      chromatin accessibility, morphological reconstruction, electrophysiology, and projection mapping. The study identifies
      ~100 consensus types and maps cross-modal correspondences.
    advanced: 'Establishes the gold standard for multimodal cell type classification. For connectomics: morphological features
      alone distinguish major classes but not fine subtypes, connectivity-defined subtypes often correspond to transcriptomic
      subtypes, and the reproducibility analysis provides confidence intervals for classification reliability.'
