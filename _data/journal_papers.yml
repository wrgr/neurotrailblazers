      reconstructing individual neurons at light microscopy resolution while covering the entire brain volume required new
      imaging and computational approaches.
    action: >-
      The authors developed and applied methods for whole-brain 3D reconstruction of individual neurons in Drosophila using
      light microscopy combined with sparse labeling strategies, building a library of single-neuron morphologies across the
      entire brain.
    resolution: >-
      The study produced three-dimensional reconstructions of hundreds of individual neurons spanning the entire fly brain,
      revealing their projection patterns and enabling systematic analysis of brain-wide wiring logic at single-cell resolution.
