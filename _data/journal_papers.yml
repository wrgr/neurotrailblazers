  - >-
    How does the choice of registration algorithm (e.g., SyN vs. B-spline) affect downstream neuron identity matching in connectomics
    studies?
  - >-
    What are the limitations of using a single population-average template when Drosophila strains differ substantially in
    brain size or morphology?
  - >-
    How might the template construction approach described here be adapted for other invertebrate or vertebrate model organisms
    where genetic tools are less developed?
  summaries:
    beginner: >-
      Scientists studying fruit fly brains need a common reference image, like a standardized atlas, so they can compare data
      from different labs or experiments. This paper built that atlas by averaging hundreds of fly brain images together to
      create one unbiased template. Having a shared reference is essential for mapping where specific neurons live and how
      they connect.
    intermediate: >-
      This paper presents JRC2018, an unbiased population-average template of the Drosophila brain and ventral nerve cord
      derived from iterative affine and non-linear registration of many individual confocal specimens. The template improves
      spatial normalization fidelity compared to previous single-fly references and covers the complete central nervous system.
      It serves as the registration target for most modern Drosophila connectomics and light-microscopy neuroanatomy workflows.
    advanced: >-
      The JRC2018 template was built using an iterative groupwise registration framework that minimizes template bias by not
      privileging any single individual, analogous to FreeSurfer's group template construction for human MRI. The authors
      used both affine and symmetric diffeomorphic normalization (SyN) to handle large inter-individual variability. A key
      caveat is that the template reflects the imaging modality and genetic background of the training set, so registration
      accuracy degrades for different reporters or preparation methods. Its release substantially reduced cross-lab variability
      in cell-type identification in the hemibrain and FlyWire connectomics projects.
  ocar:
    opportunity: >-
      Comparing neural anatomy and connectivity data across different Drosophila studies requires a common spatial reference,
      but existing brain templates were biased toward individual specimens and did not cover the full central nervous system
      including the ventral nerve cord.
    challenge: >-
      Constructing an unbiased template requires averaging many individual brain images with heterogeneous size, orientation,
      and staining, while preserving fine anatomical detail and avoiding systematic distortions introduced by any single specimen.
    action: >-
      The authors generated a population-level, unbiased anatomical template of the Drosophila melanogaster brain and ventral
      nerve cord by iteratively registering and averaging a large set of individual confocal images of labeled neurons. They
      used affine and non-linear deformable registration to align specimens and computed a mean-shape, mean-intensity template.
      The resulting template was validated against known neuroanatomical landmarks.
    resolution: >-
      The study produced a high-quality, publicly released reference template (JRC2018) covering both the brain and ventral
      nerve cord, enabling cross-lab registration of any Drosophila nervous system dataset. The template significantly improved
      registration accuracy and downstream cell-type comparisons compared to previous single-specimen references.
    future_work: >-
      Templates for other developmental stages and Drosophila strains are needed, and extending this approach to other model
      organisms with less genetic accessibility remains an open challenge.
  plain_language_summary: >-
    To compare brain maps from different experiments, scientists need a standard 'average brain' to align everything onto
    — much like how GPS maps need a shared coordinate system. This paper created such an average reference brain (and spinal
    cord equivalent) for the fruit fly by carefully combining hundreds of individual brain images. The result lets researchers
    from different labs overlay their data on the same map and compare results directly.
