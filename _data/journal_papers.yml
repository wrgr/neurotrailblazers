      performance — are directly relevant when deploying CNN-based segmenters across different EM imaging protocols or tissue
      preparations.
  ocar:
    opportunity: >-
      Visual object recognition in large, diverse image datasets was far beyond the capability of existing machine learning
      methods, limiting progress on real-world computer vision and slowing adoption of automated image analysis in science.
    challenge: >-
      Training a deep convolutional network on 1.2 million high-resolution images required computational resources (GPU parallelism),
      architectural innovations (ReLU activations, dropout regularization), and training strategies (data augmentation) that
