    ocar:
    opportunity: |
      The acute metabolic effects of cigarette smoke on tissues beyond the lung were poorly characterized, yet systemic oxidative stress from smoking underlies many smoking-related diseases, making short-term exposure models in mice valuable for mechanistic studies.
    challenge: |
      Establishing a reproducible, controlled nose-only exposure model required careful standardization of smoke delivery and timing, and measuring multiple markers of mitochondrial function and redox homeostasis across different tissues in a single experiment.
    action: |
      Raza, John, and Nemmar exposed mice to cigarette smoke via a nose-only chamber for a short-term period and measured glutathione levels, cytochrome P450 enzyme activities, and mitochondrial respiratory chain enzyme activities across lung, liver, and kidney tissues.
    resolution: |
      Short-term cigarette smoke exposure produced significant disruptions in glutathione redox homeostasis and mitochondrial function in multiple tissues, demonstrating that even brief exposure has systemic metabolic consequences and establishing a mouse model for mechanistic toxicology studies.
    future_work: |
      Understanding the molecular mechanisms by which smoke constituents reach and damage extra-pulmonary tissues, and the reversibility of these effects, remain important research questions.
  plain_language_summary: |
    This paper studied what happens to mice after a short period of breathing cigarette smoke through a specially designed chamber. The researchers measured how the smoke affected the body's antioxidant defenses and energy-producing enzymes in organs like the liver and kidney. While entirely unrelated to neuroscience or connectomics, it appears in this dataset due to citation network effects.
  summaries:
    beginner: |
        This study exposed mice to cigarette smoke for a short time and measured the damage to their cells' energy systems and antioxidant defenses. It showed that even brief smoke exposure has measurable metabolic effects across multiple organs. This paper is not related to brain mapping or connectomics and appears here due to citation overlap in the bibliometric dataset.
    intermediate: |
        This toxicology study documents short-term cigarette smoke effects on CYP1A1/2 enzyme induction and glutathione redox status in mouse tissues. Its presence in a connectomics citation network is a clear bibliometric artifact — high citation counts in its own domain (tobacco toxicology) likely created overlapping citation patterns with unrelated neuroscience papers. Researchers should treat this as a false positive in citation-based literature discovery.
    advanced: |
        This paper's inclusion in a connectomics reading list is a methodological artifact of citation-based bibliometrics where high-citation papers in any field accumulate cross-domain citation links. The reactive oxygen species and mitochondrial dysfunction topics do have tangential neuroscience relevance (oxidative stress in neurodegeneration, mitochondrial dynamics in synaptic function), but the specific content — nose-only smoke exposure in mice — has no direct connectomics application. This case illustrates the importance of manual curation and domain-specific filtering when using unsupervised citation network analysis to identify relevant literature.
  discussion_prompts:
  - |
    This paper appears in a connectomics citation network despite having no direct relevance to brain wiring — what does this reveal about the limitations of citation-based bibliometric methods for literature discovery?
    - |
    Oxidative stress and mitochondrial dysfunction are relevant to neurodegeneration — how would you design a study connecting smoking-induced oxidative stress to changes in synaptic connectivity detectable by connectomics?
    - |
    How should researchers filter or weight citation network results to distinguish topically relevant papers from high-citation outliers that appear due to domain-crossing citation patterns?
    - id: the-natverse-a-versatile-computational-toolbox-to-combine-an
    title: |
    The natverse: a versatile computational toolbox to combine and analyse neuroanatomical data
    authors: "Bates, Manton, Jagannathan et al."
    year: 2014
    journal: ""
