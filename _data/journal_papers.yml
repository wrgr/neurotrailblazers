  summaries:
    beginner: >-
      When scientists build computer models of brain circuits, how do they know if the model is right? This paper proposes
      standards for evaluating computational models, arguing that models should make testable predictions and be compared
      against alternatives.
    intermediate: >-
      Eckstein et al. propose a framework for evaluating computational evidence in neuroscience, including standards for model
      specification, comparison, validation, and falsification. They discuss how connectomics data can serve both as model
      constraints and validation targets.
    advanced: >-
      Addresses the model selection and validation problem for connectome-constrained models. Proposes Bayesian model comparison,
      cross-validation against held-out circuits, and out-of-distribution generalization as standards for computational evidence
      in network neuroscience.
  ocar:
    opportunity: >-
      Computational models of neural circuits were proliferating, but the field lacked agreed-upon standards for evaluating
      whether a model provides genuine evidence about brain function versus merely fitting observed data.
    challenge: >-
      Defining standards of computational evidence requires addressing fundamental questions about model comparison, validation,
      falsification, and the distinction between fitting data and explaining mechanisms.
    action: >-
      Eckstein et al. proposed a framework for evaluating computational evidence in neuroscience, including standards for
      model specification, formal comparison methods, validation against independent data, and criteria for falsification.
    resolution: >-
      The framework provides concrete guidelines including Bayesian model comparison, cross-validation against held-out circuits,
      and out-of-distribution generalization testing, directly applicable to connectome-constrained models.
    future_work: >-
      Implementing these standards across the field and developing shared benchmarks for model comparison in connectomics
      remain important goals.
