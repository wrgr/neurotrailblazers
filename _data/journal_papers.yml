    beginner: FlyWire is a website where anyone can help map the fruit fly brain by correcting computer-generated neuron tracings.
      This paper describes how the platform was built to let hundreds of people work on the same brain simultaneously without
      interfering with each other's edits.
    intermediate: Dorkenwald et al. describe the FlyWire platform, a web-based system for collaborative proofreading of the
      FAFB whole-brain segmentation. The platform uses a chunked graph data structure (CAVE) that supports real-time, conflict-free
      multi-user editing. Community engagement strategies enabled hundreds of contributors to proofread neurons across the
      entire brain.
    advanced: The technical core of FlyWire is the chunked graph representation that decomposes the segmentation into spatially
      localized, independently editable chunks. This architecture enables O(1) edit operations regardless of dataset size
      and supports concurrent multi-user editing without locks. The platform design demonstrates that connectomics proofreading
      can be effectively crowdsourced when tooling eliminates coordination overhead.
