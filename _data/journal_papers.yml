    ocar:
    opportunity: |
      Despite the enormous cognitive differences between mice and humans, the synaptic circuit organization of their cerebral cortex had never been directly compared at the ultrastructural level, leaving unknown which circuit features are conserved and which differ.
    challenge: |
      Comparing synaptic connectivity across species requires matching EM datasets with compatible resolution and tissue processing, consistent cell-type classification methods, and computational tools for cross-dataset alignment and comparison.
    action: |
      The authors compared EM connectomics datasets from mouse and human cortex, annotating cell types, measuring synapse sizes, densities, and connectivity patterns, and performing quantitative comparisons of excitatory and inhibitory circuit organization.
    resolution: |
      Mouse and human cortex share fundamental circuit motifs including the prevalence of excitatory-to-excitatory connections and inhibitory control of pyramidal cells, but differ in the relative connectivity of interneuron subtypes and the proportion of inhibitory synapses. The study provides the first direct ultrastructural comparison between these two species.
    future_work: |
      Larger volume reconstructions with complete cell inventories are needed to determine whether the species differences identified here reflect true circuit divergence or sampling biases from small volumes.
  plain_language_summary: |
    Mouse brains have 1,000 times fewer neurons than human brains, but we didn't know how the actual wiring differed at the level of individual connections. This study directly compared mouse and human brain tissue under the electron microscope, finding that many fundamental circuit patterns are shared but with notable differences in how inhibitory neurons connect.
  summaries:
    beginner: |
        Scientists compared the actual microscopic wiring of mouse and human brain tissue, looking at individual synaptic connections under the electron microscope. They found that the basic circuit organization is similar in both species but there are differences in how inhibitory neurons — the brain's 'brakes' — connect to other neurons.
    intermediate: |
        Using matched EM datasets from mouse and human cortex, the authors quantified synapse density, size distributions, and cell-type-specific connectivity patterns including excitatory/inhibitory ratios and interneuron target preferences. The comparative analysis reveals conserved features (asymmetric synapse prevalence, pyramidal-to-pyramidal connectivity) alongside species-specific differences in interneuron connectivity that may relate to expanded cognitive capabilities.
    advanced: |
        The cross-species connectomic comparison faces several methodological challenges: tissue fixation differences between human (post-mortem) and mouse (perfusion-fixed) tissue affect ultrastructural quality and potentially synapse detection; the sampled volumes are small relative to the heterogeneity within each species; and cell-type classification based on ultrastructural morphology requires careful criteria harmonization. Despite these caveats, the identification of differences in chandelier cell connectivity and VIP interneuron targets between species provides testable hypotheses about circuit evolution and the molecular mechanisms that might underlie them.
  discussion_prompts:
  - |
    What specific circuit features differ between mouse and human cortex at the ultrastructural level, and what might these differences contribute to human cognitive capabilities?
    - |
    How can the methodological challenges of comparing EM datasets from different species (different fixation, different volume, different tissue quality) be rigorously controlled?
    - |
    What would a complete comparative connectomics dataset need to include to confidently attribute behavioral differences between species to specific circuit differences?
    - id: gbx2-identifies-two-amacrine-cell-subtypes-with-distinct-mol
    title: |
    Gbx2 Identifies Two Amacrine Cell Subtypes with Distinct Molecular, Morphological, and Physiological Properties
    authors: "Kerstein, Leffler, Sivyer et al."
    year: 2020
