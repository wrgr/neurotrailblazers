- id: ritchie-2015
  title: limma powers differential expression analyses for RNA-sequencing and microarray studies
  authors: Matthew E. Ritchie, Belinda Phipson, ... Wei Shi
  year: 2015
  journal: ''
  doi: 10.1093/nar/gkv007
  dimension: computer-vision-ml
  tags:
  - "method:statistics"
  - "method:differential-expression"
  - "method:bioinformatics"
  - "tool:limma"
  - "cell-types:transcriptomics"
  - "phase:core-methods"
  discussion_prompts:
  - >-
    How does limma's empirical Bayes variance moderation improve statistical power compared to per-gene t-tests, and when
    is this advantage largest?
  - >-
    How might differential expression analysis using limma be used to validate or refine cell-type classifications made from
    EM morphology in connectomics studies?
  - >-
    What are the limitations of applying limma-voom to single-cell RNA-seq data from individual neuron types, and what pseudobulk
    alternatives address them?
  summaries:
    beginner: >-
      limma is a popular statistics package used to find genes that are active at different levels in two groups of cells
      or conditions. The key innovation is that it uses information from all genes together to make better estimates when
      you only have a few samples. In neuroscience, limma is used to identify genes expressed differently between neuron types,
      which helps link transcriptomic cell-type identity to the structural types seen in EM connectomics.
    intermediate: >-
      limma applies linear models to log-expression data and introduces an empirical Bayes prior on gene-wise variances, shrinking
      unreliable small-sample variance estimates toward a pooled estimate. The resulting moderated t-statistics have greater
      power than ordinary t-tests at small n, which is the standard case in RNA-seq experiments. In connectomics contexts,
      limma-style differential expression analysis is used to identify marker genes distinguishing neuron types identified
      morphologically, linking structural classification to molecular identity.
    advanced: >-
      The empirical Bayes prior in limma is specified as an inverse chi-squared distribution on residual variances with parameters
      estimated from the data, yielding a posterior mean variance estimate that corresponds to a moderated t-statistic with
      inflated degrees of freedom. A key extension (limma-voom) applies this framework to RNA-seq count data by converting
      counts to log-CPM with observation-level weights, addressing the heteroscedasticity of count data. In single-cell RNA-seq
      applied to neuron type classification for connectomics, limma-style methods are used for pseudobulk differential expression
      to avoid the inflated type I error of naive single-cell tests. The package's handling of arbitrary contrast matrices
      makes it flexible for comparing multiple cell types simultaneously.
  ocar:
    opportunity: >-
      Differential gene expression analysis of RNA-seq and microarray data required statistical methods that could handle
      the small sample sizes typical of biological experiments while borrowing strength across genes to improve power — a
      challenge not fully met by simple per-gene t-tests.
    challenge: >-
      With small sample sizes (often n=3 per group), per-gene variance estimates are unreliable, leading to inflated false
      positive and false negative rates; a principled empirical Bayes framework for sharing variance information across genes
      was needed.
    action: >-
      Smyth developed the limma (linear models for microarray analysis) package, which applies linear models to gene expression
      data and uses empirical Bayes moderation of per-gene variance estimates toward a common prior, producing moderated t-statistics
      that outperform ordinary t-tests with small sample sizes. The package handles complex experimental designs through contrast
      matrices.
    resolution: >-
      limma became the most widely used differential expression analysis package in bioinformatics, demonstrating substantially
      improved power over unmoderated tests and enabling reliable analysis of complex multi-factor experiments. It has been
      applied to characterize gene expression differences between neuron types and brain regions relevant to understanding
      cell-type diversity in connectomics contexts.
    future_work: >-
      Extensions of the limma framework to handle single-cell RNA-seq data (with zero-inflation and count distributions) and
      to integrate multi-omics data remain active areas, addressed by packages like limma-voom and dream.
  plain_language_summary: >-
    When scientists want to know which genes are expressed differently between two conditions — say, between different neuron
    types — they face a statistical challenge: with only a few samples, normal statistics are unreliable. limma solves this
    by sharing information across all the genes in an experiment to get better estimates of variability. It is like grading
    a test more fairly by considering how variable scores typically are across all students, not just the few in front of
    you.
