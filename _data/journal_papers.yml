  summaries:
    beginner: >-
      Turning a million EM images into a wiring diagram requires a massive computational pipeline. This paper describes the
      complete MICrONS pipeline: aligning images, finding neuron boundaries, detecting synapses, and packaging everything
      for analysis.
    intermediate: >-
      Macrina et al. describe the full automated reconstruction pipeline for the MICrONS mm³ volume: image alignment, affinity-based
      segmentation, supervoxel agglomeration, synapse detection, and pre/post partner assignment. The pipeline processed ~2
      petabytes of imagery.
    advanced: >-
      The definitive systems paper for the MICrONS pipeline. Provides the most complete accounting of stage-by-stage error
      rates in a petascale reconstruction and documents computational resources (~millions of GPU-hours) useful for cost estimation
      of future projects.
  ocar:
    opportunity: >-
      Reconstructing the MICrONS cubic-millimeter cortical volume required an end-to-end computational pipeline operating
      at petascale, but no detailed systems-level description of such a pipeline existed with quantified stage-by-stage error
      rates.
    challenge: >-
      Each pipeline stage — image alignment, segmentation, agglomeration, synapse detection — introduced errors that propagated
      downstream, and processing ~2 petabytes of imagery required massive computational resources with carefully managed parallelization.
    action: >-
      Macrina et al. documented the complete MICrONS reconstruction pipeline including image alignment, affinity-based segmentation,
      supervoxel agglomeration, synapse detection with pre/post partner assignment, and quantified error rates and computational
      costs at each stage.
    resolution: >-
      The paper provides the most complete accounting of a petascale reconstruction pipeline, documenting millions of GPU-hours
      of computation and stage-by-stage error rates that enable cost estimation and error budgeting for future projects.
    future_work: >-
      Reducing the computational cost per unit volume and improving the weakest pipeline stages are priorities for enabling
      even larger reconstructions.
