  summaries:
    beginner: >-
      The brain is organized into distinct networks — groups of regions that work together. This study mapped these functional
      networks across the entire human brain using resting-state fMRI, identifying familiar systems like the visual network,
      motor network, and default mode network.
    intermediate: >-
      Power et al. used resting-state fMRI to define a functional parcellation of the human brain, identifying ~260 functional
      areas organized into ~13 networks. The parcellation was validated against task-based fMRI and has become widely used
      for network analysis.
    advanced: >-
      This parcellation became a standard for human brain network analysis and enables direct comparison with structural connectivity.
      The community structure detected from functional correlations partially but imperfectly matches structural connectivity
      modules, raising questions about the structure-function relationship.
  ocar:
    opportunity: >-
      Resting-state fMRI had revealed functional connectivity, but no comprehensive map of the human brain's functional network
      organization existed at whole-brain scale.
    challenge: >-
      Defining functional networks from resting-state data required methods for parcellating the brain into functional units
      and detecting community structure in the resulting correlation matrices, with validation against independent data.
    action: >-
      Power et al. used resting-state fMRI to define a functional parcellation of the entire human brain, identifying ~260
      functional areas organized into ~13 networks, and validated the parcellation against task-based fMRI data.
    resolution: >-
      The Power parcellation became a widely adopted standard for human brain network analysis, revealing the canonical set
      of functional networks and enabling systematic comparison of functional and structural connectivity across studies.
    future_work: >-
      Understanding why functional community structure only partially matches structural connectivity modules and extending
      functional parcellations to individual-level precision are ongoing challenges.
