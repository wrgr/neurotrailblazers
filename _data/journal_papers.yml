  summaries:
    beginner: >-
      Regular FIB-SEM produces beautiful 3D images with equal resolution in all directions, but can only image tiny volumes.
      This paper describes engineering improvements that increased the imageable volume by more than 100-fold, making FIB-SEM
      practical for imaging entire brain regions.
    intermediate: >-
      Xu et al. describe engineering improvements to FIB-SEM enabling continuous imaging over weeks to months, producing volumes
      exceeding 10⁶ μm³ at 8 nm isotropic resolution. Key innovations include automated FIB milling error detection, improved
      beam stability, and optimized sample preparation. This platform produced the Janelia hemibrain dataset.
    advanced: >-
      The engineering contributions — fault recovery, drift compensation, long-term beam stability — enabled the hemibrain
      and subsequent FIB-SEM connectomics. The system achieves 4-8 nm isotropic voxels over ~10⁶ μm³. Compare: FAFB achieved
      10x larger volume at 10x worse z-resolution; the hemibrain achieved 10x better z-resolution at 10x smaller volume.
  ocar:
    opportunity: >-
      Conventional FIB-SEM produced isotropic nanometer-resolution volumes but was limited to very small tissue blocks, making
      it impractical for imaging entire brain regions or circuits at the scale needed for connectomics.
    challenge: >-
      Extending FIB-SEM to large volumes required solving multiple engineering problems simultaneously, including long-term
      beam stability over weeks of continuous operation, automated detection and recovery from milling errors, and drift compensation.
    action: >-
      Xu et al. engineered an enhanced FIB-SEM platform with automated fault recovery, improved beam stability, and optimized
      sample preparation, enabling continuous imaging over weeks to months and producing volumes exceeding 10^6 cubic micrometers
      at 8 nm isotropic resolution.
    resolution: >-
      The enhanced system increased achievable FIB-SEM volume by more than 100-fold compared to conventional systems, directly
      enabling the acquisition of the Janelia hemibrain dataset and establishing FIB-SEM as a viable modality for circuit-scale
      connectomics.
    future_work: >-
      Whether FIB-SEM throughput could be further increased to approach the volume scales achievable by serial-section methods
      while retaining isotropic resolution remained an open question.
