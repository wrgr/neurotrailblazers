    ocar:
    opportunity: |
      The mathematical properties of randomly wired networks were poorly characterized, yet random graph theory provides the null models needed to determine whether observed connectivity patterns in real networks — including neural circuits — are non-random and potentially functional.
    challenge: |
      Rigorously deriving the structural properties of random graphs as a function of edge probability required new combinatorial techniques and probabilistic arguments that were not available in earlier graph theory.
    action: |
      Bollobás systematically developed the mathematical theory of random graphs (Erdős–Rényi model and extensions), deriving exact and asymptotic results on properties such as connectivity, component structure, diameter, and subgraph frequencies as functions of edge probability.
    resolution: |
      The book established a comprehensive mathematical framework for random graphs, proving phase-transition phenomena (e.g., the giant component emergence), and providing the baseline null distributions against which real-world network topology — including connectomes — is compared.
    future_work: |
      Extending random graph theory to weighted, directed, and hierarchically structured networks that better match biological connectomes remains an ongoing mathematical challenge.
  plain_language_summary: |
    This mathematics textbook laid the groundwork for understanding networks built by randomly connecting nodes. In neuroscience, random graph theory is indispensable as the baseline comparison: when we say a brain network has 'more clustering than expected,' the expected value comes from random graph models. Without this mathematical foundation, we could not distinguish meaningful wiring patterns from statistical noise.
  summaries:
    beginner: |
        A random graph is a network where connections between nodes are made by chance. This book worked out the math for how such networks behave — for example, when does a random network become fully connected? These results give neuroscientists a baseline for comparison: if a real brain network looks different from a random one, something biologically meaningful might explain the difference.
    intermediate: |
        Bollobás's 'Random Graphs' provides the rigorous mathematical foundations for Erdős–Rényi random graphs and their generalizations, including proofs of threshold phenomena for connectivity, Hamiltonian cycles, and subgraph containment. In connectomics, these results underpin statistical tests for non-random features such as overrepresented motifs, high clustering, and community structure, all of which require comparison to appropriately matched random null models.
    advanced: |
        This text is the canonical reference for random graph theory and provides the theoretical machinery for connectome graph analysis. Key results include the sharp threshold for graph connectivity at p = ln(n)/n and the emergence of a giant component at p = 1/n. In connectomics applications, the Erdős–Rényi model is typically insufficient as a null model (it does not preserve degree sequence), motivating configuration model or degree-preserving randomization. Researchers should be aware that graph statistics computed on connectomes (e.g., clustering coefficient, path length) must be compared to null models that control for degree distribution to avoid spurious conclusions.
  discussion_prompts:
  - |
    What random graph null model is most appropriate when testing whether a connectome has non-random clustering or motif frequencies, and why does the choice of null model matter?
    - |
    The Erdős–Rényi model assumes all edges are equally probable — how does this assumption break down for neural connectivity, and what alternative models better capture biological constraints?
    - |
    Random graph theory predicts a sharp transition from disconnected to connected as edge density increases — is there an analogous transition in connectome development, and what would it look like?
    - id: molecular-mechanisms-of-cell-death-recommendations-of-the-no
    title: |
    Molecular mechanisms of cell death: recommendations of the Nomenclature Committee on Cell Death 2018
    authors: "Galluzzi, Vitale, Aaronson et al."
    year: 2018
    journal: ""
