      data from different projects can be searched and compared easily.
    intermediate: >-
      Sanchez, Gray-Roncal et al. propose standardized annotation metadata types for connectomics data, building on the RAMON
      schema. The standard defines consistent metadata fields for neurons, synapses, and other annotations, enabling cross-dataset
      queries and automated quality checks. Applied to multiple EM datasets to demonstrate interoperability.
    advanced: >-
      Metadata standardization is a prerequisite for the cross-dataset comparison that connectomics increasingly requires.
      This paper identifies the minimum metadata fields needed for annotation interoperability, proposes a schema that balances
      expressiveness with adoption simplicity, and demonstrates cross-dataset queries. The work directly supports reproducibility
      and the FAIR data principles in connectomics.
  ocar:
    opportunity: >-
      As multiple connectomics projects produced datasets with different annotation conventions, the lack of standardized
      metadata made it difficult to search, compare, or combine results across projects.
    challenge: >-
      Defining a metadata standard required balancing expressiveness (capturing all relevant information) with simplicity
      (encouraging adoption), while supporting the diverse annotation types (neurons, synapses, regions) used across connectomics
      projects.
    action: >-
      Sanchez, Gray-Roncal et al. proposed standardized annotation metadata types for connectomics building on the RAMON schema,
      defining consistent fields for neurons, synapses, and other annotations, and demonstrated cross-dataset queries on multiple
      EM datasets.
    resolution: >-
      The metadata standard enables cross-dataset queries and automated quality checks, directly supporting reproducibility
      and the FAIR data principles in connectomics by making annotations from different projects searchable and comparable.
    future_work: >-
      Achieving broad adoption of the standard across the connectomics community and extending it to support emerging annotation
      types (e.g., functional data, cell type labels) are ongoing priorities.
