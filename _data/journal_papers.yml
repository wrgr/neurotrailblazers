    summaries:
      beginner: "Finding synapses in brain images is hard because they are small and look similar to other structures. This paper shows that looking at the surrounding context — nearby vesicles, membranes, and mitochondria — helps a computer classifier distinguish real synapses from false alarms much more reliably."
      intermediate: "Becker et al. demonstrate that incorporating contextual features from the neighborhood around candidate synapse locations significantly improves detection accuracy. They extract multi-scale features capturing the presence of vesicle clouds, membrane proximity, and organelle context, and train a random forest classifier. The context-aware approach substantially outperforms local-texture-only baselines on ssTEM benchmark data."
      advanced: "This paper formalizes the observation that synapse identification depends on contextual cues (presynaptic vesicle pools, postsynaptic densities, cleft geometry) that extend well beyond the synapse itself. The feature design uses ray-based descriptors and Haar-like filters at multiple scales to capture these cues. While predating deep learning approaches, the work establishes the principle that synapse detection benefits from large receptive fields — a finding that directly motivated the use of deep CNNs with wide context for this task."

  - id: zung-2017
    title: "An error detection and correction framework for connectomics"
    authors: "Zung J et al."
    year: 2017
