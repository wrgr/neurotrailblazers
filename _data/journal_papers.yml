  - "Fig. 1: phantom design"
  - "Fig. 3: sensitivity vs specificity"
  discussion_prompts:
  - How should MRI tractography results be interpreted given the false-positive problem?
  - What role can EM connectomics play in validating tractography methods?
  related_content:
  - /content-library/connectomics/connectome-history/
  - /content-library/connectomics/graph-representations/
  summaries:
    beginner: >-
      Can we trust brain wiring maps from MRI? This study challenged 96 tractography methods using a phantom with known connections.
      The sobering result: all methods produced many false connections that don't actually exist.
    intermediate: >-
      96 tractography pipelines were evaluated on a physical phantom with known fiber configurations. All methods exhibited
      high false-positive rates — the more sensitive the method, the more false bundles it produced. No method achieved both
      high sensitivity and specificity.
    advanced: >-
      Fundamentally changed how the field interprets tractography-derived connectomes. The false-positive problem means MRI-derived
      connectivity matrices contain systematic errors difficult to distinguish from true connectivity. This is qualitatively
      different from EM, where false positives arise from correctable segmentation errors.
  ocar:
    opportunity: >-
      Diffusion tractography was widely used to map brain connectivity, but the accuracy of these methods had never been systematically
      evaluated against a ground truth with known fiber configurations.
    challenge: >-
      Creating a valid benchmark required building a physical phantom with realistic fiber configurations and evaluating a
      large number of tractography methods under standardized conditions to draw generalizable conclusions.
    action: >-
      Maier-Hein et al. evaluated 96 tractography pipelines on a physical phantom with known fiber bundles, systematically
      measuring each method's sensitivity (true bundles detected) and specificity (false bundles avoided).
    resolution: >-
      The sobering result showed that all methods produced high false-positive rates, with more sensitive methods generating
      more false bundles. No method achieved both high sensitivity and specificity, fundamentally changing how the field interprets
      tractography-derived connectomes.
    future_work: >-
      Developing tractography methods with better specificity and using EM connectomics as ground truth for validating MRI-based
      connectivity are important next steps.
  bibtex: >-
    @article{maierhein2017challenge,
      title={The challenge of mapping the human connectome based on diffusion tractography},
