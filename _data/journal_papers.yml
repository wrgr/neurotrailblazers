    ocar:
    opportunity: |
      Neuroimaging and neuroanatomy studies require a standardized coordinate system to report brain locations and compare findings across individuals and studies, but no widely adopted spatial reference for the human brain existed.
    challenge: |
      The human brain varies substantially in size and shape across individuals, making it difficult to define universal coordinates that meaningfully correspond to the same anatomical structures in different people.
    action: |
      Talairach and Tournoux constructed a stereotaxic co-planar atlas of the human brain based on a single post-mortem specimen, defining a coordinate system anchored to the anterior and posterior commissures (AC-PC line). The atlas provides anatomical labels in 3D Talairach space that can be applied to any brain after linear transformation.
    resolution: |
      The Talairach coordinate system became the de facto standard for reporting functional neuroimaging (PET, fMRI) and neuroanatomy results for decades, enabling cross-study comparison of activation foci and lesion locations. It provided the conceptual framework upon which MNI and other modern brain atlases were built.
    future_work: |
      The Talairach atlas is based on a single individual and uses linear normalization, which inadequately handles inter-individual variability; population-average probabilistic atlases (e.g., MNI152) and non-linear registration methods have largely replaced it in modern neuroimaging.
  plain_language_summary: |
    To compare brain scan results across different people and different labs, scientists needed a shared address system for the brain — like GPS coordinates but for neuroanatomy. This atlas created a standard coordinate grid based on a single human brain, allowing researchers to say 'activity was seen at coordinates X, Y, Z' and have everyone understand the same location. It became the foundation for decades of human neuroimaging research.
  summaries:
    beginner: |
        This atlas created a standard map of the human brain with a coordinate system, so that scientists studying different people's brains can all use the same address system to locate structures. Before this, there was no common language for saying exactly where in the brain something was found. It enabled the first systematic comparisons of brain activity across different experiments and individuals.
    intermediate: |
        The Talairach coordinate system is defined by a piecewise linear transformation that maps any individual brain onto a reference space anchored by the anterior and posterior commissures. Despite being derived from a single specimen, it enabled the first large-scale meta-analyses of PET and fMRI activation data. In modern connectomics, the concept of a reference coordinate system underpins all brain atlas efforts, from the Allen Brain Atlas to the Drosophila JRC2018 template.
    advanced: |
        The Talairach atlas's fundamental limitation — using a single, aged, female specimen for a reference presumed to represent all human brains — motivated the development of the MNI152 probabilistic average template derived from 152 individuals. The piecewise linear normalization (12 octants) is systematically outperformed by non-linear diffeomorphic registration (ANTs, FSL FNIRT) for inter-subject alignment. Nevertheless, the Talairach framework established the key conceptual requirement for any connectomics or neuroimaging atlas: a consistent spatial reference enabling cross-study comparison, a principle directly applied in large EM connectomics projects through template brain construction and registration pipelines.
  discussion_prompts:
  - |
    What are the consequences of basing a universal human brain coordinate system on a single individual, and how do modern probabilistic atlases address this problem?
    - |
    How does the concept of a stereotaxic atlas translate from human neuroimaging to EM connectomics, where single-animal reconstructions serve as the reference?
    - |
    In what ways does inter-individual variability in brain structure challenge the goal of a universal neural wiring diagram, whether in humans or in Drosophila?
