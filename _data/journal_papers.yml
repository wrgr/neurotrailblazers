  - How should citation practices reference specific CAVE materializations?
  related_content:
  - /content-library/infrastructure/provenance-and-versioning/
  - /content-library/proofreading/proofreading-tools/
  summaries:
    beginner: When hundreds of people edit a brain map simultaneously, you need a system to track every change. CAVE is like
      version control for connectomics — it lets researchers go back to any previous version and ensures published analyses
      can always be reproduced.
    intermediate: CAVE provides versioned, materialized annotation infrastructure for large-scale connectomics. It tracks
      the complete history of proofreading edits in a chunked graph structure supporting efficient historical queries. Materialization
      produces timestamped snapshots for reproducible analysis.
    advanced: CAVE's architecture solves the reproducibility crisis in collaborative connectomics. The chunked graph enables
      O(1) edit operations, the materialization pipeline produces denormalized tables for fast queries, and the versioning
      system maintains complete edit provenance. Powers both FlyWire and MICrONS.
