- id: saalfeld-2009b
  title: "CATMAID: collaborative annotation toolkit for massive amounts of image data"
  authors: Stephan Saalfeld, Albert Cardona, Volker Hartenstein, Pavel Tomančák
  year: 2009
  journal: ''
  doi: 10.1093/bioinformatics/btp266
