    How does presynaptic versus postsynaptic developmental plasticity differ mechanistically, and what are the advantages
    of presynaptic regulation for establishing sparse combinatorial wiring?
  - >-
    What predictions does the sparse coding theory make about the optimal number of inputs per Kenyon cell, and how do the
