  summaries:
    beginner: The hemibrain is a map of about half the fruit fly brain containing ~25,000 neurons and 20 million connections.
      It includes not just the wiring diagram but also analyses of circuit structure, neuron types, and network properties.
    intermediate: Scheffer et al. present the hemibrain connectome from a FIB-SEM volume at 8 nm isotropic resolution. The
      paper covers FFN segmentation, ~50 person-years of proofreading, synapse detection, and neuron type assignment. The
      dataset is queryable via neuPrint.
    advanced: 'Demonstrates the frontier of production connectomics. Key points: proofreading prioritized large neurons by
      downstream impact; confidence scoring by synapse count thresholds; the neuPrint database architecture for graph queries.
      Proofreading completeness varies by brain region.'
  ocar:
    opportunity: A large-scale connectome of the adult Drosophila brain was needed to enable systematic analysis of neural circuits underlying complex behavior, but no such dataset existed at synaptic resolution.
    challenge: Imaging half the fly brain at 8 nm isotropic resolution using FIB-SEM and proofreading the resulting segmentation required ~50 person-years of effort, with difficult decisions about how to prioritize proofreading across brain regions.
    action: Scheffer et al. produced the hemibrain connectome containing ~25,000 neurons and ~20 million synapses using FIB-SEM imaging, flood-filling network segmentation, extensive proofreading, and systematic neuron type assignment, making it queryable through the neuPrint database.
    resolution: The hemibrain became the first large-scale adult Drosophila connectome, enabling circuit-level analysis across many brain regions and establishing production connectomics standards for proofreading prioritization and confidence scoring.
    future_work: Completing the other brain hemisphere and comparing with whole-brain datasets like FlyWire to assess inter-individual variability are natural next steps.
