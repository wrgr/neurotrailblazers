  - /content-library/infrastructure/provenance-and-versioning/
  summaries:
    beginner: Brain images are enormous — petabytes of data that need to be stored and shared efficiently. OME-Zarr is a new
      file format designed for cloud storage that makes it possible to stream just the parts of an image you need without
      downloading everything.
    intermediate: Moore et al. describe OME-Zarr, a cloud-optimized multi-resolution image format for bioimaging. It stores
      data as chunked arrays in object storage, enabling efficient random access and multi-resolution viewing without full
      dataset download. The format is adopted by multiple connectomics platforms.
    advanced: OME-Zarr addresses the fundamental I/O bottleneck for large-scale connectomics data sharing. The chunked, multi-resolution
      design enables efficient streaming for visualization (Neuroglancer), analysis (random region extraction), and collaborative
      annotation. Compare with Precomputed (Google) and N5 (Janelia) formats.
  ocar:
    opportunity: Connectomics datasets are petabytes in size, but existing file formats were not designed for cloud-based access, forcing researchers to download entire datasets or use platform-specific proprietary formats.
    challenge: Designing a format that supports efficient random access to arbitrary sub-regions at multiple resolutions while being compatible with cloud object storage required rethinking how multi-dimensional image data is chunked and indexed.
    action: Moore et al. developed OME-Zarr, a cloud-optimized multi-resolution file format that stores bioimaging data as chunked arrays compatible with cloud object storage, enabling efficient streaming and random access.
    resolution: OME-Zarr was adopted by multiple connectomics platforms and visualization tools (including Neuroglancer), solving the data sharing bottleneck by enabling researchers to access only the portions of data they need without downloading entire petabyte-scale datasets.
    future_work: Harmonizing OME-Zarr with competing formats (Precomputed, N5) and establishing community standards for metadata within the format remain ongoing efforts.
