    ocar:
    opportunity: |
      Understanding how neurons in visual cortex compute their responses requires knowing both their functional properties and their structural connectivity — but no dataset existed that combined dense functional recordings with a complete wiring diagram of the same tissue volume at cortical scale.
    challenge: |
      Achieving co-registration of two-photon calcium imaging across a millimeter-scale cortical volume with subsequent EM reconstruction required solving hard technical problems of tissue preservation, physical registration, and matching individual cells across modalities at submicron precision.
    action: |
      The MICrONS consortium performed dense two-photon calcium imaging of ~75,000 neurons in mouse primary visual cortex and higher areas (V1, RL, AL, PM, AM), characterized their visual response properties, then fixed the same tissue and performed automated EM reconstruction to obtain the structural connectome. Cells were matched between modalities using fiducial landmarks.
    resolution: |
      The study produced the largest joint functional-structural cortical dataset, enabling direct tests of whether connected neurons share functional properties. The dataset was released publicly via MICrONS Explorer and has become a community resource for testing circuit theories of visual cortex computation.
    future_work: |
      Improving completeness of synaptic reconstruction across all cortical layers and cell types, extending to behavioral experiments, and developing statistical frameworks to interpret the structure-function relationships observed are ongoing priorities.
  plain_language_summary: |
    Scientists have long wanted to know not just what neurons in the brain are wired to, but also what those neurons respond to — and whether connected neurons tend to share similar functions. This paper achieved exactly that for a piece of mouse visual cortex: they first recorded what ~75,000 neurons responded to in a living mouse, then mapped all the connections between those same neurons from electron microscope images of the preserved tissue. The resulting dataset lets researchers directly test theories about how visual circuits work.
  summaries:
    beginner: |
        This paper combined two major types of brain measurement in the same tissue: recording the electrical activity of tens of thousands of neurons in a mouse's visual cortex while the mouse viewed images, and then mapping all their connections from electron microscope images. Having both types of data for the same neurons lets scientists test whether the wiring diagram predicts how neurons respond. It is a landmark experiment in linking brain structure to brain function.
    intermediate: |
        The MICrONS dataset integrates two-photon calcium imaging of ~75,000 neurons across five visual areas with dense EM reconstruction of a 1.4 mm x 0.87 mm x 0.82 mm volume. Functional responses include orientation tuning, spatial frequency preference, and noise correlations for identified cell types (excitatory, inhibitory subtypes). EM reconstruction provided synapse-level connectivity for all cells within the volume. Initial analyses found weak but significant correlations between structural connectivity and functional similarity, particularly for noise correlations, supporting a structural basis for correlated variability.
    advanced: |
        The co-registration pipeline aligned the two-photon imaging coordinate system to the EM volume using fiducial landmarks (fluorescent beads and vasculature), achieving submicron cell matching accuracy. Functional-structural comparisons are complicated by several sources of noise: calcium imaging captures a filtered version of spike rates, not precise firing; EM connectivity is incomplete for distal processes; and functional states were measured during a specific stimulus protocol that may not represent all circuit states. The dataset has motivated new statistical frameworks for testing Hebbian learning predictions at scale, and the finding that noise correlations are partially predicted by common input (not just direct synaptic connections) highlights the importance of indirect connectivity in shaping functional coupling.
  discussion_prompts:
  - |
    What are the technical and biological sources of noise in the structure-function correlation analysis of the MICrONS dataset, and how should they be accounted for?
    - |
    How does the degree to which connected neuron pairs share functional properties compare to theoretical predictions from Hebbian learning models?
    - |
    What new computational theories of visual cortex become testable with a joint functional-structural dataset, and what additional measurements would be most informative?
