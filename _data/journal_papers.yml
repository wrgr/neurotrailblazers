      classical theorem prover toward useful steps. While this is a computer science paper, automated reasoning methods like
      these are increasingly applied to verify scientific software and data pipelines.
    intermediate: >-
      MizAR 60 combines neural-guided ATP (ENIGMA for E prover, Deepire for Vampire) with transformer-based premise selection
      in an iterative self-improvement loop. The iterative loop — generate ATP proofs, train on them, generate more proofs,
      repeat — is a general paradigm for bootstrapping AI performance in domains with formal feedback. This paradigm has analogs
      in connectomics where automated segmentation models are iteratively improved from human-corrected proofreading data.
    advanced: >-
      The iterative self-training paradigm in MizAR 60 is methodologically analogous to active learning loops used in connectomics
      proofreading, where model predictions are selectively corrected by humans and used to retrain. The transformer-based
      premise selection can be viewed as a form of retrieval-augmented reasoning, paralleling approaches in scientific literature
      mining for connectomics. This paper is an outlier in the connectomics citation network and likely appears due to high-citation
      links between AI methods; its direct relevance is the iterative self-improvement training strategy rather than specific
      mathematical content.
  ocar:
    opportunity: >-
      Automated theorem proving (ATP) could theoretically assist mathematical verification at large scale, but the combination
      of premise selection and proof search remained too weak to handle the breadth and complexity of a large formal mathematics
      library like Mizar.
    challenge: >-
