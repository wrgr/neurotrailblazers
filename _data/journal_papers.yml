  summaries:
    beginner: After a computer detects small fragments of neurons in brain images, it needs to decide which fragments belong
      to the same neuron. This paper uses a mathematical approach called multicut to make these grouping decisions at large
      scale, balancing the risk of merging different neurons versus leaving one neuron in pieces.
    intermediate: This paper applies the multicut (correlation clustering) framework to large-scale neuron agglomeration in
      connectomics. The method jointly optimizes all fragment-merging decisions to minimize a global objective that balances
      merge and split errors. Benchmark evaluation demonstrates competitive accuracy with improved consistency compared to
      greedy agglomeration methods.
    advanced: The multicut formulation casts agglomeration as a structured prediction problem where merge/split decisions
      are globally coupled. Unlike greedy approaches, multicut provides theoretical guarantees about solution quality relative
      to the objective. The paper evaluates computational strategies for scaling to large volumes and analyzes how edge weight
      calibration affects the merge-split error tradeoff on standard connectomics benchmarks.
