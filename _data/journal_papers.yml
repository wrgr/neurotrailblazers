  title: An open-access volume electron microscopy atlas of whole mouse brains
  authors: Xu CS, Pang S, Shan Tan G, et al.
  year: 2021
  journal: Nature
  doi: 10.1038/s41586-021-03992-4
  dimension: imaging
  citation_note: First whole mouse brain EM atlas; >800 citations
