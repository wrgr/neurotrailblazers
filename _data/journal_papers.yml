  - Which rules are likely conserved across cortical areas and species?
  related_content:
  - /content-library/cell-types/neuron-type-identification/
  - /content-library/case-studies/microns-visual-cortex/
  summaries:
    beginner: >-
      Different types of excitatory neurons in the cortex connect to each other in specific patterns — they don't wire up
      randomly. This study used the MICrONS dataset to discover the detailed 'wiring rules' that govern how different cell
      types connect.
    intermediate: >-
      Bodor et al. use the MICrONS mm³ dataset to define cell-type-specific connectivity rules for excitatory neurons across
      cortical layers. They identify systematic preferences in which cell types preferentially connect, with layer-specific
      targeting that extends beyond simple proximity.
    advanced: >-
      This paper establishes the excitatory connectivity rulebook for mouse visual cortex at a completeness not previously
      achievable. Key findings include layer-specific synaptic targeting preferences that are not predicted by spatial proximity
      alone, and quantitative E-type-to-E-type connection probabilities that constrain cortical circuit models.
  ocar:
    opportunity: >-
      The rules governing how different excitatory neuron types connect in cortex were largely unknown because previous studies
      lacked the scale to measure cell-type-specific connectivity across all cortical layers simultaneously.
    challenge: >-
      Defining connectivity rules required both accurate classification of excitatory neuron types across layers and measurement
      of connection probabilities and synapse counts between all type pairs, demanding the scale of the MICrONS dataset.
    action: >-
      Bodor et al. used the MICrONS cubic-millimeter dataset to classify excitatory neuron types across cortical layers and
      measure cell-type-specific connectivity rules including connection probabilities and synaptic targeting preferences.
    resolution: >-
      The study established the definitive excitatory connectivity rulebook for mouse visual cortex, revealing layer-specific
      targeting preferences not predicted by spatial proximity alone and providing quantitative constraints for cortical circuit
      models.
    future_work: >-
      Determining which connectivity rules are conserved across cortical areas and species and integrating excitatory rules
      with inhibitory connectivity patterns are important next steps.
