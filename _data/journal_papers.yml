    related_content: [/content-library/case-studies/drosophila-visual-circuits/, /content-library/neuroai/structure-function-mapping/]
    summaries:
      beginner: "Fruit flies are very good at detecting motion. This paper reconstructed the detailed wiring of the fly's motion-sensing circuits and used the connectivity to propose how these circuits actually compute the direction of movement."
      intermediate: "Takemura et al. densely reconstructed medulla columns in the Drosophila optic lobe, identifying all synaptic connections among the neurons involved in motion detection. The wiring diagram constrained existing computational models, favoring specific implementations of the Hassenstein-Reichardt correlator."
      advanced: "This study exemplifies targeted connectomics — reconstructing a functionally defined circuit to distinguish between competing models. The dense reconstruction of seven medulla columns revealed stereotyped connectivity with quantifiable variability. The synapse-level wiring data ruled out several motion detection model variants and motivated subsequent functional validation experiments."

