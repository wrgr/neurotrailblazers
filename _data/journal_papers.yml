  summaries:
    beginner: Some brain regions are more connected than others — they serve as 'hubs' that link many other regions together.
      This study used diffusion MRI to map these hubs and found a densely connected 'structural core' that includes regions
      important for integration and consciousness.
    intermediate: Hagmann et al. used diffusion spectrum imaging to construct a whole-brain structural connectivity network
      and identified a 'structural core' of densely interconnected hub regions including medial parietal cortex and superior
      frontal cortex. The core overlaps with the default mode network.
    advanced: This was among the first papers to identify hub structure in the human structural connectome. The 'structural
      core' concept — a densely interconnected set of regions that forms the backbone of brain communication — parallels the
      rich-club phenomenon observed in C. elegans at the neuron level. Cross-scale comparison of hub properties remains an
      open question.
  ocar:
    opportunity: The organization of the human structural connectome was unknown — specifically whether certain brain regions serve as disproportionately connected hubs forming a core communication backbone.
    challenge: Constructing a reliable whole-brain structural connectivity network from diffusion MRI required high-quality diffusion spectrum imaging and appropriate graph-theoretic methods for identifying hub regions and core structure.
    action: Hagmann et al. used diffusion spectrum imaging to construct a whole-brain structural connectivity network and applied graph-theoretic analysis to identify hub regions and a densely interconnected structural core.
    resolution: The study identified a structural core of densely interconnected hub regions concentrated in medial parietal and superior frontal cortex, overlapping with the default mode network and paralleling the rich-club phenomenon observed at the neuron level in C. elegans.
    future_work: Comparing hub properties across scales — from macro-scale MRI hubs to micro-scale hub neurons in EM connectomics — remains an important open question.
