    ocar:
    opportunity: |
      Macaque monkeys are a critical model for understanding human brain organization, but the MRI acquisition tools and preprocessing pipelines developed for the Human Connectome Project (HCP) have not been matched for macaques, limiting high-quality structural and functional connectome mapping in this species.
    challenge: |
      Macaque brains are smaller than human brains, requiring higher spatial and temporal resolution to resolve similar features; additionally, the macaque's anatomy necessitates specialized RF coils and customized pulse sequences that differ from those optimized for human imaging.
    action: |
      The authors designed and validated a 24-channel 3T multi-array RF coil optimized for macaque imaging, developed specialized MRI pulse sequences, and created a preprocessing pipeline for macaque structural and functional data analogous to the HCP minimal preprocessing pipeline.
    resolution: |
      The new coil and protocols yielded substantially improved SNR and spatial resolution for macaque brain imaging. The validated preprocessing pipeline enabled generation of high-quality structural and functional connectomes comparable in quality to HCP human datasets.
    future_work: |
      Further validation with larger macaque cohorts and extension to other non-human primate species would strengthen the utility of this platform for comparative connectomics research.
  plain_language_summary: ""
  summaries:
    beginner: |
        Scientists use MRI to map connections in the brain, and a project called the Human Connectome Project created excellent tools for doing this in humans. This paper built similar high-quality MRI tools specifically for monkeys, which are an important model for understanding the human brain.
    intermediate: |
        This study addresses the instrumentation gap between human and macaque MRI by developing a dedicated 24-channel 3T RF coil, optimized pulse sequences, and an HCP-style preprocessing pipeline for macaque connectomics. The resulting improvements in SNR and resolution bring macaque connectivity data quality closer to that available for human HCP datasets.
    advanced: |
        The paper provides a comprehensive characterization of a custom 24-channel 3T macaque RF coil, alongside optimized multiband and diffusion MRI acquisition protocols and a validated preprocessing pipeline. The ~3-fold smaller macaque brain volume demands proportionally higher spatial resolution to match HCP's relative cortical coverage; by achieving this, the platform enables direct comparison of macaque and human functional and structural connectomes, though temporal SNR and subject motion remain challenges for awake macaque fMRI.
  discussion_prompts:
  - |
    What are the key technical differences between optimizing MRI acquisition for macaques versus humans, and how do these differences affect the interpretation of comparative connectome studies?
    - |
    How should preprocessing pipelines for macaque data handle the systematic differences in brain morphology and folding patterns relative to humans?
    - |
    What scientific questions about primate brain evolution become tractable with HCP-quality macaque connectome data that were not previously addressable?
    - id: a-systematic-approach-to-reconstructing-microcircuitry-by-el
    title: |
