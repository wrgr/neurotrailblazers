  discussion_prompts:
  - >-
    How do the sources of error in manual serial-section EM reconstruction described in this paper compare to the error modes
    of modern automated segmentation pipelines?
  - >-
    What aspects of the systematic reconstruction approach described here were most important for enabling the C. elegans
    connectome, and what limited scaling to larger volumes?
  - >-
    How should completeness and accuracy be defined and measured for a neural circuit reconstruction, given the variety of
    error types that can occur?
  summaries:
    beginner: >-
      This paper describes a step-by-step guide for how to reconstruct neural circuits using electron microscopy, covering
      everything from tissue preparation to imaging to manually tracing neurons across hundreds of thin sections. It was a
      foundational reference that defined best practices before automated tools existed. Understanding this manual workflow
      helps appreciate why automation in modern connectomics is such a significant advance.
    intermediate: >-
      This methods paper systematizes the serial-section TEM reconstruction workflow, addressing section thickness and collection
      strategies, montaging for large fields of view, alignment approaches for section series, and criteria for synapse identification.
      It represents the practical implementation guide for the style of reconstruction that produced early landmark datasets
      including the C. elegans connectome. Many of the accuracy and completeness challenges it identified — partial reconstructions,
      merge/split errors, synapse ambiguity — are the same ones that modern automated pipelines still work to solve.
    advanced: >-
      The paper's systematic approach to error sources in manual reconstruction — section loss, folding, staining variability,
      tracing ambiguity — provides a useful baseline for evaluating how automated pipelines perform relative to ground truth.
      The emphasis on cross-section consistency and the use of redundant imaging (overlapping grids) anticipated modern approaches
      to ensuring reconstruction completeness. For contemporary EM connectomics, the relevant comparison is how far automated
      flood-filling networks and agglomeration algorithms have closed the gap with manual expert reconstruction quality on
      the same error categories described here, and whether new error modes have been introduced by automation.
  ocar:
    opportunity: >-
      Reconstructing neural microcircuits from electron microscopy requires a systematic workflow for imaging, section alignment,
      neuron tracing, and synapse identification, but no standardized methodology had been established for how to approach
      this from end to end.
    challenge: >-
      Serial-section EM reconstruction involves many steps — tissue preparation, sectioning, imaging, montaging, alignment,
      and tracing — each with its own sources of error, and the interdependencies between steps made it unclear how to optimize
      the overall pipeline.
    action: >-
      The authors presented a comprehensive systematic methodology for reconstructing neural microcircuitry from serial thin
      sections by electron microscopy, covering tissue preparation, section collection, imaging protocols, montaging strategies,
      and reconstruction approaches. They documented the full workflow with practical guidance on avoiding common failure
      modes at each stage.
    resolution: >-
      The paper provided a foundational reference protocol for manual serial-section EM connectomics that informed subsequent
      laboratory practice and software development. It established standards for section thickness, overlap requirements,
      and reconstruction accuracy that influenced how the field approached circuit reconstruction for decades.
    future_work: >-
      Automating many of the manual steps described and scaling the approach to larger tissue volumes were the natural next
      steps, which drove the development of automated EM imaging and segmentation tools that define modern connectomics.
  plain_language_summary: >-
    Before computers could reconstruct brain circuits automatically, scientists had to manually photograph hundreds of thin
    slices of tissue and trace neurons by hand — an enormous undertaking. This paper laid out a systematic recipe for doing
    this correctly, covering everything from how to cut the tissue to how to trace cell boundaries. It became the essential
    reference guide for a generation of manual connectomics work and set the stage for later automation.
