    beginner: >-
      Can you figure out what type each neuron is just by looking at its shape and connections? This study used the MICrONS
      dataset to classify inhibitory neurons, finding that connectivity features can distinguish types that look morphologically
      similar.
    intermediate: >-
      Schneider-Mizell et al. classified inhibitory neurons in the MICrONS mm³ volume using morphological and connectivity
      features, showing that connectivity features improve classification beyond morphology alone.
    advanced: >-
      Demonstrates the unique value of dense connectomics for cell type classification: features like target layer distribution
      and partner type composition are only accessible at connectome scale. Key challenges include handling incomplete arbors
      and defining features robust to proofreading errors.
  ocar:
    opportunity: >-
      The MICrONS cubic-millimeter connectome dataset offered the first opportunity to classify inhibitory interneurons using
      both morphological and dense synaptic connectivity features, going beyond what any single modality could achieve alone.
    challenge: >-
      Inhibitory neuron subtypes often look morphologically similar, and incomplete proofreading of dendritic and axonal arbors
      introduces noise into connectivity-based features. Defining robust classification features that tolerate reconstruction
      errors was a key challenge.
    action: >-
      Schneider-Mizell et al. systematically classified inhibitory neurons in the MICrONS volume using a combination of morphological
      features (soma depth, arbor extent) and connectivity features (target layer distribution, partner cell type composition,
      input/output ratios).
    resolution: >-
      Connectivity features significantly improved classification accuracy beyond morphology alone, revealing inhibitory subtypes
      that are distinguishable only at connectome scale. The study produced a comprehensive census of inhibitory cell types
      and their circuit-level wiring rules in mouse visual cortex.
    future_work: >-
