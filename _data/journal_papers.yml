  discussion_prompts:
  - >-
    How would you design a connectomics experiment to test whether Hebbian plasticity has shaped the strength and specificity
    of synaptic connections in a circuit?
  - >-
    What evidence from functional connectomics datasets (e.g., MICrONS) supports or challenges the prediction that strongly
    connected neuron pairs have more correlated activity?
  - >-
    What are the limitations of using a static EM connectome snapshot to infer the learning history of a circuit, and how
    might they be overcome?
  summaries:
    beginner: >-
      Donald Hebb's book proposed that the brain learns by strengthening connections between neurons that are active at the
      same time — a principle now known as Hebbian learning. This idea has been foundational to all modern theories of memory
      and learning. In connectomics, researchers now try to test whether this principle leaves a visible fingerprint in the
      wiring of real brain circuits.
    intermediate: >-
      Hebb's 'Organization of Behavior' introduces cell assemblies (reverberating networks encoding percepts) and phase sequences
      (chains of cell assemblies underlying thought) as biologically plausible neural substrates of cognition. The Hebbian
      synaptic rule provides the learning mechanism: correlated pre- and postsynaptic activity strengthens synapses. In connectomics,
      the critical question is whether synapse weight distributions between cell types show evidence of co-activity-driven
      Hebbian strengthening, a hypothesis that the functional connectomics approach of the MICrONS project directly attempts
      to address.
    advanced: >-
      Hebb's learning rule, formalized as dw/dt ∝ x_pre * x_post, is the conceptual precursor to STDP (spike-timing dependent
      plasticity) and the BCM rule. While the book predated direct measurement of LTP (Bliss & Lømo, 1973), its conceptual
      predictions were strikingly confirmed. For connectomics, the key test of Hebbian wiring is whether structurally connected
      neuron pairs show greater correlated activity than unconnected pairs — a test directly applied in the MICrONS dataset
      analysis. A key caveat is that a static EM connectome is a snapshot of the synaptic state at one moment, and the history
      of plasticity that shaped it is invisible without longitudinal imaging or molecular plasticity markers.
  ocar:
    opportunity: >-
      A theoretical framework was needed to explain how the nervous system gives rise to complex behavior through learning,
      perception, and motor control — at a time when neuroscience lacked the conceptual tools to link neural activity to behavior.
    challenge: >-
      Connecting neuroanatomy and physiology to behavior required a theoretical framework that was both biologically plausible
      and computationally powerful, bridging the gap between the cellular level and the level of complex adaptive behavior.
    action: >-
      Hebb proposed a detailed theory of how neurons in cell assemblies organize through experience, introducing the synaptic
      learning rule now called 'Hebbian learning' — the idea that 'neurons that fire together, wire together.' He developed
      the concept of cell assemblies as the neural substrate of mental representations and phase sequences as the basis of
      thought.
    resolution: >-
      The book established Hebbian synaptic plasticity as a foundational concept in neuroscience, providing the theoretical
      underpinning for later models of long-term potentiation (LTP), neural networks, and associative memory. Connectomics
      now provides tools to test whether Hebbian connectivity patterns — co-active neurons sharing stronger synaptic connections
      — are visible in structural wiring diagrams.
    future_work: >-
      Whether structural connectomes can reveal evidence of Hebbian plasticity history, and how learning-related synaptic
      changes are encoded in the static wiring diagrams obtained from EM connectomics, remain fundamental open questions.
  plain_language_summary: >-
    This 1949 book introduced one of the most important ideas in all of neuroscience: that neurons that are active together
    tend to strengthen their connections — 'neurons that fire together, wire together.' This principle, called Hebbian learning,
    became the foundation for understanding memory, learning, and how the brain develops through experience. Modern connectomics
    can now test whether Hebbian connectivity patterns are actually visible in the structural wiring of neural circuits.
