    ocar:
    opportunity: |
      Human brain structure at the nanometer scale — the level at which individual synapses, axons, and organelles are visible — remained completely uncharted for any substantial volume, preventing direct study of human circuit organization and comparison to model organisms.
    challenge: |
      Reconstructing a cubic millimeter of human cortex required acquiring, storing, and processing roughly 1.4 petabytes of FIB-SEM image data, deploying novel segmentation and proofreading infrastructure at unprecedented scale, and managing the clinical logistics of obtaining and preserving surgical tissue.
    action: |
      Shapson-Coe, Januszewski, Berger and colleagues imaged a 1 mm³ fragment of human temporal cortex (from epilepsy surgery) at ~8 nm resolution using FIB-SEM, reconstructed approximately 57,000 cells and 150 million synapses using flood-filling network segmentation, and publicly released the full dataset with interactive visualization tools.
    resolution: |
      The reconstruction revealed that glia outnumber neurons approximately 2:1, that oligodendrocytes are the most common cell type, that deep-layer excitatory neurons can be classified by dendritic orientation, and that while most axonal inputs to a neuron are weak, rare axons form up to 50 synapses onto a single target — a previously undescribed motif.
    future_work: |
      Understanding whether the rare powerful multi-synapse inputs represent a general cortical principle or a pathological artifact of the epileptic tissue, and extending this approach to different human cortical regions and individuals, are critical next steps.
  plain_language_summary: |
    This paper produced the most detailed map ever made of a piece of human brain — a sugar-cube-sized fragment of cortex, imaged at the resolution needed to see individual synapses. The resulting dataset is 1.4 petabytes and contains 57,000 cells and 150 million connections. Among the findings was a striking discovery: while most connections between neurons are weak, a small number of axons form up to 50 synapses onto a single cell — suggesting unexpectedly powerful individual inputs.
  summaries:
    beginner: |
        Scientists took a tiny piece of human brain tissue (about the size of a grain of rice) removed during epilepsy surgery and imaged it at incredible resolution using an electron microscope. The 1.4-petabyte dataset reveals all 57,000 cells and 150 million connections in that fragment. One surprising finding was that a few axons make up to 50 separate connections onto a single neuron — far more than expected.
    intermediate: |
        This landmark study presents the H01 dataset: a 1 mm³ FIB-SEM reconstruction of human temporal cortex comprising ~57,000 cells, ~230 mm of blood vessels, and ~150 million synapses at approximately 8 nm isotropic resolution. Segmentation used Google's flood-filling network pipeline. Key biological findings include a 2:1 glia-to-neuron ratio, oligodendrocyte dominance, dendritic orientation as a classifier for deep-layer excitatory neurons, and the discovery of rare multi-synapse (up to 50) axonal inputs. The full dataset is publicly accessible.
    advanced: |
        The H01 dataset represents the first petavoxel-scale human cortex reconstruction and benchmarks human connectivity against model organisms. Methodological highlights include sample preparation preserving synaptic ultrastructure from fresh surgical tissue, FIB-SEM acquisition at 8 nm resolution, and automated segmentation with human proofreading for quality control. Critical caveats: the tissue was from an epileptic focus (potential pathological alterations), the 1 mm³ volume precludes long-range pathway analysis, and single-subject sampling prevents population-level conclusions. The multi-synapse input motif (up to 50 synapses from one axon to one neuron) is a striking observation warranting validation in non-pathological tissue.
  discussion_prompts:
  - |
    The tissue was removed from an epileptic patient — how might epilepsy-related reorganization affect the observed connectivity patterns, particularly the multi-synapse axonal inputs?
    - |
    This reconstruction covers only 1 mm³ of temporal cortex — what biological questions can and cannot be answered at this spatial scale, and how would a larger volume change the analysis?
    - |
    How do the cellular composition ratios (glia:neuron ≈ 2:1, oligodendrocyte dominance) compare to non-human primate and rodent data, and what might explain any differences?
