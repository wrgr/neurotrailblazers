  summaries:
    beginner: >-
      After a computer automatically traces neurons in brain images, humans must check and fix the results — a process called
      proofreading. This paper explains why proofreading is the biggest bottleneck in mapping brain wiring and discusses strategies
      for making it faster and more efficient.
    intermediate: >-
      Plaza et al. review the connectome reconstruction pipeline with a focus on the proofreading bottleneck. They analyze
      how segmentation error rates translate into proofreading time, compare focused proofreading strategies versus exhaustive
      review, and discuss tools that accelerate human annotators. The paper frames proofreading as the rate-limiting step
      for large-scale connectomics.
    advanced: >-
      This paper provides a quantitative framework for understanding proofreading cost as a function of segmentation quality,
      volume size, and desired accuracy. The analysis of focused versus exhaustive proofreading strategies directly informs
      resource allocation decisions. The QA metrics discussed — including split/merge rates and their asymmetric impact on
      downstream analysis — remain central to pipeline evaluation.
  ocar:
    opportunity: >-
      Automated segmentation was improving but still produced errors that required human correction. The connectomics field
      needed a framework for understanding how proofreading effort scales with dataset size and segmentation quality.
    challenge: >-
      Proofreading cost depended on segmentation error rates, volume size, and desired accuracy in complex ways that made
      it difficult to plan resource allocation or evaluate pipeline improvements.
    action: >-
      Plaza et al. reviewed the reconstruction pipeline with a focus on the proofreading bottleneck, providing quantitative
      analysis of how segmentation error rates translate into proofreading time and comparing focused versus exhaustive proofreading
      strategies.
    resolution: >-
      The paper established proofreading as the rate-limiting step for large-scale connectomics and provided a quantitative
      framework for resource allocation that directly informed subsequent projects including the hemibrain and FlyWire.
    future_work: >-
      Reducing the proofreading bottleneck through better segmentation algorithms, smarter proofreading prioritization, and
      automated error correction remained critical open challenges.
