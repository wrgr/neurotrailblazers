      Do different brain regions use the same types of neurons? This study found that inhibitory neuron types are shared across
      areas, while excitatory neuron types differ — each area has its own specialized excitatory neurons.
    intermediate: >-
      Tasic et al. performed scRNA-seq on ~24,000 cells from two mouse cortical areas, identifying 133 transcriptomic types.
      GABAergic types are largely shared; glutamatergic types show area-specific specialization, particularly in deep layers.
    advanced: >-
      The most comprehensive single-cell transcriptomic reference for mouse cortex. For connectomics, cell type classifiers
      trained on one volume may not transfer to other areas. The hierarchical taxonomy provides a template for organizing
      connectomics-derived classifications.
  ocar:
    opportunity: >-
      Large-scale single-cell RNA sequencing made it possible to build the first comprehensive transcriptomic cell type taxonomy
      of mouse neocortex, potentially revealing whether different cortical areas use the same or different cell types.
    challenge: >-
      Previous studies sampled too few cells or too few areas to determine whether neuronal diversity varies across cortical
      regions. Distinguishing true biological variation from technical noise across experiments required rigorous statistical
      frameworks.
    action: >-
      Tasic et al. performed scRNA-seq on approximately 24,000 cells from two mouse visual cortical areas (VISp and ALM),
      applying iterative clustering to define 133 transcriptomic cell types organized in a hierarchical taxonomy.
    resolution: >-
      GABAergic interneuron types are largely shared across areas, while glutamatergic excitatory types show striking area-specific
      specialization, particularly in deep layers. The resulting taxonomy became the reference standard for cortical cell
      type classification.
    future_work: >-
      Extending the taxonomy to additional cortical and subcortical areas, integrating with connectomics data to determine
      whether transcriptomic types correspond to connectivity-defined types, and building cross-modal classifiers that predict
