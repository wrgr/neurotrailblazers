    to improve reconstruction quality?
  - >-
    At what level of automated segmentation accuracy does manual proofreading become the dominant bottleneck for connectomics,
    and how do methods like quantitative neuroanatomy help address this?
  summaries:
    beginner: >-
      When scientists reconstruct brain circuits from electron microscope images, they make errors that need to be found and
      corrected. This paper developed better methods for checking reconstruction quality by using both the physical shapes
      of neurons and the patterns of their connections to automatically identify and fix mistakes.
    intermediate: >-
      This paper presents a framework for quantitative proofreading of EM connectomics reconstructions using morphological
      arbor metrics and network-context analysis. Applied to Drosophila larval and adult circuits, the approach improved wiring
      diagram reliability and enabled systematic characterization of the relationship between arbor geometry and synaptic
      connectivity.
    advanced: >-
      The authors introduce a proofreading methodology that quantifies reconstruction quality using arbor branching statistics
      and exploits network topology — specifically, the expected convergence and divergence ratios for known cell-type pairs
      — to identify likely merges and splits. Applied to Drosophila sensorimotor and visual circuits, the method reduced reconstruction
      errors and produced anatomically annotated wiring diagrams with quantified confidence. The framework represents an early
      example of semi-automated proofreading and anticipates later approaches using machine learning classifiers trained on
      morphological and topological features to guide error detection.
