- id: micheva-2007
  title: "Array Tomography: A New Tool for Imaging the Molecular Architecture and Ultrastructure of Neural Circuits"
  authors: Kristina D. Micheva, Stephen J Smith
  year: 2007
  journal: ''
  doi: 10.1016/j.neuron.2007.06.014
  dimension: imaging
  tags:
  - "method:array-tomography"
  - "imaging:electron-microscopy"
  - "imaging:fluorescence"
  - "method:multiplexed-imaging"
  - "neuroanatomy:synapses"
  - "scale:circuit"
  discussion_prompts:
  - >-
    How does the molecular specificity offered by array tomography change our understanding of synapse diversity compared
    to purely structural EM connectomics?
  - >-
    What are the scalability limitations of array tomography compared to large-volume automated EM, and how might they be
    addressed?
  - >-
    How does the iterative immunostaining protocol in array tomography compare to other multiplexed imaging approaches like
    CODEX or MERFISH for mapping synaptic proteins?
  summaries:
    beginner: >-
      This paper introduces a method called array tomography that lets scientists image the same brain tissue slice with both
      a fluorescence microscope (to see specific proteins) and an electron microscope (to see fine structure). By cutting
      tissue into many thin slices arranged on glass slides, researchers can repeatedly stain and image the same material,
      identifying dozens of different molecules at each synapse. This combines the best of two types of microscopy.
    intermediate: >-
      Array tomography overcomes the resolution-versus-specificity trade-off by physically separating sections on glass substrates,
      allowing iterative antibody stripping and re-staining for multiplexed protein mapping, followed by SEM imaging of the
      same sections for ultrastructural context. The method achieves ~100 nm lateral and ~70 nm axial resolution in fluorescence
      mode and nanometer resolution in EM mode. It has been used to characterize the molecular heterogeneity of synaptic populations
      and to distinguish synapse subtypes in cortical circuits.
    advanced: >-
      A critical technical advantage of array tomography is that resin embedding preserves both antigenicity for immunofluorescence
      and membrane ultrastructure for EM, whereas aqueous embedding protocols for STORM/PALM typically sacrifice EM contrast.
      The iterative staining protocol (up to ~20 cycles demonstrated) enables a multiplexing depth far exceeding standard
      multicolor fluorescence, though antibody cross-reactivity and epitope accessibility after repeated stripping are important
      caveats. In connectomics contexts, array tomography has been used as a complementary validation tool alongside larger-scale
      FIB-SEM or SBEM reconstructions, particularly for quantifying synapse molecular diversity and identifying contact types
      that are ambiguous in EM alone.
  ocar:
    opportunity: >-
      Mapping the molecular composition and ultrastructure of neural circuits simultaneously was not possible with standard
      electron microscopy, which lacks molecular specificity, or with confocal microscopy, which lacks nanometer resolution.
    challenge: >-
      Combining molecular labeling with ultrastructural imaging required a workflow that could preserve both fluorescence
      and membrane ultrastructure in the same tissue section, and that could handle the hundreds to thousands of sections
      needed for circuit-level analysis.
    action: >-
      The authors developed array tomography, in which brain tissue is resin-embedded and cut into ultrathin serial sections
      that are collected as a physical array on glass substrates. Each section is imaged by fluorescence microscopy for multiple
      molecular markers, then re-imaged by scanning electron microscopy for ultrastructure. Multi-round immunostaining allows
      many proteins to be detected on the same sections.
    resolution: >-
      Array tomography enabled simultaneous visualization of synapse molecular identity (via immunofluorescence) and ultrastructure
      (via EM) in the same tissue volume. The method revealed the molecular diversity of individual synapses and demonstrated
      that multiple rounds of staining could be applied to map dozens of proteins in the same section array.
    future_work: >-
      Scaling array tomography to large brain volumes and integrating it with computational segmentation pipelines for fully
      automated molecular-ultrastructural connectomics remain active areas of development.
  plain_language_summary: >-
    Scientists want to know both what proteins are at each synapse and what it looks like in fine structural detail — but
    standard methods can only do one at a time. Array tomography slices brain tissue into hundreds of ultra-thin sections,
    lays them out on glass like a grid, and images each section with both a fluorescence microscope (for protein identity)
    and an electron microscope (for fine structure). It is like having a book where each page shows the same scene in two
    different color schemes.
