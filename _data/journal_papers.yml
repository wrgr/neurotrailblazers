- id: aicher-2015
  title: Learning latent block structure in weighted networks
  authors: Aicher C, Jacobs AZ, Clauset A
  year: 2015
  journal: Journal of Complex Networks
  doi: 10.1093/comnet/cnu026
  dimension: network-analysis
  tags:
  - "network-analysis:stochastic-block-model"
  - "network-analysis:community-detection"
  - "network-analysis:random-graph-model"
  key_figures:
  - "Fig. 1: weighted SBM illustration"
  - "Fig. 3: model comparison"
  discussion_prompts:
  - When should stochastic block models be preferred over modularity optimization for community detection?
  - How does modeling edge weights versus binary edges change the detected community structure?
  related_content:
  - /content-library/connectomics/network-analysis-methods/
  - /content-library/connectomics/graph-representations/
  summaries:
    beginner: >-
      Networks have hidden structure — groups of nodes that connect to each other in distinctive patterns. This paper develops
      a statistical model that can discover these groups while accounting for the strength (weight) of connections, not just
      their presence or absence.
    intermediate: >-
      Aicher et al. extend the stochastic block model to weighted networks, enabling principled community detection that uses
      edge weight information. Unlike modularity optimization, this approach provides a generative model and supports model
      selection (choosing the number of communities).
    advanced: >-
      Weighted SBMs are particularly relevant for EM connectomics where edge weights (synapse counts) carry important information.
      The generative model framework enables formal model comparison, handles degree correction, and avoids the resolution
      limit of modularity. The approach can distinguish assortative, disassortative, and core-periphery structure.
  ocar:
    opportunity: >-
      Standard community detection methods like modularity optimization treat edges as binary (present/absent), ignoring connection
      weights that carry important biological information, particularly synapse counts in EM connectomics.
    challenge: >-
      Extending stochastic block models to weighted networks required developing inference methods for weight distributions
      conditioned on block membership while maintaining computational tractability and the ability to select the number of
      communities.
    action: >-
      Aicher et al. extended the stochastic block model framework to weighted networks, developing inference algorithms that
      use edge weight information for community detection and support formal model selection for choosing the number of communities.
    resolution: >-
      The weighted SBM provides a principled generative approach to community detection that avoids the resolution limit of
      modularity, handles degree correction, and can distinguish assortative, disassortative, and core-periphery structures
      in weighted networks.
    future_work: >-
      Applying weighted SBMs to large-scale EM connectomics data where synapse counts define edge weights and comparing the
      detected communities with biologically defined cell types are natural applications.
  bibtex: >-
