- id: januszewski-2018
  title: High-precision automated reconstruction of neurons with flood-filling networks
  authors: Januszewski M et al.
  year: 2018
  journal: Nature Methods
  doi: 10.1038/s41592-018-0049-4
  dimension: computer-vision-ml
  tags:
  - "computer-vision-ml:flood-filling-network"
  - "computer-vision-ml:instance-segmentation"
  - "computer-vision-ml:3D-convolution"
  - "proofreading:QA-metrics"
  key_figures:
  - "Fig. 1: flood-filling network architecture and iterative seed expansion"
  - "Fig. 3: segmentation accuracy comparison on songbird and fly datasets"
  - "Fig. 5: reconstruction error rates and proofreading effort reduction"
  discussion_prompts:
  - >-
    How does the recurrent, seed-based flood-filling approach change the kinds of errors produced compared to traditional
    boundary-detection pipelines?
  - What practical limits does the sequential seed-expansion strategy impose on parallelization and throughput?
  related_content:
  - /content-library/computer-vision-ml/instance-segmentation/
  - /content-library/proofreading/QA-metrics/
  summaries:
    beginner: >-
      Instead of first drawing boundaries and then grouping pixels, this method grows each neuron outward from a seed point
      using a neural network, like digitally flood-filling a region. This approach produces far fewer merge errors, meaning
      it rarely accidentally glues two different neurons together.
    intermediate: >-
      Januszewski et al. introduce flood-filling networks (FFNs) that perform instance segmentation by iteratively predicting
      an object mask centered on a moving field of view. The recurrent architecture accumulates context as it grows, naturally
      handling complex branching morphology. On multiple EM datasets the method achieves near-human accuracy with substantially
      reduced proofreading burden.
    advanced: >-
      FFNs reformulate segmentation as sequential decision-making: a 3D convolutional network predicts voxel-level membership
      probabilities conditioned on the already-segmented region. This removes the need for a separate agglomeration step and
      shifts the error profile toward split errors (missed branches) rather than merges. The paper benchmarks on the songbird
      area X and Drosophila datasets, reporting large reductions in expected run length (ERL) error.
  ocar:
    opportunity: >-
      Automated neuron segmentation was limited by boundary-detection approaches that required a separate, error-prone agglomeration
      step. A fundamentally different paradigm — growing each neuron from a seed point — could potentially avoid the merge
      errors that dominated existing pipelines.
    challenge: >-
      Seed-based expansion must handle highly complex neuronal morphologies with thin, branching processes while accumulating
      enough context to make correct membership decisions. The sequential nature of the approach also poses challenges for
      computational throughput.
    action: >-
      Januszewski et al. developed flood-filling networks (FFNs) that perform instance segmentation by iteratively predicting
      an object mask from a moving field of view, using a recurrent 3D CNN that conditions each prediction on the already-segmented
      region.
    resolution: >-
      FFNs achieved near-human segmentation accuracy on multiple EM datasets with dramatically fewer merge errors than boundary-based
      methods, shifting the error profile toward split errors (missed branches) that are easier for proofreaders to fix. The
      approach substantially reduced overall proofreading burden.
    future_work: >-
      Improving throughput through better parallelization of seed expansion, reducing split errors via multi-scale or hierarchical
      architectures, and combining FFN outputs with agglomeration methods for further accuracy gains.
  bibtex: >
    @article{januszewski2018highprecision,
      title={High-precision automated reconstruction of neurons with flood-filling networks},
      author={Januszewski, Micha{\l} and others},
      journal={Nature Methods},
      volume={15},
      pages={605--610},
      year={2018},
      doi={10.1038/s41592-018-0049-4}
    }
