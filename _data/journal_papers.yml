- id: watts-1998
  title: Collective dynamics of ‘small-world’ networks
  authors: Duncan J. Watts, Steven H. Strogatz
  year: 1998
  journal: ''
  doi: 10.1038/30918
  dimension: network-analysis
  tags:
  - "method:graph-theory"
  - "species:c-elegans"
  - "graph-analysis:small-world"
  - "graph-analysis:clustering"
  - "scale:whole-brain"
  discussion_prompts:
  - >-
    The C. elegans connectome was used as an empirical example of a small-world network in 1998 — how has our understanding
    changed now that we have whole-brain connectomes for larger organisms?
  - >-
    How sensitive are small-world metrics (clustering coefficient, path length) to the choice of synapse-weight threshold
    when applied to weighted connectomes like the Drosophila hemibrain?
  - >-
    Does small-world topology in a connectome imply anything specific about the computational properties or robustness of
    that circuit, or is it purely a descriptive finding?
  summaries:
    beginner: >-
      Most networks — including the brain — are not random but also not perfectly regular. Watts and Strogatz showed that
      a small fraction of random long-range connections can dramatically shrink the average distance between any two nodes
      while keeping local structure intact. The C. elegans nervous system was one of the real-world examples that fit this
      'small-world' pattern.
    intermediate: >-
      Watts and Strogatz (1998) introduced the small-world network model, showing that interpolating between regular and random
      graphs via random edge rewiring produces a regime with simultaneously high clustering coefficient C and low characteristic
      path length L. They validated the model against three empirical networks, including the C. elegans connectome, finding
      all three exhibit C >> C_random and L ≈ L_random. This work provided the first formal framework for analyzing connectome
      topology in graph-theoretic terms.
    advanced: >-
      The Watts–Strogatz model is foundational for connectome graph analysis; its two summary statistics (clustering coefficient,
      path length) remain standard benchmarks for comparing neural networks across species. Caveats include the model's assumption
      of equal degree for all nodes (contrast with scale-free distributions in many biological networks) and the difficulty
      of separating topological properties from circuit function. In connectomics, small-world metrics have been computed
      for fly, worm, and mammalian cortical networks, though comparisons are sensitive to thresholding choices and edge-weight
      definitions.
  ocar:
    opportunity: >-
      Many real-world networks — from power grids to social networks to nervous systems — appeared to fall between the extremes
      of perfectly regular lattices and purely random graphs, yet no mathematical framework captured this intermediate regime.
    challenge: >-
      Characterizing networks required metrics that could simultaneously capture local clustering (neighbors of a node are
      likely connected) and short global path lengths, properties that prior models could not reproduce together.
    action: >-
      Watts and Strogatz introduced the 'small-world' network model by starting with a regular ring lattice and randomly rewiring
      a small fraction of edges. They measured clustering coefficient and average path length as functions of rewiring probability
      and compared these to real networks from neuroscience, power engineering, and social science.
    resolution: >-
      They demonstrated that a tiny amount of random rewiring dramatically reduces average path length while preserving high
      local clustering, creating a 'small-world' regime. Real networks including the C. elegans neural network fell into this
      regime, suggesting a universal organizing principle with implications for efficient signal propagation.
    future_work: >-
      Understanding how small-world topology arises from developmental or evolutionary constraints, and its causal role in
      neural computation, remains an active research area.
  plain_language_summary: >-
    This famous paper asked: why can you reach almost anyone on Earth through six degrees of separation, even though most
    people only know their local neighbors? The authors showed that adding just a few long-range shortcuts to an otherwise
    local network creates a 'small world' — a network that is both tightly clustered and easy to traverse — and found the
    same pattern in the wiring of C. elegans neurons.
  citation_note: 42581 citations | methods | 1 foundations
- id: galluzzi-2019
  title: Autophagy-Independent Functions of the Autophagy Machinery
  authors: Lorenzo Galluzzi, Douglas R. Green
  year: 2019
  journal: ''
  doi: 10.1016/j.cell.2019.05.026
  dimension: computer-vision-ml
  tags:
  - "cell-types:autophagy"
  - "method:cell-biology"
  - "review:mechanisms"
  - "method:genetics"
  discussion_prompts:
  - >-
    How can researchers experimentally distinguish between a phenotype caused by loss of autophagic flux versus loss of an
    autophagy-independent function of an ATG protein?
  - >-
    The review highlights autophagy-independent roles in inflammation — how might these affect interpretation of autophagy
    studies in neuroinflammatory contexts?
  - >-
    Which autophagy-independent functions described here are most relevant to neurodegeneration research, and what therapeutic
    implications do they have?
  summaries:
    beginner: >-
      Autophagy is a process where cells break down and recycle their own damaged parts. This review showed that the proteins
      involved in autophagy also perform many other functions in the cell that have nothing to do with recycling. Understanding
      these extra functions is important because autophagy proteins are targets for treating cancer and neurodegeneration.
    intermediate: >-
      This review by Galluzzi and Green comprehensively catalogues non-canonical roles of ATG proteins outside autophagic
      flux. These include LC3-associated phagocytosis (LAP), LC3-associated endocytosis (LANDO), secretory autophagy, and
      direct regulatory interactions with apoptotic and inflammatory signaling cascades. The distinction between flux-dependent
      and flux-independent functions has important implications for interpreting phenotypes in autophagy knockout studies.
    advanced: >-
      The review systematically deconstructs the assumption that ATG protein phenotypes reflect autophagic degradation capacity.
      Functions covered include non-degradative roles of ATG proteins in immune signaling (e.g., ATG5–ATG12 activating IFN-I
      responses), regulation of apoptosis by Beclin-1 via Bcl-2 family interactions, and LAP-dependent phagosome maturation.
      Key experimental caveats include the difficulty of separating flux-dependent and flux-independent phenotypes in genetic
      models, and the context-dependence of these alternative functions across cell types and tissues. Relevance to neuroscience
      includes autophagy's role in synaptic pruning and aggregate clearance in neurodegeneration.
  ocar:
    opportunity: >-
      Autophagy — the cellular self-digestion pathway — was assumed to mediate its physiological roles exclusively through
      the degradation of cytoplasmic cargo, leaving unexplained a range of cellular effects observed when autophagy flux was
      absent.
    challenge: >-
      Distinguishing between effects caused by the absence of autophagic degradation versus scaffold or signaling functions
      of autophagy proteins required careful genetic and biochemical dissection in contexts where canonical flux is blocked.
    action: >-
      Galluzzi and Green reviewed and synthesized evidence across multiple model systems for autophagy-independent functions
      of core autophagy machinery proteins (ATG proteins), cataloguing their roles in membrane dynamics, inflammation, cell
      death, and other processes distinct from cargo degradation.
    resolution: >-
      The review established that many ATG proteins participate in cellular processes — including LC3-associated phagocytosis,
      unconventional secretion, and regulation of apoptosis — through mechanisms entirely independent of autophagic flux,
      reframing autophagy machinery as multifunctional regulators.
    future_work: >-
      Determining which autophagy-independent functions are physiologically dominant in specific disease contexts and whether
      they can be selectively targeted therapeutically remains an open challenge.
  plain_language_summary: >-
    Cells have a recycling system called autophagy that breaks down unwanted material. This review revealed that the proteins
    running this recycling machine do many other jobs as well — including regulating inflammation and cell death — even when
    no recycling is happening. It is like discovering that garbage trucks also deliver mail and repair roads on their routes.
  citation_note: 852 citations | review | 0 orientation
- id: bollobs-1985
  title: Random Graphs
  authors: Béla Bollobás
  year: 1985
  journal: ''
  doi: ''
  dimension: network-analysis
  tags:
  - "method:graph-theory"
  - "method:statistics"
  - "graph-analysis:null-models"
  - "graph-analysis:random-graphs"
  discussion_prompts:
  - >-
    What random graph null model is most appropriate when testing whether a connectome has non-random clustering or motif
    frequencies, and why does the choice of null model matter?
  - >-
    The Erdős–Rényi model assumes all edges are equally probable — how does this assumption break down for neural connectivity,
    and what alternative models better capture biological constraints?
  - >-
    Random graph theory predicts a sharp transition from disconnected to connected as edge density increases — is there an
    analogous transition in connectome development, and what would it look like?
  summaries:
    beginner: >-
      A random graph is a network where connections between nodes are made by chance. This book worked out the math for how
      such networks behave — for example, when does a random network become fully connected? These results give neuroscientists
      a baseline for comparison: if a real brain network looks different from a random one, something biologically meaningful
      might explain the difference.
    intermediate: >-
      Bollobás's 'Random Graphs' provides the rigorous mathematical foundations for Erdős–Rényi random graphs and their generalizations,
      including proofs of threshold phenomena for connectivity, Hamiltonian cycles, and subgraph containment. In connectomics,
      these results underpin statistical tests for non-random features such as overrepresented motifs, high clustering, and
      community structure, all of which require comparison to appropriately matched random null models.
    advanced: >-
      This text is the canonical reference for random graph theory and provides the theoretical machinery for connectome graph
      analysis. Key results include the sharp threshold for graph connectivity at p = ln(n)/n and the emergence of a giant
      component at p = 1/n. In connectomics applications, the Erdős–Rényi model is typically insufficient as a null model
      (it does not preserve degree sequence), motivating configuration model or degree-preserving randomization. Researchers
      should be aware that graph statistics computed on connectomes (e.g., clustering coefficient, path length) must be compared
      to null models that control for degree distribution to avoid spurious conclusions.
  ocar:
    opportunity: >-
      The mathematical properties of randomly wired networks were poorly characterized, yet random graph theory provides the
      null models needed to determine whether observed connectivity patterns in real networks — including neural circuits
      — are non-random and potentially functional.
    challenge: >-
      Rigorously deriving the structural properties of random graphs as a function of edge probability required new combinatorial
      techniques and probabilistic arguments that were not available in earlier graph theory.
    action: >-
      Bollobás systematically developed the mathematical theory of random graphs (Erdős–Rényi model and extensions), deriving
      exact and asymptotic results on properties such as connectivity, component structure, diameter, and subgraph frequencies
      as functions of edge probability.
    resolution: >-
      The book established a comprehensive mathematical framework for random graphs, proving phase-transition phenomena (e.g.,
      the giant component emergence), and providing the baseline null distributions against which real-world network topology
      — including connectomes — is compared.
    future_work: >-
      Extending random graph theory to weighted, directed, and hierarchically structured networks that better match biological
      connectomes remains an ongoing mathematical challenge.
  plain_language_summary: >-
    This mathematics textbook laid the groundwork for understanding networks built by randomly connecting nodes. In neuroscience,
    random graph theory is indispensable as the baseline comparison: when we say a brain network has 'more clustering than
    expected,' the expected value comes from random graph models. Without this mathematical foundation, we could not distinguish
    meaningful wiring patterns from statistical noise.
  citation_note: 6168 citations | methods | 1 foundations
- id: galluzzi-2018
  title: "Molecular mechanisms of cell death: recommendations of the Nomenclature Committee on Cell Death 2018"
  authors: Lorenzo Galluzzi, Ilio Vitale, ... Patrizia Agostinis
  year: 2018
  journal: ''
  doi: 10.1038/s41418-017-0012-4
  dimension: computer-vision-ml
  tags:
  - "method:cell-biology"
  - "review:nomenclature"
  - "cell-types:apoptosis"
  - "method:genetics"
  discussion_prompts:
  - >-
    How do the mechanistic criteria established in this nomenclature change the interpretation of earlier cell death studies
    that relied solely on morphological criteria?
  - >-
    Several cell death modalities (e.g., autophagy-dependent cell death, apoptosis) share molecular components — how can researchers
    cleanly assign a cell death event to one modality?
  - >-
    In the context of neurodegeneration, which regulated cell death pathways are most therapeutically actionable based on
    current evidence, and what does this nomenclature framework contribute to that question?
  summaries:
    beginner: >-
      Cells in our bodies are constantly dying and being replaced. Scientists have discovered many different ways cells can
      die — each with different molecular machinery and effects on surrounding tissue. This consensus paper standardized the
      names and definitions for these pathways so researchers worldwide use the same terminology, which is essential for comparing
      results across labs.
    intermediate: >-
      This Nomenclature Committee recommendation provides operational definitions for regulated cell death (RCD) modalities
      including intrinsic and extrinsic apoptosis, necroptosis, pyroptosis, ferroptosis, parthanatos, entotic cell death,
      NETosis, lysosome-dependent cell death, autophagy-dependent cell death, immunogenic cell death, cellular senescence,
      and mitotic catastrophe. Each modality is defined by molecular markers and genetic/pharmacological criteria rather than
      morphology alone. Relevance to neuroscience includes apoptotic and necroptotic pathways in neurodegeneration and the
      role of pyroptosis in neuroinflammation.
    advanced: >-
      The 2018 NCCD recommendations represent the third major update to cell death nomenclature and reflect the field's shift
      from morphological to mechanistic classification. Key nuances include the distinction between RCD and accidental cell
      death, the possibility of pathway switching under genetic or pharmacological perturbation, and the recognition that
      cell death modalities can be immunogenic or tolerogenic with distinct downstream inflammatory consequences. In connectomics-adjacent
      neuroscience, these distinctions matter for interpreting neuronal loss in disease models, synaptic pruning mechanisms,
      and the role of microglia-mediated phagocytosis in circuit refinement.
  ocar:
    opportunity: >-
      The proliferating diversity of cell death modalities discovered in recent decades created terminological confusion that
      impeded communication across research communities and made it difficult to design and interpret experiments about cellular
      demise.
    challenge: >-
      Defining consistent, mechanistically grounded nomenclature for cell death pathways required integrating evidence from
      genetics, biochemistry, and cell biology across model systems, while distinguishing regulated from accidental death
      and separating overlapping pathway activities.
    action: >-
      An international Nomenclature Committee on Cell Death reviewed and updated definitions and criteria for all recognized
      cell death modalities, including apoptosis, necroptosis, pyroptosis, ferroptosis, autophagy-dependent cell death, and
      others, establishing consensus operational definitions based on molecular mechanisms.
    resolution: >-
      The 2018 recommendations established a unified nomenclature with mechanistic criteria distinguishing over a dozen regulated
      cell death modalities, providing a reference framework that enables reproducible reporting and cross-study comparison
      in cell biology and disease research.
    future_work: >-
      Newly discovered modalities continue to emerge, and determining the in vivo prevalence and pathological relevance of
      each pathway in human disease requires continued investigation.
  plain_language_summary: >-
    Cells can die in many different ways — some orderly and programmed, others chaotic and damaging. Scientists discovered
    so many different cell death pathways that the names and definitions became confusing. This paper brought together an
    international committee to agree on clear, mechanism-based definitions for all the major ways cells can die, giving researchers
    a shared vocabulary.
