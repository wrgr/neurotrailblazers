  - /content-library/proofreading/split-error/
  summaries:
    beginner: >-
      When computers trace neurons, they make two kinds of mistakes: merging two separate neurons into one, or splitting one
      neuron into pieces. This paper describes an automated system that detects both types of errors and suggests corrections,
      reducing the need for tedious human review.
    intermediate: >-
      Zung et al. propose a deep learning framework for detecting and correcting merge and split errors in automated neuron
      segmentations. The system uses a convolutional network to classify candidate error locations and suggest corrections.
      The approach is evaluated on connectomics datasets and demonstrates substantial error reduction.
    advanced: >-
      This framework treats error detection and correction as complementary tasks within a unified architecture. The key insight
      is that merge errors and split errors have different detection signatures and require different correction strategies.
      The system can be deployed as a preprocessing step before human proofreading, focusing annotator effort on genuinely
      ambiguous regions.
  ocar:
    opportunity: >-
      Automated neuron segmentation produced merge and split errors requiring time-consuming human proofreading, and there
      was no automated system to detect and correct both error types in a unified framework.
    challenge: >-
      Merge and split errors have different spatial signatures and require different correction strategies, making unified
      detection difficult across large volumes.
    action: >-
      Zung et al. trained a convolutional network to classify candidate error locations as merge or split errors and suggest
      targeted corrections, creating an iterative detect-correct loop.
    resolution: >-
      The system substantially reduced segmentation errors and focused human proofreading effort on genuinely ambiguous regions,
      bridging fully automated and semi-automated reconstruction.
    future_work: >-
      Integrating error detection into active learning pipelines where the system learns from human corrections on the hardest
      cases.
