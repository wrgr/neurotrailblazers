  - id: harris-weinberg-2012
    title: "Ultrastructure of synapses in the mammalian brain"
    authors: "Harris KM, Weinberg RJ"
    year: 2012
    journal: "Cold Spring Harbor Perspectives in Biology"
    doi: "10.1101/cshperspect.a005587"
    dimension: neuroanatomy
    tags:
      - neuroanatomy:synapse
      - neuroanatomy:spine
      - neuroanatomy:postsynaptic-density
      - neuroanatomy:vesicle
      - imaging:electron-microscopy
    key_figures:
      - "Fig. 1: synapse ultrastructure overview"
      - "Fig. 3: vesicle pool organization"
      - "Fig. 5: perforated synapse morphology"
    discussion_prompts:
      - "Which synapse features are robust enough for automated detection versus requiring human adjudication?"
      - "How does fixation quality affect measurements of cleft width and PSD thickness?"
    related_content:
      - /content-library/neuroanatomy/synapse-classification/
      - /content-library/neuroanatomy/dendrite-biology/
    summaries:
      beginner: "This review is a visual guide to what synapses — the connection points between neurons — actually look like under a powerful microscope. It explains the small structures (vesicles, densities, clefts) that make up a synapse and why their size and shape matter for brain function."
      intermediate: "Harris and Weinberg provide a systematic catalog of excitatory and inhibitory synapse ultrastructure in mammalian cortex and hippocampus. They describe presynaptic vesicle pools, the structure of the postsynaptic density, and cleft components visible at EM resolution. The review also covers perforated synapses, multi-synaptic boutons, and spinule formations."
      advanced: "Essential reading for anyone developing synapse detection algorithms or evaluating connectome edge weights. Key methodological points include the distinction between symmetric (Gray Type II) and asymmetric (Gray Type I) synapses, the quantitative relationship between PSD area and vesicle count, and caveats around interpreting synapse size from single-section profiles versus serial reconstructions."

  - id: peters-palay-1991
    title: "The Fine Structure of the Nervous System: Neurons and Their Supporting Cells"
    authors: "Peters A, Palay SL, Webster H deF"
    year: 1991
    journal: "Oxford University Press (textbook)"
    doi: null
    dimension: neuroanatomy
    tags:
