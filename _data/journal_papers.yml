- id: zhu-2017
  title: Unpaired Image-to-Image Translation Using Cycle-Consistent Adversarial Networks
  authors: Jun-Yan Zhu, Taesung Park, Phillip Isola, Alexei A. Efros
  year: 2017
  journal: ''
  doi: 10.1109/iccv.2017.244
  dimension: computer-vision-ml
  tags:
  - "method:deep-learning"
  - "method:gan"
  - "method:image-translation"
  - "tool:cyclegan"
  - "neuroai:domain-adaptation"
  - "imaging:electron-microscopy"
  discussion_prompts:
  - >-
    How should biologically meaningful image-to-image translation methods be validated in EM connectomics — what ground truth
    is needed to ensure translated images preserve ultrastructural accuracy?
  - >-
    What are the risks of using CycleGAN-translated images as training data for segmentation networks — could hallucinated
    features in the synthetic images degrade segmentation performance?
  - >-
    How does cycle-consistency compare to other constraints (perceptual loss, feature matching) for enforcing biologically
    faithful unpaired image translation?
  summaries:
    beginner: >-
      Changing an image from one style to another — like making a photo look like a painting — normally requires many matched
      example pairs. CycleGAN learned to do this with no matched pairs by requiring that if you translate an image to the
      new style and back, you get the original image. This technique is used in neuroscience to translate between different
      types of brain images.
    intermediate: >-
      CycleGAN employs two generator-discriminator pairs with a cycle-consistency loss (forward and backward cycle losses)
      to learn unpaired domain translation. In EM connectomics, applications include staining normalization across imaging
      sessions, conversion between FIB-SEM and ATUM-SEM image styles for cross-dataset training, and augmentation of rare
      or expensive image modalities. The cycle-consistency constraint helps prevent mode collapse but does not guarantee biologically
      accurate translations.
    advanced: >-
      CycleGAN's cycle-consistency loss enforces approximate injectivity of the mapping but cannot guarantee that domain-specific
      information not present in both domains is correctly handled — a critical caveat for scientific image synthesis where
      biologically meaningful features must be preserved. In EM connectomics, CycleGAN has been applied to normalize staining
      variations that reduce cross-dataset generalization of segmentation models; however, evaluation requires domain experts
      to verify that hallucinated or removed ultrastructural features do not bias downstream analysis. The method is widely
      used in data augmentation pipelines but should be validated against ground-truth matched images when available.
  ocar:
    opportunity: >-
      Image-to-image translation (converting images from one style or domain to another) typically requires large datasets
      of aligned image pairs, but paired training data is often unavailable in scientific imaging contexts including microscopy
      and histology.
    challenge: >-
      Learning a mapping between two image domains without paired examples is ill-posed — many possible mappings could transform
      images in one domain to look like images in the other, requiring additional constraints to enforce meaningful translations.
    action: >-
      Zhu et al. introduced CycleGAN, which uses two generative adversarial networks trained in tandem with a cycle-consistency
      loss requiring that a translated image can be translated back to recover the original, thus constraining the mapping
      without paired training data.
    resolution: >-
      CycleGAN successfully learns unpaired image-to-image translations for tasks including style transfer, domain adaptation,
      and modality conversion, performing comparably to paired methods on standard benchmarks. In connectomics and neuroscience,
      CycleGAN has been applied to cross-modality image synthesis, EM staining normalization, and augmentation for segmentation
      training.
    future_work: >-
      CycleGAN can fail when mode collapse produces non-injective mappings; handling multimodal translation and ensuring biologically
      faithful rather than visually plausible synthesis remain challenges for scientific applications.
  plain_language_summary: >-
    Translating images from one style to another normally requires matched pairs of examples — like having the same photo
    in color and black-and-white. CycleGAN is a clever method that learns this translation without any matched pairs, using
    a 'roundtrip consistency' trick. In brain science, it has been used to convert between different types of microscopy images
    without needing expensive paired data.
