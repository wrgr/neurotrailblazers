    ocar:
    opportunity: |
      The C. elegans nervous system was the first for which a complete wiring diagram was published (White et al. 1986), but subsequent analysis revealed errors and incompleteness in that original map. A rigorous, updated reconstruction was needed to provide an accurate and self-consistent connectome for network analysis.
    challenge: |
      The original C. elegans wiring diagram contained gaps, inconsistencies, and technical errors due to the limitations of manual reconstruction. Producing a corrected, complete, and self-consistent connectivity graph required systematic re-examination of the original EM micrographs and application of modern network analysis methods.
    action: |
      The authors systematically re-examined published and original EM data for C. elegans, corrected errors in the connectivity matrix, filled gaps, and produced a revised, self-consistent wiring diagram. They then analyzed the topological properties of the resulting network using graph-theoretic methods.
    resolution: |
      The revised C. elegans connectome showed small-world properties, a rich-club organization of highly connected hub neurons, and community structure corresponding to known functional subsystems. The corrected graph became the standard reference connectome for network neuroscience analyses of C. elegans.
    future_work: |
      Subsequent work has further refined the C. elegans connectome to include gap junctions, monoamine connections, and synaptic weights, and has compared connectomes across individual animals to assess stereotypy and variability.
  plain_language_summary: |
    The complete wiring diagram of the tiny worm C. elegans was first mapped in 1986, but it had errors. This paper corrected and completed that map, then analyzed the worm's nervous system as a mathematical network. They found that its 302 neurons are organized as a 'small world' — tightly clustered but efficiently connected — with a few hub neurons that many pathways pass through.
  summaries:
    beginner: |
        The worm C. elegans has exactly 302 neurons, making it the first animal whose complete brain wiring diagram was mapped. This paper corrected errors in the original map and then studied the wiring as a mathematical network, finding it has the 'small world' property where any two neurons are connected through just a few steps.
    intermediate: |
        This paper produced a corrected and complete synaptic and gap-junction connectivity matrix for C. elegans by systematically re-examining original EM data, then characterized the network's topology. Key findings include small-world organization (high clustering, short path length), a rich-club of hub neurons, and modularity reflecting functional subsystems — establishing C. elegans as a model for connectome network analysis.
    advanced: |
        The authors reconciled inconsistencies in the White et al. (1986) C. elegans connectome by leveraging multiple data sources and applying graph-theoretic consistency checks. The resulting directed, weighted connectivity graph became the canonical C. elegans connectome and was used to demonstrate small-world and rich-club topology, hierarchical modularity, and the functional relevance of identified hub neurons. The analysis established a methodological template subsequently applied to Drosophila and mammalian connectomes, and highlighted the importance of data quality and completeness for reliable network analysis.
  discussion_prompts:
  - |
    How has the C. elegans connectome been refined since this paper, and what new biological insights have emerged from those refinements?
    - |
    What does the small-world topology of the C. elegans connectome imply about the computational and metabolic constraints that shaped its evolution?
    - |
    How comparable are the graph-theoretic properties of the C. elegans connectome to those of larger connectomes (Drosophila, mouse partial), and what can we conclude from similarities or differences?
