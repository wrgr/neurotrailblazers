  summaries:
    beginner: For the first time, a small piece of human brain was reconstructed at the level of individual synapses. The
      H01 dataset reveals detailed wiring of tens of thousands of human neurons, including unusual structures not seen in
      other species.
    intermediate: 'Shapson-Coe et al. present the H01 dataset: 1 mm³ of human temporal cortex at nanometer resolution, containing
      ~57,000 cells and ~150 million synapses. The reconstruction reveals human-specific features including axonal whorls
      and more prevalent multi-synaptic connections than in mouse.'
    advanced: 'The first EM connectomics dataset at scale from human tissue. Key findings: multi-synaptic connection distribution
      differs from mouse with heavier tail; axonal whorls of unknown function highlight undiscovered human neuroanatomy. Technical
      challenges include pathological tissue source and computational cost of petascale reconstruction.'
  ocar:
    opportunity: Despite decades of EM connectomics in model organisms, no large-scale synaptic-resolution reconstruction of human brain tissue had been achieved, leaving fundamental questions about human-specific neural circuit organization unanswered.
    challenge: Human brain tissue is difficult to obtain at the quality needed for EM, and the computational cost of reconstructing a petavoxel volume at nanometer resolution required scaling existing pipelines by orders of magnitude.
    action: Shapson-Coe et al. reconstructed 1 mm cubed of human temporal cortex at nanometer resolution from surgically resected tissue, producing a dataset containing ~57,000 cells and ~150 million synapses with automated segmentation and synapse detection.
    resolution: The H01 dataset revealed human-specific features including axonal whorls of unknown function and a heavier-tailed distribution of multi-synaptic connections compared to mouse, demonstrating that human cortical wiring has distinctive properties not predicted from model organisms.
    future_work: Obtaining non-pathological human tissue for EM and comparing connectivity rules across human cortical areas and with other species remain critical next steps.
