  - "Fig. 2: developmental connectome analysis"
  discussion_prompts:
  - Which generative models best capture the statistics of real connectomes?
  - How should generative models be used to test hypotheses about wiring rules?
  related_content:
  - /content-library/connectomics/network-analysis-methods/
  - /content-library/connectomics/motif-analysis/
  summaries:
    beginner: >-
      To understand brain wiring, scientists build mathematical models that can generate realistic-looking networks. This
      review compares different models and shows how they can reveal the rules that govern how brain connections form and
      change during development.
    intermediate: >-
      Pedigo et al. review generative network models applied to connectomics data, comparing stochastic block models, random
      dot product graphs, and configuration models. They demonstrate how model comparison on developmental connectome data
      can distinguish competing hypotheses about wiring rules.
    advanced: >-
      This review provides a practical guide to applying generative models to EM connectomes. Key insights include the importance
      of model selection criteria, the relationship between model complexity and biological interpretability, and how developmental
      data provides natural experiments for testing generative models.
  ocar:
    opportunity: >-
      Generative network models had been developed for social and technological networks but had not been systematically applied
      to connectomics data, particularly developmental connectome series where they could reveal wiring rules.
    challenge: >-
      Choosing among competing generative models (stochastic block models, random dot product graphs, configuration models)
      and interpreting the results biologically requires understanding the strengths and assumptions of each approach.
    action: >-
      Pedigo et al. reviewed generative network models applied to connectomics, compared their properties, and demonstrated
      how model comparison on developmental C. elegans and Drosophila connectome data can distinguish competing hypotheses
      about wiring rules.
    resolution: >-
      The review established a practical guide for applying generative models to EM connectomes, showing that developmental
      data provides natural experiments for testing models and that model selection criteria are essential for biological
      interpretability.
    future_work: >-
      Developing generative models that incorporate spatial information and cell type identity, and applying them to larger
      connectomics datasets, are key directions.
