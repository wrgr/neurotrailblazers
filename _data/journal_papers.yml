    summaries:
      beginner: "This paper describes the creation of a complete high-resolution image of an entire adult fruit fly brain. The dataset, called FAFB, became the foundation for later efforts to trace every neuron and connection in the fly brain."
      intermediate: "Zheng et al. generated a 21 million image tile EM volume covering the full adult Drosophila brain at synaptic resolution using serial-section transmission EM. The FAFB dataset enabled targeted circuit tracing and eventually served as the basis for the FlyWire whole-brain connectome."
      advanced: "FAFB was acquired using ATUM-based serial sectioning at ~4 nm x-y and 40 nm z resolution. The paper addresses section loss, alignment challenges, and staining variability across the ~7,000 section series. While imaging alone does not constitute a connectome, FAFB demonstrated that whole-brain EM acquisition was tractable for a complex brain."

  - id: microns-2021
    title: "Functional connectomics spanning multiple areas of mouse visual cortex"
    authors: "MICrONS Consortium"
    year: 2021
    journal: "bioRxiv"
