      rare axonal and dendritic morphologies, and cell-type-specific connectivity patterns. The volume was made publicly available,
      providing a landmark resource for studying human cortical microcircuitry.
    future_work: >-
      Extending human cortical connectomics to larger volumes, different cortical areas, and comparison with neurological
      disease tissue remains a major goal for understanding human brain organization and pathology.
