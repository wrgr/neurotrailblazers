  summaries:
    beginner: Understanding how brain connectivity develops in children is crucial for understanding mental health. This paper describes the Healthy Brain Network — a massive open dataset with brain scans and behavioral data from thousands of children, freely available for research.
    intermediate: Alexander et al. describe the Healthy Brain Network, a large-scale, open-access dataset collecting MRI, EEG, behavioral, and clinical data from >3,000 participants ages 5-21. The dataset supports research on brain development, connectivity maturation, and transdiagnostic mental health research.
    advanced: Large open developmental datasets like HBN provide the population-level context for interpreting individual connectomes. For cross-scale integration, developmental MRI data establishes the macro-scale trajectory that micro-scale EM observations (e.g., Witvliet et al. C. elegans development) must be consistent with.
  ocar:
    opportunity: Understanding how brain connectivity develops during childhood and adolescence is crucial for mental health research, but no large-scale, open-access dataset combined brain imaging with comprehensive behavioral and clinical assessments in a developing population.
    challenge: Collecting high-quality multi-modal data from thousands of children requires standardized protocols, robust data sharing infrastructure, and a transdiagnostic approach that captures the full spectrum of mental health variation.
    action: Alexander et al. established the Healthy Brain Network, collecting MRI, EEG, behavioral, and clinical data from >3,000 participants ages 5-21 and making all data publicly available for open research.
    resolution: HBN became a foundational open resource for developmental brain connectivity research, enabling studies of connectivity maturation, brain-behavior relationships, and transdiagnostic approaches to pediatric mental health.
    future_work: Integrating developmental MRI trajectories with micro-scale EM observations of circuit maturation and extending the dataset to longitudinal follow-up are important goals.
