  - How does annotation tool choice affect the quality and biases of ground truth data?
  related_content:
  - /content-library/proofreading/proofreading-tools/
  - /content-library/proofreading/metrics-and-qa/
  summaries:
    beginner: >-
      Before training computers to find neurons, humans need to manually label example images as 'ground truth.' VAST is a
      desktop tool for this work — it lets annotators paint over neurons in 3D image stacks and assign labels.
    intermediate: >-
      VAST provides a desktop annotation environment for manual and semi-automatic segmentation of EM volumes. Features include
      multi-resolution rendering, label management for thousands of objects, and export to standard formats. Used to produce
      ground truth for several landmark datasets.
    advanced: >-
      While cloud tools dominate production proofreading, VAST remains relevant for ground truth creation where precise manual
      control is needed. Its paint-based annotation model doesn't inherit biases from automated pre-segmentation. For benchmark
      creation, VAST's pixel-precise annotations remain the gold standard.
  ocar:
    opportunity: >-
      Training machine learning models for neuron segmentation requires high-quality ground truth annotations, but there was
      no dedicated desktop tool for manually producing pixel-precise volumetric annotations of EM data.
    challenge: >-
      Annotating dense 3D EM volumes requires managing thousands of labeled objects across hundreds of image slices, with
      tools for precise boundary painting, multi-resolution navigation, and efficient label management.
    action: >-
      Berger et al. developed VAST, a desktop annotation tool for manual and semi-automatic segmentation of EM volumes featuring
      multi-resolution rendering, paint-based annotation, and management of thousands of labeled objects with export to standard
      formats.
    resolution: >-
      VAST became the tool of choice for ground truth creation in several landmark connectomics datasets, providing pixel-precise
      annotations that are unbiased by automated pre-segmentation and remain the gold standard for benchmark creation.
    future_work: >-
      Integrating VAST with cloud-based annotation platforms and adding support for automated pre-segmentation to accelerate
      ground truth creation are natural extensions.
