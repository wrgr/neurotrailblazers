    opportunity: >-
      Imaging a cubic millimeter of mouse cortex for the MICrONS project required acquiring and assembling petabytes of EM
      imagery, far exceeding the throughput of any single microscope or manual workflow.
    challenge: >-
      Sustaining high imaging throughput over months demanded automated stage control, real-time quality assessment, parallel
      operation of multiple TEMs, and computational infrastructure for petabyte-scale image assembly without human bottlenecks.
    action: >-
      Yin et al. built an industrial-scale multi-beam TEM pipeline with automated focus and contrast monitoring, real-time
      QA dashboards for section damage detection and re-imaging decisions, and parallel operation of multiple microscopes
      achieving sustained throughput of ~1 megapixel/second per instrument.
    resolution: >-
      The pipeline successfully acquired the complete MICrONS mm-cubed cortical volume, demonstrating that connectomics imaging
      could be industrialized with mature QA practices and providing concrete throughput benchmarks for planning future projects.
