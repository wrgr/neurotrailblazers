- id: newman-2004
  title: Finding and evaluating community structure in networks
  authors: Michelle G. Newman, Michelle Girvan
  year: 2004
  journal: ''
  doi: 10.1103/physreve.69.026113
  dimension: network-analysis
  tags:
  - "method:community-detection"
  - "method:modularity"
  - "method:graph-theory"
  - "concept:network-topology"
  - "tool:betweenness-centrality"
  - "method:network-analysis"
  discussion_prompts:
  - >-
    What is the resolution limit of modularity maximization, and how does it affect the detection of microcircuit communities
    in large-scale connectome graphs?
  - >-
    How should the random graph null model embedded in the modularity metric be adapted for spatially embedded networks like
    the brain, where short-range connections are more likely due to wiring cost constraints?
  - >-
    How do communities detected by modularity analysis in structural connectomes correspond to functionally defined brain
    networks from fMRI?
  summaries:
    beginner: >-
      Networks like social networks or brain connectivity maps often contain tightly knit groups — communities — where connections
      within the group are much denser than connections to the outside. This paper introduced algorithms and a quality measure
      (modularity) to automatically find these communities, which is now widely used in brain connectivity research.
    intermediate: >-
      Newman and Girvan's edge-betweenness algorithm removes edges with highest betweenness centrality (those bridging communities)
      to reveal community structure, and introduces modularity Q as a quality measure comparing actual to expected edge density
      within groups. Modularity maximization became the standard approach for identifying functional modules in structural
      and functional brain connectivity matrices in network neuroscience.
    advanced: >-
      The modularity metric Q = Σ[A_ij - k_i*k_j/(2m)]δ(c_i, c_j) compares edge density within communities to a random graph
      null model with the same degree sequence. The resolution limit of Q means communities smaller than √(2m) may be merged
      into larger structures — a critical caveat for connectomics applications where biologically meaningful microcircuits
      may be smaller than the resolution threshold. The Louvain and Leiden algorithms that superseded the original betweenness
      method optimize the same Q but are computationally tractable for the millions-of-node scale of modern connectome graphs.
  ocar:
    opportunity: >-
      Understanding the mesoscale organization of networks — whether they contain cohesive groups or 'communities' of densely
      interconnected nodes — required principled algorithms that could scale to large networks and assess community quality.
    challenge: >-
      Community detection in networks is computationally hard in general; defining a good optimization target (modularity)
      and developing algorithms that balance accuracy, speed, and avoidance of degenerate solutions (resolution limit) were
      non-trivial.
    action: >-
      Newman and Girvan developed algorithms for discovering community structure using betweenness centrality to iteratively
      remove edges connecting communities, and introduced the modularity metric (Q) as a quality measure for proposed network
      partitions.
    resolution: >-
      The betweenness-based community detection algorithm and modularity metric became foundational tools in network science,
      enabling identification of functional modules in biological and social networks. In connectomics, modularity analysis
      is routinely used to identify brain regions or neuron clusters with dense intra-group connectivity.
    future_work: >-
      The modularity metric has a known resolution limit (small communities in large networks may be missed); subsequent methods
      like the Louvain and Leiden algorithms address this while improving computational efficiency.
  plain_language_summary: >-
    Just as a city naturally organizes into neighborhoods where people mostly interact with each other, networks have 'communities'
    — densely connected groups. This paper introduced a way to find and measure these communities mathematically, using a
    metric called modularity that has become essential for analyzing brain connectivity networks.
