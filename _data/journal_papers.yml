- id: hider-2022-bossdb
  title: 'BossDB: A cloud-native approach for petascale neuroscience discovery'
  authors: Hider R Jr, Kleissas D, Gion T, Xenes D, Matelsky J, Pryor D, Rodriguez L, Johnson EC,
    Gray-Roncal W, Wester B
  year: 2022
  journal: Frontiers in Neuroinformatics
  doi: 10.3389/fninf.2022.828787
  dimension: data-storage
  citation_note: Cloud-native platform managing petabyte-scale connectomics datasets
  tags:
  - data-storage:cloud-storage
  - data-storage:data-management
  - data-storage:scalability
  - data-storage:API
  - methodology:open-science
  key_figures:
  - 'Fig. 1: BossDB architecture on AWS'
  - 'Fig. 3: multi-resolution data access patterns'
  discussion_prompts:
  - How does cloud-native storage change the economics of sharing and accessing connectomics data?
  - What are the tradeoffs between BossDB, DVID, and other connectomics data platforms?
  related_content:
  - /content-library/infrastructure/data-formats/
  - /content-library/infrastructure/provenance-and-versioning/
  summaries:
    beginner: Brain imaging produces enormous amounts of data — petabytes for a single connectomics
      project. BossDB is a cloud-based platform that stores this data and lets researchers worldwide
      access exactly the parts they need through a simple web interface, without downloading entire datasets.
    intermediate: Hider, Gray-Roncal et al. describe BossDB, a cloud-native data management platform
      deployed on AWS for storing, accessing, visualizing, and sharing petascale neuroscience image
      data via RESTful API. The system supports multi-resolution access, spatial queries, and
      integration with analysis tools. It has managed datasets exceeding one petabyte.
    advanced: BossDB addresses the data management bottleneck in connectomics by leveraging cloud
      infrastructure for elastic storage and compute. The chunked, multi-resolution architecture
      enables efficient random access patterns needed for both visualization (tile serving) and
      analysis (region extraction). The RESTful API design enables programmatic integration with
      downstream pipelines. Compare with DVID (Janelia) and CloudVolume approaches.
  ocar:
    opportunity: Connectomics projects generate petabytes of image data, but traditional storage approaches could not efficiently serve this data to distributed research teams or integrate with cloud-based analysis pipelines.
    challenge: Building a cloud-native platform for petascale neuroscience data required designing an architecture that supports efficient random access at multiple resolutions, elastic scaling, and programmatic integration with diverse analysis tools.
    action: Hider, Gray-Roncal et al. developed BossDB, a cloud-native data management platform deployed on AWS that stores, serves, and shares petascale neuroscience data via RESTful API with multi-resolution access and spatial query support.
    resolution: BossDB enabled researchers worldwide to access petabyte-scale connectomics datasets efficiently without downloading entire datasets, with the chunked multi-resolution architecture supporting both visualization and analysis access patterns.
    future_work: Extending BossDB to support additional data types (annotations, meshes) and integrating with other connectomics platforms for federated data access are ongoing directions.
