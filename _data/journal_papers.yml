      - "How has immuno-EM since 1991 refined or contradicted any of the structural assignments?"
    related_content:
      - /content-library/neuroanatomy/soma-ultrastructure/
      - /content-library/neuroanatomy/axon-biology/
      - /content-library/neuroanatomy/myelin-and-nodes/
    summaries:
      beginner: "This classic textbook is the definitive atlas of what the brain looks like under an electron microscope. It describes every type of cell and structure you will encounter: neuron cell bodies, axons, dendrites, synapses, glia, and myelin. Think of it as a field guide for identifying structures in brain tissue images."
      intermediate: "Peters, Palay & Webster remains the gold standard reference for neuronal ultrastructure. Each chapter systematically catalogs the EM appearance of a major structure, with micrographs, drawings, and quantitative parameters. The chapters on axon terminals, synaptic junctions, and myelin sheaths provide the visual vocabulary needed for accurate proofreading decisions."
      advanced: "While dated in its functional interpretations, this text's morphological descriptions remain unsurpassed in rigor. The systematic treatment of organelle distribution across neuronal compartments, the classification of synaptic vesicle types and their relationship to neurotransmitter content, and the detailed treatment of nodes of Ranvier and paranodal junctions are all directly relevant to current automated annotation pipelines."

  - id: bhatt-2009
    title: "Dendritic Spine Dynamics"
    authors: "Bhatt DH, Zhang S, Bhatt AN"
    year: 2009
    journal: "Annual Review of Physiology"
    doi: "10.1146/annurev.physiol.010908.163140"
    dimension: neuroanatomy
    tags:
      - neuroanatomy:dendrite
      - neuroanatomy:spine
      - neuroanatomy:synapse
      - neuroanatomy:cytoskeleton
      - methodology:experimental-design
    key_figures:
      - "Fig. 1: spine morphology classification"
      - "Fig. 3: spine turnover rates across regions"
      - "Fig. 5: activity-dependent remodeling"
    discussion_prompts:
      - "How should connectomics studies account for spine dynamics when reporting connection strengths?"
      - "What fraction of spines in a typical cortical EM volume might lack functional synapses?"
    related_content:
      - /content-library/neuroanatomy/dendrite-biology/
      - /content-library/neuroanatomy/synapse-classification/
    summaries:
      beginner: "Dendritic spines are tiny protrusions on neurons where most excitatory connections form. This review explains that spines are not static — they change shape, appear, and disappear over time. This matters for connectomics because a wiring diagram captured at one moment is a snapshot of a dynamic system."
      intermediate: "This review covers the molecular and structural dynamics of dendritic spines including formation, elimination, and morphological plasticity. The authors discuss how spine shape (mushroom, thin, stubby, filopodial) correlates with synapse maturity and strength. For connectomics, the key insight is that spine morphology and density are not fixed, meaning static EM reconstructions capture one state of a dynamic substrate."
      advanced: "Bhatt et al. synthesize live-imaging and EM data to describe spine turnover rates across brain regions and developmental stages. Methodologically relevant points include the disconnect between spine presence and functional synapse presence, the implications of fixation timing for spine morphology in EM, and the question of how spine dynamics affect the interpretability of single-timepoint connectomes."

  - id: shepherd-harris-1998
    title: "Three-Dimensional Structure and Composition of CA3→CA1 Axons in Rat Hippocampal Slices"
    authors: "Shepherd GM, Harris KM"
    year: 1998
    journal: "Journal of Neuroscience"
    doi: "10.1523/JNEUROSCI.18-20-08300.1998"
    dimension: neuroanatomy
    tags:
      - neuroanatomy:axon
      - neuroanatomy:bouton
      - neuroanatomy:vesicle
      - neuroanatomy:mitochondria
      - imaging:serial-section
      - case-studies:hippocampus
    key_figures:
      - "Fig. 2: 3D axon reconstructions"
      - "Fig. 4: bouton composition quantification"
      - "Fig. 6: multi-synapse bouton examples"
    discussion_prompts:
      - "How would you validate whether modern automated segmentation correctly identifies the bouton features measured in this study?"
      - "What does the multi-synapse bouton finding imply for how we weight edges in a connectome graph?"
    related_content:
      - /content-library/neuroanatomy/axon-biology/
      - /content-library/neuroanatomy/synapse-classification/
    summaries:
      beginner: "This paper used serial electron microscopy to reconstruct the fine branches of axons in the hippocampus in 3D. The authors showed that the small swellings (boutons) along axons, where synapses form, are highly variable in size and contents. It's an early example of the kind of detailed wiring analysis that modern connectomics does at larger scales."
      intermediate: "Shepherd and Harris performed serial section EM reconstruction of Schaffer collateral axons in rat CA1, providing quantitative data on bouton volumes, vesicle counts, mitochondria presence, and multi-synapse bouton frequencies. They found that only ~40% of boutons contain mitochondria, with important implications for sustained transmission."
      advanced: "This study established quantitative priors that remain useful for validating automated reconstructions: mean bouton volume (~0.1 μm³), vesicle density (~200 per bouton), and the fraction of en passant versus terminal boutons. The finding that multi-synapse boutons synapse onto different postsynaptic neurons has implications for how edge weights should be computed in connectome graphs."

  - id: fiala-harris-2001
    title: "Cylindrical Diameters Method for Calibrating Section Thickness in Serial Electron Microscopy"
    authors: "Fiala JC, Harris KM"
    year: 2001
    journal: "Journal of Microscopy"
    doi: "10.1046/j.1365-2818.2001.00926.x"
    dimension: neuroanatomy
    tags:
      - imaging:serial-section
      - imaging:electron-microscopy
      - methodology:benchmark
      - neuroanatomy:microtubule
      - data-storage:alignment
    key_figures:
