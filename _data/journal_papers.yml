- id: newman-2006
  title: Modularity and community structure in networks
  authors: Newman MEJ
  year: 2006
  journal: PNAS
  doi: 10.1073/pnas.0601602103
  dimension: network-analysis
  tags:
  - "network-analysis:modularity"
  - "network-analysis:community-detection"
  - "connectomics:graph-theory"
  key_figures:
  - "Fig. 1: modularity optimization"
  - "Fig. 3: community structure examples"
  discussion_prompts:
  - How does the resolution limit of modularity optimization affect community detection in connectomes?
  - When should modularity-based versus model-based community detection be preferred?
  related_content:
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: >-
      Networks often have communities — groups of nodes that are more connected to each other than to the rest of the network.
      This paper presents an efficient method for finding these communities by maximizing a quantity called modularity.
    intermediate: >-
      Newman presents a spectral algorithm for modularity optimization that efficiently detects community structure in large
      networks. The method partitions networks into modules that maximize within-group versus between-group connectivity.
      Widely applied to brain networks.
    advanced: >-
      This paper introduced the spectral modularity approach that became the default community detection method in network
      neuroscience. Known limitation: the resolution limit means small communities may be merged in large networks. For EM
      connectomics, where networks have known spatial and cell-type structure, modularity results should be validated against
      biological priors.
  ocar:
    opportunity: >-
      Detecting community structure — groups of densely interconnected nodes — is fundamental for understanding network organization,
      but existing methods were either computationally expensive or lacked a clear optimization criterion.
    challenge: >-
      Modularity maximization is NP-hard in general, requiring efficient heuristic algorithms that scale to large networks
      while producing high-quality partitions.
    action: >-
      Newman developed a spectral algorithm for modularity optimization that efficiently partitions networks into communities
      by exploiting the eigenvectors of the modularity matrix, making community detection tractable for large networks.
    resolution: >-
      The spectral modularity approach became the default community detection method in network neuroscience, enabling systematic
      identification of modular brain network organization across scales and species.
    future_work: >-
      Addressing the resolution limit (which can merge small communities in large networks) and developing methods that explicitly
      account for biological priors like spatial embedding and cell type are important for connectomics applications.
