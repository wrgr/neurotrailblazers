    ocar:
    opportunity: |
      Reconstructing neuronal circuits required three-dimensional EM imaging of large tissue volumes at nanometer resolution, but existing methods — serial section TEM — were slow, required skilled human intervention, and could not be automated for large-scale connectomics.
    challenge: |
      Imaging hundreds of micrometers of tissue at synapse-resolving resolution while maintaining precise section-to-section alignment and minimizing charging artifacts demanded a fundamentally new approach to sample preparation, imaging geometry, and detector configuration.
    action: |
      Denk and Horstmann invented serial block-face scanning electron microscopy (SBEM), combining an in-chamber ultramicrotome with backscattered electron detection to automatically image the block face, cut a fresh slice, and repeat — enabling automated, high-throughput 3D EM of heavy-metal-stained biological tissue.
    resolution: |
      SBEM produced stacks of hundreds of 50–70 nm sections with sub-10 nm lateral jitter and sufficient resolution to trace the thinnest axons and identify synapses, demonstrating for the first time that large-scale automated 3D EM reconstruction of neural tissue was practically feasible.
    future_work: |
      Increasing imaging throughput, reducing beam damage, and extending the approach to larger volumes (beyond cubic millimeters) remain ongoing engineering challenges for petascale connectomics.
  plain_language_summary: |
    Imaging the brain's wiring at the scale of individual synapses requires electron microscopy, but traditional methods involved manually cutting thousands of thin slices by hand — slow and error-prone. This paper invented a machine that cuts the slices automatically inside the microscope and images each one, enabling the first truly automated large-scale 3D imaging of brain tissue and opening the door to modern connectomics.
  summaries:
    beginner: |
        To see individual synapses in the brain, scientists use electron microscopes, which require imaging thousands of ultra-thin slices. This paper invented a way to do this automatically: a tiny diamond knife inside the microscope cuts each slice, which is then immediately imaged. This automation made it possible to map large volumes of brain tissue for the first time.
    intermediate: |
        Denk and Horstmann's SBEM innovation integrates an ultramicrotome within the SEM vacuum chamber, using backscattered electrons to image the block face of osmium-stained tissue. The approach avoids the section-handling problems of traditional TEM serial sectioning, achieves ~10 nm lateral resolution and 50–70 nm z-resolution, and can run unattended. It enabled downstream connectomics work including mouse retina (Helmstaedter et al. 2013) and was a precursor to FIB-SEM for even higher-resolution volumes.
    advanced: |
        SBEM's key innovations were (1) in-chamber sectioning to avoid section handling and loss, (2) low-vacuum conditions preventing charge buildup on uncoated block faces, and (3) backscattered electron contrast from heavy-metal staining. Limitations include anisotropic resolution (z > xy), beam-damage accumulation over extended acquisitions, and throughput constraints that motivated later development of multi-beam SEM and FIB-SEM. The paper's ~1700 citations understate its influence given that SBEM-derived approaches underlie a large fraction of all mammalian connectomics datasets.
  discussion_prompts:
  - |
    How does SBEM's anisotropic resolution (better in xy than z) affect the ability to detect and classify synapses, and what strategies have been developed to mitigate this?
    - |
    SBEM images a single block face sequentially, while FIB-SEM uses a focused ion beam for milling — what are the practical tradeoffs between these approaches for different connectomics applications?
    - |
    What advances in sample preparation and staining have been most critical for making SBEM and related methods applicable to connectomics-scale volumes?
    - id: a-petascale-automated-imaging-pipeline-for-mapping-neuronal
