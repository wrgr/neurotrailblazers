  authors: Betzel RF, Griffa A, Hagmann P, Misic B
  year: 2019
  journal: Network Neuroscience
  doi: 10.1162/netn_a_00075
  dimension: mri-connectomics
  tags:
  - mri-connectomics:structural-connectivity
  - mri-connectomics:tractography
  - network-analysis:null-model
  - methodology:statistical-analysis
  key_figures:
  - 'Fig. 1: distance-dependent thresholding'
  - 'Fig. 3: consensus network comparison'
  discussion_prompts:
  - How should group-level connectomes be constructed from individual data?
  - What distance-dependent biases exist in both tractography and EM connectomics?
  related_content:
  - /content-library/connectomics/graph-representations/
  summaries:
    beginner: When you combine brain scans from many people to create an 'average' brain network, the method you use to combine
      them matters a lot. This paper shows that distance between brain regions biases the results and proposes a better way
      to create representative brain networks.
    intermediate: Betzel et al. address the problem of constructing group-representative structural connectomes from diffusion
      tractography. They show that standard consensus approaches are biased toward short-range connections and propose distance-dependent
      thresholds that preserve the spatial profile of connectivity.
    advanced: 'This paper addresses a fundamental methodological issue in MRI connectomics: the distance-dependent false-positive
      rate of tractography biases group-level network construction. The proposed consensus approach preserves both local and
      long-range connectivity statistics. Analogous distance-dependent biases exist in EM (e.g., volume boundary effects).'
  ocar:
    opportunity: Group-representative structural connectomes were widely used in network analysis, but the standard methods for combining individual tractography data into group consensus networks introduced systematic biases that were not well understood.
    challenge: Tractography has a distance-dependent false-positive rate — short-range connections are more reliably detected — meaning standard consensus approaches preferentially retain short-range connections and underrepresent long-range connectivity.
    action: Betzel et al. demonstrated the distance-dependent bias in standard consensus network construction and proposed distance-dependent thresholds that preserve the spatial profile of connectivity when building group-representative networks.
    resolution: The proposed approach produces group-level networks that accurately represent both local and long-range connectivity statistics, addressing a fundamental methodological bias in MRI connectomics that affects downstream network analysis.
    future_work: Developing analogous corrections for distance-dependent biases in EM connectomics (such as volume boundary effects) and applying the consensus approach to clinical populations are natural extensions.
