  - /content-library/imaging/acquisition-qa/
  summaries:
    beginner: This paper is an accessible overview of why imaging the brain's wiring is so hard. The brain contains structures
      at vastly different scales — from entire brain regions (centimeters) down to individual synapses (nanometers). No single
      imaging method can capture all of these at once.
    intermediate: Lichtman and Denk present a perspective on the multi-scale imaging challenge, framing it as simultaneously
      achieving synapse-resolution (~10 nm) and circuit-scale field of view (~mm to cm). They compare light microscopy, serial
      section EM, SBEM, and FIB-SEM, and introduce the concept of correlative imaging.
    advanced: This perspective remains one of the clearest articulations of the resolution-volume tradeoff. Lichtman and Denk
      quantify the imaging throughput required for mammalian connectomics and argue that brute-force scaling is insufficient
      without fundamental automation advances. Their analysis of the 'data bottleneck' anticipated the current state of the
      field.
  ocar:
    opportunity: Connectomics required imaging brain tissue at nanometer resolution across millimeter-scale volumes, but no single imaging modality could achieve both simultaneously, and the tradeoffs between approaches were poorly quantified.
    challenge: The brain spans five orders of magnitude in scale from synapses to circuits. Achieving synapse-level resolution (~10 nm) across circuit-scale fields of view (~mm) required throughput improvements of many orders of magnitude beyond existing methods.
    action: Lichtman and Denk provided a quantitative analysis of the resolution-volume tradeoff across light microscopy, serial section EM, SBEM, and FIB-SEM, and introduced the concept of correlative multi-scale imaging to bridge resolution gaps.
    resolution: The perspective established the intellectual framework for understanding why connectomics is hard and what engineering advances are needed, correctly anticipating the data and automation bottlenecks that have defined the subsequent decade of the field.
    future_work: The authors argued that brute-force scaling alone would be insufficient and that fundamental advances in automation, correlative imaging, and computational analysis would be essential for mammalian connectomics.
