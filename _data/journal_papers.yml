      Using large-scale EM reconstruction of the mouse lateral geniculate nucleus and surrounding thalamic nuclei, the authors
      traced the complete axonal projection of a single GABAergic interneuron. Contrary to the expectation of type-specific
      inhibitory function, this neuron participated in multiple inhibitory circuit configurations — both presynaptic inhibition
      and classical postsynaptic inhibition — across a remarkably broad target domain.
    advanced: >-
      This single-cell connectomic analysis challenges a key assumption of inhibitory cell type classification: that morphological
      type predicts functional specialization. The neuron's broad innervation of thalamic relay cells and interneurons, combined
      with diverse synaptic configurations, suggests that individual interneurons can integrate multiple inhibitory roles
      simultaneously. A caveat is that this is an N=1 case study; population-level analysis would be needed to determine whether
      this multifunctionality is typical or exceptional for this cell type.
  ocar:
    opportunity: >-
      The conventional view holds that distinct inhibitory neuron types mediate distinct forms of inhibition, but whether
      a single interneuron can simultaneously participate in multiple inhibitory mechanisms was unclear.
    challenge: >-
      Characterizing the full output diversity of a single interneuron requires reconstructing all its synaptic contacts across
      a large tissue volume, which is extremely labor-intensive with traditional EM methods.
    action: >-
      The authors used large-scale EM reconstruction in the mouse visual thalamus to trace the complete axonal arbor and synaptic
      outputs of an individual interneuron, cataloging all the cell types and compartments it innervates.
    resolution: >-
      The reconstructed interneuron was found to innervate nearly the entire mouse visual thalamus and to participate in multiple
      distinct forms of inhibitory circuit motifs simultaneously, challenging the one-interneuron-one-function model. This
      single cell turned out to be among the most broadly projecting neurons analyzed in the dataset.
    future_work: >-
      Determining whether such multifunctional interneurons are common across thalamic nuclei and other brain regions, and
      understanding how their activity is regulated, are key open questions.
