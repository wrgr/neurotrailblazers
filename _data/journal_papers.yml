    ocar:
    opportunity: |
      Mapping gene expression at subcellular spatial resolution within intact biological tissues was not possible with existing in situ methods, which were limited in resolution or multiplexing capacity, leaving a gap between transcriptomic profiling and nanoscale structural imaging.
    challenge: |
      Achieving nanoscale-precision spatial transcriptomics required physically expanding the tissue to bring RNAs far enough apart to image individual transcripts clearly, while preserving RNA integrity and tissue architecture through the expansion process.
    action: |
      The authors developed expansion sequencing (ExSeq), combining expansion microscopy (physical swelling of tissue with a hydrogel) with in situ RNA sequencing methods to spatialize transcripts within expanded specimens. They demonstrated both untargeted (whole-transcriptome) and targeted (panels of specific genes) approaches on brain tissue.
    resolution: |
      ExSeq achieved nanoscale-precision spatial transcriptomics in intact brain tissue, enabling subcellular localization of transcripts to specific dendritic or axonal compartments. It demonstrated for the first time that spatial sequencing could resolve individual RNA molecules at neurite-level resolution, opening the possibility of linking gene expression to ultrastructural context in connectomics studies.
    future_work: |
      Combining ExSeq with EM connectomics (correlative expansion-EM sequencing) and scaling throughput to brain-region or whole-brain transcriptomics while maintaining subcellular resolution are major outstanding goals.
  plain_language_summary: |
    Scientists want to know which genes are active inside specific parts of neurons — for example, whether certain mRNAs are found only at synapses. This paper developed ExSeq, which physically inflates brain tissue like a sponge expanding in water to make the RNA molecules far enough apart to read them individually. The result is a map of gene expression at nanometer precision inside cells — much finer than previous methods — and it could eventually be combined with EM connectomics for a combined structural-molecular brain map.
  summaries:
    beginner: |
        This paper developed a technique called ExSeq that physically expands brain tissue so that individual RNA molecules (which carry genetic information) can be read in place under a microscope. By swelling the tissue with a special gel, molecules that were too crowded to distinguish become spread out enough to image individually. This allows scientists to map gene expression at the scale of individual synapses or dendrites, much finer than before.
    intermediate: |
        ExSeq adapts expansion microscopy (Chen et al. 2015) for in situ sequencing by anchoring RNA to the expanding hydrogel matrix, then performing sequencing-by-ligation or -synthesis on the expanded specimen. The method achieves ~50 nm effective spatial precision for transcript localization — far finer than FISH or MERFISH — and was demonstrated in mouse hippocampal neurons. The potential integration of ExSeq with EM connectomics would enable single-cell molecular profiling co-registered to structural connectivity maps.
    advanced: |
        ExSeq's key innovation is co-polymerizing RNA (via LabelX anchor chemistry) into a polyacrylamide hydrogel that expands 4-fold isotropically, then performing in situ sequencing within the expanded gel. Sequencing read length is currently limited (2-50 bases for targeted panels), constraining gene identification to pre-specified targets or requiring error correction for untargeted applications. A critical challenge for connectomics integration is that expansion pre-treatment is incompatible with the heavy-metal staining required for EM contrast, requiring correlative workflows with separate aliquots or specialized protocols. The subcellular transcript localization capability is particularly relevant for identifying locally translated mRNAs at synaptic sites and characterizing the molecular diversity of synapse types within EM reconstructions.
  discussion_prompts:
  - |
    How might ExSeq be integrated with EM connectomics to produce a combined structural-molecular atlas of brain circuits, and what are the technical barriers?
    - |
    What molecular questions about synapse diversity and cell-type identity in connectomics could ExSeq answer that immunostaining-based approaches cannot?
    - |
    How does the spatial resolution achievable with ExSeq compare to what is needed to assign transcripts to specific subcellular compartments (dendritic spines, axon initial segments), and what improvements are needed?
    - id: automatic-detection-of-synaptic-partners-in-a-whole-brain-dr
    title: |
    Automatic detection of synaptic partners in a whole-brain Drosophila electron microscopy data set
    authors: "Buhmann, Sheridan, Malin-Mayor et al."
