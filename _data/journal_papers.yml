- id: lee-2017
  title: Superhuman accuracy on the SNEMI3D connectomics challenge
  authors: Lee K, Zung J, Li P, et al.
  year: 2017
  journal: "arXiv:1706.00120"
  doi: null
  dimension: computer-vision-ml
  tags:
  - "computer-vision-ml:segmentation"
  - "computer-vision-ml:3D-convolution"
  - "computer-vision-ml:boundary-detection"
  - "methodology:benchmark"
  key_figures:
  - "Fig. 1: residual symmetric 3D U-Net architecture"
  - "Fig. 2: error comparison between model predictions and human annotations"
  - "Fig. 4: ablation study on training augmentations"
  discussion_prompts:
  - >-
    What does it mean for a model to achieve 'superhuman' accuracy, and how should we interpret this when the ground truth
    itself is human-generated?
  - How important were training-time augmentations versus architectural improvements in reaching top performance?
  related_content:
  - /content-library/computer-vision-ml/segmentation/
  - /content-library/methodology/benchmark/
  summaries:
    beginner: >-
      This paper shows that a deep learning model can trace neuron boundaries in brain images more accurately than trained
      human annotators, at least on a standard benchmark dataset. The key ingredients are a carefully designed 3D neural network
      and aggressive data augmentation during training.
    intermediate: >-
      Lee et al. present a 3D residual symmetric U-Net that surpasses human performance on the SNEMI3D neuron segmentation
      benchmark. The architecture combines residual learning with a symmetric encoder-decoder and is trained with heavy augmentation
      including simulated misalignment and missing sections. The result demonstrates that architecture and augmentation together
      can push automated segmentation beyond expert-level accuracy.
    advanced: >-
      The residual symmetric network extends U-Net with skip connections that use element-wise summation rather than concatenation,
      reducing parameter count while preserving gradient flow. Ablation studies reveal that domain-specific augmentations
      (elastic deformation, misalignment simulation, missing-section simulation) contribute more to performance than architectural
      depth alone. The 'superhuman' claim is grounded in a direct comparison with independently generated human ground-truth
      annotations that disagree with each other more than the model disagrees with consensus.
  ocar:
    opportunity: >-
      Deep learning architectures for EM segmentation were improving rapidly, and the SNEMI3D benchmark provided a standardized
      way to measure whether automated methods could match or exceed human annotator accuracy.
    challenge: >-
      Achieving superhuman accuracy required not only architectural advances but also robustness to the specific artifacts
      of serial-section EM — misaligned sections, missing sections, and elastic tissue deformations — that trip up both humans
      and algorithms.
    action: >-
      Lee et al. designed a 3D residual symmetric U-Net and trained it with aggressive domain-specific augmentations including
      simulated misalignment, missing sections, and elastic deformations, then benchmarked against independently generated
      human ground-truth annotations.
    resolution: >-
      The model surpassed human performance on SNEMI3D, with ablation studies showing that domain-specific augmentations contributed
      more to performance than architectural depth alone. The superhuman claim was validated by showing that human annotators
      disagree with each other more than the model disagrees with consensus.
    future_work: >-
      Extending superhuman performance to more diverse tissue types and species, understanding failure modes on out-of-distribution
      data, and determining how benchmark performance translates to practical proofreading reduction in production pipelines.
