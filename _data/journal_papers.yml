      of the brain with a powerful electron microscope and using computers to trace each neuron, they mapped the connections
      of about half the Drosophila brain and made the data freely available.
    intermediate: >-
      This landmark paper presents the Drosophila hemibrain connectome, reconstructing synaptic-resolution connectivity for
      a large fraction of the adult central brain. The work introduces improved methods for EM preparation, imaging, segmentation,
      synapse detection, and proofreading, and delivers a publicly available atlas defining thousands of cell types organized
      into computational compartments.
    advanced: >-
      The hemibrain dataset represents a methodological tour de force in connectomics, combining FIB-SEM imaging at 8 nm isotropic
      resolution with convolutional neural network-based segmentation and synapse detection, followed by extensive proofreading.
      Key contributions include improved alignment algorithms, a scalable cell-type classification framework, and a freely
      available synaptic connectivity graph. Important caveats include incomplete coverage (one hemisphere, partial brain),
      systematic proofreading biases toward well-studied regions, and the challenge of validating automated synapse predictions.
  ocar:
    opportunity: >-
      Understanding the neural basis of animal behavior requires a complete wiring diagram of the brain, but such a map had
      never been achieved for any organism with the behavioral complexity of Drosophila melanogaster.
    challenge: >-
      Reconstructing the circuitry of the Drosophila central brain requires processing and analyzing petabyte-scale EM datasets,
      developing new methods for image alignment, automated segmentation, synapse detection, and proofreading, and organizing
      the resulting data into a comprehensive and usable atlas.
    action: >-
      The authors developed and applied improved methods for EM data collection, alignment, segmentation, synapse detection,
      and proofreading to reconstruct a large fraction of the Drosophila central brain. They defined cell types, refined computational
      compartments, and created an exhaustive atlas of identified neurons.
    resolution: >-
      The resulting connectome, known as the hemibrain dataset, provides synaptic-resolution connectivity for roughly half
      the Drosophila central brain, defining thousands of cell types and enabling circuit-level analysis across many brain
      regions. The dataset was released publicly and has since been used in hundreds of downstream studies.
    future_work: >-
      Completion of the full Drosophila brain connectome (both hemispheres), integration with functional data, and development
      of computational tools to interpret the circuit-level data at scale remain major ongoing efforts.
