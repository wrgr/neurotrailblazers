    — this is called the 'phase problem.' SHELXT is a clever computer program that reconstructs crystal structures by alternating
    between two mathematical worlds, effectively solving this puzzle automatically. While designed for chemistry, the iterative
    phase-retrieval approach it uses has parallels in cryo-EM reconstruction used in structural neuroscience.
