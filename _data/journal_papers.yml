      described.
    advanced: >-
      The H01 dataset represents the first petascale EM connectomics resource from human cortex. Acquisition used a 61-beam
      multibeam SEM at ~4×4×30 nm voxel resolution, generating ~1.4 petabytes of raw data. Automated segmentation using flood-fill
