  summaries:
    beginner: Fruit flies are very good at detecting motion. This paper reconstructed the detailed wiring of the fly's motion-sensing
      circuits and used the connectivity to propose how these circuits actually compute the direction of movement.
    intermediate: Takemura et al. densely reconstructed medulla columns in the Drosophila optic lobe, identifying all synaptic
      connections among the neurons involved in motion detection. The wiring diagram constrained existing computational models,
      favoring specific implementations of the Hassenstein-Reichardt correlator.
    advanced: This study exemplifies targeted connectomics — reconstructing a functionally defined circuit to distinguish
      between competing models. The dense reconstruction of seven medulla columns revealed stereotyped connectivity with quantifiable
      variability. The synapse-level wiring data ruled out several motion detection model variants and motivated subsequent
      functional validation experiments.
  ocar:
    opportunity: Multiple competing computational models of motion detection existed in Drosophila, but they could not be distinguished without knowing the actual synaptic wiring of the motion detection circuit.
    challenge: Resolving which model was correct required dense reconstruction of all synaptic connections within optic lobe medulla columns — a technically demanding task requiring high-resolution EM and careful identification of every synapse.
    action: Takemura et al. densely reconstructed seven medulla columns in the Drosophila optic lobe, identifying all neurons and synaptic connections involved in motion detection and mapping the complete local circuit diagram.
    resolution: The synaptic wiring data ruled out several motion detection model variants and favored specific implementations of the Hassenstein-Reichardt correlator, demonstrating the power of targeted connectomics to adjudicate between competing computational models.
    future_work: Functional validation of the proposed circuit model through electrophysiology and optogenetics, and extending the analysis to the complete optic lobe, were identified as key next steps.
