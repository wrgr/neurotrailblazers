  - "Fig. 2: query interface"
  discussion_prompts:
  - What graph query patterns are most useful for biological discovery in connectomics?
  - How should connectome databases balance query flexibility with performance?
  related_content:
  - /content-library/connectomics/graph-representations/
  - /content-library/case-studies/flywire-whole-brain/
  summaries:
    beginner: >-
      Once you have a brain wiring diagram, you need a way to search it. neuPrint is a database and web interface that lets
      researchers query connectome data — like asking 'show me all neurons that connect to this specific neuron' or 'find
      all neurons of this type.'
    intermediate: >-
      Clements et al. describe neuPrint, a graph database and web application for querying EM connectome data. Built on Neo4j,
      it supports Cypher queries for exploring connectivity at neuron, type, and region levels. The system serves the hemibrain
      and FlyWire datasets.
    advanced: >-
      neuPrint's graph database architecture reflects the insight that connectomics data is naturally a labeled property graph.
      The Cypher query language enables complex path-based and motif-based queries. The web interface with NeuronBridge integration
      enables cross-dataset cell type matching.
  ocar:
    opportunity: >-
      Connectome datasets contain millions of neurons and synapses organized as graphs, but researchers lacked accessible
      tools for querying this connectivity data without writing custom analysis code.
    challenge: >-
      Connectome queries involve complex graph operations (path finding, motif search, type-based aggregation) that require
      a database architecture designed for graph data rather than traditional tabular databases.
    action: >-
      Clements et al. built neuPrint, a graph database and web application on Neo4j that stores connectome data as a labeled
      property graph and provides both a Cypher query interface and a user-friendly web frontend for exploring connectivity.
    resolution: >-
      neuPrint made connectome data accessible to non-programmers and enabled complex graph queries (connectivity paths, motif
      searches, type-level aggregations) that would be impractical with flat-file data, serving the hemibrain and other Drosophila
      datasets.
    future_work: >-
      Extending neuPrint to support cross-dataset queries and integrating with visualization tools for richer exploration
      of query results are ongoing directions.
