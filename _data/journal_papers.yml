  - /content-library/infrastructure/reconstruction-pipeline/
  summaries:
    beginner: >-
      Getting computers to accurately identify cells in microscopy images usually requires lots of manual training data. Cellpose
      3 uses image restoration to automatically improve image quality before segmentation, making cell detection work better
      across different types of images without retraining.
    intermediate: >-
      Stringer and Pachitariu present Cellpose 3, which adds image restoration (denoising, deblurring) as a preprocessing
      step to the Cellpose segmentation framework. The approach improves generalization across imaging conditions and reduces
      the need for domain-specific training data.
    advanced: >-
      Cellpose 3 demonstrates that combining restoration and segmentation in an end-to-end framework improves robustness to
      imaging artifacts — directly relevant to EM connectomics where contrast and noise vary across sections and brain regions.
      The domain adaptation question is critical as the field moves toward cross-dataset generalization.
  ocar:
    opportunity: >-
      Cell segmentation models required extensive retraining for each new imaging condition, limiting their applicability
      across the diverse image types encountered in connectomics and microscopy.
    challenge: >-
      Variation in contrast, noise, and blur across different microscopy modalities and tissue preparations meant that a model
      trained on one dataset often performed poorly on others without domain-specific training data.
    action: >-
      Stringer and Pachitariu developed Cellpose 3, adding image restoration (denoising, deblurring) as a preprocessing step
      to the Cellpose segmentation framework, creating an end-to-end pipeline that improves generalization without retraining.
    resolution: >-
      The combined restoration-segmentation approach improved robustness to imaging artifacts across diverse conditions, reducing
      the need for domain-specific training data and demonstrating a path toward cross-dataset generalization for cell segmentation.
    future_work: >-
      Evaluating the restoration approach on EM connectomics data specifically and developing foundation models for general-purpose
      neural tissue segmentation are important directions.
