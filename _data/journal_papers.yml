    advanced: Cellpose 3 demonstrates that combining restoration and segmentation in an end-to-end framework improves robustness to imaging artifacts — directly relevant to EM connectomics where contrast and noise vary across sections and brain regions. The domain adaptation question is critical as the field moves toward cross-dataset generalization.

