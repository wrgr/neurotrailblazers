      and ATUM. Each method has different strengths — this paper explains when to use which one.'
    intermediate: 'Briggman and Bock compare volume EM methods for neural circuit reconstruction: resolution, achievable volume,
      throughput, section preservation, and suitability for different biological questions. Key comparisons include SBEM''s
      automated workflow versus ATUM''s re-imaging ability, and FIB-SEM''s isotropic voxels versus serial section anisotropy.'
    advanced: 'This review systematically evaluates how each volume EM modality''s technical parameters propagate through
      the reconstruction pipeline: anisotropic voxels create directionally biased segmentation errors, FIB-SEM''s isotropy
      improves small-caliber neurite tracing but limits volume. The framework for matching imaging modality to scientific
      question continues to guide project planning.'
