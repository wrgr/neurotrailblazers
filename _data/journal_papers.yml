    ocar:
    opportunity: |
      A complete, cell-type-resolved map of how olfactory information is projected from the primary olfactory center to higher brain areas was needed to understand parallel processing of odor information in Drosophila.
    challenge: |
      Reconstructing every olfactory projection neuron type and their synaptic targets across a whole-brain EM volume requires extensive manual and semi-automated tracing across a complex, densely packed neuropil.
    action: |
      Using the FAFB whole-brain EM dataset, the authors reconstructed all olfactory projection neurons from the antennal lobe, classified them into types by morphology and connectivity, and mapped their synaptic outputs to mushroom bodies, lateral horn, and other higher brain areas.
    resolution: |
      The complete census revealed 150+ projection neuron types with distinct glomerular innervation and downstream targeting logic, demonstrating parallel channels for odor identity versus valence processing. The dataset provides a reference framework for linking neural circuit architecture to olfactory behavior.
    future_work: |
      Connecting specific projection neuron types to odor response properties through functional recordings and behavioral genetics, and extending comparisons across sexes and ages, remain important goals.
  plain_language_summary: ""
  summaries:
    beginner: |
        Fruit flies detect smells using a relatively simple brain circuit. This paper mapped every relay neuron in the Drosophila smell pathway using electron microscopy, creating a complete reference chart of how different smells are routed to different parts of the brain.
    intermediate: |
        This peer-reviewed companion to the preprint version provides a definitive census of Drosophila olfactory projection neuron types reconstructed from the FAFB whole-brain EM dataset. The authors classified >150 types based on glomerular innervation and downstream connectivity, revealing systematic organizational principles for parallel olfactory processing streams targeting mushroom bodies and lateral horn.
    advanced: |
        The study provides a complete connectomic reference for the Drosophila olfactory projection neuron population, enabling precise quantification of convergence ratios, bilateral symmetry, and connectivity stereotypy across individuals where comparison data exist. A key finding is that multiglomerular projection neurons show distinct downstream targeting relative to uniglomerular types, suggesting specialized roles in combinatorial odor coding. Caveats include reliance on a single female brain and limited cross-validation of cell typing criteria between morphological and connectivity-based approaches.
  discussion_prompts:
  - |
    How does the completeness of the projection neuron census in this study compare to what was achievable with light microscopy-based methods, and what novel cell types were revealed?
    - |
    What connectivity features distinguish projection neurons targeting mushroom bodies versus lateral horn, and how might these differences relate to memory versus innate valence processing?
    - |
    How do the bilateral symmetry patterns of olfactory projection neurons revealed by this connectome compare to predictions from developmental and genetic studies?
    - id: a-connectomic-study-of-a-petascale-fragment-of-human-cerebra
    title: "A connectomic study of a petascale fragment of human cerebral cortex"
    authors: "Shapson-Coe, Januszewski, Berger et al."
    year: 2021
    journal: ""
    doi: 10.1101/2021.05.29.446289
    dimension: connectomics
    reading_phase: 4_frontiers
