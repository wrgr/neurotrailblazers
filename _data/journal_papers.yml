      advanced: "The key architectural insight is that skip connections allow the decoder to recover spatial precision lost during downsampling without sacrificing the large receptive field needed for context. The weighted cross-entropy loss with distance-based weight maps at cell boundaries encourages the network to learn thin, continuous boundary predictions. U-Net's influence on connectomics is pervasive: most modern 3D segmentation networks (3D U-Net, FusionNet, etc.) are direct descendants of this design."

