    ocar:
    opportunity: |
      Electron microscopy-based connectomics requires destructive sample preparation, limiting access to the same tissue by other methods. X-ray holographic nano-tomography (XNH) offered a potentially non-destructive, high-resolution alternative for neuronal reconstruction, but had not been demonstrated for dense neural tissue at connectomics-relevant resolution.
    challenge: |
      X-ray imaging at nanometer resolution requires synchrotron radiation sources, highly coherent beams for holographic phase contrast, and algorithms for phase retrieval and 3D reconstruction — all while achieving sufficient contrast to distinguish membranes and organelles in densely stained neural tissue without the heavy metal staining required for EM.
    action: |
      The authors demonstrated XNH on Drosophila neural tissue, optimizing sample preparation, phase retrieval, and reconstruction algorithms to achieve sufficient resolution (~100 nm isotropic) to trace individual neurons. They reconstructed neural segments and identified synapses, comparing results to EM ground truth.
    resolution: |
      XNH successfully enabled dense neuronal reconstruction in Drosophila tissue, achieving sufficient resolution to trace neuron morphology and identify large synaptic profiles. The non-destructive nature of X-ray imaging allowed subsequent EM of the same tissue, enabling correlated XNH-EM analysis.
    future_work: |
      Improving XNH resolution toward EM-equivalent levels (~5-10 nm), extending to larger tissue volumes, and making the technique available outside synchrotron facilities are important goals for the field.
  plain_language_summary: |
    This paper showed that X-ray imaging can be used to trace neurons in brain tissue without destroying the sample — unlike electron microscopy. By using synchrotron X-rays in a holographic configuration, they could see neurons well enough to trace their paths, opening up the possibility of non-destructively mapping neural circuits and then going back to examine the same tissue with other methods.
  summaries:
    beginner: |
        Electron microscopy is the main tool for mapping brain circuits, but it destroys the tissue during preparation. This paper demonstrated that X-ray imaging using synchrotron light can visualize neurons in brain tissue without destroying it, potentially allowing scientists to image the same tissue multiple times with different techniques.
    intermediate: |
        This paper demonstrates X-ray holographic nano-tomography (XNH) as a method for dense neuronal reconstruction in Drosophila neural tissue. Achieving ~100 nm isotropic resolution via phase-contrast synchrotron imaging and multi-distance phase retrieval, XNH enabled neuron tracing without the destructive preparation required for EM, and allowed correlated XNH-EM analysis of the same tissue.
    advanced: |
        XNH leverages the phase-contrast signal of coherent synchrotron X-rays to image neural tissue without the heavy metal staining essential for EM contrast. Multi-distance phase retrieval (using the transport of intensity equation) converts detected intensity patterns to projected phase images, which are reconstructed into 3D volumes by back-projection. The resolution demonstrated (~100-200 nm) is sufficient for tracing large processes but insufficient for resolving thin axons and small synapses that EM can detect. The non-destructive nature enables sequential multi-modal imaging but the requirement for synchrotron beamtime currently limits throughput and accessibility.
  discussion_prompts:
  - |
    At what spatial resolution does X-ray holographic nano-tomography become competitive with electron microscopy for connectomics-relevant reconstruction, and what technical advances would be required?
    - |
    What unique scientific opportunities does the non-destructive nature of XNH enable that are impossible with standard EM connectomics?
    - |
    How might XNH or related X-ray approaches complement EM connectomics in a multi-modal pipeline for large-volume neural circuit reconstruction?
    - id: fusionnet-a-deep-fully-residual-convolutional-neural-network
    title: |
    FusionNet: A Deep Fully Residual Convolutional Neural Network for Image Segmentation in Connectomics
    authors: "Quan, Hildebrand, Jeong"
    year: 2021
    journal: ""
    doi: 10.3389/fcomp.2021.613981
    dimension: segmentation
    reading_phase: 4_frontiers
    composite_score: 0.0761
