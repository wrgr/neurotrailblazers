- id: vogelstein-2019
  title: 'Connectal coding: discovering the structures linking cognitive phenotypes to individual histories'
  authors: Vogelstein JT, Bridgeford EW, Wang Q, et al.
  year: 2019
  journal: Current Opinion in Neurobiology
  doi: 10.1016/j.conb.2019.04.005
  dimension: network-analysis
  tags:
  - network-analysis:network-embedding
  - network-analysis:graph-matching
  - connectomics:graph-theory
  key_figures:
  - 'Fig. 1: connectal coding framework'
  - 'Fig. 2: graph-to-vector pipeline'
  discussion_prompts:
  - How can connectal coding principles be applied to EM connectomics data?
  - What statistical tests are appropriate for comparing connectomes across individuals or conditions?
  related_content:
  - /content-library/connectomics/graph-representations/
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: Just as the genetic code stores information in DNA sequences, the brain may store information in connection
      patterns — a 'connectal code.' This paper proposes methods for reading this code by statistically analyzing brain network
      structure.
    intermediate: Vogelstein et al. propose 'connectal coding' as a framework for linking brain network structure to behavior
      and cognition. They describe a pipeline for converting graphs to feature vectors, enabling statistical testing of hypotheses
      about how connectivity relates to phenotype.
    advanced: 'This paper provides the statistical framework for hypothesis testing on connectomes: graph-to-vector embedding,
      followed by standard statistical methods (classification, regression, hypothesis testing). The framework applies to
      both MRI and EM connectomes and addresses the multiple-comparisons problem inherent in testing many edges simultaneously.'
  ocar:
    opportunity: The brain may encode information in its connection patterns — a 'connectal code' — but there was no statistical framework for systematically linking brain network structure to behavior and cognition.
    challenge: Connectomes are complex high-dimensional objects (graphs), and testing hypotheses about how connectivity relates to phenotype requires converting graphs into feature vectors while preserving relevant structure and controlling for multiple comparisons.
    action: Vogelstein et al. proposed the 'connectal coding' framework with a pipeline for graph-to-vector embedding followed by standard statistical methods (classification, regression, hypothesis testing) applicable to both MRI and EM connectomes.
    resolution: The framework provides a principled statistical approach for relating brain network structure to behavior, addressing the multiple-comparisons problem inherent in testing many edges simultaneously and applicable across connectomics scales.
