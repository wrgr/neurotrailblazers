      intermediate: "Motta et al. performed dense connectomic reconstruction of layer 4 of mouse barrel cortex using SBEM. They reconstructed ~90 neurons with complete local arbors, identified ~3,000 synapses, and classified thalamocortical versus intracortical axons. Specific connectivity motifs (reciprocal connections, common input) occur at rates above chance."
      advanced: "This study advanced dense cortical reconstruction by combining automated segmentation with systematic error quantification and ground-truth validation. The analysis of thalamocortical axon targeting revealed laminar and cell-type specificity that could not be resolved with sparse reconstructions. The dataset serves as a benchmark for evaluating automated reconstruction pipelines on cortical neuropil."

