    ocar:
    opportunity: |
      Analyzing high-dimensional gene expression datasets to identify co-expressed gene modules requires scalable network-based methods that go beyond pairwise correlation. Connectomics researchers need analogous tools to identify modules of co-varying connectivity among neurons or brain regions.
    challenge: |
      Standard correlation analyses treat all gene pairs equivalently, failing to capture the hub-and-spoke architecture of real biological networks; choosing appropriate thresholds and scale-free topology parameters is non-trivial.
    action: |
      The authors developed WGCNA, an R package implementing weighted correlation network analysis that constructs soft-thresholded co-expression networks, identifies modules via hierarchical clustering, and relates modules to external traits.
    resolution: |
      WGCNA reliably identifies biologically meaningful gene co-expression modules and hub genes that are reproducible across datasets. The package has become a standard tool in systems biology and has been adopted for connectivity matrix analysis in network neuroscience.
    future_work: |
      Extension to non-Gaussian data types and integration with single-cell RNA-seq datasets with sparse counts remain active areas of development.
  plain_language_summary: |
    WGCNA is a toolkit for finding groups of genes that tend to turn on and off together, much like identifying cliques of friends who always show up to the same events. In neuroscience it helps researchers find clusters of brain regions or neurons with correlated activity or connectivity patterns.
  summaries:
    beginner: |
        Scientists often measure the activity of thousands of genes at once and need to find which ones work together. WGCNA is a software tool that groups genes into modules based on how correlated their activity levels are, helping researchers identify which gene groups are linked to specific biological traits.
    intermediate: |
        WGCNA constructs weighted co-expression networks using a soft-thresholding power to approximate scale-free topology, then identifies modules via dynamic tree cutting of the resulting hierarchical clustering. Module eigengenes serve as summary representations that can be correlated with phenotypic traits, making it highly applicable to connectivity matrix decomposition in network neuroscience.
    advanced: |
        WGCNA's soft-thresholding framework reduces sensitivity to arbitrary hard cutoffs and preserves continuous correlation information. Key caveats include the assumption of approximately scale-free network topology, sensitivity to outlier samples, and potential loss of resolution when merging similar modules. In connectomics, the method has been adapted to identify mesoscale modules in structural and functional connectivity matrices, though the biological interpretation of eigengene-trait correlations requires caution in small-n neuroimaging studies.
  discussion_prompts:
  - |
    How does the choice of soft-thresholding power in WGCNA affect module detection, and what criteria should guide that choice in connectome adjacency matrices?
    - |
    What are the key differences between applying WGCNA to gene expression data versus applying it to structural or functional connectivity matrices in neuroscience?
    - |
    How can WGCNA module membership scores be integrated with cell-type-specific connectomic data to identify molecularly defined connectivity modules?
    - id: cylindrical-diameters-method-for-calibrating-section-thickne
    title: |
    Cylindrical diameters method for calibrating section thickness in serial electron microscopy
    authors: "Fiala, Harris"
    year: 2001
    journal: ""
    doi: 10.1046/j.1365-2818.2001.00926.x
