  - "Fig. 3: small-world and modular organization"
  discussion_prompts:
  - How do graph measures computed on EM connectomes compare with those from macroscale tractography?
  - Which network measures are most robust to missing data (incomplete reconstructions)?
  related_content:
  - /content-library/connectomics/graph-representations/
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: >-
      The brain can be studied as a network — neurons as dots, connections as lines. This influential review introduces basic
      tools from network science and shows how they apply to brain data. Key ideas include small-world properties, hub neurons,
      and modular communities.
    intermediate: >-
      Bullmore and Sporns provide a comprehensive introduction to graph-theoretic analysis of brain networks at multiple scales.
      They cover degree distribution, clustering, path length, betweenness centrality, and modularity, and discuss small-world
      architecture and hub organization.
    advanced: >-
      While focused on macroscale connectomics, this review established the analytical vocabulary now applied to nanoscale
      EM connectomes. Critical points: the importance of null models, scale dependence of network measures, and the call for
      standardized analysis pipelines.
  ocar:
    opportunity: >-
      Brain networks had been studied at the level of individual regions or connections, but there was no unified mathematical
      framework for understanding whole-brain network organization and comparing it across species or conditions.
    challenge: >-
      Translating concepts from network science and graph theory to neural data required adapting methods designed for social
      or technological networks to the unique properties of brain connectivity — directed, weighted, spatially embedded, and
      multi-scale.
    action: >-
      Bullmore and Sporns provided a comprehensive introduction to graph-theoretic analysis of brain networks, covering degree
      distributions, clustering, path lengths, modularity, hub structure, and small-world properties across both structural
      and functional connectomics.
    resolution: >-
      The review established the analytical vocabulary and methodological framework that the field of network neuroscience
      still uses today, enabling standardized comparison of brain network properties across studies, species, and scales.
    future_work: >-
      Key challenges include developing network measures suited to directed weighted graphs from EM connectomics and integrating
      macro-scale MRI network analysis with micro-scale synaptic connectivity.
