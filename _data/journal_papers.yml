    ocar:
    opportunity: |
      Accurate three-dimensional reconstruction from serial electron microscopy requires knowing the thickness of each physical section, but direct measurement is technically difficult and prone to error. Calibration errors propagate into volumetric measurements of axons, dendrites, and synapses.
    challenge: |
      Section thickness in serial EM varies due to knife chatter, compression, and other cutting artifacts; reference structures of known geometry are needed but must be identified from within the same tissue to avoid systematic bias.
    action: |
      The authors described the cylindrical diameters method, which uses cross-sectional profiles of cylindrical objects (such as mitochondria or microtubules) within the section stack to back-calculate section thickness from the apparent diameters observed in electron micrographs.
    resolution: |
      The cylindrical diameters method provides a reliable, in-tissue calibration standard that does not require external calibration samples and can be applied to series containing minor distortions. The method has become a standard quality-control step in serial-section EM reconstructions.
    future_work: |
      Automated identification of suitable cylindrical calibration objects within large-volume EM datasets remains an open engineering challenge for fully automated reconstruction pipelines.
  plain_language_summary: |
    When scientists slice brain tissue ultra-thin for electron microscopy, each slice may not be exactly the same thickness — and getting this wrong distorts all 3D measurements. This paper describes a clever trick: by measuring the apparent width of naturally cylindrical objects (like tiny tubes inside cells) in the images, you can calculate how thick each slice actually was.
  summaries:
    beginner: |
        To reconstruct 3D brain structures from stacked 2D electron microscope images, scientists need to know how thick each physical slice was. This paper describes using the known circular cross-sections of objects inside the tissue itself as a ruler to calibrate slice thickness.
    intermediate: |
        Accurate section thickness estimation is critical for volumetric reconstruction in serial-section TEM. The cylindrical diameters method exploits the geometry of cylindrical organelles to estimate thickness from apparent elliptical profiles, offering an approach that works even in sections with minor mechanical artifacts that would confound other methods.
    advanced: |
        The cylindrical diameters method is particularly valuable in connectomics because it provides an internal calibration reference derived directly from the tissue being reconstructed, avoiding the need for fiducial markers. The method assumes that calibration objects are truly cylindrical and isotropically oriented, which may introduce systematic error in highly oriented tissue like white matter tracts. Modern FIB-SEM and ATUM-SEM workflows with more consistent section thickness have reduced but not eliminated the need for this type of post-hoc calibration.
  discussion_prompts:
  - |
    Under what conditions does the cylindrical diameters method fail, and what alternative calibration approaches are available for modern large-volume EM datasets?
    - |
    How does section thickness variability propagate into errors in synapse volume or axon diameter measurements in connectomic reconstructions?
    - |
    With the transition from manual serial-section TEM to automated FIB-SEM, how have section thickness calibration requirements changed?
    - id: the-genetic-architecture-of-the-human-cerebral-cortex
    title: "The genetic architecture of the human cerebral cortex"
    authors: "Grasby, Jahanshad, Painter et al."
