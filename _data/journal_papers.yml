    summaries:
      beginner: "This paper shows that a deep learning model can trace neuron boundaries in brain images more accurately than trained human annotators, at least on a standard benchmark dataset. The key ingredients are a carefully designed 3D neural network and aggressive data augmentation during training."
      intermediate: "Lee et al. present a 3D residual symmetric U-Net that surpasses human performance on the SNEMI3D neuron segmentation benchmark. The architecture combines residual learning with a symmetric encoder-decoder and is trained with heavy augmentation including simulated misalignment and missing sections. The result demonstrates that architecture and augmentation together can push automated segmentation beyond expert-level accuracy."
      advanced: "The residual symmetric network extends U-Net with skip connections that use element-wise summation rather than concatenation, reducing parameter count while preserving gradient flow. Ablation studies reveal that domain-specific augmentations (elastic deformation, misalignment simulation, missing-section simulation) contribute more to performance than architectural depth alone. The 'superhuman' claim is grounded in a direct comparison with independently generated human ground-truth annotations that disagree with each other more than the model disagrees with consensus."

  - id: turaga-2010
    title: "Convolutional networks can learn to generate affinity graphs for image segmentation"
    authors: "Turaga SC et al."
    year: 2010
    journal: "Neural Computation"
    doi: "10.1162/neco.2009.10-08-881"
    dimension: computer-vision-ml
    tags:
