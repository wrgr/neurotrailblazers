- id: zador-2023
  title: "Catalyzing next-generation AI: The role of neuroscience"
  authors: Zador A, Escola S, Richards B, et al.
  year: 2023
  journal: Nature Communications
  doi: 10.1038/s41467-023-37180-x
  dimension: neuroai
  tags:
  - "neuroai:bio-inspired-architecture"
  - "neuroai:structure-function"
  - "methodology:experimental-design"
  key_figures:
  - "Fig. 1: neuroscience-AI feedback loop"
  - "Fig. 2: biological design principles"
  discussion_prompts:
  - Which biological principles are most likely to improve current AI systems?
  - How should neuroscience experiments be designed to maximize relevance for AI development?
  related_content:
  - /content-library/connectomics/neuroai-bridge/
  summaries:
    beginner: >-
      Can studying how real brains work help us build better AI? This paper argues yes — that neuroscience can provide design
      principles, learning rules, and architectural ideas that will catalyze the next generation of artificial intelligence.
    intermediate: >-
      Zador et al. present a manifesto for NeuroAI: the systematic use of neuroscience insights to inspire AI advances. They
      identify specific areas where biology can inform AI: structured architectures, multi-scale learning, embodied intelligence,
      and energy-efficient computation.
    advanced: >-
      This position paper from leading NeuroAI researchers identifies the most tractable opportunities for neuroscience-to-AI
      transfer. Key arguments: connectome data can constrain network architectures, developmental programs encode inductive
      biases, and multi-scale circuit motifs can inform modular AI design.
  ocar:
    opportunity: >-
      AI and neuroscience have historically inspired each other, but the relationship had become ad hoc, with no systematic
      framework for identifying which neuroscience insights could most productively advance AI.
    challenge: >-
      Bridging the two fields requires identifying specific, actionable biological principles rather than vague analogies,
      and ensuring that neuroscience experiments are designed to produce data useful for AI development.
    action: >-
      Zador et al. convened leading researchers from both fields and identified specific areas where neuroscience can inform
      AI, including structured architectures from connectomics, multi-scale learning rules, embodied intelligence principles,
      and energy-efficient computation strategies.
    resolution: >-
      The paper established a roadmap for NeuroAI research, arguing that connectome data can directly constrain network architectures,
      developmental programs encode useful inductive biases, and circuit motifs can inform modular AI design.
    future_work: >-
      Translating the identified biological principles into concrete improvements in AI systems and designing neuroscience
      experiments that maximize relevance for AI remain the central challenges.
