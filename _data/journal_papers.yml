    ocar:
    opportunity: |
      The highly folded human cerebral cortex made comparison of cortical anatomy and function across subjects difficult, as homologous cortical regions are not spatially aligned in volumetric MRI. A surface-based representation was needed to enable accurate cross-subject registration and analysis of cortical structure and function.
    challenge: |
      Reconstructing the cortical surface from MRI requires accurate segmentation of white and gray matter, followed by surface inflation and registration to a common template sphere — all while preserving accurate topological relationships and enabling meaningful comparison of curvature, thickness, and functional data across subjects.
    action: |
      Dale, Fischl, and Sereno developed FreeSurfer, providing algorithms for automated cortical surface reconstruction, inflation, and spherical registration. They validated surface-based analysis of cortical thickness, curvature, and functional data by comparing to manual measurements and demonstrating improved cross-subject alignment.
    resolution: |
      FreeSurfer's cortical surface reconstruction and analysis pipeline became the standard for human neuroimaging studies, enabling accurate cross-subject comparison of cortical anatomy and function. Surface-based registration substantially improved alignment of cortical areas compared to volumetric methods.
    future_work: |
      Extensions to subcortical segmentation, quantitative MRI, and multi-modal surface parcellation continue to extend FreeSurfer's capabilities, and deep learning-based surface reconstruction is an active area.
  plain_language_summary: |
    The brain's outer layer is heavily folded, making it hard to compare the same region across different people's brains. This paper developed FreeSurfer, a software tool that unfolds the brain's surface into a map — like unfolding a crumpled piece of paper — allowing accurate comparison of brain regions across people and enabling precise mapping of where functions and structures are located.
  summaries:
    beginner: |
        The outer layer of the brain is folded like a crumpled piece of paper. To compare the same brain region across different people, scientists need to 'unfold' those surfaces into a standard map. This paper developed the FreeSurfer software to automatically reconstruct, inflate, and register brain surfaces from MRI scans.
    intermediate: |
        This paper describes cortical surface-based analysis methods implemented in FreeSurfer, including automated surface reconstruction from MRI, cortical flattening, spherical registration for cross-subject alignment, and surface-based analysis of cortical thickness and functional data. Surface-based approaches substantially improve the alignment of homologous cortical areas compared to volumetric registration.
    advanced: |
        FreeSurfer's cortical reconstruction pipeline uses deformable surface models optimized by intensity gradients at the white-gray and pial boundaries, followed by surface inflation and spherical registration to a population average template. The resulting surface representations enable vertex-wise statistical analysis of cortical morphology and function. In connectomics contexts, FreeSurfer-derived cortical parcellations (e.g., Desikan-Killiany) are used to define nodes in structural and functional connectivity analyses. Key limitations include sensitivity to MRI acquisition quality and the use of intensity-based segmentation without a priori knowledge of cytoarchitecture.
  discussion_prompts:
  - |
    How does surface-based registration in FreeSurfer improve cross-subject alignment of cortical areas compared to volumetric registration, and where does it still fail?
    - |
    How are FreeSurfer-derived parcellations used as node definitions in structural connectomics studies, and what assumptions does this introduce?
    - |
    What would a connectomics-informed cortical surface parcellation look like, and would it differ substantially from parcellations derived from MRI morphology or function?
    - id: quantitative-neuroanatomy-for-connectomics-in-drosophila
    title: "Quantitative neuroanatomy for connectomics in Drosophila"
    authors: "Schneider-Mizell, Gerhard, Longair et al."
    year: 2016
    journal: ""
    doi: 10.7554/elife.12059
    dimension: proofreading
    reading_phase: 2_core_methods
    composite_score: 0.0749
    role: methods
    tags:
    - species:drosophila
    - proofreading
    - method:quantitative-neuroanatomy
    - connectomics
    - neuroanatomy
    - graph-analysis
    ocar:
    opportunity: |
      Electron microscopy-based connectomics required laborious manual proofreading or independent duplicate reconstructions to achieve reliable circuit maps. Methods for quantitatively assessing reconstruction quality and using network-level context to guide error correction were lacking.
    challenge: |
      Manual proofreading of dense EM reconstructions is extremely time-consuming, and errors in neurite tracing propagate into incorrect connectivity assignments. Developing quantitative metrics for reconstruction quality and algorithms that leverage network context to detect and correct errors requires both biological and computational innovation.
    action: |
      The authors developed new methods combining quantitative morphological analysis (arbor metrics) with network context to iteratively proofread and enrich Drosophila circuit reconstructions. They applied these methods to both larval sensorimotor and adult visual circuits, measuring connectivity underpinnings of morphological variation and producing anatomically enriched wiring diagrams.
    resolution: |
      The quantitative neuroanatomy approach improved reconstruction reliability and enabled the production of wiring diagrams with attached morphological annotations. The study characterized how synaptic input distribution correlates with arbor geometry and demonstrated that network context can guide reconstruction, reducing human effort.
    future_work: |
      Fully automated proofreading guided by network context, and extending these methods to larger volumes with more cell types, remain important directions for scalable connectomics.
  plain_language_summary: |
    Building accurate brain wiring diagrams from microscope images requires checking and correcting thousands of reconstruction errors — a hugely tedious process. This paper developed smarter methods that use both the shape of neurons and the patterns of who connects to whom to automatically flag and fix reconstruction mistakes, making the process faster and more reliable.
  summaries:
    beginner: |
        When scientists reconstruct brain circuits from electron microscope images, they make errors that need to be found and corrected. This paper developed better methods for checking reconstruction quality by using both the physical shapes of neurons and the patterns of their connections to automatically identify and fix mistakes.
    intermediate: |
        This paper presents a framework for quantitative proofreading of EM connectomics reconstructions using morphological arbor metrics and network-context analysis. Applied to Drosophila larval and adult circuits, the approach improved wiring diagram reliability and enabled systematic characterization of the relationship between arbor geometry and synaptic connectivity.
    advanced: |
        The authors introduce a proofreading methodology that quantifies reconstruction quality using arbor branching statistics and exploits network topology — specifically, the expected convergence and divergence ratios for known cell-type pairs — to identify likely merges and splits. Applied to Drosophila sensorimotor and visual circuits, the method reduced reconstruction errors and produced anatomically annotated wiring diagrams with quantified confidence. The framework represents an early example of semi-automated proofreading and anticipates later approaches using machine learning classifiers trained on morphological and topological features to guide error detection.
  discussion_prompts:
  - |
    How does incorporating network context into proofreading — using expected connectivity patterns to flag anomalies — compare to purely image-based error detection approaches?
    - |
    What is the relationship between neuron arbor morphology and synaptic connectivity, and how can this relationship be exploited to improve reconstruction quality?
    - |
    At what level of automated segmentation accuracy does manual proofreading become the dominant bottleneck for connectomics, and how do methods like quantitative neuroanatomy help address this?
