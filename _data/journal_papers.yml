  discussion_prompts:
  - >-
    How does the lateral horn contribute differently to innate odor valence routing compared to the mushroom body, based on
    what this circuit study reveals?
  - >-
    What experimental evidence most convincingly validates each circuit node's functional role in aversive odor behavior,
