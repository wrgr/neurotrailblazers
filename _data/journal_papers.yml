  - How would you design an acquisition QA system for a dataset 10x larger?
  related_content:
  - /content-library/imaging/acquisition-qa/
  - /content-library/case-studies/microns-visual-cortex/
  summaries:
    beginner: To map the wiring of even a small piece of mouse brain, you need millions of images assembled into one continuous
      3D volume. This paper describes the industrial-scale imaging system used for the MICrONS project — multiple electron
      microscopes running simultaneously with automated quality checks.
    intermediate: Yin et al. describe the multi-beam TEM imaging pipeline used for the MICrONS mm³ cortical volume. Key engineering
      contributions include automated stage control, real-time QA feedback, parallel operation of multiple TEMs, and computational
      infrastructure for petabyte-scale image assembly. The pipeline achieved sustained throughput of ~1 megapixel/second
      per microscope.
    advanced: This paper is essential for understanding the industrialization of connectomics imaging. The QA architecture
      — automated focus assessment, contrast monitoring, section damage detection, and real-time re-imaging decisions — represents
      a mature approach to acquisition reliability at scale. The paper provides concrete throughput numbers useful for planning
      future large-scale acquisitions.
- id: lichtman-denk-2011
  title: 'The big and the small: Challenges of imaging the brain''s circuits'
  authors: Lichtman JW, Denk W
  year: 2011
  journal: Science
  doi: 10.1126/science.1209168
  dimension: imaging
  tags:
  - imaging:electron-microscopy
  - imaging:resolution
  - imaging:correlative-imaging
  - methodology:experimental-design
  key_figures:
  - 'Fig. 1: scale comparison of imaging modalities'
  - 'Fig. 2: resolution versus volume tradeoff'
  discussion_prompts:
  - Has the resolution-volume tradeoff described in 2011 been substantially altered by subsequent technology?
  - What role should correlative imaging play in connectomics experimental design?
  related_content:
  - /content-library/imaging/em-principles/
  - /content-library/imaging/acquisition-qa/
  summaries:
    beginner: This paper is an accessible overview of why imaging the brain's wiring is so hard. The brain contains structures
      at vastly different scales — from entire brain regions (centimeters) down to individual synapses (nanometers). No single
      imaging method can capture all of these at once.
    intermediate: Lichtman and Denk present a perspective on the multi-scale imaging challenge, framing it as simultaneously
      achieving synapse-resolution (~10 nm) and circuit-scale field of view (~mm to cm). They compare light microscopy, serial
      section EM, SBEM, and FIB-SEM, and introduce the concept of correlative imaging.
    advanced: This perspective remains one of the clearest articulations of the resolution-volume tradeoff. Lichtman and Denk
      quantify the imaging throughput required for mammalian connectomics and argue that brute-force scaling is insufficient
      without fundamental automation advances. Their analysis of the 'data bottleneck' anticipated the current state of the
      field.
- id: briggman-bock-2012
  title: Volume electron microscopy for neuronal circuit reconstruction
  authors: Briggman KL, Bock DD
