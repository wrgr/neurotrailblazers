# Structured journal paper collection for NeuroTrailblazers.
# Each paper is a searchable record with tags and multi-level summaries.
# Sortable by: dimension, year, tags. Filterable by expertise level.
# Papers appearing in multiple dimensions use also_dimensions for cross-referencing.
#
# Fields per paper:
#   id, title, authors, year, journal, doi, dimension, also_dimensions (optional),
#   tags, key_figures, discussion_prompts, related_content, summaries (beginner/intermediate/advanced),
#   citation_note (optional - for highly cited papers)

papers:
- id: harris-weinberg-2012
  title: Ultrastructure of synapses in the mammalian brain
  authors: Harris KM, Weinberg RJ
  year: 2012
  journal: Cold Spring Harbor Perspectives in Biology
  doi: 10.1101/cshperspect.a005587
  dimension: neuroanatomy
  tags:
  - "neuroanatomy:synapse"
  - "neuroanatomy:spine"
  - "neuroanatomy:postsynaptic-density"
  - "neuroanatomy:vesicle"
  - "imaging:electron-microscopy"
  key_figures:
  - "Fig. 1: synapse ultrastructure overview"
  - "Fig. 3: vesicle pool organization"
  - "Fig. 5: perforated synapse morphology"
  discussion_prompts:
  - Which synapse features are robust enough for automated detection versus requiring human adjudication?
  - How does fixation quality affect measurements of cleft width and PSD thickness?
  related_content:
  - /content-library/neuroanatomy/synapse-classification/
  - /content-library/neuroanatomy/dendrite-biology/
  summaries:
    beginner: >-
      This review is a visual guide to what synapses — the connection points between neurons — actually look like under a
      powerful microscope. It explains the small structures (vesicles, densities, clefts) that make up a synapse and why their
      size and shape matter for brain function.
    intermediate: >-
      Harris and Weinberg provide a systematic catalog of excitatory and inhibitory synapse ultrastructure in mammalian cortex
      and hippocampus. They describe presynaptic vesicle pools, the structure of the postsynaptic density, and cleft components
      visible at EM resolution. The review also covers perforated synapses, multi-synaptic boutons, and spinule formations.
    advanced: >-
      Essential reading for anyone developing synapse detection algorithms or evaluating connectome edge weights. Key methodological
      points include the distinction between symmetric (Gray Type II) and asymmetric (Gray Type I) synapses, the quantitative
      relationship between PSD area and vesicle count, and caveats around interpreting synapse size from single-section profiles
      versus serial reconstructions.
  ocar:
    opportunity: >-
      Connectomics pipelines require reliable identification and classification of synapses, but the ultrastructural features
      that define different synapse types in mammalian brain had not been comprehensively reviewed in a format accessible
      to computational researchers.
    challenge: >-
      Synaptic ultrastructure varies across brain regions, fixation protocols, and section angles, making it difficult to
      establish universal morphological criteria. Quantitative relationships between structural features (e.g., PSD area and
      vesicle count) had been reported inconsistently.
    action: >-
      Harris and Weinberg systematically cataloged excitatory and inhibitory synapse ultrastructure across mammalian cortex
      and hippocampus, describing presynaptic vesicle pools, postsynaptic density structure, cleft geometry, and variant forms
      like perforated synapses and multi-synaptic boutons.
    resolution: >-
      The review established a canonical reference for synapse morphology at EM resolution, providing the visual and quantitative
      vocabulary needed to develop and validate automated synapse detection algorithms in connectomics.
    future_work: >-
      Open questions include how to reliably distinguish synapse subtypes in automated pipelines and how fixation artifacts
      affect quantitative measurements used as classification features.
  bibtex: >-
    @article{harris2012ultrastructure,
      title={Ultrastructure of synapses in the mammalian brain},
      author={Harris, Kristen M and Weinberg, Richard J},
      journal={Cold Spring Harbor Perspectives in Biology},
      volume={4},
      number={5},
      pages={a005587},
      year={2012},
      doi={10.1101/cshperspect.a005587}
    }
  plaintext_citation: >-
    Harris, K. M., & Weinberg, R. J. (2012). Ultrastructure of synapses in the mammalian brain. Cold Spring Harbor Perspectives
    in Biology, 4(5), a005587.
  code_url: null
  data_url: null
- id: peters-palay-1991
  title: "The Fine Structure of the Nervous System: Neurons and Their Supporting Cells"
  authors: Peters A, Palay SL, Webster H deF
  year: 1991
  journal: Oxford University Press (textbook)
  doi: null
  dimension: neuroanatomy
  tags:
  - "neuroanatomy:soma"
  - "neuroanatomy:axon"
  - "neuroanatomy:dendrite"
  - "neuroanatomy:myelin"
  - "neuroanatomy:organelle"
  - "imaging:electron-microscopy"
  key_figures:
  - "Ch. 1 plates: neuronal soma organelles"
  - "Ch. 5 plates: synaptic junction types"
  - "Ch. 8 plates: myelin and nodes"
  discussion_prompts:
  - Which morphological criteria from this text translate directly into automated detection features?
  - How has immuno-EM since 1991 refined or contradicted any of the structural assignments?
  related_content:
  - /content-library/neuroanatomy/soma-ultrastructure/
  - /content-library/neuroanatomy/axon-biology/
  - /content-library/neuroanatomy/myelin-and-nodes/
  summaries:
    beginner: >-
      This classic textbook is the definitive atlas of what the brain looks like under an electron microscope. It describes
      every type of cell and structure you will encounter: neuron cell bodies, axons, dendrites, synapses, glia, and myelin.
      Think of it as a field guide for identifying structures in brain tissue images.
    intermediate: >-
      Peters, Palay & Webster remains the gold standard reference for neuronal ultrastructure. Each chapter systematically
      catalogs the EM appearance of a major structure, with micrographs, drawings, and quantitative parameters. The chapters
      on axon terminals, synaptic junctions, and myelin sheaths provide the visual vocabulary needed for accurate proofreading
      decisions.
    advanced: >-
      While dated in its functional interpretations, this text's morphological descriptions remain unsurpassed in rigor. The
      systematic treatment of organelle distribution across neuronal compartments, the classification of synaptic vesicle
      types and their relationship to neurotransmitter content, and the detailed treatment of nodes of Ranvier and paranodal
      junctions are all directly relevant to current automated annotation pipelines.
  ocar:
    opportunity: >-
      Electron microscopists and computational neuroscientists needed a comprehensive morphological reference for identifying
      cellular structures in EM images, but no single resource systematically covered all neuronal and glial ultrastructure.
    challenge: >-
      The diversity of neuronal cell types, organelles, and specialized structures across brain regions made it difficult
      to compile a unified atlas. Correlating structures across different fixation and staining protocols added further complexity.
    action: >-
      Peters, Palay, and Webster produced a definitive textbook cataloging the EM appearance of every major structure in nervous
      tissue, with micrographs, drawings, and quantitative morphological parameters organized by cellular compartment.
    resolution: >-
      The text became the gold standard morphological reference for neuroscience, providing the visual vocabulary used by
      generations of researchers and now serving as ground truth for training and validating automated annotation systems.
    future_work: >-
      While the morphological descriptions remain unsurpassed, functional interpretations need updating with modern immuno-EM
      and correlative light-electron microscopy findings.
  bibtex: >-
    @book{peters1991fine,
      title={The Fine Structure of the Nervous System: Neurons and Their Supporting Cells},
      author={Peters, Alan and Palay, Sanford L and Webster, Henry deF},
      publisher={Oxford University Press},
      year={1991},
      edition={3rd}
    }
  plaintext_citation: >-
    Peters, A., Palay, S. L., & Webster, H. deF. (1991). The fine structure of the nervous system: Neurons and their supporting
    cells (3rd ed.). Oxford University Press.
