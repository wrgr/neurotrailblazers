    intermediate: 'Van Essen et al. describe the HCP design: high-resolution structural MRI, diffusion MRI, resting-state
      fMRI, task fMRI, and MEG/EEG from 1,200 young adults. Technical innovations include customized hardware and optimized
      protocols.'
    advanced: 'HCP established the technical and data-sharing standards for population-scale connectomics. Key contributions:
      multi-modal parcellation approach, demonstration that multi-shell diffusion improves tractography, and the CIFTI surface-based
      analysis framework.'
