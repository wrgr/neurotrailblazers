- id: turaga-2010
  title: Convolutional networks can learn to generate affinity graphs for image segmentation
  authors: Turaga SC et al.
  year: 2010
  journal: Neural Computation
  doi: 10.1162/neco.2009.10-08-881
  dimension: computer-vision-ml
  tags:
  - "computer-vision-ml:affinity-prediction"
  - "computer-vision-ml:segmentation"
  - "computer-vision-ml:boundary-detection"
  key_figures:
  - "Fig. 1: affinity graph representation of image segmentation"
  - "Fig. 3: convolutional network trained with MALIS loss"
  - "Fig. 5: segmentation results on EM neuron images"
  discussion_prompts:
  - >-
    How does the affinity-graph representation of segmentation differ from direct boundary prediction, and what advantages
    does it offer?
  - >-
    Why was the MALIS (maximin affinity learning) loss an important conceptual advance over pixel-wise cross-entropy for segmentation?
  related_content:
  - /content-library/computer-vision-ml/affinity-prediction/
  - /content-library/computer-vision-ml/boundary-detection/
  summaries:
    beginner: >-
      Instead of just drawing edges around neurons, this paper trains a neural network to predict for every pair of neighboring
      pixels whether they belong to the same neuron. These pairwise 'affinity' predictions can then be turned into a full
      segmentation. This idea became one of the foundational approaches in connectomics image analysis.
    intermediate: >-
      Turaga et al. introduce the affinity graph framework for neuron segmentation: a CNN predicts edge affinities between
      neighboring voxels, and a graph partitioning step produces the final segmentation. They also propose the MALIS loss,
      which focuses gradient updates on the maximally incorrect affinities that would cause topological errors, rather than
      treating all voxels equally.
    advanced: >-
      This paper laid the theoretical groundwork for affinity-based segmentation in connectomics. The MALIS criterion computes
      gradients only on the critical edges of the minimum spanning tree that connect or separate ground-truth segments, providing
      a training signal that is directly sensitive to topological merge and split errors. The affinity-graph formulation also
      naturally supports long-range affinities, which later work showed improves segmentation of thin processes.
  ocar:
    opportunity: >-
      Early connectomics segmentation relied on hand-crafted boundary detectors. The growing power of convolutional neural
      networks raised the question of whether CNNs could learn to predict pairwise voxel relationships (affinities) that encode
      segmentation directly.
    challenge: >-
      Standard pixel-wise loss functions treat all errors equally, but in segmentation, a single incorrect affinity on a critical
      boundary can cause a catastrophic merge of two neurons. A loss function sensitive to topological errors was needed.
    action: >-
      Turaga et al. introduced the affinity graph framework where a CNN predicts edge affinities between neighboring voxels,
      and proposed the MALIS (maximin affinity learning) loss that focuses gradient updates on the maximally incorrect affinities
      responsible for topological errors.
    resolution: >-
      The affinity-graph formulation became one of the two foundational paradigms for connectomics segmentation (alongside
      flood-filling). MALIS provided a training signal directly sensitive to merge and split errors, and the framework naturally
      extended to long-range affinities for improved segmentation of thin processes.
    future_work: >-
      Extending to long-range and learned affinities, combining affinity prediction with structured losses like the later
      Funke et al. PDE-based approach, and integrating affinity graphs with graph neural networks for end-to-end segmentation.
  bibtex: >
    @article{turaga2010convolutional,
      title={Convolutional networks can learn to generate affinity graphs for image segmentation},
      author={Turaga, Srinivas C and others},
      journal={Neural Computation},
      volume={22},
      number={2},
      pages={511--538},
      year={2010},
