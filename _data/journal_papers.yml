  related_content: [/content-library/imaging/em-principles/, /content-library/imaging/acquisition-qa/]
  summaries:
    beginner: This paper produced the first complete electron microscopy images of an entire mouse brain — billions of images covering every region. While the resolution isn't high enough to see individual synapses everywhere, it provides an unprecedented anatomical atlas.
    intermediate: Xu et al. used enhanced FIB-SEM to image two complete mouse brains at ~8 nm isotropic resolution. The dataset enables whole-brain cell census, regional ultrastructure comparison, and organelle-level quantification. All data is publicly available.
    advanced: This atlas establishes a new class of connectomics resource — whole-brain coverage at intermediate resolution. The dataset bridges the gap between light-microscopy atlases and synapse-resolution EM volumes, enabling quantitative ultrastructural comparisons across brain regions.

