      of nervous system organization.
    intermediate: Varshney et al. provide the most rigorous graph-theoretic analysis of the C. elegans connectome using a
      corrected version of the White et al. data. They analyze both chemical synapses and gap junctions, computing degree
      distributions, clustering, rich-club structure, and modular organization.
    advanced: 'A methodological template for connectome network analysis. Notable: systematic comparison of binary vs weighted
      analyses, rigorous null model comparison, separate analysis of gap junction and chemical synapse networks, and identification
      of the rich-club phenomenon — densely interconnected hub interneurons.'
