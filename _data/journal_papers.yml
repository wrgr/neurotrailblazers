    summaries:
      beginner: "A small piece of human brain tissue was reconstructed at nanometer resolution, revealing tens of thousands of neurons and millions of connections. The dataset uncovered structures never seen before, including mysterious coiled axons called whorls."
      intermediate: "Shapson-Coe et al. present the H01 dataset — 1 mm³ of human temporal cortex containing ~57,000 cells and ~150 million synapses reconstructed at EM resolution. The study reveals human-specific features including axonal whorls and a heavier-tailed distribution of multi-synaptic connections compared to mouse."
      advanced: "H01 represents the first petascale human connectomics dataset. The tissue originated from a temporal lobe epilepsy resection, introducing caveats about pathology. Computationally, the reconstruction required exascale inference. Novel findings include oligodendrocyte-to-neuron associations, abundant multi-synaptic motifs, and axonal whorls whose function remains unknown."

