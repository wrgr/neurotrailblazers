    ocar:
    opportunity: |
      Neuroscience lacked a comprehensive structural map of all connections in the human brain—a framework that could serve as the foundation for understanding how brain function emerges from wiring patterns.
    challenge: |
      The human brain contains ~86 billion neurons connected by hundreds of trillions of synapses organized across scales from synaptic to regional; no existing technique or data resource could capture this connectivity comprehensively, and no consensus framework existed for organizing what was known.
    action: |
      Sporns, Tononi, and Kötter introduce and define the concept of the human 'connectome'—a comprehensive structural description of the brain's connection matrix. They argue for a multi-scale approach, review available partial connectivity data from tract-tracing, diffusion imaging, and electrophysiology, and call for systematic community efforts to map brain connectivity.
    resolution: |
      The paper establishes 'connectome' as a conceptual and scientific term, arguing that a complete wiring diagram is indispensable for understanding brain function, modeling neurological disease, and comparing brains across individuals and species. It lays the intellectual foundation for the Human Connectome Project and other large-scale connectivity mapping initiatives.
    future_work: |
      Developing imaging and computational methods capable of actually capturing the full human connectome at cellular resolution was acknowledged as a major unsolved challenge requiring decades of effort.
  plain_language_summary: ""
  summaries:
    beginner: |
        This paper coined the term 'connectome'—a complete wiring diagram of all connections in the brain. The authors argue that understanding the brain requires mapping this diagram systematically, just as the Human Genome Project mapped all human genes.
    intermediate: |
        Sporns, Tononi, and Kötter define the connectome concept and argue that a multi-scale structural description of brain connectivity—from synaptic to inter-regional—is essential for neuroscience. They review partial connectivity data from tract-tracing studies and propose graph-theoretic analysis as a framework for understanding network properties of the connectome.
    advanced: |
        This foundational paper introduces the connectome as a research program, building on Sporns's earlier network analysis work and Tononi's integrated information framework. The authors argue that the nervous system's functional capacities are encoded in its structural wiring and propose that graph-theoretic metrics (efficiency, clustering, modularity) will be diagnostically and theoretically informative. The paper catalyzed two major research directions: macroscale connectomics (HCP, dMRI) and microscale EM-based connectomics, and its emphasis on multi-scale integration remains a central unsolved challenge in the field.
  discussion_prompts:
  - |
    What does 'completeness' mean for the connectome at different scales, and is a synaptic-resolution connectome necessary or sufficient for understanding brain function?
    - |
    How has the connectome concept evolved since this 2005 paper, particularly with regard to incorporating dynamic, activity-dependent, and molecular dimensions?
    - |
    What are the key differences between macroscale connectomes derived from diffusion MRI and microscale connectomes derived from electron microscopy, and are they measuring the same thing?
    - id: saturated-reconstruction-of-a-volume-of-neocortex
    title: "Saturated Reconstruction of a Volume of Neocortex"
    authors: "Kasthuri, Hayworth, Berger et al."
    year: 2015
    journal: ""
    doi: 10.1016/j.cell.2015.06.054
    dimension: connectomics
