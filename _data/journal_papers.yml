- id: bassett-sporns-2017
  title: Network neuroscience
  authors: Bassett DS, Sporns O
  year: 2017
  journal: Nature Neuroscience
  doi: 10.1038/nn.4502
  dimension: network-analysis
  tags:
  - "network-analysis:community-detection"
  - "network-analysis:centrality"
  - "network-analysis:modularity"
  - "connectomics:graph-theory"
  key_figures:
  - "Fig. 1: network neuroscience framework"
  - "Fig. 3: multi-scale network analysis"
  discussion_prompts:
  - How should network neuroscience methods be adapted for the unique properties of EM connectomes?
  - What are the most promising directions for integrating macro-scale and micro-scale network analysis?
  related_content:
  - /content-library/connectomics/network-analysis-methods/
  - /content-library/connectomics/neuroai-bridge/
  summaries:
    beginner: >-
      Network neuroscience is a field that studies the brain as a network of connected parts. This review describes the tools
      and ideas that have emerged, from measuring how well-connected a brain region is to understanding how network organization
      relates to behavior and disease.
    intermediate: >-
      Bassett and Sporns provide an overview of network neuroscience as a discipline, covering methods (graph theory, dynamic
      network analysis, multi-layer networks), applications (development, disease, cognition), and future directions. They
      emphasize the importance of cross-scale integration.
    advanced: >-
      This review establishes network neuroscience as a coherent discipline spanning macro (MRI) and micro (EM) scales. Key
      arguments: (1) network analysis provides a common language across scales; (2) dynamic and multi-layer network methods
      are needed for time-varying and multi-modal data; (3) the greatest opportunities lie in cross-scale integration where
      EM provides ground truth for evaluating macro-scale network claims.
  ocar:
    opportunity: >-
      Network analysis methods were being applied to brain data across multiple scales, modalities, and species, but the field
      lacked a unifying framework that coherently organized these efforts into a single discipline.
    challenge: >-
      Integrating methods from graph theory, dynamic systems, and multi-layer networks with applications spanning development,
      disease, and cognition required synthesizing a rapidly growing literature across scales from synapses to brain regions.
    action: >-
      Bassett and Sporns provided a comprehensive overview of network neuroscience as a discipline, covering methods, applications,
      and future directions with particular emphasis on cross-scale integration between MRI and EM connectomics.
    resolution: >-
      The review established network neuroscience as a coherent field with a common analytical language across scales, and
      identified cross-scale integration — where EM provides ground truth for macro-scale network claims — as the greatest
      opportunity.
    future_work: >-
      Developing dynamic and multi-layer network methods for time-varying and multi-modal connectomics data, and achieving
      meaningful integration of micro-scale and macro-scale network analyses, are the key frontiers.
  bibtex: >-
    @article{bassett2017network,
      title={Network neuroscience},
      author={Bassett, Danielle S and Sporns, Olaf},
      journal={Nature Neuroscience},
      volume={20},
      number={3},
      pages={353--364},
      year={2017},
      doi={10.1038/nn.4502}
    }
