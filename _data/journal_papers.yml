  key_figures:
  - "Fig. 1: NEURD morphological feature extraction"
  - "Fig. 3: automated compartment classification"
  discussion_prompts:
  - How can morphological features extracted from meshes improve cell type classification?
  - What is the relationship between automated morphological analysis and traditional Sholl analysis?
  related_content:
  - /content-library/neuroanatomy/dendrite-biology/
  - /content-library/cell-types/neuron-type-identification/
  summaries:
    beginner: >-
      After mapping neurons in 3D, scientists need to measure their shapes automatically. NEURD is a tool that extracts detailed
      morphological features from neuron reconstructions — like branch patterns, spine density, and compartment identity —
      enabling automated cell type classification.
    intermediate: >-
      Celii et al. present NEURD, a pipeline for automated morphological feature extraction and proofreading from EM reconstructions.
      The system decomposes neuronal meshes into branches, classifies compartments (axon vs dendrite), detects spines, and
      computes quantitative morphological descriptors for downstream classification.
    advanced: >-
      NEURD addresses the feature engineering gap between raw segmentation and biological analysis. The mesh-based approach
      avoids skeleton artifacts and enables direct computation of surface area, volume, and spine density. The automated axon-dendrite
      classification achieves >95% accuracy on MICrONS data.
  ocar:
    opportunity: >-
      EM connectomics pipelines produced detailed 3D neuron reconstructions, but there was no automated system for extracting
      the morphological features (branch patterns, spine density, compartment identity) needed for biological analysis and
      cell type classification.
    challenge: >-
      Extracting quantitative morphological features from meshes required decomposing complex neuronal shapes into meaningful
      components (branches, spines) and classifying compartments (axon vs dendrite) with high accuracy across diverse cell
      types.
    action: >-
      Celii et al. developed NEURD, a pipeline that decomposes neuronal meshes into branches, classifies axon versus dendrite
      compartments, detects spines, and computes quantitative morphological descriptors for downstream analysis and automated
      proofreading.
    resolution: >-
      NEURD achieved >95% accuracy on axon-dendrite classification in MICrONS data and provided the feature engineering bridge
      between raw segmentation and biological analysis, enabling automated cell type classification from morphology.
    future_work: >-
      Extending NEURD to additional species and brain regions and integrating morphological features with connectivity-based
      classification for improved cell typing are important next steps.
