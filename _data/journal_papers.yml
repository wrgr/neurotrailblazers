  summaries:
    beginner: >-
      The Human Connectome Project scanned 1,200 healthy adults with advanced brain imaging plus behavioral testing. All data
      is shared freely, making it the reference dataset for human brain network research.
    intermediate: >-
      Van Essen et al. describe the HCP design: high-resolution structural MRI, diffusion MRI, resting-state fMRI, task fMRI,
      and MEG/EEG from 1,200 young adults. Technical innovations include customized hardware and optimized protocols.
    advanced: >-
      HCP established the technical and data-sharing standards for population-scale connectomics. Key contributions: multi-modal
      parcellation approach, demonstration that multi-shell diffusion improves tractography, and the CIFTI surface-based analysis
      framework.
  ocar:
    opportunity: >-
      Mapping human brain connectivity at population scale required a coordinated project with standardized protocols and
      data sharing, but no such effort existed despite the recognized need for a reference dataset of human brain networks.
    challenge: >-
      Achieving the required data quality for 1,200 subjects demanded customized MRI hardware, optimized acquisition protocols
      for multiple modalities, and infrastructure for storing and sharing petabytes of data openly.
    action: >-
      Van Essen et al. designed and executed the Human Connectome Project, collecting high-resolution structural MRI, diffusion
      MRI, resting-state and task fMRI, and MEG/EEG from 1,200 young adults with extensive behavioral testing, and released
      all data publicly.
    resolution: >-
      HCP established the reference dataset and technical standards for population-scale human brain network research, with
      innovations in multi-modal parcellation, multi-shell diffusion, and the CIFTI surface-based analysis framework that
      are now widely adopted.
    future_work: >-
      Extending the HCP approach to clinical populations, aging, and development, and bridging macro-scale HCP data with micro-scale
      EM connectomics, are ongoing priorities.
