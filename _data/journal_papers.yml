  - /content-library/connectomics/graph-representations/
  summaries:
    beginner: This is the paper that started connectomics. White and colleagues spent over a decade tracing every neuron and
      connection in the tiny worm C. elegans, producing the first complete wiring diagram of any nervous system. It proved
      that mapping an entire brain's connections was possible.
    intermediate: White et al. reconstructed the complete nervous system of C. elegans — 302 neurons and ~7,000 chemical synapses
      — from serial-section EM. The resulting wiring diagram became the foundational dataset for computational neuroscience
      and network analysis of neural circuits.
    advanced: The reconstruction relied on manual tracing from serial thin sections with limited computational support. Known
      caveats include incomplete gap junction mapping, variable synapse identification criteria, and reliance on a small number
      of animals. Despite these limitations, the dataset has driven decades of graph-theoretic analysis and remains a benchmark
      for connectome completeness.
  ocar:
    opportunity: No complete wiring diagram of any nervous system existed, meaning neuroscience lacked a ground-truth reference for how neural circuits are organized at the synaptic level.
    challenge: Mapping every neuron and synapse required manually tracing through thousands of serial EM sections over more than a decade, with no computational tools for automation and no precedent for the task.
    action: White, Southgate, Thomson, and Brenner manually traced all 302 neurons and ~7,000 chemical synapses in C. elegans from serial-section electron micrographs, producing the first complete nervous system wiring diagram.
    resolution: The C. elegans connectome became the foundational dataset for computational and network neuroscience, proving that complete nervous system mapping was achievable and providing a reference that has driven decades of analysis and modeling.
    future_work: Subsequent work has focused on correcting known errors in the original dataset, completing gap junction mapping, and extending to multiple individuals and developmental stages.
