      title={Saturated reconstruction of a volume of neocortex},
      author={Kasthuri, Narayanan and Hayworth, Kenneth Jeffrey and Berger, Daniel Raimund and others},
      journal={Cell},
      volume={162},
      number={3},
      pages={648--661},
      year={2015},
      doi={10.1016/j.cell.2015.06.054}
    }
  plaintext_citation: "Kasthuri, N., Hayworth, K. J., Berger, D. R., et al. (2015). Saturated reconstruction of a volume of neocortex. Cell, 162(3), 648-661."
