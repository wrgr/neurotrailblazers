    beginner: 'When computers trace neurons, they make two kinds of mistakes: merging two separate neurons into one, or splitting
      one neuron into pieces. This paper describes an automated system that detects both types of errors and suggests corrections,
      reducing the need for tedious human review.'
    intermediate: Zung et al. propose a deep learning framework for detecting and correcting merge and split errors in automated
      neuron segmentations. The system uses a convolutional network to classify candidate error locations and suggest corrections.
      The approach is evaluated on connectomics datasets and demonstrates substantial error reduction.
    advanced: This framework treats error detection and correction as complementary tasks within a unified architecture. The
      key insight is that merge errors and split errors have different detection signatures and require different correction
      strategies. The system can be deployed as a preprocessing step before human proofreading, focusing annotator effort
      on genuinely ambiguous regions.
