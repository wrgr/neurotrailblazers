- id: heinrich-2018
  title: Synaptic cleft segmentation in non-isotropic volume electron microscopy of the complete Drosophila brain
  authors: Heinrich L et al.
  year: 2018
  journal: MICCAI
  doi: 10.1007/978-3-030-00934-2_36
  dimension: computer-vision-ml
  tags:
  - "computer-vision-ml:synapse-detection"
  - "computer-vision-ml:3D-convolution"
  - "case-studies:Drosophila"
  key_figures:
  - "Fig. 1: network architecture for anisotropic synapse detection"
  - "Fig. 2: predicted synaptic cleft segmentations in the Drosophila brain"
  - "Fig. 4: precision-recall analysis across brain regions"
  discussion_prompts:
  - >-
    How does the anisotropy of typical EM data (lower z-resolution) affect network architecture choices for synapse detection?
  - >-
    What additional information beyond cleft location is needed to turn synapse detections into a functional connectivity
    map?
  related_content:
  - /content-library/computer-vision-ml/synapse-detection/
  - /content-library/case-studies/Drosophila/
  summaries:
    beginner: >-
      Synapses are the connection points between neurons, and finding them automatically in brain images is essential for
      mapping neural circuits. This paper trains a 3D neural network to detect the narrow gaps (clefts) at synapses throughout
      the entire fruit fly brain, handling the challenge that the images have much lower resolution in one direction.
    intermediate: >-
      Heinrich et al. develop a 3D CNN for synaptic cleft detection in the full adult Drosophila brain (FAFB) dataset, which
      has highly anisotropic voxel resolution. The architecture uses asymmetric convolution kernels and pooling to match the
      data's anisotropy. The method achieves high precision and recall across diverse brain regions, enabling brain-wide synapse
      mapping.
    advanced: >-
      The key architectural adaptation is the use of valid convolutions with anisotropic kernel sizes that respect the roughly
      8:1 xy-to-z resolution ratio of the FAFB dataset. The paper addresses the class imbalance between cleft and non-cleft
      voxels with a combination of balanced sampling and weighted loss. The detected clefts, combined with neuron segmentation,
      provide the connectivity edges for large-scale circuit analysis in Drosophila.
  ocar:
    opportunity: >-
      Mapping the complete synaptic connectivity of the Drosophila brain required automated synapse detection that could scale
      to the entire FAFB dataset, but the highly anisotropic voxel resolution posed unique architectural challenges for 3D
      neural networks.
    challenge: >-
      The FAFB dataset has roughly 8:1 xy-to-z resolution anisotropy, meaning standard isotropic 3D convolutions waste computation
      and learn poor features. Additionally, synaptic clefts occupy a tiny fraction of the volume, creating severe class imbalance.
    action: >-
      Heinrich et al. designed a 3D CNN with asymmetric convolution kernels and pooling matched to the data's anisotropy,
      combined with balanced sampling and weighted loss to address class imbalance, and applied it to the complete adult Drosophila
      brain.
    resolution: >-
      The method achieved high precision and recall for synaptic cleft detection across diverse brain regions, enabling brain-wide
      synapse mapping. Combined with neuron segmentation, the detected clefts provided the connectivity edges for the FlyWire
      whole-brain connectome.
    future_work: >-
      Extending to pre/post-synaptic partner assignment, adapting the anisotropic architecture to other non-isotropic datasets,
      and improving detection of small or ambiguous synapses in densely packed neuropil regions.
