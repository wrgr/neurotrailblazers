  summaries:
    beginner: >-
      FlyWire is a website where anyone can help map the fruit fly brain by correcting computer-generated neuron tracings.
      This paper describes how the platform was built to let hundreds of people work on the same brain simultaneously without
      interfering with each other's edits.
    intermediate: >-
      Dorkenwald et al. describe the FlyWire platform, a web-based system for collaborative proofreading of the FAFB whole-brain
      segmentation. The platform uses a chunked graph data structure (CAVE) that supports real-time, conflict-free multi-user
      editing. Community engagement strategies enabled hundreds of contributors to proofread neurons across the entire brain.
    advanced: >-
      The technical core of FlyWire is the chunked graph representation that decomposes the segmentation into spatially localized,
      independently editable chunks. This architecture enables O(1) edit operations regardless of dataset size and supports
      concurrent multi-user editing without locks. The platform design demonstrates that connectomics proofreading can be
      effectively crowdsourced when tooling eliminates coordination overhead.
  ocar:
    opportunity: >-
      The FAFB whole-brain segmentation needed proofreading by hundreds of contributors, but existing tools could not support
      real-time collaborative editing of a dataset this large without edit conflicts.
    challenge: >-
      Enabling hundreds of simultaneous users to edit the same segmentation required a data structure that supported conflict-free
      multi-user operations at constant time regardless of dataset size.
    action: >-
      Dorkenwald et al. built the FlyWire platform using a chunked graph architecture (CAVE) that decomposed the segmentation
      into spatially localized, independently editable chunks, enabling O(1) edit operations and concurrent multi-user editing
      without locks.
    resolution: >-
      The platform successfully coordinated hundreds of contributors to proofread neurons across the entire Drosophila brain,
      demonstrating that connectomics proofreading can be crowdsourced when tooling eliminates coordination overhead.
    future_work: Adapting the platform for mammalian-scale datasets and developing better onboarding tools for non-expert
      contributors.
