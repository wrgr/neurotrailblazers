    related_content: [/content-library/case-studies/microns-mouse-visual-cortex/, /content-library/neuroai/structure-function-mapping/]
    summaries:
      beginner: "This project first recorded the activity of neurons in a living mouse watching visual stimuli, then imaged the same piece of brain with electron microscopy to map all the connections. By combining both datasets, scientists can ask how a neuron's wiring relates to what it responds to."
      intermediate: "The MICrONS Consortium combined two-photon calcium imaging with large-scale EM reconstruction across multiple visual cortical areas in mouse. The resulting dataset links functional properties of tens of thousands of neurons to their synaptic connectivity at nanometer resolution."
      advanced: "The ~1 mm³ volume spans areas VISp, VISrl, and VISal, reconstructed via flood-filling networks. Correlative analysis requires co-registration of in-vivo two-photon and post-hoc EM coordinate frames. Early analyses reveal that functionally similar neurons share more synapses, but the effect size is modest and depends on connection strength thresholds."

