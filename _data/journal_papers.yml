    advanced: >-
      The paper establishes a light-microscopy complement to EM-based connectomics by providing single-neuron morphological
      data at whole-brain scale, something that remains computationally and practically challenging in nanometer-resolution
      EM volumes. The sparse labeling approach (stochastic flip-out or Brainbow strategies) limits throughput, and morphological
