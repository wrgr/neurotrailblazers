      random access at multiple resolutions, elastic scaling, and programmatic integration with diverse analysis tools.
    action: >-
      Hider, Gray-Roncal et al. developed BossDB, a cloud-native data management platform deployed on AWS that stores, serves,
      and shares petascale neuroscience data via RESTful API with multi-resolution access and spatial query support.
    resolution: >-
      BossDB enabled researchers worldwide to access petabyte-scale connectomics datasets efficiently without downloading
      entire datasets, with the chunked multi-resolution architecture supporting both visualization and analysis access patterns.
    future_work: >-
