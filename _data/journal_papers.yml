    summaries:
      beginner: "Even the best automatic neuron tracing makes mistakes — sometimes merging two neurons into one or splitting one neuron into pieces. This paper trains a second neural network to find these mistakes automatically and then fix them, creating a self-correcting pipeline that improves reconstruction quality without human intervention."
      intermediate: "Zung et al. propose a two-stage framework: an error detector network classifies whether segments contain merge or split errors, and an error corrector network re-segments flagged regions. The iterative detect-correct loop progressively improves segmentation quality. The framework can also prioritize the most impactful errors for human proofreaders, functioning as an active learning system."
      advanced: "The error detection network operates on local windows around segment boundaries and outputs merge/split error probabilities. The correction module applies targeted re-segmentation only in high-error-probability regions, preserving correct segmentation elsewhere. The iterative application converges to improved accuracy, and the error probability scores provide a natural priority ordering for human-in-the-loop proofreading, bridging fully automated and semi-automated reconstruction paradigms."

