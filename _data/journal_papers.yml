    ocar:
    opportunity: |
      Understanding how olfactory information is transformed and routed from the periphery to higher brain centers requires a complete census of projection neuron types and their synaptic connectivity, which was unavailable at whole-brain scale.
    challenge: |
      Olfactory projection neurons are diverse in morphology and connectivity; classifying all types and tracing their complete input-output connectivity in a whole-brain EM dataset requires painstaking reconstruction across large volumes and robust cell-typing criteria.
    action: |
      The authors used the FAFB (Full Adult Female Brain) EM dataset to reconstruct all olfactory projection neurons in the Drosophila brain, classifying them into types based on morphology and connectivity. They analyzed input-output relationships at the antennal lobe and downstream targets including mushroom bodies and lateral horn.
    resolution: |
      The reconstruction provided a complete census of Drosophila olfactory projection neuron types, their glomerular innervation patterns, and their downstream connectivity, revealing organizational principles of olfactory information routing. This constitutes the first complete reconstruction of an olfactory projection neuron population at whole-brain scale.
    future_work: |
      Linking these connectivity maps to odor response properties and behavioral outcomes, and comparing across individuals for stereotypy assessment, are important next steps.
  plain_language_summary: ""
  summaries:
    beginner: |
        When a fly smells something, sensory neurons send signals to a brain region, which then passes the information along to other areas. This paper traced all the 'relay' neurons in this pathway in a fly brain using electron microscopy, creating a complete map of how smell information gets routed.
    intermediate: |
        Using the FAFB whole-brain EM dataset, the authors reconstructed every olfactory projection neuron in the Drosophila antennal lobe, classifying uniglomerular and multiglomerular types and mapping their connectivity to mushroom bodies and lateral horn. The comprehensive census reveals that different glomeruli use distinct projection strategies, with implications for parallel processing of odor identity versus valence.
    advanced: |
        This work establishes a complete connectomic census of Drosophila olfactory projection neurons within the FAFB dataset, using morphological clustering and connectivity profiles to define cell types. Key findings include quantification of convergence and divergence ratios across the antennal lobe-to-lateral horn pathway and identification of novel projection neuron types not previously described. Caveats include reliance on a single individual brain, limiting assessment of inter-individual stereotypy, and the absence of functional data linking specific projection types to odor responses.
  discussion_prompts:
  - |
    How do the connectivity ratios between antennal lobe glomeruli and their downstream targets (mushroom body vs. lateral horn) support parallel processing models of olfactory coding?
    - |
    What criteria were used to define projection neuron 'cell types' in this dataset, and how robustly do morphological and connectivity-based classifications agree?
    - |
    How does this Drosophila olfactory connectome compare to vertebrate olfactory bulb projection neuron organization, and what shared principles emerge?
    - id: chandelier-cell-anatomy-and-function-reveal-a-variably-distr
    title: |
    Chandelier cell anatomy and function reveal a variably distributed but common signal
    authors: "Schneider-Mizell, Bodor, Collman et al."
    year: 2020
    journal: ""
    doi: 10.1101/2020.03.31.018952
    dimension: connectomics
    reading_phase: 2_core_methods
    composite_score: 0.2015
