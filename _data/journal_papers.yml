    ocar:
    opportunity: |
      Automated segmentation of large EM brain volumes produces errors that require manual proofreading, but existing proofreading tools are not designed to take advantage of the 3D structure of neurons, making the process inefficient.
    challenge: |
      Single neurons in EM datasets can span thousands of image slices with complex branching arbors, and while automated segmentation works well locally, it struggles with large-scale context, creating many merge and split errors that must be found and corrected by human proofreaders.
    action: |
      The authors developed a proofreading workflow that combines 3D visualization with segmentation graph tools to help annotators rapidly identify and correct segmentation errors. The system allows users to navigate the 3D structure of neurons while simultaneously viewing and editing the underlying segmentation graph to merge or split fragments.
    resolution: |
      The approach significantly accelerates connectome reconstruction by reducing the time required for proofreading large neurons. The combination of 3D context with graph-based editing allowed annotators to catch errors that would be missed with 2D slice-by-slice review, improving the completeness and accuracy of reconstructed circuits.
    future_work: |
      Further automation of error detection using active learning approaches and better integration of human proofreading effort with automated segmentation pipelines remain important challenges for scaling to even larger brain volumes.
  plain_language_summary: ""
  summaries:
    beginner: |
        To map brain circuits, scientists take thousands of electron microscopy images and use computers to trace individual neurons through them. This paper presents a faster way to check and fix the computer's tracing mistakes by letting researchers see neurons in 3D and edit the underlying graph of neuron segments at the same time.
    intermediate: |
        This work introduces a proofreading system for EM connectomics that couples interactive 3D visualization with segmentation graph editing, enabling annotators to efficiently identify and correct merge/split errors in automated reconstructions. By providing large-scale structural context alongside local editing tools, the approach accelerates the proofreading throughput needed for whole-brain connectome reconstruction.
    advanced: |
        The paper addresses the fundamental bottleneck in EM connectomics—manual proofreading—by integrating 3D neuron visualization with segmentation graph manipulation in a single interface. A key insight is that errors in automated segmentation are more efficiently detected when annotators can observe the full 3D morphology of a neuron, rather than reviewing 2D cross-sections sequentially. Caveats include the continued reliance on human judgment for ambiguous cases and the challenge of scaling annotator effort to cubic-millimeter or larger volumes.
