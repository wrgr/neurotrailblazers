  summaries:
    beginner: Everyone's brain wiring is slightly different — so different that you can identify a person just from their
      brain connectivity pattern, like a fingerprint. This paper showed that functional brain connectivity is unique to each
      individual and can even predict cognitive ability.
    intermediate: Finn et al. demonstrated that individual functional connectivity profiles are sufficiently unique to identify
      individuals across scanning sessions with >90% accuracy. The most discriminating connections are in frontoparietal networks,
      and connectivity profiles predict fluid intelligence.
    advanced: Connectome fingerprinting demonstrates that individual-level connectivity variation is structured and behaviorally
      meaningful. For EM connectomics (typically single-animal), this raises the question of how much of a connectome's structure
      reflects species-typical wiring versus individual variation.
  ocar:
    opportunity: It was known that brain connectivity varies between individuals, but it was unclear whether these differences are structured enough to uniquely identify individuals and whether they carry behaviorally relevant information.
    challenge: Demonstrating connectome fingerprinting required showing that individual differences in functional connectivity are reliable across scanning sessions and are not merely noise, while also linking these differences to cognitive measures.
    action: Finn et al. computed functional connectivity profiles from resting-state and task fMRI in HCP participants and tested whether these profiles could identify individuals across sessions and predict fluid intelligence.
    resolution: Individual functional connectivity profiles were sufficiently unique to identify participants with >90% accuracy, with the most discriminating features in frontoparietal networks. Connectivity profiles also predicted fluid intelligence, demonstrating that individual connectivity variation is behaviorally meaningful.
    future_work: Understanding how much individual variation in connectomes reflects genetics versus experience, and what this implies for interpreting single-animal EM connectomics, remain important questions.
