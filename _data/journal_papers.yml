    summaries:
      beginner: "This paper gives a segmentation network an extra training task: predicting the local shape (size, orientation, elongation) of the neuron at each point. Even though this shape information is discarded at test time, the extra task forces the network to learn better internal representations, resulting in more accurate neuron tracings."
      intermediate: "Sheridan et al. propose local shape descriptors (LSDs) — statistics of the local neuron shape at each voxel — as an auxiliary self-supervised training target for affinity-based segmentation networks. The LSD task requires no additional manual labels since descriptors are computed from existing ground-truth masks. Adding LSDs consistently improves segmentation across multiple EM datasets and reduces the domain gap when transferring to new tissue."
      advanced: "LSDs encode six local statistics (mean offset, covariance eigenvalues, orientation) at each voxel, providing a dense self-supervised signal that regularizes intermediate feature representations. The method is architecture-agnostic and complements both affinity and direct segmentation approaches. Benchmark experiments on zebrafish, fly, and mouse EM data show consistent improvements in VOI and ERL, and the learned features transfer better across domains than networks trained on affinities alone."

  - id: heinrich-2018
    title: "Synaptic cleft segmentation in non-isotropic volume electron microscopy of the complete Drosophila brain"
    authors: "Heinrich L et al."
    year: 2018
    journal: "MICCAI"
    doi: "10.1007/978-3-030-00934-2_36"
