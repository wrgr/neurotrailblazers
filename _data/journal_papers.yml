  - >-
    How might connectomics approaches contribute to understanding why specific brain regions are co-active at rest and what
    computational function this serves?
  summaries:
    beginner: >-
      This paper discovered that the human brain has a consistent 'default mode' — a set of brain areas that are very active
      when you are not doing anything in particular and that quieten down when you focus on a task. Before this, scientists
      mostly ignored what the brain does at rest. The discovery of the default mode network opened an entire new field of
      resting-state brain research and changed how we think about brain function.
    intermediate: >-
      Raichle et al. identified the default mode network by contrasting PET and fMRI signals during rest vs. active task conditions,
      demonstrating consistent deactivation of medial prefrontal cortex, posterior cingulate, and angular gyrus during goal-directed
      tasks. The DMN has since been linked to self-referential processing, autobiographical memory, and mind-wandering. In
      connectomics contexts, the structural underpinnings of the DMN — white matter connectivity and potentially the synaptic
      organization of component regions — are active research questions.
    advanced: >-
      The DMN's discovery contributed to the development of resting-state fMRI as a major research paradigm, where functional
      connectivity (correlated BOLD fluctuations at rest) is used as a proxy for structural or functional brain organization.
      A key unresolved question is the relationship between resting-state functional connectivity and structural connectivity
      at both the white matter (DTI tractography) and synaptic levels. Connectomics approaches to understanding the DMN are
      in their infancy, but the principle that resting spontaneous activity patterns reflect underlying connectivity structure
      is directly relevant to interpreting connectivity data from structural connectomes and motivates efforts to measure
      functional connectivity alongside structural wiring in the same tissue.
  ocar:
    opportunity: >-
      Human neuroimaging studies had focused on task-evoked brain activity, but the baseline state of the brain — what it
      does when not performing a task — had not been systematically characterized, leaving a major gap in understanding resting
      brain function.
    challenge: >-
      Defining a 'resting' or 'default' state required identifying consistent patterns of brain activity that emerge reproducibly
      across subjects in the absence of explicit task demands, which had been dismissed as noise or irrelevant variation.
    action: >-
      Raichle et al. analyzed PET and fMRI data from subjects at rest versus performing cognitive tasks, identifying brain
      regions that are consistently more active during rest than during task (the 'default mode network') including medial
      prefrontal cortex, posterior cingulate, and lateral temporal cortex.
    resolution: >-
      The study established the default mode network (DMN) as a reproducible, organized baseline state of the human brain
      with specific anatomical components and a consistent pattern of task-induced deactivation. The DMN has since been extensively
      studied in relation to self-referential thought, mind-wandering, and neuropsychiatric disorders.
    future_work: >-
      Understanding the function of default mode activity, its relationship to consciousness and self-referential processing,
      and how structural connectivity (white matter pathways and potentially synaptic connectivity) gives rise to the DMN
      are active research areas.
  plain_language_summary: >-
    When the brain is not doing anything specific, it does not simply switch off — instead, a consistent set of regions becomes
    very active. This paper characterized these 'default mode' regions and showed they form a coordinated network that is
    reliably deactivated when people start doing a cognitive task. The discovery of this resting-state network opened a whole
    new area of neuroscience focused on what the brain does when it is apparently 'doing nothing'.
