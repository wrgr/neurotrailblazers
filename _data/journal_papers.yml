      To understand how neurons in the brain are wired together, scientists need to image them at very high resolution in
      three dimensions. This review explains the different electron microscopy methods available for doing this and the challenges
      of reconstructing complete circuits from the resulting images.
    intermediate: >-
      Briggman and Denk systematically compare volume EM modalities (serial-section TEM, SBEM, FIB-SEM, array tomography)
      for neural circuit reconstruction, evaluating resolution, z-continuity, throughput, and scalability. They outline the
      full pipeline from tissue preparation through imaging to reconstruction and discuss early automated segmentation approaches,
      identifying human proofreading as a major bottleneck.
    advanced: >-
      This early review articulates the technical requirements for connectomics from first principles, establishing the throughput
      and resolution tradeoffs that still shape the field. The SBEM approach, developed by Denk's group, is presented as enabling
      the first practical large-volume reconstructions. The paper predates deep-learning segmentation and petascale imaging
      systems, and its identification of automated reconstruction as the critical bottleneck proved prescient—subsequent work
      by the FlyEM, Allen Institute, and Google teams spent a decade solving exactly this problem using convolutional networks
      and flood-filling algorithms.
  ocar:
    opportunity: >-
      Understanding neural circuit function requires knowing the precise synaptic connections between neurons, but no practical
      method existed for reconstructing complete synaptic connectivity maps from tissue volumes large enough to contain functionally
      relevant circuits.
    challenge: >-
      Generating the required nanometer-resolution 3D images of neural tissue at scale was limited by the speed and continuity
      of serial electron microscopy, and automated image analysis methods for reconstructing neuron shapes and identifying
      synapses were not yet mature.
    action: >-
      Briggman and Denk review the state of volume electron microscopy approaches for neural circuit reconstruction, including
      serial section TEM, SBEM (serial block-face scanning EM), FIB-SEM, and array tomography. They evaluate each approach's
      tradeoffs in resolution, imaging speed, z-resolution, and scalability, and discuss requirements for automated reconstruction
      software.
    resolution: >-
      The review establishes that serial block-face SEM (Denk & Horstmann 2004) offers the best balance of throughput and
      z-resolution for large-volume reconstruction, enabling imaging of cubic-millimeter volumes at ~25 nm isotropic resolution
      with automated sectioning. The authors outline the data pipeline from EM image acquisition through segmentation to synapse
      detection needed for connectomics.
    future_work: >-
      Automated segmentation and proofreading at scale—transforming raw EM volumes into annotated connectomes with acceptable
      error rates—was identified as the critical bottleneck requiring major computational advances.
