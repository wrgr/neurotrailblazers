  - /content-library/connectomics/motif-analysis/
  summaries:
    beginner: When you cluster a network to find groups, different methods can give different answers — and both can be 'correct.'
      This paper shows that two standard clustering approaches reveal different aspects of network structure, demonstrated
      on fruit fly brain data.
    intermediate: Priebe et al. demonstrate that adjacency spectral embedding and Laplacian spectral embedding of the same
      network recover fundamentally different community structures — and both are valid. Applied to the Drosophila mushroom
      body connectome, they show that one method clusters by cell type while the other clusters by hemisphere.
    advanced: 'The ''two-truths'' phenomenon has direct implications for connectomics: the choice of spectral embedding method
      determines what structure is discovered. This means claims about community structure must specify which embedding was
      used and acknowledge that alternative embeddings may reveal different, equally valid structure.'
  ocar:
    opportunity: Spectral clustering methods were widely used for community detection in networks, but it was not understood that two standard approaches — adjacency and Laplacian spectral embedding — could recover fundamentally different community structures from the same data.
    challenge: Demonstrating the two-truths phenomenon required both theoretical analysis showing when and why the two methods diverge and empirical validation on real neural network data where biological ground truth exists.
    action: Priebe et al. proved theoretically and demonstrated empirically that adjacency spectral embedding and Laplacian spectral embedding recover different community structures, applying both methods to the Drosophila mushroom body connectome where one clusters by cell type and the other by hemisphere.
    resolution: The paper established that claims about community structure in connectomics must specify which embedding method was used, since alternative embeddings may reveal different, equally valid biological organization.
    future_work: Developing methods that can simultaneously capture multiple types of community structure and providing guidance on which embedding is most appropriate for specific biological questions are important next steps.
