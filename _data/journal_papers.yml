    ocar:
    opportunity: |
      Connectomes provide precise wiring diagrams but not the sign of connections (excitatory vs. inhibitory), which is determined by the neurotransmitter each neuron releases — information not visible from EM ultrastructure alone, leaving circuits functionally ambiguous.
    challenge: |
      Predicting neurotransmitter identity from EM images required training classifiers on subtle ultrastructural features of presynaptic terminals — differences in vesicle morphology and density — while achieving accuracy sufficient for use across an entire brain connectome.
    action: |
      Eckstein et al. trained convolutional neural networks to predict six neurotransmitter types (acetylcholine, glutamate, GABA, serotonin, dopamine, octopamine) from EM images of presynaptic boutons in D. melanogaster, visualized the learned discriminative features, and applied predictions across the full FlyWire connectome.
    resolution: |
      The network achieved 87% per-synapse accuracy, 94% per-neuron accuracy, and 91% accuracy on known cell types, enabling whole-brain assignment of neurotransmitter identity. The predictions revealed that lineage-related neurons largely express only one fast-acting transmitter, and monoaminergic neurons are clearly separated from fast-transmitter neurons by their ultrastructural profile.
    future_work: |
      Extending the approach to mammalian EM data where the ultrastructural basis for neurotransmitter prediction may differ, and validating predictions for less-common transmitters, remain priorities.
  plain_language_summary: |
    Knowing which neurons are connected is only half the story — you also need to know whether each connection is excitatory (like pressing the gas) or inhibitory (like pressing the brakes). Neurotransmitter type determines this, but you cannot directly read it from an electron microscope image. This paper trained an AI to predict neurotransmitter type from subtle differences in the microscope images of synapses, achieving 87% accuracy and labeling every connection in the entire fly brain.
  summaries:
    beginner: |
        In the brain, some connections tell the next neuron to fire (excitatory) and some tell it to stop (inhibitory), depending on what chemical messenger the first neuron releases. This paper trained a computer to predict which chemical a neuron uses just by looking at electron microscopy images of its synapses. With 87% accuracy across six transmitter types, the method assigned functional signs to millions of connections in the entire fly brain.
    intermediate: |
        Eckstein et al. developed a CNN classifier for presynaptic terminal ultrastructure in D. melanogaster EM data, trained with labels derived from immunostaining and in situ hybridization ground truth. The network uses 3D EM image patches around predicted synapse locations and achieves high per-neuron accuracy by aggregating individual synapse predictions. Integration with the FlyWire connectome enables signed connectivity analysis, transforming what was a structural map into a partially functional one. A key finding is that neurons sharing a developmental lineage predominantly express a single fast transmitter, aligning EM with developmental biology.
    advanced: |
        This paper solves a critical information gap in connectomics: structural EM alone cannot determine whether a connection is excitatory or inhibitory. The classifier's ultrastructural features for transmitter prediction include vesicle size, density, and shape distributions visible in the EM images — subtle signatures that differ between glutamatergic (small round vesicles) and GABAergic (slightly larger, pleomorphic) terminals, though these differences are less stark than in classic EM studies. Caveats: 87% per-synapse accuracy implies ~13% misclassification, which compounds across circuit-level analyses; per-neuron aggregation improves this substantially. The approach may not generalize to mammalian EM due to different ultrastructural conventions and greater cell-type diversity. Publicly available predictions are being used in FlyWire circuit analyses.
  discussion_prompts:
  - |
    The 87% per-synapse accuracy means ~13% of individual synapse predictions are wrong — how does this error rate propagate into circuit-level analyses, and what safeguards should be applied?
    - |
    The finding that developmental lineage predicts transmitter identity is biologically significant — what developmental mechanisms could enforce this rule, and what are the exceptions?
    - |
    How would you validate neurotransmitter predictions from EM images against independent ground-truth (e.g., in situ hybridization) at scale, and what validation level is sufficient for publication?
    - id: scikit-learn-machine-learning-in-python
