  summaries:
    beginner: >-
      To study brain connectivity, you need to divide the brain into regions. This paper created the most detailed map of
      the human cortex to date — 360 distinct areas — by combining multiple types of brain imaging data from the Human Connectome
      Project.
    intermediate: >-
      Glasser et al. used HCP data to define a 360-region cortical parcellation based on architecture, function, connectivity,
      and topography. The parcellation is more reproducible than prior atlases and captures biologically meaningful boundaries.
    advanced: >-
      This parcellation represents the current standard for macro-scale human brain network analysis. The multi-modal approach
      — combining myelin maps, cortical thickness, resting-state fMRI, and task fMRI — produces parcellation boundaries that
      are more biologically grounded than purely anatomy-based or purely function-based approaches.
  ocar:
    opportunity: >-
      Brain network analysis requires dividing the cortex into parcels, but existing atlases were based on single modalities
      and produced inconsistent boundaries that did not capture biologically meaningful regions.
    challenge: >-
      Creating a parcellation that reflects true cortical area boundaries required integrating multiple imaging modalities
      (myelin maps, cortical thickness, functional connectivity, task activation) and validating the boundaries across hundreds
      of subjects.
    action: >-
      Glasser et al. used multi-modal HCP data from 210 subjects to define a 360-region cortical parcellation based on converging
      evidence from architecture, function, connectivity, and topography, with semi-automated boundary detection.
    resolution: >-
      The Glasser parcellation became the standard atlas for macro-scale human brain network analysis, with more reproducible
      and biologically grounded boundaries than prior single-modality approaches.
    future_work: >-
      Understanding how macro-scale parcellation boundaries relate to micro-scale cytoarchitectural boundaries visible in
      EM data is an important cross-scale question.
