    ocar:
    opportunity: |
      How neural circuits change from birth to adulthood to support behavioral maturation is a fundamental question in neuroscience, but the extent of synaptic remodeling across development at the level of a complete connectome had never been quantified.
    challenge: |
      Obtaining complete connectome reconstructions of multiple individuals at different developmental stages requires extensive EM data collection and reconstruction, and distinguishing stereotyped developmental changes from individual variability demands isogenic animals and careful experimental design.
    action: |
      The authors used serial-section electron microscopy to reconstruct the full brains of eight isogenic C. elegans individuals spanning four postnatal stages, then systematically compared connectivity patterns across individuals and developmental time points.
    resolution: |
      While the overall geometric architecture of the C. elegans brain is preserved from birth to adulthood, substantial remodeling occurs at the level of individual chemical and electrical synapses. The study identified specific developmental rules governing synapse addition, removal, and strengthening, providing the first complete picture of connectome-level brain maturation.
    future_work: |
      Determining how gene expression and activity-dependent mechanisms drive the observed synaptic changes, and whether similar developmental remodeling rules apply in more complex nervous systems, are key future directions.
  plain_language_summary: ""
  summaries:
    beginner: |
        Just like how children's brains change as they grow up, the tiny worm C. elegans also has a brain that rewires itself from birth to adulthood. This paper mapped the complete brain wiring of eight worms at different ages and found that while the overall structure stays the same, the specific connections between neurons change a lot.
    intermediate: |
        By reconstructing the complete connectomes of eight isogenic C. elegans individuals across four postnatal developmental stages, this study reveals that gross brain geometry is conserved during maturation, but individual synaptic connections undergo extensive remodeling. The work establishes quantitative principles of developmental synapse addition and elimination at the whole-brain scale.
    advanced: |
        This landmark study generates eight complete C. elegans connectomes across development, enabling the first systematic quantification of connectome-level remodeling during postnatal maturation. Key findings include preservation of circuit topology on a conserved anatomical scaffold, combined with extensive individual synapse remodeling; the isogenic design controls for genetic variability, but environmental factors and stochastic developmental noise cannot be fully separated. The multi-individual, multi-stage dataset provides a unique resource for testing developmental circuit models.
  discussion_prompts:
  - |
    What distinguishes stereotyped developmental remodeling from individual variability in connectome studies, and how should this distinction be approached statistically with small sample sizes?
    - |
    How do the principles of synapse addition and elimination observed in C. elegans development compare to models of Hebbian and homeostatic plasticity in vertebrate systems?
    - |
    What technical and conceptual challenges would need to be overcome to perform a similar multi-individual, multi-stage connectome study in a more complex nervous system, such as Drosophila larva?
