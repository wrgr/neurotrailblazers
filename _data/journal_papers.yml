    beginner: >-
      This paper presents the complete wiring diagram of an adult fruit fly brain, containing roughly 130,000 neurons and
      millions of connections. Hundreds of volunteers helped proofread the automated reconstruction, correcting errors to
      produce the most complete brain map ever assembled.
    intermediate: >-
      Dorkenwald et al. describe the FlyWire connectome, a community-proofread whole-brain wiring diagram of adult Drosophila
      built on the FAFB dataset. The proofreading effort combined automated segmentation with large-scale crowd-sourced error
      correction coordinated through the CAVE infrastructure. Rigorous QA metrics were used to assess completeness and accuracy.
    advanced: >-
      This landmark paper demonstrates that crowd-sourced proofreading can scale to whole-brain connectomics when supported
      by appropriate infrastructure (CAVE, chunked graph). The proofreading strategy balanced coverage against accuracy by
      prioritizing high-impact errors. The QA framework — including path-length completeness, synapse assignment accuracy,
      and known-circuit validation — sets a standard for future connectome releases.
  ocar:
    opportunity: >-
      The FAFB dataset provided a complete EM volume of the adult Drosophila brain, but the automated segmentation contained
      millions of errors that needed to be corrected before the wiring diagram could be used for biological analysis.
    challenge: >-
      Proofreading an entire brain's worth of neurons required coordinating hundreds of contributors editing the same dataset
      simultaneously, while maintaining quality standards and tracking which regions had been adequately reviewed.
    action: >-
      Dorkenwald et al. combined automated segmentation with large-scale crowd-sourced proofreading coordinated through the
      CAVE infrastructure, using a chunked graph architecture that supported real-time multi-user editing and rigorous QA
      metrics to assess completeness and accuracy.
    resolution: >-
      The resulting FlyWire connectome — roughly 130,000 neurons and millions of connections — is the most complete brain
      wiring diagram ever assembled, demonstrating that crowd-sourced proofreading can scale to whole-brain connectomics.
    future_work: >-
      Applying similar approaches to larger brains and establishing how much proofreading is sufficient for different biological
