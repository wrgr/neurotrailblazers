    ocar:
    opportunity: |
      Characterizing the full diversity of cellular organelles, compartments, and circuit elements in mammalian neocortex requires EM reconstruction at a scale and detail not previously achieved, as single-neuron studies could not reveal population-level statistics or rare cell types.
    challenge: |
      Reconstructing neocortex at the scale required to characterize all organelles and circuit motifs demands petabyte-scale imaging, automated segmentation with very low error rates, and integration of structural data with functional measurements — a combination that had not been achieved simultaneously.
    action: |
      The authors performed dense automated reconstruction of a millimeter-scale volume of mouse visual neocortex using multi-beam scanning EM and deep-learning segmentation, identifying all neurons, glia, blood vessels, and subcellular organelles. They integrated the structural connectome with calcium imaging functional data from the same volume to create a functional connectomics dataset.
    resolution: |
      The study produced a landmark reconstruction of mouse visual cortex that characterized the diversity of cells, organelles, compartments, and circuit motifs at unprecedented scale, including rare cell types and subcellular structures. Integration with functional data revealed correlations between connectivity and response properties, opening a new era of structure-function connectomics.
    future_work: |
      Extending functional connectomics to other cortical areas and species, and developing statistical frameworks for linking wiring patterns to computational function, remain major open challenges.
  plain_language_summary: |
    This paper produced an extraordinarily detailed map of a cubic millimeter of mouse visual cortex — all the cells, their organelles, and their connections — and combined it with recordings of those same cells' electrical activity. Think of it as not only drawing the wiring diagram of a computer chip but also measuring which wires carry current during specific computations. This combination of structure and function in one dataset is a major step toward understanding how cortical circuits compute.
  summaries:
    beginner: |
        This paper reconstructed a tiny cube of mouse brain cortex in incredible detail using electron microscopy, identifying every cell, their internal structures, and all their connections. They also recorded the electrical activity of the same neurons, creating a dataset that links brain wiring to brain function. It is one of the most comprehensive structure-function datasets in neuroscience and a landmark in the field of connectomics.
    intermediate: |
        Using multi-beam SEM and automated deep-learning segmentation, this study reconstructed a 1 mm^3 volume of mouse primary visual cortex (V1) with complete resolution of organelles, synapses, and cellular compartments. Co-registered calcium imaging data from the same tissue volume enabled direct testing of whether connected neurons share functional properties (noise correlations, orientation tuning similarity). The dataset, released publicly via MICrONS Explorer, enables community-wide analysis of structure-function relationships at cortical circuit scale.
    advanced: |
        The MICrONS dataset integration of EM and two-photon calcium imaging required precise physical alignment of the functional imaging volume to the EM reconstruction, achieved through fiducial landmarks and non-linear registration. Key technical caveats include incomplete proofreading of distal processes (reducing connectivity completeness for small-diameter axons), and the temporal gap between functional imaging and tissue fixation introduces potential systematic biases if synaptic states change. Functional connectivity (correlated activity) was found to weakly but significantly predict structural connectivity (shared synaptic partners), consistent with Hebbian learning principles, though the effect size is small. This establishes the MICrONS dataset as a reference for testing circuit models of V1 computation and for developing automated methods to predict function from structure.
  discussion_prompts:
  - |
    How strongly does structural connectivity predict functional connectivity in this cortical dataset, and what factors might explain the weak correlation observed?
    - |
    What are the technical challenges of co-registering calcium imaging data with electron microscopy reconstructions, and how were they addressed in this study?
    - |
    What new questions about cortical computation become testable with a combined structure-function connectomics dataset that were previously inaccessible?
    - id: convolutional-networks-can-learn-to-generate-affinity-graphs
    title: |
    Convolutional Networks Can Learn to Generate Affinity Graphs for Image Segmentation
    authors: "Turaga, Murray, Jain et al."
    year: 2009
    journal: ""
    doi: 10.1162/neco.2009.10-08-881
    dimension: segmentation
    reading_phase: 1_foundations
    composite_score: 0.1067
    role: methods
    tags:
