      Loomba et al. performed dense EM reconstruction of cortical samples from mouse and human temporal cortex. Human cortex
      shows higher synapse density, more inhibitory synapses, and distinct connectivity motifs.
    advanced: >-
      First systematic connectomic comparison across mammalian species at synaptic resolution. The methodology — matching
      processing and analysis pipelines across species — is a template for cross-species connectomics. Key findings: ~2x higher
