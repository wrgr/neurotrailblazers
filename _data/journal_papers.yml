    action: >-
      The authors obtained a rapidly preserved surgical tissue sample from human temporal cortex, stained with heavy metals,
      embedded in resin, cut >5,000 sections at ~30 nm, and imaged with a high-speed multibeam scanning EM. They applied computational
      reconstruction to generate a three-dimensional dataset of 57,216 cells with annotated neurons, synapses, and blood vessels.
    resolution: >-
