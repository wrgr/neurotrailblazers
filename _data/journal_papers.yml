- id: liu-2011
  title: Controllability of complex networks
  authors: Yang‐Yu Liu, Jean-Jacques Slotine, Albert-Ĺaszló Barabási
  year: 2011
  journal: ''
  doi: 10.1038/nature10011
  dimension: network-analysis
  tags:
  - "method:graph-theory"
  - "graph-analysis:controllability"
  - "species:c-elegans"
  - "graph-analysis:network-control"
