    action: >-
      The authors describe engineering modifications to commercial FIB-SEM systems that enable large-volume continuous acquisition
      for connectomics, including hardware upgrades for long-term stability, software control systems for automated operation,
      and quality control procedures for unattended acquisition.
    resolution: >-
      The modified FIB-SEM systems achieved continuous, automated acquisition of large volumes at isotropic 8 nm resolution,
      enabling collection of the data underlying several major Drosophila connectome datasets. The approach demonstrated that
      FIB-SEM can be scaled to volumes relevant for insect brain connectomics.
    future_work: >-
