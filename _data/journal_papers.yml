- id: witvliet-2021
  title: Connectomes across development reveal principles of brain maturation
  authors: Witvliet D, Mulcahy B, Mitchell JK, et al.
  year: 2021
  journal: Nature
  doi: 10.1038/s41586-021-03778-8
  dimension: case-studies
  tags:
  - "case-studies:C-elegans"
  - "case-studies:dense-reconstruction"
  - "connectomics:connectome-comparison"
  - "methodology:reproducibility"
  key_figures:
  - "Fig. 1: developmental connectome series overview"
  - "Fig. 3: connection stability versus variability across maturation"
  discussion_prompts:
  - How does developmental connectomics change our interpretation of single-timepoint adult wiring diagrams?
  - Which connections are genetically hardwired versus activity-dependent based on the developmental data?
  related_content:
  - /content-library/case-studies/c-elegans-revisited/
  - /content-library/methodology/reproducibility-standards/
  summaries:
    beginner: >-
      By mapping the wiring diagram of C. elegans at multiple stages of development, this study shows how the brain's connections
      change as the animal grows up. Some connections are stable from birth while others are added or refined with experience.
    intermediate: >-
      Witvliet et al. reconstructed connectomes from eight C. elegans individuals spanning development from birth to adulthood.
      The comparison reveals a stable core scaffold of connections present at hatching, with additional connections appearing
      progressively and showing higher inter-individual variability.
    advanced: >-
      This is the first developmental connectome series in any organism. Methodologically, it required consistent reconstruction
      quality across all timepoints to distinguish biological change from technical noise. Key findings include a stable backbone
      of ~40% of connections present throughout development, progressive addition of weak connections, and increased wiring
      variability in circuits associated with learned behaviors.
  ocar:
    opportunity: >-
      Connectomes had only been mapped at single time points, leaving unknown how neural wiring changes during development
      and which connections are present from birth versus added through experience.
    challenge: >-
      Producing a developmental connectome series required reconstructing complete connectomes from multiple individuals at
      different developmental stages while maintaining consistent quality to distinguish biological changes from reconstruction
      artifacts.
    action: >-
      Witvliet et al. reconstructed connectomes from eight C. elegans individuals spanning development from hatching to adulthood,
      and systematically compared connection presence, strength, and variability across time points.
    resolution: >-
      The study revealed a stable core scaffold of ~40% of connections present from hatching, with additional weak connections
      progressively added during development and showing higher inter-individual variability, particularly in circuits associated
      with learned behaviors.
    future_work: >-
      Determining which developmentally added connections are activity-dependent versus genetically programmed, and extending
      developmental connectomics to other organisms, are key open questions.
  bibtex: >-
