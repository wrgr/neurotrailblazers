  - /content-library/connectomics/graph-representations/
  summaries:
    beginner: >-
      Turning brain images into a wiring diagram requires many computational steps — finding neurons, detecting synapses,
      and building a connection graph. This paper presents the first fully automated pipeline that takes raw electron microscopy
      images and produces a brain graph with no human interaction required, making connectomics more accessible and reproducible.
    intermediate: >-
      Gray Roncal et al. present an end-to-end automated pipeline for EM connectomics that chains image preprocessing, neuron
      segmentation, synapse detection, and graph construction into a single workflow. The open-source framework produces brain
      graphs directly from raw EM data, enabling reproducible connectomics at scale.
    advanced: >-
      This paper established the images-to-graphs paradigm that influenced subsequent pipeline designs including MICrONS and
      FlyWire. The key contribution is treating the full reconstruction chain as a single optimizable system rather than independent
      stages. The open-source release and emphasis on reproducibility were ahead of their time in the field.
  ocar:
    opportunity: >-
      EM connectomics required multiple separate computational steps (image processing, segmentation, synapse detection, graph
      construction), but no fully automated end-to-end pipeline existed that could take raw images and produce a brain graph
      without human intervention.
    challenge: >-
      Integrating all pipeline stages into a single automated workflow required handling the diverse data formats, resolution
      requirements, and error characteristics of each stage while maintaining end-to-end reproducibility.
    action: >-
      Gray Roncal et al. developed the first fully automated images-to-graphs pipeline for EM connectomics, chaining image
      preprocessing, neuron segmentation, synapse detection, and graph construction into a single open-source workflow.
    resolution: >-
      The pipeline established the images-to-graphs paradigm that influenced subsequent pipeline designs including MICrONS
      and FlyWire, treating the full reconstruction chain as a single optimizable system rather than independent stages.
    future_work: >-
      Optimizing end-to-end pipeline performance, integrating with cloud infrastructure for scalability, and extending to
      diverse tissue preparations are ongoing challenges.
