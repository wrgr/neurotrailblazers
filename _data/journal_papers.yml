    intermediate: 'Macrina et al. describe the full automated reconstruction pipeline for the MICrONS mm³ volume: image alignment,
      affinity-based segmentation, supervoxel agglomeration, synapse detection, and pre/post partner assignment. The pipeline
      processed ~2 petabytes of imagery.'
    advanced: The definitive systems paper for the MICrONS pipeline. Provides the most complete accounting of stage-by-stage
      error rates in a petascale reconstruction and documents computational resources (~millions of GPU-hours) useful for
      cost estimation of future projects.
- id: scheffer-2020-hemibrain
  title: A connectome and analysis of the adult Drosophila central brain
  authors: Scheffer LK, Xu CS, Januszewski M, et al.
