    ocar:
    opportunity: |
      Understanding how the brain generates behavior requires knowing not just local circuit motifs but the complete synaptic wiring of the entire brain. No such complete neuronal wiring diagram existed for any adult complex brain, leaving fundamental questions about global information flow unanswered.
    challenge: |
      Reconstructing a complete adult brain connectome at synaptic resolution requires acquiring petabytes of EM images, segmenting billions of voxels into individual neurons, proofreading thousands of reconstruction errors, and building data infrastructure capable of storing and querying the resulting graph of millions of synapses.
    action: |
      The authors acquired FIB-SEM and transmission EM image volumes of the adult Drosophila brain, applied automated segmentation with extensive proofreading, and assembled a complete wiring diagram containing approximately 130,000 neurons and 15 million synapses. They characterized cell types, connectivity motifs, and information flow using graph analysis.
    resolution: |
      This work produced the first complete neuronal wiring diagram of an adult brain, the Drosophila connectome (FlyWire/hemibrain-scale). The dataset revealed cell-type-specific connectivity rules, brain-wide circuit pathways, and organizational principles governing sensory-to-motor information flow, providing an unprecedented resource for understanding neural computation.
    future_work: |
      Functional validation of the connectivity-derived predictions, extension to other developmental stages or mutant backgrounds, and comparison with the second hemisphere remain important next steps.
  plain_language_summary: |
    This paper completed the ultimate neuroscience jigsaw puzzle — mapping every single connection between every neuron in the brain of an adult fly. With 130,000 neurons and 15 million synapses recorded, it is like having a complete subway map for the brain instead of just knowing a few important lines, enabling researchers to trace any information pathway from sensory input to motor output.
  summaries:
    beginner: |
        This paper created the first complete wiring diagram of an adult animal's brain — the fruit fly's brain — showing every connection between every neuron. With about 130,000 neurons and millions of connections mapped, it is a landmark achievement that lets scientists trace how information flows from the eyes or nose all the way to motor commands.
    intermediate: |
        The authors present the first complete adult brain connectome, reconstructed from EM images of Drosophila melanogaster. The dataset contains ~130,000 neurons and ~15 million synapses, with cell types annotated and connectivity analyzed at the brain-wide level. This resource enables systematic analysis of sensorimotor pathways, circuit motifs, and inter-area communication throughout the brain.
    advanced: |
        This landmark paper describes the reconstruction pipeline and initial analyses of the Drosophila adult whole-brain connectome. Petabyte-scale EM acquisition was combined with flood-fill network segmentation, automated synapse detection, and extensive community-based proofreading via FlyWire. Analyses revealed hierarchical organization of information flow, recurrent circuit motifs, and bilateral structural symmetry with quantifiable asymmetries. Key caveats include reconstruction errors in small-caliber neurites, incomplete coverage of the optic lobes, and the challenge of interpreting the functional significance of purely structural connectivity.
  discussion_prompts:
  - |
    What new organizational principles of the brain became visible only when the complete wiring diagram was available, that could not have been seen from partial reconstructions?
    - |
    How should the field approach the problem of validating functional predictions derived from this structural connectome?
    - |
    What are the next scale milestones for connectomics — in terms of organism size, brain volume, or number of synapses — and what technologies need to advance to reach them?
