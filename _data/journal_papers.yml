  summaries:
    beginner: 'C. elegans comes in two sexes: hermaphrodite and male. This study mapped the complete nervous system of both,
      revealing that shared circuits are highly similar but sex-specific neurons create dramatically different reproductive
      circuitry.'
    intermediate: Cook et al. present complete connectomes for both C. elegans sexes. The shared nervous system is highly
      conserved with quantitative differences in connection strength. Male-specific neurons form circuits that extensively
      modify shared circuits for reproductive behavior.
    advanced: Establishes the analytical framework for studying connectomic variation within a species. Connection presence
      is highly conserved but strength varies continuously. Sex-specific circuits are added as modules to a shared backbone,
      suggesting modular circuit evolution.
  ocar:
    opportunity: The original C. elegans connectome mapped only the hermaphrodite, leaving unknown how nervous system wiring differs between the two sexes and what principles govern sex-specific circuit organization.
    challenge: Producing complete connectomes for both sexes required reconstructing a second whole-animal nervous system and developing methods to compare connectivity across animals with different numbers of neurons (hermaphrodite 302, male 385).
    action: Cook et al. reconstructed complete connectomes for both C. elegans sexes from serial-section EM, mapped all chemical synapses and gap junctions, and systematically compared shared and sex-specific circuitry.
    resolution: The shared nervous system is highly conserved in connection topology with quantitative differences in strength, while sex-specific neurons are added as modular circuits that extensively modify the shared backbone for reproductive behavior.
    future_work: Understanding how sex-specific circuits are specified during development and whether the modular addition principle generalizes to sexual dimorphism in other species remains to be explored.
