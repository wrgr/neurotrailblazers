  summaries:
    beginner: >-
      A practical guide to building brain connectivity maps from diffusion MRI: how to divide the brain into regions, trace
      fiber pathways, and turn results into a network. Also explains the many pitfalls that can change results dramatically.
    intermediate: >-
      Comprehensive methodological review of diffusion MRI connectome construction: parcellation scheme selection, diffusion
      model fitting, tractography algorithm choice, streamline filtering, and connectivity matrix construction. The 'but'
      section addresses known limitations.
    advanced: >-
      The most complete methodological reference for MRI connectome construction pipelines. Key points: parcellation granularity
      determines node definition, streamline count is a poor proxy for connection strength, and each methodological choice
      propagates into network-level statistics.
  ocar:
    opportunity: >-
      Building connectomes from diffusion MRI involves many methodological choices (parcellation, diffusion model, tractography
      algorithm, filtering), but there was no comprehensive guide explaining how each choice affects the final connectivity
      matrix.
    challenge: >-
      Each step in the pipeline introduces biases and errors that propagate into network-level statistics, but the interactions
      between choices are complex and not always intuitive.
    action: >-
      Sotiropoulos and Zalesky provided a comprehensive methodological review covering every stage of diffusion MRI connectome
      construction — parcellation, diffusion model fitting, tractography, streamline filtering, and matrix construction —
      with explicit discussion of known limitations.
    resolution: >-
      The review became the standard methodological reference for MRI connectome construction, highlighting that parcellation
      granularity determines node definition, streamline count is a poor proxy for connection strength, and each choice propagates
      into network-level results.
    future_work: >-
      Developing consensus recommendations for pipeline choices and establishing quantitative benchmarks for pipeline validation
      against ground truth are important goals.
