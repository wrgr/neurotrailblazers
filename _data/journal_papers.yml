    summaries:
      beginner: "This paper presents the first complete wiring diagram of an adult brain — the fruit fly Drosophila — with about 139,000 neurons and 50 million synaptic connections. Hundreds of researchers around the world helped proofread the data collaboratively."
      intermediate: "Dorkenwald et al. deliver the FlyWire connectome: a dense reconstruction of the adult Drosophila brain from the FAFB EM volume. The project combined automated segmentation with large-scale crowd-sourced proofreading, achieving comprehensive coverage of all neuronal cell types and their synaptic connections."
      advanced: "FlyWire's chunked graph architecture enabled concurrent editing by hundreds of proofreaders worldwide. Quality was managed through priority queues weighted by synaptic mass. The 139,255 reconstructed objects include neurons, glia, and fragments; the high-confidence proofread subset captures the vast majority of synaptic weight, establishing a new standard for whole-brain connectome completeness."

