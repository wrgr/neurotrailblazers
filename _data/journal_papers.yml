  summaries:
    beginner: The mushroom body is the learning and memory center of the fly brain. This paper mapped every neuron and connection in this circuit, revealing how it is organized to support learning — providing the most complete picture of a learning circuit in any animal.
    intermediate: Lin et al. present the complete connectome of the Drosophila larval mushroom body — the associative learning center — reconstructed from the whole-brain EM volume. The comprehensive proofreading and validation approach provides a model for circuit-focused quality control within whole-brain datasets.
    advanced: This paper demonstrates targeted, circuit-complete proofreading within a whole-brain dataset. The QA strategy — exhaustive proofreading of all mushroom body neurons with systematic validation against known anatomy — achieves higher completeness than the surrounding brain. The resulting circuit reveals learning-relevant motifs including convergent dopaminergic input.
  ocar:
    opportunity: The mushroom body is the best-characterized learning circuit in Drosophila, but a complete connectome of this circuit had not been achieved, limiting understanding of how its architecture supports associative learning.
    challenge: Achieving circuit-complete reconstruction within a whole-brain dataset required targeted proofreading strategies with higher quality standards than the surrounding volume, plus systematic validation against known anatomy.
    action: Lin et al. performed exhaustive proofreading of all mushroom body neurons in the larval Drosophila whole-brain connectome, validated the reconstruction against known anatomy, and analyzed the resulting circuit for learning-relevant connectivity motifs.
    resolution: The complete mushroom body connectome revealed circuit motifs including convergent dopaminergic input that support associative learning, and the proofreading validation approach provides a model for circuit-focused quality control within whole-brain datasets.
    future_work: Using the complete circuit to build and test computational models of associative learning and extending the approach to other well-characterized circuits are natural next steps.
