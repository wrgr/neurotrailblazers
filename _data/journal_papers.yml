      platform that stores this data and lets researchers worldwide access exactly the parts they need through a simple web
      interface, without downloading entire datasets.
    intermediate: >-
      Hider, Gray-Roncal et al. describe BossDB, a cloud-native data management platform deployed on AWS for storing, accessing,
      visualizing, and sharing petascale neuroscience image data via RESTful API. The system supports multi-resolution access,
      spatial queries, and integration with analysis tools. It has managed datasets exceeding one petabyte.
    advanced: >-
      BossDB addresses the data management bottleneck in connectomics by leveraging cloud infrastructure for elastic storage
      and compute. The chunked, multi-resolution architecture enables efficient random access patterns needed for both visualization
      (tile serving) and analysis (region extraction). The RESTful API design enables programmatic integration with downstream
      pipelines. Compare with DVID (Janelia) and CloudVolume approaches.
  ocar:
    opportunity: >-
      Connectomics projects generate petabytes of image data, but traditional storage approaches could not efficiently serve
      this data to distributed research teams or integrate with cloud-based analysis pipelines.
    challenge: >-
