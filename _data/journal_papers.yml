      genetically isolated Drosophila visual system neuron types. Using cell-type-specific genetic lines, the authors generated
      transcriptomic data that can be cross-referenced with connectivity data from existing EM datasets, providing a multi-layered
      resource for the community.
    advanced: >-
      The resource integrates intersectional genetic driver lines with single-cell or population-level transcriptomics to
      assign molecular identities to neurons already characterized at the circuit level in Drosophila visual system connectomes.
      Key caveats include the reliance on sparse genetic access (which may not achieve pure cell-type isolation) and the challenge
