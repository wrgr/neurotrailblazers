  summaries:
    beginner: >-
      Can we take wiring patterns found in real brains and use them to design better AI? This paper extracts architectural
      building blocks from the FlyWire connectome and shows that incorporating these patterns into artificial neural networks
      improves their performance.
    intermediate: >-
      Dorkenwald et al. introduce CODEX, a framework for extracting circuit motifs from the FlyWire connectome and translating
      them into architectural components for artificial neural networks. The bio-inspired designs show performance improvements
      on specific computational tasks.
    advanced: >-
      CODEX represents a systematic approach to the connectome-to-architecture pipeline. Rather than hand-designing bio-inspired
      features, the framework automatically identifies overrepresented connectivity patterns and evaluates their computational
      utility. This closes the loop between connectomics data and AI design.
  ocar:
    opportunity: >-
      While NeuroAI had proposed using brain wiring to inspire AI, there was no systematic method for extracting architectural
      motifs from connectomics data and evaluating their utility in artificial neural networks.
    challenge: >-
      Bridging the gap from biological wiring diagrams to AI architectures required methods for automatically identifying
      overrepresented connectivity patterns in connectomics data and translating them into implementable architectural components.
    action: >-
      Dorkenwald et al. developed CODEX, a framework that automatically extracts circuit motifs from the FlyWire connectome,
      translates them into architectural components for artificial neural networks, and evaluates their computational utility.
    resolution: >-
      CODEX demonstrated that connectome-derived architectural features can improve artificial neural network performance
      on specific tasks, closing the loop between connectomics data and AI design in a systematic, automated way.
    future_work: >-
      Identifying which motifs transfer best across tasks and species, and scaling the approach to mammalian connectomics
      data, are key priorities.
