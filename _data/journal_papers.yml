- id: helmstaedter-2013
  title: Connectomic reconstruction of the inner plexiform layer in the mouse retina
  authors: Helmstaedter M, Briggman KL, Turaga SC, et al.
  year: 2013
  journal: Nature
  doi: 10.1038/nature12346
  dimension: neuroanatomy
  tags:
  - "neuroanatomy:synapse"
  - "neuroanatomy:dendrite"
  - "case-studies:retina"
  - "case-studies:mouse"
  - "case-studies:dense-reconstruction"
  key_figures:
  - "Fig. 1: IPL reconstruction overview"
  - "Fig. 3: bipolar cell type classification"
  - "Fig. 5: connectivity matrix between bipolar and ganglion cell types"
  discussion_prompts:
  - How does the laminar organization of the retina simplify connectomic reconstruction compared to cortical tissue?
  - What additional specificity mechanisms beyond co-stratification might explain the observed connectivity patterns?
  related_content:
  - /content-library/neuroanatomy/synapse-classification/
  - /content-library/neuroanatomy/dendrite-biology/
  summaries:
    beginner: >-
      This paper mapped the complete wiring between two major classes of neurons in the mouse retina at the level of individual
      synapses. By reconstructing every connection in the inner plexiform layer, the authors revealed how different types
      of bipolar cells connect to different types of ganglion cells.
    intermediate: >-
      Helmstaedter et al. performed dense connectomic reconstruction of the inner plexiform layer of the mouse retina using
      SBEM imaging and crowd-sourced proofreading. They reconstructed 950 neurons including all bipolar cell types and most
      retinal ganglion cell types, mapping synaptic connectivity at sufficient completeness to identify cell-type-specific
      wiring rules.
    advanced: >-
      This study demonstrated that dense connectomic reconstruction could reveal cell-type-specific wiring rules at scale.
      The combination of machine learning segmentation with crowd-sourced annotation established a scalable human-in-the-loop
      pipeline. The connectivity matrix showed that co-stratification is necessary but not sufficient for connectivity.
  ocar:
    opportunity: >-
      The retinal inner plexiform layer contains stereotyped connectivity between bipolar and ganglion cell types, but the
      wiring rules governing these connections had not been mapped at synaptic resolution across all cell types simultaneously.
    challenge: >-
      Dense reconstruction of the IPL required segmenting and classifying hundreds of neurons from SBEM data and mapping thousands
      of synapses, a scale that exceeded what manual tracing alone could accomplish.
    action: >-
      Helmstaedter et al. performed dense connectomic reconstruction of the mouse retinal IPL using SBEM imaging combined
      with machine learning segmentation and crowd-sourced proofreading, reconstructing 950 neurons and their synaptic connections.
    resolution: >-
      The study revealed cell-type-specific wiring rules showing that co-stratification is necessary but not sufficient for
      connectivity, and demonstrated that crowd-sourced proofreading could scale connectomic reconstruction to hundreds of
      neurons.
    future_work: >-
      Open questions include what additional molecular or activity-dependent specificity mechanisms beyond co-stratification
      explain the observed connectivity patterns.
  bibtex: >-
    @article{helmstaedter2013connectomic,
      title={Connectomic reconstruction of the inner plexiform layer in the mouse retina},
      author={Helmstaedter, Moritz and Briggman, Kevin L and Turaga, Srinivas C and others},
      journal={Nature},
      volume={500},
      number={7461},
      pages={168--174},
      year={2013},
      doi={10.1038/nature12346}
    }
