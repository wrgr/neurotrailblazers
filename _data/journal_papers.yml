    challenge: Each modality involved complex tradeoffs between resolution, volume, throughput, section preservation, and downstream segmentation quality that were difficult to evaluate without direct comparison.
    action: Briggman and Bock systematically compared SBEM, FIB-SEM, and ATUM-SEM across resolution, achievable volume, throughput, and section preservation, providing a framework for matching imaging modality to scientific question.
    resolution: The review established a decision framework that continues to guide connectomics project planning, showing how modality-specific technical parameters propagate through reconstruction pipelines to affect biological conclusions.
    future_work: As imaging technologies continue to evolve, the framework needs updating to incorporate newer modalities and hybrid approaches.
