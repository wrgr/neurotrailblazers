      strategies for making it faster and more efficient.
    intermediate: Plaza et al. review the connectome reconstruction pipeline with a focus on the proofreading bottleneck.
      They analyze how segmentation error rates translate into proofreading time, compare focused proofreading strategies
      versus exhaustive review, and discuss tools that accelerate human annotators. The paper frames proofreading as the rate-limiting
      step for large-scale connectomics.
    advanced: This paper provides a quantitative framework for understanding proofreading cost as a function of segmentation
      quality, volume size, and desired accuracy. The analysis of focused versus exhaustive proofreading strategies directly
      informs resource allocation decisions. The QA metrics discussed — including split/merge rates and their asymmetric impact
      on downstream analysis — remain central to pipeline evaluation.
  ocar:
