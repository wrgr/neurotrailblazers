  - What experimental improvements would strengthen co-registration between functional and structural data?
  related_content:
  - /content-library/case-studies/microns-visual-cortex/
  - /content-library/connectomics/neuroai-bridge/
  summaries:
    beginner: >-
      Can you predict what a neuron does from how it is wired? This MICrONS study first recorded neuron activity in a living
      mouse, then mapped all connections using EM. Neurons that respond similarly to visual stimuli do tend to connect, but
      the relationship is complex.
    intermediate: >-
      Bae et al. present the MICrONS functional connectomics dataset: calcium imaging of ~75,000 neurons followed by EM reconstruction.
      Connection probability and synapse count are modestly correlated with functional similarity, with the relationship varying
      by cell type.
    advanced: >-
      The first large-scale dataset enabling rigorous testing of Hebbian-like wiring rules in cortex. The modest correlation
      strengths (~0.1-0.2) highlight that connectivity is not deterministically predicted by function, consistent with a combination
      of activity-dependent plasticity, molecular guidance, and stochastic processes.
  ocar:
    opportunity: >-
      A central promise of connectomics is that knowing how neurons are wired can explain what they do, but testing this required
      a dataset combining functional recordings and synaptic-resolution connectivity from the same tissue.
    challenge: >-
      Correlating structure and function required co-registering in vivo two-photon calcium imaging with post-hoc EM reconstruction
      across different coordinate systems, scales, and imaging modalities for tens of thousands of neurons.
    action: >-
      Bae et al. produced the MICrONS functional connectomics dataset by recording calcium activity from ~75,000 neurons in
      mouse visual cortex and then reconstructing their synaptic connectivity from a cubic-millimeter EM volume.
    resolution: >-
      The study found that connection probability and synapse count are modestly but significantly correlated with functional
      similarity, with correlations varying by cell type. This provided the first large-scale quantitative test of structure-function
      relationships in mammalian cortex.
    future_work: >-
      Improving co-registration accuracy and developing more sophisticated models that account for cell type, spatial context,
      and multi-synaptic pathways may reveal stronger structure-function relationships.
