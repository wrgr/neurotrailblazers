- id: mcguire-1984
  title: Microcircuitry of bipolar cells in cat retina
  authors: BA McGuire, JK Stevens, Peter Sterling
  year: 1984
  journal: ''
  doi: 10.1523/jneurosci.04-12-02920.1984
  dimension: connectomics
  tags:
  - "species:cat"
  - "neuroanatomy:retina"
  - "method:serial-section-em"
  - "cell-types:bipolar-cells"
  - "method:manual-reconstruction"
  - "scale:sub-volume"
  discussion_prompts:
  - >-
    This 1984 paper identified eight bipolar cell types from EM morphology and connectivity — how does this compare to the
    number identified by modern single-cell RNA-sequencing and large-scale retinal connectomics?
  - >-
    The paper found that multiple cone bipolar types converge on single ganglion cell types — what computational advantage
    does this redundancy or convergence provide?
  - >-
    How have the reconstruction methods used in 1984 (manual tracing from printed micrographs) and the questions they could
    address changed with modern automated EM connectomics?
  summaries:
    beginner: >-
      The retina is not just a camera — it contains layers of neurons that process visual information before sending it to
      the brain. This paper studied one layer (bipolar cells) by tracing their connections in 189 serial electron microscope
      slices. It found at least eight distinct types of bipolar cells, each wired differently, suggesting specialized parallel
      pathways for visual information.
    intermediate: >-
      McGuire et al. (1984) performed one of the earliest systematic neuronal circuit reconstructions from serial EM, identifying
      eight bipolar cell types by stratification depth and connectivity in cat area centralis. Key findings include rod bipolar
      to AII amacrine cell as the primary rod pathway, and multiple cone bipolar types converging on both ON (sublamina b)
      and OFF (sublamina a) beta ganglion cells. This paper established the concept of morphologically and synaptically distinct
      parallel processing channels in retina, directly motivating modern retinal connectomics.
    advanced: >-
      This 1984 reconstruction of 15 neurons from 189 serial sections represents an early landmark that foreshadowed the density
      and precision of modern connectomics. The cell type classification based on stratification depth and synaptic partner
      identity predates molecular marker-based classification but aligns well with subsequent transcriptomic studies. Key
      limitations: small volume and single animal, limited statistical power for rare cell types, and manual reconstruction
      introducing potential systematic errors. The paper's influence on retinal circuit biology is outsized relative to its
      citation count; its identification of the rod bipolar → AII amacrine → cone bipolar pathway remains a textbook circuit.
  ocar:
    opportunity: >-
      The wiring of bipolar cells in the retina — the interneurons connecting photoreceptors to ganglion cells — was unknown
      at synaptic resolution, making it impossible to understand how parallel visual channels are constructed in the first
      stages of retinal processing.
    challenge: >-
      Reconstructing fine neuronal processes and their synaptic connections from hundreds of serial ultrathin sections required
      a computer-aided reconstruction system capable of tracking multiple overlapping processes with their full complement
      of synaptic inputs and outputs.
    action: >-
      McGuire, Stevens, and Sterling reconstructed 15 bipolar neurons from a 14×120 µm patch of adult cat area centralis from
      189 serial ultrathin EM sections, identifying synaptic inputs and outputs for each cell and classifying cell types based
      on stratification, cytology, and connectivity.
    resolution: >-
      The study identified eight distinct bipolar cell types (one rod, seven cone bipolar), each with highly stereotyped synaptic
      connectivity patterns, and revealed that cone bipolar cells form more complex and redundant connections to ganglion
      cells than previously appreciated, with multiple cone bipolar types converging on single ganglion cell types.
    future_work: >-
      Extending the analysis to include the full local circuit — including amacrine cell interactions — and to compare rod
      and cone pathway wiring across the full retinal area, were natural next steps addressed by subsequent connectomics work.
  plain_language_summary: >-
    The retina contains relay neurons called bipolar cells that pass signals from light-sensing photoreceptors to the ganglion
    cells that send information to the brain. This paper reconstructed 15 of these bipolar cells from serial electron microscopy
    sections and found that they come in at least eight distinct types, each with a specific wiring pattern. It was a landmark
    early example of using EM reconstruction to understand circuit specificity — a precursor to modern connectomics.
