- id: bhatt-2009
  title: Dendritic Spine Dynamics
  authors: Bhatt DH, Zhang S, Bhatt AN
  year: 2009
  journal: Annual Review of Physiology
  doi: 10.1146/annurev.physiol.010908.163140
  dimension: neuroanatomy
  tags:
  - neuroanatomy:dendrite
  - neuroanatomy:spine
  - neuroanatomy:synapse
  - neuroanatomy:cytoskeleton
  - methodology:experimental-design
  key_figures:
  - 'Fig. 1: spine morphology classification'
  - 'Fig. 3: spine turnover rates across regions'
  - 'Fig. 5: activity-dependent remodeling'
  discussion_prompts:
  - How should connectomics studies account for spine dynamics when reporting connection strengths?
  - What fraction of spines in a typical cortical EM volume might lack functional synapses?
  related_content:
  - /content-library/neuroanatomy/dendrite-biology/
  - /content-library/neuroanatomy/synapse-classification/
  summaries:
    beginner: Dendritic spines are tiny protrusions on neurons where most excitatory connections form. This review explains
      that spines are not static — they change shape, appear, and disappear over time. This matters for connectomics because
      a wiring diagram captured at one moment is a snapshot of a dynamic system.
    intermediate: This review covers the molecular and structural dynamics of dendritic spines including formation, elimination,
      and morphological plasticity. The authors discuss how spine shape (mushroom, thin, stubby, filopodial) correlates with
      synapse maturity and strength. For connectomics, the key insight is that spine morphology and density are not fixed,
      meaning static EM reconstructions capture one state of a dynamic substrate.
    advanced: Bhatt et al. synthesize live-imaging and EM data to describe spine turnover rates across brain regions and developmental
      stages. Methodologically relevant points include the disconnect between spine presence and functional synapse presence,
      the implications of fixation timing for spine morphology in EM, and the question of how spine dynamics affect the interpretability
      of single-timepoint connectomes.
  ocar:
    opportunity: Dendritic spines are the primary sites of excitatory synaptic input, but their dynamic nature was not well integrated into the connectomics framework, which treats neural wiring as static.
    challenge: Studying spine dynamics requires live imaging over time, while connectomics provides only a single-timepoint snapshot. Reconciling these two perspectives is conceptually and methodologically difficult.
    action: Bhatt et al. reviewed the molecular and structural dynamics of dendritic spines, synthesizing live-imaging and EM data on spine formation, elimination, morphological plasticity, and turnover rates across brain regions and developmental stages.
    resolution: The review established that spine morphology and density are not fixed, providing essential context for interpreting static connectomes. The correlation between spine shape and synapse maturity offers a framework for assessing connection stability from EM data.
    future_work: Key open questions include what fraction of spines in a typical EM volume lack functional synapses and how spine dynamics should be factored into connectome-derived circuit models.
  bibtex: >-
    @article{bhatt2009dendritic,
      title={Dendritic spine dynamics},
      author={Bhatt, Deepak H and Zhang, Sheng and Bhatt, Akanksha N},
      journal={Annual Review of Physiology},
      volume={71},
      pages={261--282},
      year={2009},
      doi={10.1146/annurev.physiol.010908.163140}
    }
  plaintext_citation: "Bhatt, D. H., Zhang, S., & Bhatt, A. N. (2009). Dendritic spine dynamics. Annual Review of Physiology, 71, 261-282."
