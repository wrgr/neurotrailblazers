    beginner: >-
      To map the wiring of even a small piece of mouse brain, you need millions of images assembled into one continuous 3D
      volume. This paper describes the industrial-scale imaging system used for the MICrONS project — multiple electron microscopes
      running simultaneously with automated quality checks.
    intermediate: >-
      Yin et al. describe the multi-beam TEM imaging pipeline used for the MICrONS mm³ cortical volume. Key engineering contributions
      include automated stage control, real-time QA feedback, parallel operation of multiple TEMs, and computational infrastructure
      for petabyte-scale image assembly. The pipeline achieved sustained throughput of ~1 megapixel/second per microscope.
    advanced: >-
      This paper is essential for understanding the industrialization of connectomics imaging. The QA architecture — automated
      focus assessment, contrast monitoring, section damage detection, and real-time re-imaging decisions — represents a mature
      approach to acquisition reliability at scale. The paper provides concrete throughput numbers useful for planning future
      large-scale acquisitions.
