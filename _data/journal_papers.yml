    ocar:
    opportunity: |
      Reconstructing a complete whole-brain connectome beyond C. elegans requires proofreading at a scale that exceeds what any single lab can accomplish, demanding new community-based approaches to distribute the effort.
    challenge: |
      Coordinating distributed proofreading by many annotators on the same large EM dataset introduces conflicts, quality control challenges, and requires novel infrastructure for collaborative editing, version control, and consensus building at the scale of millions of neurons and synapses.
    action: |
      The authors developed FlyWire, a browser-based platform enabling online community proofreading of the Drosophila brain. The system provides a collaborative editing environment with graph-based segmentation editing, authentication, and social structures to coordinate large numbers of annotators.
    resolution: |
      FlyWire demonstrated that whole-brain connectome proofreading can be accomplished by an online community, with hundreds of participants contributing to the reconstruction of the full adult fly brain. The platform's design successfully managed conflicts, tracked contributions, and maintained data quality at the whole-brain scale.
    future_work: |
      Scaling the FlyWire model to larger volumes such as mammalian brain regions will require further advances in automated segmentation quality and more efficient human-AI collaborative proofreading workflows.
  plain_language_summary: ""
  summaries:
    beginner: |
        Mapping a whole brain in a fly requires checking and fixing millions of decisions made by computers. FlyWire is a website that lets anyone help with this task, like a Wikipedia for brain mapping, with hundreds of people working together to complete the fly brain map.
    intermediate: |
        FlyWire is a browser-based platform for community proofreading of whole-brain EM reconstructions, providing collaborative graph editing, user authentication, and quality control infrastructure. The paper describes how computational and social structures were designed to scale proofreading effort to the Drosophila whole-brain connectome with hundreds of distributed annotators.
    advanced: |
        FlyWire's architecture addresses the fundamental scalability problem in EM connectomics by distributing proofreading labor through a community platform with graph-based collaborative editing. Key design choices include chunk-based data serving, optimistic locking for concurrent edits, and contribution tracking for quality oversight. A notable caveat is that community proofreading introduces variable annotator expertise, requiring strategies to aggregate edits and detect and correct systematic errors; the paper describes how these challenges were managed in practice.
  discussion_prompts:
  - |
    How does the FlyWire community model compare to other crowdsourced scientific data annotation efforts (e.g., Eyewire, Zooniverse), and what unique challenges does connectomics proofreading present?
    - |
    What quality control mechanisms are most effective for managing variable annotator expertise in collaborative connectomics proofreading?
    - |
    How would the FlyWire model need to be adapted to support community proofreading of mammalian brain volumes, which are orders of magnitude larger?
