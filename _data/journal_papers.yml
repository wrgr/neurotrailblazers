- id: dorkenwald-2023-cave
  title: 'CAVE: Connectome Annotation Versioning Engine'
  authors: Dorkenwald S, McKellar CE, Macrina T, et al.
  year: 2023
  journal: bioRxiv
  doi: 10.1101/2023.07.26.550598
  dimension: data-storage
  tags:
  - data-storage:CAVE
  - data-storage:provenance
  - data-storage:versioning
  - data-storage:chunked-graph
  key_figures:
  - 'Fig. 1: CAVE architecture'
  - 'Fig. 2: materialization pipeline'
  discussion_prompts:
  - How does CAVE's versioning model compare to general-purpose version control (Git)?
  - How should citation practices reference specific CAVE materializations?
  related_content:
  - /content-library/infrastructure/provenance-and-versioning/
  - /content-library/proofreading/proofreading-tools/
  summaries:
    beginner: When hundreds of people edit a brain map simultaneously, you need a system to track every change. CAVE is like
      version control for connectomics — it lets researchers go back to any previous version and ensures published analyses
      can always be reproduced.
    intermediate: CAVE provides versioned, materialized annotation infrastructure for large-scale connectomics. It tracks
      the complete history of proofreading edits in a chunked graph structure supporting efficient historical queries. Materialization
      produces timestamped snapshots for reproducible analysis.
    advanced: CAVE's architecture solves the reproducibility crisis in collaborative connectomics. The chunked graph enables
      O(1) edit operations, the materialization pipeline produces denormalized tables for fast queries, and the versioning
      system maintains complete edit provenance. Powers both FlyWire and MICrONS.
  ocar:
    opportunity: Large-scale connectomics projects involve hundreds of proofreaders making concurrent edits, but there was no infrastructure to track edit history, ensure reproducibility, or allow researchers to reference specific dataset versions.
    challenge: Building a versioning system for connectomics required handling the unique data structure of segmentation (a chunked supervoxel graph), supporting real-time concurrent edits, and producing materialized snapshots efficiently from a continuously changing dataset.
    action: Dorkenwald et al. developed CAVE, a system that tracks the complete history of proofreading edits in a chunked graph structure, produces timestamped materialized snapshots, and provides APIs for versioned data access.
    resolution: CAVE solved the reproducibility problem for collaborative connectomics by enabling any analysis to reference a specific dataset version, with O(1) edit operations and efficient materialization. It now powers both FlyWire and MICrONS datasets.
    future_work: Extending CAVE to support cross-dataset versioning and integrating it with automated proofreading systems are ongoing developments.
