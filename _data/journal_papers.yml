    ocar:
    opportunity: |
      Whole-brain connectivity maps exist at different scales — from coarse tract-tracing to synaptic-resolution EM — but integrating these scales into a unified brain map has been a major challenge. A multi-scale framework was needed to connect molecular, cellular, and systems-level views of brain organization.
    challenge: |
      Aligning and integrating volumetric reconstructions across imaging modalities with different resolutions, coordinate systems, and biological specimens requires robust registration pipelines and a coherent data model that can represent brain structure from nanometers to millimeters.
    action: |
      The authors developed a computational pipeline to derive a multi-scale brain map from whole-brain volumetric reconstructions, integrating data from multiple imaging sources and scales. They applied this framework to create unified brain atlases and used graph-based analyses to characterize connectivity across scales.
    resolution: |
      The resulting multi-scale brain map provided a coherent representation of brain organization from individual neurons to whole-brain connectivity patterns. The framework enabled comparative analyses across species, including C. elegans, and demonstrated how local and global connectivity properties relate to one another.
    future_work: |
      Extending multi-scale integration to larger brains such as mouse or human, and incorporating dynamic functional data alongside structural connectivity, remain important challenges.
  plain_language_summary: |
    This paper built a brain map that works at multiple zoom levels simultaneously — from individual neurons all the way up to large brain regions. Think of it like a GPS map that shows both street-level detail and country-wide overview, allowing researchers to navigate brain organization at whatever scale is useful.
  summaries:
    beginner: |
        Brain maps can be made at many different scales, from individual tiny neurons to large brain areas. This paper developed a way to combine brain maps from different scales into one unified map, helping scientists understand how the brain is organized at all levels at once.
    intermediate: |
        This paper developed computational methods to create multi-scale brain atlases from volumetric EM and light microscopy reconstructions. By registering data across spatial scales and species, it enabled analyses of how connectivity properties at the synaptic level relate to mesoscale circuit organization, with applications to C. elegans and Drosophila connectomes.
    advanced: |
        The authors present a multi-scale brain mapping pipeline that integrates whole-brain volumetric reconstructions across imaging modalities and resolutions. Using graph-theoretic analyses, they characterize how connectivity metrics (e.g., rich clubs, modularity) manifest differently across scales, providing a framework for bridging synaptic connectomics with systems-level neuroanatomy. Key caveats include registration errors across scales and the assumption of structural stationarity across specimens.
  discussion_prompts:
  - |
    What computational and biological assumptions are required to integrate connectivity data across spatial scales, and how might violations of these assumptions affect conclusions?
    - |
    How does multi-scale brain mapping change how we think about functional modularity in neural circuits?
    - |
    What are the prospects and challenges for applying this multi-scale framework to mammalian brains with far greater cellular complexity?
    - id: expansion-microscopy
    title: "Expansion microscopy"
    authors: "Chen, Tillberg, Boyden"
