  - /content-library/neuroanatomy/soma-ultrastructure/
  summaries:
    beginner: >-
      Every neuron has a cell body (soma) with a distinctive size, shape, and organelle composition. This study automatically
      measured these features for tens of thousands of neurons in the MICrONS dataset, enabling rapid cell type classification
      from soma features alone.
    intermediate: >-
      Elabbady et al. perform an automated quantitative census of somatic features in the MICrONS cortical volume including
      nucleus size, organelle content, and soma morphology. These features enable cell type classification that partially
      recapitulates connectivity-based and transcriptomic classifications.
    advanced: >-
      This census demonstrates that soma-level features — accessible even from low-resolution EM — carry substantial cell
      type information. The automated pipeline scales to the full MICrONS volume and provides a fast first-pass classification
      that can be refined with connectivity and morphological features.
  ocar:
    opportunity: >-
      Cell type classification in EM typically relies on dendritic morphology or connectivity, but somatic features — accessible
      even from lower-resolution data — had not been systematically quantified across a large EM volume.
    challenge: >-
      Automatically measuring somatic features (nucleus size, organelle content, soma morphology) for tens of thousands of
      neurons required robust segmentation and feature extraction pipelines that could handle the diversity of cell types
      in cortex.
    action: >-
      Elabbady et al. developed an automated pipeline for quantitative somatic feature extraction and applied it to the full
      MICrONS cortical volume, measuring nucleus size, organelle content, and soma morphology for all neurons.
    resolution: >-
      The somatic census demonstrated that soma-level features carry substantial cell type information, partially recapitulating
      connectivity-based and transcriptomic classifications and providing a fast first-pass classification method.
    future_work: >-
      Integrating somatic, morphological, and connectivity-based features for comprehensive cell typing and validating the
      approach against transcriptomic ground truth are important next steps.
