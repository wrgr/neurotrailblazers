- id: jiang-2021
  title: Models of heterogeneous dopamine signaling in an insect learning and memory center
  authors: Linnie Jiang, Ashok Litwin-Kumar
  year: 2021
  journal: ''
  doi: 10.1371/journal.pcbi.1009205
  dimension: neuroai
