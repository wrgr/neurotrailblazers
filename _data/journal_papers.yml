    challenge: Proofreading cost depended on segmentation error rates, volume size, and desired accuracy in complex ways that made it difficult to plan resource allocation or evaluate pipeline improvements.
    action: Plaza et al. reviewed the reconstruction pipeline with a focus on the proofreading bottleneck, providing quantitative analysis of how segmentation error rates translate into proofreading time and comparing focused versus exhaustive proofreading strategies.
    resolution: The paper established proofreading as the rate-limiting step for large-scale connectomics and provided a quantitative framework for resource allocation that directly informed subsequent projects including the hemibrain and FlyWire.
    future_work: Reducing the proofreading bottleneck through better segmentation algorithms, smarter proofreading prioritization, and automated error correction remained critical open challenges.
