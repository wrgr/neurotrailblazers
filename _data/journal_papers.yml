    ocar:
    opportunity: |
      Local connectome reconstructions of brain sub-volumes provided rich circuit detail but were insufficient for understanding global information flow, sensorimotor integration, and whole-brain computation in any organism.
    challenge: |
      Reconstructing 139,255 neurons and 50 million synapses from a complete adult fly brain required new scalable segmentation pipelines, extensive distributed proofreading, and interoperable data infrastructure capable of handling petabyte-scale EM volumes.
    action: |
      The authors generated a complete adult female Drosophila melanogaster whole-brain connectome using FIB-SEM imaging combined with flood-filling network segmentation and community proofreading. They annotated cell classes, types, hemilineages, and predicted neurotransmitter identities for all neurons, then analyzed projectome structure and information flow from sensory inputs to motor outputs.
    resolution: |
      The FlyWire connectome provides a neuronal wiring diagram with 139,255 neurons, 50 million synapses, and comprehensive cell-type annotations, publicly accessible for download and interactive browsing. Projectome analysis and pathway tracing from photoreceptors to descending motor neurons demonstrate how the connectome enables mechanistic hypotheses about sensorimotor circuits.
    future_work: |
      Extending this approach to other Drosophila individuals to assess inter-individual variability, and applying similar methods to other species, are natural next steps.
  plain_language_summary: |
    This paper produced the first complete wiring diagram of an entire adult fruit fly brain, mapping over 139,000 neurons and 50 million connections. Think of it as producing a full circuit schematic for a tiny but sophisticated computer — one that processes sight, smell, and touch, then decides how to move. The data are public and the team built tools so any researcher can browse and download the circuit of interest.
  summaries:
    beginner: |
        Neurons in a brain talk to each other through connections called synapses. This paper used an electron microscope to image an entire adult fly brain, then used machine learning to identify every neuron and trace every connection — over 50 million of them. The resulting map (the FlyWire connectome) is freely available, letting scientists look up how sensory information travels all the way to movement commands.
    intermediate: |
        Dorkenwald et al. present the FlyWire whole-brain connectome of adult D. melanogaster, achieving 139,255 reconstructed neurons and ~5×10^7 chemical synapses via flood-filling network segmentation on FIB-SEM data with distributed community proofreading. The dataset includes predicted neurotransmitter identities, hemilineage annotations, and a derived projectome. Pathway tracing from photoreceptors through the visual system to descending motor neurons illustrates the resource's utility for mechanistic circuit analysis.
    advanced: |
        FlyWire represents a qualitative advance over the hemibrain dataset (Scheffer et al. 2020) by covering both hemispheres and connecting central brain to optic lobes. The segmentation pipeline used flood-filling networks with iterative agglomeration; proofreading quality is quantified by false-merge and split rates. Key limitations include single-animal reconstruction, potential segmentation errors in dense neuropil, and the ongoing challenge of matching morphologically defined cell types to genetic lines. The open-ecosystem approach with API access, CAVE backend, and interoperability with other fly resources (neuPrint, VFB) sets a standard for future large-scale connectomics.
  discussion_prompts:
  - |
    FlyWire uses community proofreading by many annotators — what quality-control measures were employed, and how do residual errors propagate into circuit-level analyses?
    - |
    The paper derives a 'projectome' from the connectome — what additional information does this region-to-region connectivity matrix provide compared to individual neuron-level wiring?
    - |
    How would you use the FlyWire connectome to generate and test a specific hypothesis about a sensorimotor behavior in Drosophila?
    - id: autophagy-independent-functions-of-the-autophagy-machinery
    title: "Autophagy-Independent Functions of the Autophagy Machinery"
    authors: "Galluzzi, Green"
    year: 2019
    journal: ""
    doi: 10.1016/j.cell.2019.05.026
    dimension: methods-general
    reading_phase: 0_orientation
    composite_score: 0.3578
    role: review
    tags:
    - cell-types:autophagy
    - method:cell-biology
    - review:mechanisms
    - method:genetics
    ocar:
    opportunity: |
      Autophagy — the cellular self-digestion pathway — was assumed to mediate its physiological roles exclusively through the degradation of cytoplasmic cargo, leaving unexplained a range of cellular effects observed when autophagy flux was absent.
    challenge: |
      Distinguishing between effects caused by the absence of autophagic degradation versus scaffold or signaling functions of autophagy proteins required careful genetic and biochemical dissection in contexts where canonical flux is blocked.
    action: |
      Galluzzi and Green reviewed and synthesized evidence across multiple model systems for autophagy-independent functions of core autophagy machinery proteins (ATG proteins), cataloguing their roles in membrane dynamics, inflammation, cell death, and other processes distinct from cargo degradation.
    resolution: |
      The review established that many ATG proteins participate in cellular processes — including LC3-associated phagocytosis, unconventional secretion, and regulation of apoptosis — through mechanisms entirely independent of autophagic flux, reframing autophagy machinery as multifunctional regulators.
    future_work: |
      Determining which autophagy-independent functions are physiologically dominant in specific disease contexts and whether they can be selectively targeted therapeutically remains an open challenge.
  plain_language_summary: |
    Cells have a recycling system called autophagy that breaks down unwanted material. This review revealed that the proteins running this recycling machine do many other jobs as well — including regulating inflammation and cell death — even when no recycling is happening. It is like discovering that garbage trucks also deliver mail and repair roads on their routes.
  summaries:
    beginner: |
        Autophagy is a process where cells break down and recycle their own damaged parts. This review showed that the proteins involved in autophagy also perform many other functions in the cell that have nothing to do with recycling. Understanding these extra functions is important because autophagy proteins are targets for treating cancer and neurodegeneration.
    intermediate: |
        This review by Galluzzi and Green comprehensively catalogues non-canonical roles of ATG proteins outside autophagic flux. These include LC3-associated phagocytosis (LAP), LC3-associated endocytosis (LANDO), secretory autophagy, and direct regulatory interactions with apoptotic and inflammatory signaling cascades. The distinction between flux-dependent and flux-independent functions has important implications for interpreting phenotypes in autophagy knockout studies.
    advanced: |
        The review systematically deconstructs the assumption that ATG protein phenotypes reflect autophagic degradation capacity. Functions covered include non-degradative roles of ATG proteins in immune signaling (e.g., ATG5–ATG12 activating IFN-I responses), regulation of apoptosis by Beclin-1 via Bcl-2 family interactions, and LAP-dependent phagosome maturation. Key experimental caveats include the difficulty of separating flux-dependent and flux-independent phenotypes in genetic models, and the context-dependence of these alternative functions across cell types and tissues. Relevance to neuroscience includes autophagy's role in synaptic pruning and aggregate clearance in neurodegeneration.
  discussion_prompts:
  - |
    How can researchers experimentally distinguish between a phenotype caused by loss of autophagic flux versus loss of an autophagy-independent function of an ATG protein?
    - |
    The review highlights autophagy-independent roles in inflammation — how might these affect interpretation of autophagy studies in neuroinflammatory contexts?
    - |
    Which autophagy-independent functions described here are most relevant to neurodegeneration research, and what therapeutic implications do they have?
    - id: the-structure-of-the-nervous-system-of-the-nematode-i-caenor
    title: |
    The structure of the nervous system of the nematode <i>Caenorhabditis elegans</i>
    authors: "White, Southgate, Thomson et al."
    year: 1986
    journal: ""
    doi: 10.1098/rstb.1986.0056
    dimension: connectomics
    reading_phase: 1_foundations
    composite_score: 0.3492
    role: methods
    tags:
    - species:c-elegans
    - scale:whole-brain
    - method:serial-section-em
    - method:manual-reconstruction
    - neuroanatomy:pioneer
    ocar:
    opportunity: |
      No complete map of any animal nervous system existed at the level of individual neurons and synapses, making it impossible to reason about how neural circuits generate behavior from first principles.
    challenge: |
      Reconstructing an entire nervous system required imaging thousands of serial ultrathin sections by transmission electron microscopy, then manually tracing every neuronal process and synapse — a task of unprecedented scale that took over a decade of painstaking work.
    action: |
      White, Southgate, Thomson, and Brenner reconstructed the complete nervous system of C. elegans hermaphrodites from serial-section EM, tracing all 302 neurons and cataloguing approximately 5,000 chemical synapses, 2,000 neuromuscular junctions, and 600 gap junctions.
    resolution: |
      The study produced the first and (for decades) only complete connectome of any organism, revealing an essentially invariant wiring pattern across individuals, a modular organization of neuron classes, and stereotyped synaptic connectivity that provided the foundation for all subsequent C. elegans circuit analysis.
    future_work: |
      Whether the invariant wiring of C. elegans holds for organisms with larger, more plastic nervous systems, and how the connectome maps to the animal's full behavioral repertoire, remain enduring questions.
  plain_language_summary: |
    In a project that took over a decade, scientists photographed thin slices of the tiny worm C. elegans under an electron microscope and manually traced every single neuron and connection. With only 302 neurons, it was the first animal to have its complete nervous system wired map made — a landmark achievement that all modern connectomics is built on.
  summaries:
    beginner: |
        The roundworm C. elegans has exactly 302 neurons, making its brain small enough to map completely. This 1986 paper did exactly that using an electron microscope, tracing every neuron and every connection by hand. It was the first complete nervous-system wiring diagram ever created and launched the field of connectomics.
    intermediate: |
        White et al. (1986) established the conceptual and methodological foundation for connectomics by reconstructing the complete C. elegans nervous system from serial TEM sections. The 302-neuron hermaphrodite connectome revealed 118 neuron classes with stereotyped morphology and connectivity, an invariant wiring pattern across individuals, and a modular organization. This work defined the paradigm of using structural connectivity to understand neural circuit function.
    advanced: |
        This foundational work required manual reconstruction of thousands of serial ultrathin sections, a strategy that is computationally automated in modern connectomics. The C. elegans connectome revealed key principles: synaptic connectivity is largely invariant across individuals (unlike vertebrates), neurons make en passant synapses along longitudinal process bundles, and gap junctions constitute a significant fraction of connectivity (~10%). Limitations of the original reconstruction — since revised with additional synapses identified in later re-analysis — illustrate that even 'complete' connectomes require iterative proofreading.
  discussion_prompts:
  - |
    The C. elegans connectome was largely invariant across individuals — how does this compare to inter-individual variability observed in more recently reconstructed connectomes, and what does it imply for the relationship between structure and behavior?
    - |
    How did the manual reconstruction methods used in 1986 compare in accuracy to modern automated segmentation, and what have subsequent re-analyses of the C. elegans connectome corrected?
    - |
    Given that we now have the complete C. elegans connectome and can genetically manipulate individual neurons, are there still unanswered questions about how its circuits generate behavior?
