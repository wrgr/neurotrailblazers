  dimension: network-analysis
  tags:
  - network-analysis:spectral-analysis
  - network-analysis:community-detection
  - network-analysis:stochastic-block-model
  key_figures:
  - 'Fig. 1: two-truths illustration'
  - 'Fig. 3: Drosophila mushroom body analysis'
  discussion_prompts:
  - How should analysts choose between adjacency-based and Laplacian-based spectral embeddings?
  - What does the two-truths phenomenon mean for biological interpretation of clustering results?
  related_content:
