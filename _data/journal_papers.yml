    intermediate: Matsliah et al. present the complete connectome of the Drosophila optic lobe from FlyWire, identifying all cell types and their connectivity. The analysis reveals visual processing pathways, compares circuit architecture across optic lobe regions, and identifies conserved versus specialized circuit motifs.
    advanced: This is the most complete sensory system connectome in an adult animal. The comprehensive cell type catalog and connectivity matrix enable systematic comparison with computational models of visual processing and with vertebrate visual circuits at the motif level.
