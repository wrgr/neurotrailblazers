    ocar:
    opportunity: |
      Amacrine cells in the retina are a highly diverse class of interneurons essential for visual computation, but a comprehensive molecular census of all amacrine cell types was lacking, limiting understanding of retinal circuit organization.
    challenge: |
      The extreme morphological and molecular diversity of amacrine cells — with over 60 putative types — makes classification challenging; traditional methods could only partially distinguish types, leaving the full cellular composition of the retina unresolved.
    action: |
      The authors used single-cell RNA sequencing to perform transcriptomic profiling of mouse retinal amacrine cells at large scale, clustering cells by gene expression to identify distinct cell types and linking transcriptomic identity to morphological and functional data from prior studies.
    resolution: |
      The study identified over 60 molecularly distinct amacrine cell types, substantially expanding the known catalog, and provided marker genes for each type to enable specific genetic access. This molecular atlas serves as a reference for linking amacrine cell diversity to retinal circuit function.
    future_work: |
      Connecting each molecularly defined amacrine type to its specific circuit role, and extending the atlas to other species and to the full retinal cell type complement, are outstanding goals.
  plain_language_summary: ""
  summaries:
    beginner: |
        The retina in your eye processes visual information using many different cell types, including a diverse group called amacrine cells. This paper used gene expression analysis of thousands of individual cells to create a comprehensive catalog of over 60 different amacrine cell types, each with a unique molecular signature.
    intermediate: |
        Single-cell RNA-seq was used to molecularly classify mouse retinal amacrine cells, identifying over 60 transcriptomically distinct types. The study provides marker genes for each type that can be used to drive genetic tools, and cross-references known morphological and functional types where possible. This molecular atlas is a critical complement to structural connectomic analyses of the retina.
    advanced: |
        The study employs large-scale scRNA-seq clustering to define the complete molecular taxonomy of mouse retinal amacrine cells, resolving types that were previously merged or uncharacterized. A key contribution is the provision of unique molecular markers enabling Cre-driver line development for functional interrogation. Caveats include potential overclustering artifacts from high-dimensional transcriptomic data, and the challenge of reconciling transcriptomic clusters with cell types previously defined by morphology, electrophysiology, or connectivity.
  discussion_prompts:
  - |
    How well do the transcriptomically defined amacrine cell types in this atlas correspond to previously described morphological types, and what discrepancies exist?
    - |
    What markers were found to be most discriminating between amacrine subtypes, and do they have known functional relevance (e.g., neurotransmitter, neuromodulator, morphogenic)?
    - |
    How might this molecular atlas be integrated with retinal connectome data from EM studies to build a more complete picture of retinal circuit organization?
    - id: molecular-topography-of-an-entire-nervous-system
