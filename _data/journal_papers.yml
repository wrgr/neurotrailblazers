- id: eschbach-2020
  title: Recurrent architecture for adaptive regulation of learning in the insect brain
  authors: Claire Eschbach, Akira Fushiki, ... Rebecca Arruda
  year: 2020
  journal: ''
  doi: 10.1038/s41593-020-0607-9
  dimension: connectomics
  tags:
  - "species:drosophila"
  - "neuroanatomy:mushroom-body"
  - "method:optogenetics"
  - "behavior:learning"
  - "cell-types:dopaminergic"
  - "method:connectomics"
  discussion_prompts:
  - >-
    How does recurrent circuit architecture in the mushroom body compare to theoretical models of adaptive learning rate control,
    such as those based on prediction error signals?
  - >-
    What experimental evidence would distinguish between recurrent loops that regulate learning rate versus those that regulate
    memory retrieval?
  - >-
    To what extent can insights from insect mushroom body circuits inform our understanding of adaptive learning in the mammalian
    hippocampus and basal ganglia?
  summaries:
    beginner: >-
      The part of the insect brain called the mushroom body is responsible for learning associations between smells and rewards
      or punishments. This paper shows how feedback loops within this brain region help insects automatically adjust how quickly
      they learn based on past experiences.
    intermediate: >-
      This study investigates how recurrent circuit motifs in the Drosophila mushroom body enable adaptive regulation of associative
      learning. By mapping feedback connections between mushroom body output neurons and dopaminergic inputs using connectomics,
      and testing predictions with optogenetics, the authors demonstrate that these loops modulate learning rates in a state-dependent
      manner.
    advanced: >-
      Using the mushroom body connectome to identify recurrent feedback loops, this work demonstrates that the insect learning
      circuit is not a simple feedforward structure but contains recurrent motifs that adaptively regulate learning based
      on prior experience. The interplay between DANs and MBONs in these feedback loops implements a form of meta-learning;
      key caveats include the challenge of selectively perturbing specific feedback pathways without confounding effects on
      sensory processing.
  ocar:
    opportunity: >-
      The mushroom body of insects is a well-studied center for associative learning, but how recurrent circuit architecture
      enables adaptive, state-dependent regulation of learning rates is not well understood.
    challenge: >-
      Dissecting recurrent circuits in the mushroom body is difficult because many neurons are anatomically intermingled,
