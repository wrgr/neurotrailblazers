    opportunity: Mapping human brain connectivity at population scale required a coordinated project with standardized protocols and data sharing, but no such effort existed despite the recognized need for a reference dataset of human brain networks.
    challenge: Achieving the required data quality for 1,200 subjects demanded customized MRI hardware, optimized acquisition protocols for multiple modalities, and infrastructure for storing and sharing petabytes of data openly.
    action: Van Essen et al. designed and executed the Human Connectome Project, collecting high-resolution structural MRI, diffusion MRI, resting-state and task fMRI, and MEG/EEG from 1,200 young adults with extensive behavioral testing, and released all data publicly.
