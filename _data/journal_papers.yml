- id: wang-2004
  title: "Image quality assessment: from error visibility to structural similarity"
  authors: Zhou Wang, Alan C. Bovik, Hamid R. Sheikh, Eero P. Simoncelli
  year: 2004
  journal: ''
  doi: 10.1109/tip.2003.819861
  dimension: computer-vision-ml
  tags:
  - "method:image-quality-metric"
  - "method:ssim"
  - "imaging:electron-microscopy"
  - "method:image-processing"
  - "phase:foundations"
  - "method:evaluation"
  discussion_prompts:
  - >-
    How well does SSIM capture the quality of EM image restoration relevant to connectomics, where membrane continuity matters
    more than overall image fidelity?
  - >-
    In what ways do learned perceptual metrics (LPIPS) outperform SSIM for evaluating neural image reconstruction, and what
    are their limitations?
  - >-
    How should image quality metrics be adapted for 3D volumetric EM data where axial and lateral resolution differ substantially?
  summaries:
    beginner: >-
      This paper presents a mathematical formula (SSIM) for judging how similar two images look to a human observer. Unlike
      simple pixel-by-pixel comparisons, SSIM considers brightness, contrast, and structural patterns together. In neuroscience,
      it is used to check how well algorithms have reconstructed or denoised brain microscopy images.
    intermediate: >-
      SSIM computes a perceptual quality score by comparing local mean, variance, and cross-correlation between patches of
      two images, with parameters tuned to the contrast sensitivity of the human visual system. It is widely used in connectomics
      to benchmark image denoising, super-resolution, and registration algorithms on EM data, where preserving fine membrane
      and synapse structure is critical. MS-SSIM further improves performance by computing SSIM at multiple spatial scales.
    advanced: >-
      SSIM's formulation — SSIM(x,y) = (2*mu_x*mu_y + C1)(2*sigma_xy + C2) / ((mu_x^2 + mu_y^2 + C1)(sigma_x^2 + sigma_y^2
      + C2)) — implicitly weights structural similarity over luminance differences, making it more sensitive to edge and texture
      preservation than MSE. In EM connectomics, this is particularly relevant because membrane boundaries are the key structural
      features for segmentation, and MSE can be low even when boundary positions are systematically shifted. A limitation
      is that SSIM is not differentiable everywhere, motivating learned perceptual loss functions (e.g., VGG-based LPIPS)
      for deep learning image restoration. Its applicability to 3D volumetric EM stacks has been explored but isotropic 3D
      quality metrics remain less standardized.
  ocar:
    opportunity: >-
      Evaluating the quality of segmented or reconstructed images in connectomics and biomedical imaging required a metric
      that correlates with human perception rather than simple pixel-level error, which often fails to capture perceptually
      important differences.
    challenge: >-
      Traditional metrics like mean squared error (MSE) measure absolute pixel differences but are insensitive to structural
      distortions that humans find objectionable, making them poor proxies for the quality of reconstructed neural images
      or segmentation outputs.
    action: >-
      Wang et al. developed the Structural Similarity Index (SSIM), which decomposes image quality into three components —
      luminance, contrast, and structure — modeled on properties of the human visual system. SSIM computes local statistics
      over sliding windows and combines them multiplicatively into a single quality score between -1 and 1.
    resolution: >-
      SSIM was shown to correlate significantly better with human quality judgments than MSE or PSNR across a standard image
      quality database. It became widely adopted as the standard perceptual image quality metric in computer vision and biomedical
      imaging, including for evaluating EM image enhancement, denoising, and segmentation accuracy in connectomics.
    future_work: >-
      Extensions such as MS-SSIM (multi-scale) and learned perceptual metrics (LPIPS) have improved on SSIM for specific domains,
      and adapting quality metrics specifically for 3D volumetric EM data remains an open problem.
  plain_language_summary: >-
    When scientists process brain images — for example, sharpening blurry pictures or checking how accurately a computer has
    reconstructed cell boundaries — they need a way to measure how good the result looks. This paper introduced SSIM, a score
    that mimics how human eyes perceive image quality rather than just counting pixel-by-pixel errors. It is like grading
    a painting by how much it looks like the original to a viewer, not just measuring paint thickness differences.
  citation_note: 54590 citations | methods | 1 foundations
- id: egger-1997
  title: Bias in meta-analysis detected by a simple, graphical test
  authors: Matthias Egger, George Davey Smith, Martin Schneider, C. Minder
  year: 1997
  journal: ''
  doi: 10.1136/bmj.315.7109.629
  dimension: computer-vision-ml
  tags:
  - "method:meta-analysis"
  - "method:statistics"
  - "method:publication-bias"
  - "method:funnel-plot"
  - "phase:foundations"
  - "method:reproducibility"
  discussion_prompts:
  - >-
    How might publication bias affect meta-analyses of synapse density or cell-type abundance estimates across different connectomics
    studies or labs?
  - >-
    What are the limitations of funnel plot asymmetry tests when applied to a small number of connectomics or neuroanatomy
    studies, and what alternatives exist?
  - >-
    Beyond publication bias, what other sources of heterogeneity in connectomics datasets could produce funnel plot asymmetry,
    and how would you distinguish them?
  summaries:
    beginner: >-
      When many small experiments are combined to reach a conclusion, the results can be skewed if failed experiments were
      never published. This paper introduced a funnel plot test to detect that kind of bias by looking for asymmetry in a
      plot of study results. Scientists use this in neuroscience meta-analyses to check whether reported findings about brain
      function are truly replicable.
    intermediate: >-
      The Egger test regresses the standardized effect estimate on its standard error; a non-zero intercept indicates funnel
      plot asymmetry, which may reflect publication bias, small-study effects, or heterogeneity. In connectomics and systems
      neuroscience, this framework is used to evaluate meta-analyses of synapse density measurements, cell-type proportion
      estimates, or behavioral phenotypes. The test has limited power with fewer than ~10 studies, a common situation in specialized
      connectomics domains.
    advanced: >-
      Egger's regression test for funnel asymmetry has been shown to have inflated type I error when between-study heterogeneity
      is high, leading to the development of rank-based alternatives (Begg's test) and trim-and-fill methods. In the context
      of connectomics meta-analyses — for instance, comparing synapse density estimates across EM reconstruction studies or
      cell-type composition across brain regions — distinguishing publication bias from methodological heterogeneity (fixation
      protocol, species, brain region) requires careful sensitivity analysis. The test is most relevant to connectomics as
      a critical appraisal tool for evaluating whether reported connectivity statistics generalize beyond individual datasets.
  ocar:
    opportunity: >-
      Meta-analyses of neuroscience studies (e.g., comparing connectomics reconstruction accuracy or synapse counts across
      labs) can be distorted by publication bias — the tendency for positive results to be published more than negative ones
      — but detecting this bias was difficult without large datasets.
    challenge: >-
      Identifying publication bias requires a method that works even with a small number of studies, is easy to implement,
      and does not require knowing the true effect size, making statistical testing of asymmetry in summary data non-trivial.
    action: >-
      Egger et al. proposed a simple graphical test using funnel plots — scatter plots of study effect size against a measure
      of study precision — and formalized a regression test for funnel plot asymmetry. Studies with higher precision should
      cluster near the true effect, while small-study effects produce asymmetry if publication bias is present.
    resolution: >-
      The funnel plot asymmetry test was shown to detect publication bias effectively in several medical meta-analyses and
      provided a simple visual and statistical tool widely adopted in systematic reviews. It became standard practice in evidence-based
      medicine and is increasingly used in neuroscience meta-analyses assessing replication and reproducibility.
    future_work: >-
      Funnel plot asymmetry can have causes other than publication bias (e.g., heterogeneity, poor methodology in small studies),
      and distinguishing these requires additional sensitivity analyses; more powerful tests for small meta-analyses remain
      needed.
  plain_language_summary: >-
    When scientists combine results from many studies to get an overall conclusion (a meta-analysis), the combined answer
    can be misleading if small studies with negative results were never published. This paper introduced a simple graph —
    a funnel plot — and a statistical test to detect this 'publication bias'. In neuroscience, such tools help assess whether
    conclusions about brain connectivity or cell-type properties are reliable across labs.
