      intermediate: "Helmstaedter et al. performed dense connectomic reconstruction of the inner plexiform layer of the mouse retina using SBEM imaging and crowd-sourced proofreading. They reconstructed 950 neurons including all bipolar cell types and most retinal ganglion cell types, mapping synaptic connectivity at sufficient completeness to identify cell-type-specific wiring rules."
      advanced: "This study demonstrated that dense connectomic reconstruction could reveal cell-type-specific wiring rules at scale. The combination of machine learning segmentation with crowd-sourced annotation established a scalable human-in-the-loop pipeline. The connectivity matrix showed that co-stratification is necessary but not sufficient for connectivity."

