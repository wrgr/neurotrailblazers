    action: Dorkenwald et al. developed CODEX, a framework that automatically extracts circuit motifs from the FlyWire connectome, translates them into architectural components for artificial neural networks, and evaluates their computational utility.
    resolution: CODEX demonstrated that connectome-derived architectural features can improve artificial neural network performance on specific tasks, closing the loop between connectomics data and AI design in a systematic, automated way.
