  summaries:
    beginner: This paper reconstructed the dense wiring of a piece of mouse brain in the region that processes touch information
      from the whiskers. By tracing all the neurons and their connections, the authors could see how long-distance axons arriving
      from the thalamus connect to local neurons.
    intermediate: Motta et al. performed dense connectomic reconstruction of layer 4 of mouse barrel cortex using SBEM. They
      reconstructed ~90 neurons with complete local arbors, identified ~3,000 synapses, and classified thalamocortical versus
      intracortical axons. Specific connectivity motifs (reciprocal connections, common input) occur at rates above chance.
    advanced: This study advanced dense cortical reconstruction by combining automated segmentation with systematic error
      quantification and ground-truth validation. The analysis of thalamocortical axon targeting revealed laminar and cell-type
      specificity that could not be resolved with sparse reconstructions. The dataset serves as a benchmark for evaluating
      automated reconstruction pipelines on cortical neuropil.
- id: denk-horstmann-2004
  title: Serial block-face scanning electron microscopy to reconstruct three-dimensional tissue nanostructure
  authors: Denk W, Horstmann H
  year: 2004
  journal: PLoS Biology
  doi: 10.1371/journal.pbio.0020329
  dimension: imaging
  tags:
  - imaging:SBEM
  - imaging:SEM
  - imaging:serial-section
  - imaging:electron-microscopy
  - methodology:experimental-design
  key_figures:
  - 'Fig. 1: SBEM schematic'
  - 'Fig. 2: block-face image quality'
  - 'Fig. 4: 3D neural reconstruction'
  discussion_prompts:
  - What are the tradeoffs between destroying sections (SBEM) versus preserving them (ATUM)?
  - How does the choice of SBEM vs FIB-SEM vs ATUM affect downstream segmentation quality?
  related_content:
  - /content-library/imaging/em-principles/
  - /content-library/imaging/tissue-preparation/
  summaries:
    beginner: This paper invented a new way to image brain tissue in 3D. Instead of cutting tissue into slices separately,
      the authors built a miniature cutting device inside the microscope itself. After imaging the surface, the device shaves
      off a thin layer and images the new surface — repeat thousands of times to build a 3D picture.
    intermediate: Denk and Horstmann introduced serial block-face SEM (SBEM), where an ultramicrotome inside an SEM chamber
      iteratively sections and images a resin-embedded tissue block. This eliminates section collection and handling, dramatically
      reducing alignment errors. SBEM became one of the two dominant imaging modalities for large-scale connectomics.
    advanced: The key engineering insight was that back-scattered electron imaging of the block face provides sufficient contrast
      from heavy-metal-stained tissue without requiring transmitted electrons. SBEM provides isotropic-ish voxels but sections
      are destroyed during imaging. Beam damage accumulates in deeper layers. Compare with FIB-SEM for true isotropic voxels
      and ATUM-SEM for section preservation.
- id: knott-2008
  title: Serial section scanning electron microscopy of adult brain tissue using focused ion beam milling
  authors: Knott G, Marchman H, Wall D, Lich B
  year: 2008
  journal: Journal of Neuroscience
  doi: 10.1523/JNEUROSCI.3189-07.2008
  dimension: imaging
  tags:
  - imaging:FIB-SEM
  - imaging:SEM
  - imaging:electron-microscopy
  - neuroanatomy:synapse
  - methodology:experimental-design
  key_figures:
  - 'Fig. 1: FIB-SEM geometry'
  - 'Fig. 2: isotropic voxel demonstration'
  - 'Fig. 3: synapse reconstruction'
  discussion_prompts:
  - For which biological questions is isotropic resolution essential versus nice-to-have?
  - How does the volume limitation of FIB-SEM affect the kinds of connectomics questions you can ask?
  related_content:
  - /content-library/imaging/em-principles/
  - /content-library/imaging/acquisition-qa/
  summaries:
    beginner: This paper showed how to use a focused beam of ions (like a tiny sandblaster) to slice brain tissue inside an
      electron microscope, producing truly cube-shaped 3D pixels. Previous methods cut thicker slices, making images stretched
      in one direction. With FIB-SEM, every direction has the same resolution.
    intermediate: Knott et al. demonstrated FIB-SEM for neural tissue, achieving isotropic voxels (~5-10 nm in all dimensions).
      This isotropic resolution is particularly valuable for tracing thin processes that may be missed in anisotropic datasets.
      The tradeoff is dramatically slower acquisition throughput compared with SBEM or ATUM-SEM.
    advanced: FIB-SEM's isotropic resolution eliminates z-anisotropy that plagues segmentation in serial section datasets.
      The Knott et al. implementation achieves ~5 nm isotropic but at volumes orders of magnitude smaller than SBEM datasets.
      The choice between FIB-SEM and SBEM depends on whether isotropy (spine morphology, organelle quantification) or volume
      (circuit mapping) is prioritized.
