    ocar:
    opportunity: |
      Accurate cancer incidence and mortality statistics are essential for tracking disease burden, allocating research resources, and measuring the impact of prevention and treatment efforts across the United States.
    challenge: |
      Compiling comprehensive national cancer statistics requires integrating surveillance data from multiple state registries with different reporting systems, adjusting for demographic changes, and projecting current-year estimates from historical trends.
    action: |
      The American Cancer Society estimated new cancer cases and deaths in the United States for 2020 by analyzing population-based registry data, applying statistical modeling to project current-year incidence and mortality across cancer types and demographics.
    resolution: |
      The 2020 report estimated approximately 1.8 million new cancer diagnoses and 606,520 cancer deaths in the US for that year. The annual statistics provide essential epidemiological benchmarks and are widely cited in oncology and public health research.
    future_work: |
      Improving real-time cancer surveillance, capturing health disparities across racial and socioeconomic groups, and integrating genomic data into population cancer statistics are ongoing priorities.
  plain_language_summary: |
    Each year, the American Cancer Society publishes estimates of how many people will be diagnosed with or die from cancer in the United States. This 2020 report estimated about 1.8 million new cancer cases — providing essential numbers that guide medical research funding, public health policy, and clinical practice.
  summaries:
    beginner: |
        This annual report from the American Cancer Society estimates how many new cancer cases and deaths will occur in the US in 2020. These statistics are important for understanding how common different cancers are, tracking whether treatments are improving survival, and deciding where to focus research efforts.
    intermediate: |
        The 2020 Cancer Statistics report aggregates data from SEER and NPCR registries, projects current-year estimates using delay-adjusted incidence rates, and provides detailed breakdowns by cancer type, sex, age, and race/ethnicity. In neuro-oncology, the statistics for brain and CNS tumors provide epidemiological context for connectomics research on tumor-induced circuit disruption.
    advanced: |
        The methodology relies on delay-adjusted cancer registry data and joinpoint trend analysis to project incidence and mortality for the current year, acknowledging uncertainty from reporting lags and demographic changes. In the context of connectomics, this paper is most relevant as background for neuro-oncology research using imaging-based connectivity analysis to characterize glioblastoma or other brain tumors. The reported brain tumor incidence (~23,890 malignant cases in 2020) provides context for the clinical scale of neurological disease that connectomics methods may eventually inform.
  discussion_prompts:
  - |
    How could connectomics or network-based neuroimaging approaches contribute to understanding the mechanisms by which brain tumors disrupt neural circuit function?
    - |
    What are the limitations of population-level cancer statistics for informing individual patient prognosis, and how might molecular or imaging biomarkers improve personalized prediction?
    - |
    How have survival rates for brain tumors changed over the past decade, and which tumor types have seen the greatest improvement?
    - id: a-multilevel-multimodal-circuit-enhances-action-selection-in
    title: "A multilevel multimodal circuit enhances action selection in Drosophila"
    authors: "Ohyama, Schneider-Mizell, Fetter et al."
    year: 2015
    journal: ""
    doi: 10.1038/nature14297
    dimension: connectomics
    reading_phase: 2_core_methods
    composite_score: 0.0581
    role: methods
    tags:
    - species:drosophila
    - neuroanatomy:sensorimotor
    - method:circuit-dissection
    - method:calcium-imaging
    - concept:multisensory-integration
    - method:behavioral-assay
    ocar:
    opportunity: |
      Understanding how sensory information from different modalities is integrated and used to select appropriate behavioral responses is a fundamental question in systems neuroscience, and Drosophila provides a genetically tractable model for dissecting these circuits.
    challenge: |
      Multisensory integration involves circuits spanning multiple brain regions and levels of the nervous system; identifying the specific neurons and synaptic connections mediating sensorimotor integration required both anatomical and functional approaches.
    action: |
      The authors used genetic tools in Drosophila to identify and manipulate neurons in a circuit that integrates visual and mechanosensory inputs to enhance action selection, combining connectomic anatomy with functional behavioral assays.
    resolution: |
      A multilevel, multimodal circuit was identified in which convergent sensory signals enhance the reliability and speed of action selection, demonstrating how multimodal integration is implemented at the circuit level in a complete, tractable nervous system.
    future_work: |
      Generalizing these circuit principles to other sensory combinations and behavioral contexts, and testing whether similar circuit motifs exist in vertebrate sensorimotor systems, are important next steps.
  plain_language_summary: |
    How does the brain combine signals from multiple senses to decide what action to take? This paper used fruit flies to trace the specific brain circuits that combine vision and touch to improve decision-making speed and reliability, providing a concrete example of how multisensory integration works at the level of individual neurons.
  summaries:
    beginner: |
        When we make decisions, our brain combines information from multiple senses. This paper mapped the specific neural circuit in Drosophila that integrates visual and mechanical (touch/vibration) signals to improve action selection. By manipulating specific neurons, the researchers could show which parts of the circuit were essential for the behavior.
    intermediate: |
        Using trans-synaptic tracing and calcium imaging combined with behavioral assays, this study identified a multilevel circuit architecture in Drosophila where visual and mechanosensory inputs converge to modulate action selection. The circuit includes both feedforward sensory convergence and feedback modulation, providing a complete connectome-informed model of multimodal decision-making.
    advanced: |
        The study leverages Drosophila connectomics and genetic tools to achieve a complete circuit dissection of multisensory action selection, demonstrating how convergent sensory streams at multiple levels of processing (sensory neuron, interneuron, premotor) create robust behavioral responses. The availability of the Drosophila connectome context allows identification of synaptic partners, though functional validation requires genetic manipulation and behavioral quantification. A limitation is that circuit function may differ during active behavior compared to restrained preparations used for calcium imaging.
  discussion_prompts:
  - |
    How does multilevel multisensory convergence in the Drosophila circuit compare to known multisensory integration circuits in vertebrates?
    - |
    What circuit motifs enable reliable action selection under multisensory conditions, and how might these motifs be identified systematically in connectome data?
    - |
    How can connectomics inform the design of genetic experiments to test the causal roles of specific neurons in a multisensory circuit?
    - id: unpaired-image-to-image-translation-using-cycle-consistent-a
    title: "Unpaired Image-to-Image Translation Using Cycle-Consistent Adversarial Networks"
    authors: "Zhu, Park, Isola et al."
    year: 2017
    journal: ""
    doi: 10.1109/iccv.2017.244
    dimension: segmentation
    reading_phase: 2_core_methods
    composite_score: 0.0579
    role: methods
    tags:
    - method:deep-learning
    - method:gan
    - method:image-translation
    - tool:cyclegan
    - neuroai:domain-adaptation
    - imaging:electron-microscopy
    ocar:
    opportunity: |
      Image-to-image translation (converting images from one style or domain to another) typically requires large datasets of aligned image pairs, but paired training data is often unavailable in scientific imaging contexts including microscopy and histology.
    challenge: |
      Learning a mapping between two image domains without paired examples is ill-posed — many possible mappings could transform images in one domain to look like images in the other, requiring additional constraints to enforce meaningful translations.
    action: |
      Zhu et al. introduced CycleGAN, which uses two generative adversarial networks trained in tandem with a cycle-consistency loss requiring that a translated image can be translated back to recover the original, thus constraining the mapping without paired training data.
    resolution: |
      CycleGAN successfully learns unpaired image-to-image translations for tasks including style transfer, domain adaptation, and modality conversion, performing comparably to paired methods on standard benchmarks. In connectomics and neuroscience, CycleGAN has been applied to cross-modality image synthesis, EM staining normalization, and augmentation for segmentation training.
    future_work: |
      CycleGAN can fail when mode collapse produces non-injective mappings; handling multimodal translation and ensuring biologically faithful rather than visually plausible synthesis remain challenges for scientific applications.
  plain_language_summary: |
    Translating images from one style to another normally requires matched pairs of examples — like having the same photo in color and black-and-white. CycleGAN is a clever method that learns this translation without any matched pairs, using a 'roundtrip consistency' trick. In brain science, it has been used to convert between different types of microscopy images without needing expensive paired data.
  summaries:
    beginner: |
        Changing an image from one style to another — like making a photo look like a painting — normally requires many matched example pairs. CycleGAN learned to do this with no matched pairs by requiring that if you translate an image to the new style and back, you get the original image. This technique is used in neuroscience to translate between different types of brain images.
    intermediate: |
        CycleGAN employs two generator-discriminator pairs with a cycle-consistency loss (forward and backward cycle losses) to learn unpaired domain translation. In EM connectomics, applications include staining normalization across imaging sessions, conversion between FIB-SEM and ATUM-SEM image styles for cross-dataset training, and augmentation of rare or expensive image modalities. The cycle-consistency constraint helps prevent mode collapse but does not guarantee biologically accurate translations.
    advanced: |
        CycleGAN's cycle-consistency loss enforces approximate injectivity of the mapping but cannot guarantee that domain-specific information not present in both domains is correctly handled — a critical caveat for scientific image synthesis where biologically meaningful features must be preserved. In EM connectomics, CycleGAN has been applied to normalize staining variations that reduce cross-dataset generalization of segmentation models; however, evaluation requires domain experts to verify that hallucinated or removed ultrastructural features do not bias downstream analysis. The method is widely used in data augmentation pipelines but should be validated against ground-truth matched images when available.
  discussion_prompts:
  - |
    How should biologically meaningful image-to-image translation methods be validated in EM connectomics — what ground truth is needed to ensure translated images preserve ultrastructural accuracy?
    - |
    What are the risks of using CycleGAN-translated images as training data for segmentation networks — could hallucinated features in the synthetic images degrade segmentation performance?
    - |
    How does cycle-consistency compare to other constraints (perceptual loss, feature matching) for enforcing biologically faithful unpaired image translation?
    - id: optimized-tools-for-multicolor-stochastic-labeling-reveal-di
    title: |
    Optimized tools for multicolor stochastic labeling reveal diverse stereotyped cell arrangements in the fly visual system
    authors: "Nern, Pfeiffer, Rubin"
    year: 2015
    journal: ""
    doi: 10.1073/pnas.1506763112
    dimension: neuroanatomy
    reading_phase: 2_core_methods
    composite_score: 0.0578
    role: biology
    tags:
