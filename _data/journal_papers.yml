    ocar:
    opportunity: |
      Understanding the neural basis of human cognitive abilities, behavior, and their variability required a comprehensive, high-quality neuroimaging dataset acquired with standardized protocols from a large, well-characterized healthy adult population.
    challenge: |
      Creating a publicly shared, high-quality multi-modal connectivity dataset required simultaneously solving hardware (scanner optimization), acquisition (novel sequences), preprocessing (pipelines), data management (ConnectomeDB), and open science (consent, sharing infrastructure) challenges at a scale not previously attempted.
    action: |
      Van Essen and colleagues provide a comprehensive overview of the WU-Minn HCP, covering scanner hardware, acquisition protocols (fMRI, dMRI, structural MRI, MEG), the lifespan sample design (~1,200 healthy young adults with twins and siblings), behavioral battery, preprocessing pipelines (HCP minimal preprocessing), and the ConnectomeDB open data distribution platform.
    resolution: |
      The HCP successfully acquired and released high-quality multi-modal imaging data from over 1,200 participants, including behavioral, genetic, and longitudinal components. The dataset has enabled hundreds of published studies on brain parcellation, functional gradients, connectome topology, individual differences, heritability, and disease biomarkers, fundamentally transforming macroscale human connectome science.
    future_work: |
      Extending HCP protocols to lifespan (HCP-Development, HCP-Aging) and clinical populations, refining parcellation methods for individual subjects rather than group averages, and developing interpretable computational models linking connectome structure to cognitive function remained major next steps.
  plain_language_summary: ""
  summaries:
    beginner: |
        The Human Connectome Project collected detailed brain scans from over a thousand healthy volunteers using state-of-the-art scanners and freely shared all the data online. This overview paper explains the full scope of the project, from MRI protocols to the behavioral tests participants completed.
    intermediate: |
        Van Essen et al. overview the WU-Minn HCP's full data collection strategy: 3T and 7T multimodal imaging (resting-state fMRI, task fMRI, dMRI, sMRI), MEG, behavioral/cognitive batteries, and genetic data from monozygotic and dizygotic twins and siblings. They describe the HCP minimal preprocessing pipeline and ConnectomeDB, and summarize early scientific applications of the openly shared data.
    advanced: |
        This overview paper describes the data resource that has become the de facto standard for human connectome science. The twin and sibling design enables heritability analysis of connectivity phenotypes, while the large unrelated sample supports genome-wide connectivity analyses. The HCP MMP1.0 parcellation (Glasser et al. 2016), functional gradients analysis (Margulies et al. 2016), and individual-level fingerprinting (Finn et al. 2015) all built directly on HCP data. The project's open science model has been widely adopted and extended by the UK Biobank, ABCD Study, and HCP-lifespan projects, making it a model for large-scale neuroimaging data sharing.
  discussion_prompts:
  - |
    How does the HCP's twin and sibling design enable estimates of heritability for brain connectivity phenotypes, and what connectome properties have been found to be most heritable?
    - |
    What are the key preprocessing steps in the HCP minimal preprocessing pipeline, and why were they chosen over conventional alternatives?
    - |
    How has the HCP dataset been used to validate computational models of brain function, and what aspects of cognition are best captured by structural versus functional connectivity?
    - id: specificity-and-stability-in-topology-of-protein-networks
    title: "Specificity and Stability in Topology of Protein Networks"
    authors: "Maslov, Sneppen"
    year: 2002
    journal: ""
