  title: Connectome-constrained networks predict neural activity across the fly brain
  authors: Lappalainen JK, Tschopp FD, Hapber S, et al.
  year: 2024
  journal: Nature
  doi: 10.1038/s41586-024-07939-3
  dimension: neuroai
  tags:
  - "neuroai:connectome-constrained-model"
  - "neuroai:structure-function"
  - "neuroai:simulation"
