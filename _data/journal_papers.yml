  title: "neuPrint: An open access tool for EM connectome analysis"
  authors: Clements J, Dolafi T, Umayam L, et al.
  year: 2020
  journal: bioRxiv
  doi: 10.1101/2020.01.16.909465
  dimension: data-storage
  tags:
