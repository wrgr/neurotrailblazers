    intermediate: Dorkenwald et al. introduce CODEX, a framework for extracting circuit motifs from the FlyWire connectome and translating them into architectural components for artificial neural networks. The bio-inspired designs show performance improvements on specific computational tasks.
    advanced: CODEX represents a systematic approach to the connectome-to-architecture pipeline. Rather than hand-designing bio-inspired features, the framework automatically identifies overrepresented connectivity patterns and evaluates their computational utility. This closes the loop between connectomics data and AI design.
