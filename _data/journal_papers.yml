    action: Stringer and Pachitariu developed Cellpose 3, adding image restoration (denoising, deblurring) as a preprocessing step to the Cellpose segmentation framework, creating an end-to-end pipeline that improves generalization without retraining.
    resolution: The combined restoration-segmentation approach improved robustness to imaging artifacts across diverse conditions, reducing the need for domain-specific training data and demonstrating a path toward cross-dataset generalization for cell segmentation.
