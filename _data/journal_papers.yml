- id: bassett-2018-models
  title: On the nature and use of models in network neuroscience
  authors: Bassett DS, Zurn P, Gold JI
  year: 2018
  journal: Nature Reviews Neuroscience
  doi: 10.1038/s41583-018-0038-8
  dimension: neuroai
  tags:
  - "neuroai:simulation"
  - "neuroai:connectome-constrained-model"
  - "connectomics:graph-theory"
  - "methodology:hypothesis-testing"
  key_figures:
  - "Fig. 1: model taxonomy"
  - "Fig. 3: explanatory vs predictive models"
  discussion_prompts:
  - Which model claims in connectomics are currently descriptive only? What evidence upgrades them to explanatory?
  - How should connectome-constrained models be validated?
  related_content:
  - /content-library/connectomics/neuroai-bridge/
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: >-
      Scientists build simplified models of the brain to understand how it works. This paper explains the different types
      of models — some just describe patterns, some make predictions, and some explain why things work the way they do. Knowing
      the difference is essential for interpreting connectomics research.
    intermediate: >-
      Bassett et al. provide a taxonomy of models in network neuroscience: descriptive (summarize data), predictive (forecast
      outcomes), and explanatory (identify mechanisms). They argue that most connectomics analyses are descriptive, and discuss
      what additional evidence is needed to move toward explanation.
    advanced: >-
      This paper is essential reading for anyone making claims based on network analysis of connectomes. The model taxonomy
      — and the argument that graph measures are descriptive unless coupled with interventional evidence — provides a framework
      for honest reporting. Particularly relevant for motif analysis and community detection claims.
  ocar:
    opportunity: >-
      Network neuroscience was producing many analyses of brain connectivity, but the field lacked a clear framework for distinguishing
      between models that merely describe patterns and those that explain mechanisms.
    challenge: >-
      The distinction between descriptive, predictive, and explanatory models is philosophically nuanced and practically consequential
      — many connectomics claims based on graph measures were implicitly treated as explanatory without sufficient evidence.
    action: >-
      Bassett et al. provided a taxonomy of models in network neuroscience (descriptive, predictive, explanatory), analyzed
      which category most connectomics analyses fall into, and specified what additional evidence is needed to move from description
      toward explanation.
    resolution: >-
      The paper established a framework for honest reporting of model claims in connectomics, arguing that graph measures
      are inherently descriptive unless coupled with interventional evidence, with particular implications for motif analysis
      and community detection.
    future_work: >-
      Developing standards for interventional validation of network models and integrating perturbation experiments with connectomics
      data are priorities for moving the field toward explanatory models.
  bibtex: >-
