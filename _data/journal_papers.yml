  - /content-library/case-studies/flywire-whole-brain/
  summaries:
    beginner: Once you have a brain wiring diagram, you need a way to search it. neuPrint is a database and web interface
      that lets researchers query connectome data — like asking 'show me all neurons that connect to this specific neuron'
      or 'find all neurons of this type.'
    intermediate: Clements et al. describe neuPrint, a graph database and web application for querying EM connectome data.
      Built on Neo4j, it supports Cypher queries for exploring connectivity at neuron, type, and region levels. The system
      serves the hemibrain and FlyWire datasets.
    advanced: neuPrint's graph database architecture reflects the insight that connectomics data is naturally a labeled property
      graph. The Cypher query language enables complex path-based and motif-based queries. The web interface with NeuronBridge
      integration enables cross-dataset cell type matching.
- id: saalfeld-2009
  title: 'CATMAID: Collaborative annotation toolkit for massive amounts of image data'
  authors: Saalfeld S, Cardona A, Hartenstein V, Tomančák P
  year: 2009
  journal: Bioinformatics
  doi: 10.1093/bioinformatics/btt529
  dimension: data-storage
