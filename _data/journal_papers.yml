  key_figures:
  - 'Fig. 1: motif definition and enumeration'
  - 'Fig. 2: motif significance profiles across network types'
  discussion_prompts:
  - Which three-node motifs are overrepresented in neural circuits, and what might this mean functionally?
  - How does null model choice affect motif significance results?
  related_content:
