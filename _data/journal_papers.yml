  authors: White JG, Southgate E, Thomson JN, Brenner S
  year: 1986
  journal: Philosophical Transactions of the Royal Society B
  doi: 10.1098/rstb.1986.0056
  dimension: case-studies
  tags:
  - case-studies:C-elegans
  - case-studies:whole-brain
  - case-studies:dense-reconstruction
  - connectomics:graph-theory
  key_figures:
  - 'Fig. 1: complete nervous system wiring diagram'
  - 'Fig. 5: neuron class connectivity matrix'
  discussion_prompts:
  - How did the limitations of 1980s reconstruction technology shape the connectome's completeness and accuracy?
  - Why did it take nearly three decades before another organism's connectome was completed?
  related_content:
  - /content-library/case-studies/c-elegans-revisited/
  - /content-library/connectomics/graph-representations/
  summaries:
    beginner: This is the paper that started connectomics. White and colleagues spent over a decade tracing every neuron and
      connection in the tiny worm C. elegans, producing the first complete wiring diagram of any nervous system. It proved
      that mapping an entire brain's connections was possible.
    intermediate: White et al. reconstructed the complete nervous system of C. elegans — 302 neurons and ~7,000 chemical synapses
      — from serial-section EM. The resulting wiring diagram became the foundational dataset for computational neuroscience
      and network analysis of neural circuits.
    advanced: The reconstruction relied on manual tracing from serial thin sections with limited computational support. Known
      caveats include incomplete gap junction mapping, variable synapse identification criteria, and reliance on a small number
      of animals. Despite these limitations, the dataset has driven decades of graph-theoretic analysis and remains a benchmark
      for connectome completeness.
- id: takemura-2013
  title: A visual motion detection circuit suggested by Drosophila connectomics
  authors: Takemura SY, Bharioke A, Lu Z, et al.
  year: 2013
  journal: Nature
  doi: 10.1038/nature12450
  dimension: case-studies
  tags:
  - case-studies:Drosophila
  - case-studies:retina
  - connectomics:graph-theory
  - neuroai:structure-function
  key_figures:
  - 'Fig. 1: medulla column reconstruction'
  - 'Fig. 4: motion detection circuit diagram'
  discussion_prompts:
  - How did the connectome data constrain computational models of motion detection?
  - What are the trade-offs between targeted circuit reconstruction and whole-brain approaches?
  related_content:
  - /content-library/case-studies/drosophila-visual-circuits/
  - /content-library/neuroai/structure-function-mapping/
  summaries:
    beginner: Fruit flies are very good at detecting motion. This paper reconstructed the detailed wiring of the fly's motion-sensing
      circuits and used the connectivity to propose how these circuits actually compute the direction of movement.
    intermediate: Takemura et al. densely reconstructed medulla columns in the Drosophila optic lobe, identifying all synaptic
      connections among the neurons involved in motion detection. The wiring diagram constrained existing computational models,
      favoring specific implementations of the Hassenstein-Reichardt correlator.
    advanced: This study exemplifies targeted connectomics — reconstructing a functionally defined circuit to distinguish
      between competing models. The dense reconstruction of seven medulla columns revealed stereotyped connectivity with quantifiable
      variability. The synapse-level wiring data ruled out several motion detection model variants and motivated subsequent
      functional validation experiments.
- id: bock-2011
  title: Network anatomy and in vivo physiology of visual cortical neurons
  authors: Bock DD, Lee WCA, Kerlin AM, et al.
  year: 2011
  journal: Nature
  doi: 10.1038/nature09802
  dimension: case-studies
  tags:
