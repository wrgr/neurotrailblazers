      - "Fig. 5: segmentation results on EM neuron images"
    discussion_prompts:
      - "How does the affinity-graph representation of segmentation differ from direct boundary prediction, and what advantages does it offer?"
      - "Why was the MALIS (maximin affinity learning) loss an important conceptual advance over pixel-wise cross-entropy for segmentation?"
    related_content:
      - /content-library/computer-vision-ml/affinity-prediction/
      - /content-library/computer-vision-ml/boundary-detection/
    summaries:
      beginner: "Instead of just drawing edges around neurons, this paper trains a neural network to predict for every pair of neighboring pixels whether they belong to the same neuron. These pairwise 'affinity' predictions can then be turned into a full segmentation. This idea became one of the foundational approaches in connectomics image analysis."
      intermediate: "Turaga et al. introduce the affinity graph framework for neuron segmentation: a CNN predicts edge affinities between neighboring voxels, and a graph partitioning step produces the final segmentation. They also propose the MALIS loss, which focuses gradient updates on the maximally incorrect affinities that would cause topological errors, rather than treating all voxels equally."
      advanced: "This paper laid the theoretical groundwork for affinity-based segmentation in connectomics. The MALIS criterion computes gradients only on the critical edges of the minimum spanning tree that connect or separate ground-truth segments, providing a training signal that is directly sensitive to topological merge and split errors. The affinity-graph formulation also naturally supports long-range affinities, which later work showed improves segmentation of thin processes."

