    beginner: >-
      To understand how different brain areas talk to each other, researchers injected a tracer virus into hundreds of mouse
      brain regions and photographed which other regions lit up with fluorescent signals. The result is a comprehensive map
      of all major long-range connections in the mouse brain.
    intermediate: >-
      The Allen Mouse Brain Connectivity Atlas used recombinant AAV tracers to map anterograde projections from systematically
      selected injection sites across the entire mouse brain. Whole-brain serial two-photon tomography and automated image
      registration to the Allen Reference Atlas enabled creation of a normalized inter-regional connectivity matrix, revealing
      mesoscale modules and hierarchical organization.
    advanced: >-
      The mesoscale connectome provides a critical reference for integrating with fine-scale EM connectomics data, but several
      caveats apply: anterograde AAV tracing labels axons of passage as well as terminals, injection sites are heterogeneous
      in size and cell-type composition, and spatial normalization introduces registration error. The connectivity matrix
      is also sparse in certain regions due to incomplete injection coverage. Despite these limitations, the dataset has enabled
      graph-theoretic analyses revealing hierarchical hub structure and rich-club organization in the mouse connectome.
  ocar:
    opportunity: >-
      Understanding how brain regions communicate required a comprehensive map of long-range axonal projections across the
      entire mouse brain, a resource that did not exist at the mesoscale level.
    challenge: >-
      Mapping projections across all brain regions requires systematic injection of tracers into hundreds of locations with
      consistent methodology, followed by registration of resulting images to a common atlas — a logistically and computationally
      enormous undertaking.
    action: >-
      The Allen Institute conducted a large-scale viral tracer injection campaign across the mouse brain, imaged axonal projections
      with whole-brain serial two-photon tomography, and registered all data to the Allen Mouse Brain Atlas to create a mesoscale
      connectome.
    resolution: >-
      The resulting dataset provides a quantitative matrix of inter-regional connectivity across the entire mouse brain, revealing
      modular organization and hierarchical structure. The data are publicly available and have become a foundational reference
      for systems neuroscience.
    future_work: >-
      Mesoscale anterograde tracing cannot distinguish individual axon paths or account for cell-type specificity; combining
