    challenge: Each pipeline stage — image alignment, segmentation, agglomeration, synapse detection — introduced errors that propagated downstream, and processing ~2 petabytes of imagery required massive computational resources with carefully managed parallelization.
    action: Macrina et al. documented the complete MICrONS reconstruction pipeline including image alignment, affinity-based segmentation, supervoxel agglomeration, synapse detection with pre/post partner assignment, and quantified error rates and computational costs at each stage.
