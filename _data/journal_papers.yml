      advanced: "A methodological milestone establishing the correlative functional-structural pipeline later scaled up by MICrONS. The study used ATUM sectioning and manual tracing of ~1,500 synapses from functionally characterized inhibitory neurons. Despite the small sample, it demonstrated that connectivity cannot be predicted from spatial proximity alone and that functional context is essential for interpreting wiring diagrams."

