    beginner: >-
      This paper produced the first complete electron microscopy images of an entire mouse brain — billions of images covering
      every region. While the resolution isn't high enough to see individual synapses everywhere, it provides an unprecedented
      anatomical atlas.
    intermediate: >-
      Xu et al. used enhanced FIB-SEM to image two complete mouse brains at ~8 nm isotropic resolution. The dataset enables
      whole-brain cell census, regional ultrastructure comparison, and organelle-level quantification. All data is publicly
      available.
    advanced: >-
      This atlas establishes a new class of connectomics resource — whole-brain coverage at intermediate resolution. The dataset
      bridges the gap between light-microscopy atlases and synapse-resolution EM volumes, enabling quantitative ultrastructural
      comparisons across brain regions.
  ocar:
    opportunity: >-
      No complete electron microscopy atlas of an entire mouse brain existed, leaving a gap between light-microscopy brain
      atlases and the small synapse-resolution EM volumes used for connectomics.
    challenge: >-
      Imaging an entire mouse brain at ~8 nm isotropic resolution with FIB-SEM required imaging billions of sections and managing
      petabytes of data, pushing the limits of both microscopy throughput and data infrastructure.
    action: >-
      Xu et al. used enhanced FIB-SEM to image two complete mouse brains at ~8 nm isotropic resolution and made the entire
      dataset publicly available, enabling whole-brain ultrastructural analysis and organelle quantification.
    resolution: >-
      The atlas established a new class of connectomics resource at intermediate resolution, bridging light-microscopy atlases
      and synapse-resolution volumes, and enabling quantitative comparison of ultrastructure across all brain regions for
      the first time.
    future_work: >-
      Achieving synapse-resolution imaging at whole-brain scale and automated segmentation of all cells and organelles across
      the complete dataset are the key next challenges.
