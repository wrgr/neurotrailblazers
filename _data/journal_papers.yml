  - 'Fig. 6: functional-structural correlation analysis linking activity to connectivity'
  discussion_prompts:
  - How does combining functional (calcium imaging) and structural (EM) data change what we can learn about cortical circuits
    compared to either modality alone?
  - What were the major computational bottlenecks in producing the MICrONS dataset, and how might they be addressed for even
    larger volumes?
  related_content:
  - /content-library/case-studies/MICrONS/
  - /content-library/computer-vision-ml/synapse-detection/
  summaries:
    beginner: This landmark paper describes the MICrONS project, which combined recordings of neural activity in a living
      mouse with a detailed 3D map of the same brain tissue reconstructed from electron microscopy. The result is the largest
      dataset that links what neurons do (their activity) to how they are wired together.
    intermediate: Turner et al. present the MICrONS cubic-millimeter-scale cortical dataset combining in vivo two-photon calcium
      imaging with post-hoc serial-section EM and automated reconstruction. The pipeline integrates flood-filling network
      segmentation, automated synapse detection, and multi-scale proofreading to produce a connectome with matched functional
      data. The dataset enables direct analysis of structure-function relationships in mouse visual cortex.
    advanced: The MICrONS dataset represents the state of the art in combined functional-structural neuroscience at scale.
      The reconstruction pipeline chains FFN-based segmentation, CNN-based synapse and organelle detection, and PyChunkedGraph-based
      proofreading. Key technical contributions include the co-registration of two-photon and EM coordinate spaces, the automation
      of nucleus and cell-type classification, and the public release of both raw and processed data. The paper demonstrates
      that connectivity patterns correlate with functional tuning properties, validating the utility of millimeter-scale connectomics.
  ocar:
    opportunity: Advances in both in vivo calcium imaging and large-scale EM reconstruction made it feasible for the first time to record the functional activity of neurons in a living animal and then reconstruct the same tissue at synaptic resolution, linking function to structure at unprecedented scale.
    challenge: The MICrONS pipeline required solving numerous technical challenges simultaneously — co-registering two-photon and EM coordinate spaces, segmenting and proofreading a cubic millimeter of cortex, detecting millions of synapses, classifying cell types, and making the entire dataset publicly accessible.
    action: Turner et al. combined in vivo two-photon calcium imaging of mouse visual cortex with post-hoc serial-section EM, applying FFN-based segmentation, CNN-based synapse and organelle detection, PyChunkedGraph-based proofreading, and automated cell type classification to produce a complete functional connectome.
    resolution: The MICrONS dataset became the largest publicly available combined functional-structural neuroscience resource, demonstrating that connectivity patterns correlate with functional tuning properties and establishing a template for future functional connectomics projects.
    future_work: Extending functional-structural linking to additional cortical areas and sensory modalities, improving the completeness of reconstruction in dense neuropil, and developing computational frameworks to systematically analyze structure-function relationships across the full dataset.
