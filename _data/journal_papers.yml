    - domain:cancer-biology
    ocar:
    opportunity: |
      A novel form of regulated cell death called ferroptosis — driven by iron-dependent lipid peroxidation rather than apoptotic mechanisms — was newly discovered and required systematic characterization of its molecular mechanisms and physiological roles.
    challenge: |
      Ferroptosis is morphologically and mechanistically distinct from apoptosis, necrosis, and autophagy, requiring new assays and genetic tools to study its regulation and distinguish it from other cell death modalities.
    action: |
      The authors reviewed and synthesized the molecular mechanisms of ferroptosis, covering the roles of glutathione peroxidase 4 (GPX4), lipid peroxidation, iron metabolism, and cystine/glutamate transport, and cataloged conditions that induce or suppress ferroptotic death.
    resolution: |
      Ferroptosis was established as a distinct regulated cell death pathway relevant to cancer, neurodegeneration, and ischemic injury. The review provided a mechanistic framework for understanding and therapeutically targeting this pathway.
    future_work: |
      Determining the physiological contexts where ferroptosis is beneficial or detrimental, and developing selective ferroptosis inducers and inhibitors for therapeutic use, remain open challenges.
  plain_language_summary: |
    Cells can die in different ways, and scientists recently discovered a new one called ferroptosis — a form of death driven by iron and lipid damage rather than the usual programmed death pathways. This review explains how ferroptosis works and why it matters for diseases like cancer and neurodegeneration.
  summaries:
    beginner: |
        Cells don't just die — they die in specific ways. Ferroptosis is a recently discovered form of cell death where iron helps destroy the cell's membranes through chemical oxidation. This review explains the molecular process and suggests it might be important in cancer and brain diseases.
    intermediate: |
        Ferroptosis is driven by GPX4 inactivation, depletion of reduced glutathione, and subsequent uncontrolled lipid peroxidation of polyunsaturated fatty acid-containing membranes. The review covers the central role of the xCT cystine/glutamate antiporter, iron-driven Fenton chemistry, and the distinction from other cell death modes. In neuroscience, ferroptosis is implicated in neurodegeneration and may contribute to selective neuronal vulnerability in Parkinson's and ALS.
    advanced: |
        The molecular specificity of ferroptosis — GPX4 as the central suppressor, ACSL4-mediated phospholipid remodeling as a driver, and the role of NADPH and coenzyme Q10 as parallel protective mechanisms — provides multiple potential therapeutic intervention points. In the context of connectomics, ferroptosis-related neuronal death could alter circuit structure, and the selective vulnerability of specific neuron types to ferroptosis may be relevant to understanding circuit-level consequences of neurodegeneration. This paper appears in neuroscience citation networks through its relevance to neuronal cell death mechanisms.
  discussion_prompts:
  - |
    Which neuron types are most vulnerable to ferroptosis, and could selective ferroptotic death explain the circuit-level pathology seen in Parkinson's or ALS?
    - |
    How does ferroptosis differ mechanistically from oxytosis (oxidative glutamate toxicity), and are these truly distinct pathways or converging processes?
    - |
    What are the therapeutic opportunities and risks of manipulating ferroptosis in the context of brain tumors versus neuroprotection?
    - id: statistical-power-in-network-neuroscience
    title: "Statistical power in network neuroscience"
    authors: "Helwegen, Libedinsky, Heuvel"
