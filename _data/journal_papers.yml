  summaries:
    beginner: 'Deep learning is powerful, but to use it to understand the brain, we need to ask the right questions. This
      review argues that the key question is: what tasks does the brain solve, and what constraints does it operate under?
      The wiring diagram is one of those constraints.'
    intermediate: Saxe et al. argue that using deep learning as a model of the brain requires specifying the right objective
      functions and constraints. They discuss how architecture (from connectomics), learning rules (from physiology), and
      task structure (from behavior) jointly determine learned representations.
    advanced: 'This paper provides the theoretical framework for connectome-constrained deep learning models: the brain''s
      wiring specifies architectural constraints, and the objective function plus these constraints determine the representations
      that emerge through learning. This perspective motivates extracting quantitative architectural statistics from connectomes.'
  ocar:
    opportunity: Deep learning models were being increasingly used as models of the brain, but using them effectively required specifying what tasks the brain optimizes and what constraints it operates under — questions that had not been systematically addressed.
    challenge: The space of possible objective functions, architectures, and learning rules is vast, and identifying which combinations produce brain-like representations requires a principled framework rather than ad hoc model selection.
    action: Saxe et al. provided a normative modeling framework arguing that brain architecture (from connectomics), learning rules (from physiology), and task structure (from behavior) jointly determine learned representations, and that all three must be specified to build meaningful brain models.
    resolution: The paper established the theoretical basis for connectome-constrained deep learning, showing that wiring diagrams specify architectural constraints and that the objective function plus these constraints determine emergent representations.
    future_work: Extracting quantitative architectural statistics from connectomics data and testing whether constrained models learn more brain-like representations are the key empirical challenges.
