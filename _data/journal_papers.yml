    beginner: >-
      The fly's visual system is one of the best-studied brain circuits in any animal. This paper provides the complete parts
      list and wiring diagram — every neuron type and every connection — for the entire optic lobe from the FlyWire dataset.
    intermediate: >-
      Matsliah et al. present the complete connectome of the Drosophila optic lobe from FlyWire, identifying all cell types
      and their connectivity. The analysis reveals visual processing pathways, compares circuit architecture across optic
      lobe regions, and identifies conserved versus specialized circuit motifs.
    advanced: >-
      This is the most complete sensory system connectome in an adult animal. The comprehensive cell type catalog and connectivity
      matrix enable systematic comparison with computational models of visual processing and with vertebrate visual circuits
      at the motif level.
  ocar:
    opportunity: >-
      The Drosophila visual system had been studied through partial reconstructions of small circuits, but a complete cell
      type catalog and wiring diagram of the entire optic lobe was needed to understand visual processing as an integrated
      system.
    challenge: >-
      The optic lobe contains highly repetitive columnar circuits making it challenging to identify all cell types, assign
      neurons to types consistently, and map the complete connectivity within and between visual processing stages.
    action: >-
      Matsliah et al. reconstructed the complete optic lobe connectome from the FlyWire dataset, identified all cell types
      and their connectivity, and analyzed visual processing pathways and circuit motifs across optic lobe regions.
    resolution: >-
      The study produced the most complete sensory system connectome in an adult animal, with a comprehensive cell type catalog
      and connectivity matrix enabling systematic comparison with computational models of visual processing.
    future_work: >-
      Comparing visual circuit motifs between flies and vertebrates and using the complete connectome to build and test computational
      models of visual processing are key next steps.
