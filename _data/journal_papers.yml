    summaries:
      beginner: "Synapses are the connection points between neurons, and finding them automatically in brain images is essential for mapping neural circuits. This paper trains a 3D neural network to detect the narrow gaps (clefts) at synapses throughout the entire fruit fly brain, handling the challenge that the images have much lower resolution in one direction."
      intermediate: "Heinrich et al. develop a 3D CNN for synaptic cleft detection in the full adult Drosophila brain (FAFB) dataset, which has highly anisotropic voxel resolution. The architecture uses asymmetric convolution kernels and pooling to match the data's anisotropy. The method achieves high precision and recall across diverse brain regions, enabling brain-wide synapse mapping."
      advanced: "The key architectural adaptation is the use of valid convolutions with anisotropic kernel sizes that respect the roughly 8:1 xy-to-z resolution ratio of the FAFB dataset. The paper addresses the class imbalance between cleft and non-cleft voxels with a combination of balanced sampling and weighted loss. The detected clefts, combined with neuron segmentation, provide the connectivity edges for large-scale circuit analysis in Drosophila."

  - id: becker-2013
    title: "Learning context cues for synapse segmentation"
    authors: "Becker C et al."
    year: 2013
    journal: "IEEE TMI"
    doi: "10.1109/TMI.2012.2211864"
