  summaries:
    beginner: After tracing neurons, you also need to find where they connect — the synapses. This paper describes SyConn,
      an automated system that detects synapses in electron microscopy images and figures out which neurons they connect.
      This saves enormous amounts of manual annotation time.
    intermediate: Dorkenwald et al. present SyConn, a pipeline for automated synaptic connectivity inference from volume EM
      data. The system detects synapses, assigns them to pre- and postsynaptic partners, and classifies synapse types. Performance
      is validated against manual annotations in Drosophila tissue, providing quantitative QA metrics for connectivity accuracy.
    advanced: SyConn demonstrates that synapse detection and partner assignment can be automated with sufficient accuracy
      to support connectomic analysis. The QA framework — precision/recall for synapse detection, partner assignment accuracy,
      and type classification metrics — provides a template for evaluating connectivity inference pipelines. The error analysis
      reveals that partner assignment is the primary accuracy bottleneck.
  ocar:
    opportunity: After neurons were segmented, identifying their synaptic connections still required extensive manual annotation, creating a major bottleneck in turning reconstructions into connectivity maps.
    challenge: Automated synapse detection required not just finding synaptic structures but correctly assigning pre- and postsynaptic partners and classifying synapse types — tasks with high ambiguity in dense neuropil.
    action: Dorkenwald et al. developed SyConn, a pipeline that automatically detects synapses, assigns them to pre- and postsynaptic neuron partners, and classifies synapse types in volume EM data, validated against manual annotations in Drosophila tissue.
    resolution: SyConn demonstrated that synapse detection and partner assignment could be automated with sufficient accuracy to support connectomic analysis, establishing QA metrics (precision/recall for detection, partner accuracy) as a template for evaluating connectivity inference pipelines.
    future_work: Improving partner assignment accuracy, which was identified as the primary bottleneck, and generalizing across species and tissue preparations.
