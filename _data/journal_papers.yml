    ocar:
    opportunity: |
      Automated theorem proving (ATP) could theoretically assist mathematical verification at large scale, but the combination of premise selection and proof search remained too weak to handle the breadth and complexity of a large formal mathematics library like Mizar.
    challenge: |
      Proving 60% of Mizar's 60,000+ theorems automatically required integrating neural premise selection, efficient ATP engines, and iterative self-improvement loops that bootstrap increasingly powerful models from their own generated proof corpora.
    action: |
      The authors combined the E and Vampire ATP systems with ENIGMA (neural guidance for E) and Deepire (deep learning for Vampire), trained on millions of automated proofs in an iterative loop, and applied large-scale premise selection using transformer-based methods to the full Mizar Mathematical Library.
    resolution: |
      The system automatically proved ~60% of Mizar theorems in the hammer setting and ~75% when given the premises from human-written proofs, representing a substantial improvement over prior state-of-the-art and demonstrating the power of iterative self-improvement in AI-assisted mathematics.
    future_work: |
      Bridging the remaining 40% of unprovable theorems and applying these AI-ATP methods to new mathematical domains remain open challenges.
  plain_language_summary: |
    Mathematicians write formal proofs that computers can check — but making computers generate those proofs automatically is much harder. This paper built an AI system that automatically proves about 60% of theorems in a large formal mathematics library, by combining powerful theorem-proving engines with neural networks that learn which mathematical facts are most likely to be useful. While not directly a neuroscience paper, this work is relevant to connectomics as formal reasoning and automated proof methods increasingly appear in scientific data validation.
  summaries:
    beginner: |
        Formal mathematics libraries contain thousands of verified theorems, and mathematicians spend years writing them by hand. This paper built an AI that can automatically generate many of these proofs, using neural networks to guide a classical theorem prover toward useful steps. While this is a computer science paper, automated reasoning methods like these are increasingly applied to verify scientific software and data pipelines.
    intermediate: |
        MizAR 60 combines neural-guided ATP (ENIGMA for E prover, Deepire for Vampire) with transformer-based premise selection in an iterative self-improvement loop. The iterative loop — generate ATP proofs, train on them, generate more proofs, repeat — is a general paradigm for bootstrapping AI performance in domains with formal feedback. This paradigm has analogs in connectomics where automated segmentation models are iteratively improved from human-corrected proofreading data.
    advanced: |
        The iterative self-training paradigm in MizAR 60 is methodologically analogous to active learning loops used in connectomics proofreading, where model predictions are selectively corrected by humans and used to retrain. The transformer-based premise selection can be viewed as a form of retrieval-augmented reasoning, paralleling approaches in scientific literature mining for connectomics. This paper is an outlier in the connectomics citation network and likely appears due to high-citation links between AI methods; its direct relevance is the iterative self-improvement training strategy rather than specific mathematical content.
  discussion_prompts:
  - |
    The iterative self-improvement loop (generate proofs, train, repeat) in MizAR 60 resembles active learning in connectomics proofreading — what are the analogies and differences?
    - |
    How might formal verification methods from automated theorem proving be applied to validate connectomics data pipelines or the logical consistency of circuit-level claims?
    - |
    Premise selection (choosing relevant prior facts) is central to ATP — is there an analogous challenge in connectomics where selecting the right prior context improves automated segmentation or annotation?
    - id: accelerated-em-connectome-reconstruction-using-3d-visualizat
    title: |
    Accelerated EM Connectome Reconstruction using 3D Visualization and Segmentation Graphs
    authors: "Hubbard, Berg, Zhao et al."
    year: 2020
    journal: ""
    doi: 10.1101/2020.01.17.909572
    dimension: proofreading
    reading_phase: 2_core_methods
    composite_score: 0.1926
