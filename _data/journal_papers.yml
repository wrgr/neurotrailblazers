  summaries:
    beginner: Can studying how real brains work help us build better AI? This paper argues yes — that neuroscience can provide
      design principles, learning rules, and architectural ideas that will catalyze the next generation of artificial intelligence.
    intermediate: 'Zador et al. present a manifesto for NeuroAI: the systematic use of neuroscience insights to inspire AI
      advances. They identify specific areas where biology can inform AI: structured architectures, multi-scale learning,
      embodied intelligence, and energy-efficient computation.'
    advanced: 'This position paper from leading NeuroAI researchers identifies the most tractable opportunities for neuroscience-to-AI
      transfer. Key arguments: connectome data can constrain network architectures, developmental programs encode inductive
      biases, and multi-scale circuit motifs can inform modular AI design.'
- id: richards-2019
  title: A deep learning framework for neuroscience
  authors: Richards BA, Lillicrap TP, Beaudoin P, et al.
  year: 2019
  journal: Nature Neuroscience
  doi: 10.1038/s41593-019-0520-2
  dimension: neuroai
  tags:
  - neuroai:deep-learning
  - neuroai:bio-inspired-architecture
  - neuroai:representation-learning
  key_figures:
  - 'Fig. 1: deep learning as neuroscience framework'
  - 'Fig. 2: three levels of understanding'
  discussion_prompts:
  - When should we use deep learning as a model of the brain versus a tool for analyzing brain data?
  - Which deep learning architectures have the strongest biological motivation?
  related_content:
  - /content-library/connectomics/neuroai-bridge/
  summaries:
    beginner: Deep learning has achieved remarkable success in AI. This paper argues it can also serve as a framework for
      understanding real brains — not that the brain is literally a deep neural network, but that the same mathematical principles
      of optimization and representation learning apply.
    intermediate: 'Richards et al. propose that deep learning provides a unifying framework for neuroscience at Marr''s three
      levels: computational (what problems does the brain solve?), algorithmic (what learning rules does it use?), and implementational
      (how are these implemented in neural circuits?). They discuss how connectomics can constrain the implementational level.'
    advanced: 'This paper bridges computational neuroscience and machine learning by arguing that optimization under constraints
      — where connectome architecture provides the constraints — is the right framework for understanding neural computation.
      Key implication for connectomics: wiring diagrams specify the constraint structure that shapes learned representations.'
- id: lillicrap-2020
  title: Backpropagation and the brain
  authors: Lillicrap TP, Santoro A, Marris L, et al.
  year: 2020
  journal: Nature Reviews Neuroscience
  doi: 10.1038/s41583-020-0277-3
  dimension: neuroai
  tags:
  - neuroai:deep-learning
  - neuroai:bio-inspired-architecture
  - neuroai:neural-network
  key_figures:
  - 'Fig. 1: backpropagation vs biological alternatives'
  - 'Fig. 3: feedback alignment'
  discussion_prompts:
  - What connectomics evidence bears on whether the brain implements backpropagation-like credit assignment?
  - How do feedback connection patterns in connectomics data constrain learning rule theories?
  related_content:
  - /content-library/connectomics/neuroai-bridge/
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: Artificial neural networks learn by 'backpropagation' — sending error signals backward through the network.
      But can real brains do this? This review explores whether the brain has its own version of backpropagation and what
      the anatomical evidence says.
    intermediate: Lillicrap et al. review the biological plausibility of backpropagation and alternative credit assignment
      mechanisms. They discuss feedback alignment, target propagation, and dendritic computation as biologically plausible
      learning algorithms, connecting each to anatomical and physiological evidence.
    advanced: 'For connectomics, this paper motivates analysis of feedback connection patterns: are feedback projections random
      (feedback alignment) or structured (backpropagation-like)? The connectivity statistics of top-down versus bottom-up
      pathways in connectome datasets can directly test these theories.'
- id: bassett-2018-models
  title: On the nature and use of models in network neuroscience
  authors: Bassett DS, Zurn P, Gold JI
  year: 2018
  journal: Nature Reviews Neuroscience
  doi: 10.1038/s41583-018-0038-8
  dimension: neuroai
  tags:
  - neuroai:simulation
  - neuroai:connectome-constrained-model
  - connectomics:graph-theory
  - methodology:hypothesis-testing
  key_figures:
  - 'Fig. 1: model taxonomy'
  - 'Fig. 3: explanatory vs predictive models'
  discussion_prompts:
  - Which model claims in connectomics are currently descriptive only? What evidence upgrades them to explanatory?
  - How should connectome-constrained models be validated?
  related_content:
  - /content-library/connectomics/neuroai-bridge/
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: Scientists build simplified models of the brain to understand how it works. This paper explains the different
      types of models — some just describe patterns, some make predictions, and some explain why things work the way they
      do. Knowing the difference is essential for interpreting connectomics research.
    intermediate: 'Bassett et al. provide a taxonomy of models in network neuroscience: descriptive (summarize data), predictive
      (forecast outcomes), and explanatory (identify mechanisms). They argue that most connectomics analyses are descriptive,
      and discuss what additional evidence is needed to move toward explanation.'
    advanced: This paper is essential reading for anyone making claims based on network analysis of connectomes. The model
      taxonomy — and the argument that graph measures are descriptive unless coupled with interventional evidence — provides
      a framework for honest reporting. Particularly relevant for motif analysis and community detection claims.
- id: saxe-2021
  title: If deep learning is the answer, what is the question?
  authors: Saxe A, Nelli S, Summerfield C
  year: 2021
  journal: Nature Reviews Neuroscience
  doi: 10.1038/s41583-020-00395-8
  dimension: neuroai
  tags:
  - neuroai:deep-learning
  - neuroai:representation-learning
  - neuroai:bio-inspired-architecture
  key_figures:
  - 'Fig. 1: normative modeling framework'
  - 'Fig. 3: task-driven representation learning'
  discussion_prompts:
  - How can connectomics data help identify the 'objective functions' that the brain optimizes?
  - Which deep learning architectures best match known brain connectivity patterns?
  related_content:
  - /content-library/connectomics/neuroai-bridge/
  summaries:
    beginner: 'Deep learning is powerful, but to use it to understand the brain, we need to ask the right questions. This
      review argues that the key question is: what tasks does the brain solve, and what constraints does it operate under?
      The wiring diagram is one of those constraints.'
    intermediate: Saxe et al. argue that using deep learning as a model of the brain requires specifying the right objective
      functions and constraints. They discuss how architecture (from connectomics), learning rules (from physiology), and
      task structure (from behavior) jointly determine learned representations.
    advanced: 'This paper provides the theoretical framework for connectome-constrained deep learning models: the brain''s
      wiring specifies architectural constraints, and the objective function plus these constraints determine the representations
      that emerge through learning. This perspective motivates extracting quantitative architectural statistics from connectomes.'
- id: eckstein-2024
  title: Computational evidence for neuroscience
  authors: Eckstein MK, Master SL, et al.
  year: 2024
  journal: Nature Neuroscience
  doi: null
  dimension: neuroai
  tags:
  - neuroai:simulation
  - neuroai:connectome-constrained-model
