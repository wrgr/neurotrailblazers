  - What makes collaborative annotation tools succeed for distributed scientific teams?
  related_content:
  - /content-library/proofreading/proofreading-tools/
  - /content-library/infrastructure/reconstruction-pipeline/
  summaries:
    beginner: >-
      CATMAID is a web-based tool that lets multiple scientists simultaneously trace neurons through brain image stacks. It
      was one of the first collaborative annotation tools and enabled many early connectomics projects.
    intermediate: >-
      CATMAID provides a web-based collaborative environment for skeleton tracing in large EM volumes. Its architecture streams
      image tiles on demand and supports concurrent annotation by distributed teams. It was used for larval Drosophila and
      other connectomics projects.
    advanced: >-
      CATMAID pioneered the web-based collaborative annotation model that influenced subsequent tools. Its skeleton-based
      annotation approach is well-suited for sparse reconstruction but less efficient for dense annotation. The tile-based
      image serving architecture handles petabyte-scale datasets.
  ocar:
    opportunity: >-
      Early connectomics projects required multiple researchers to collaboratively trace neurons through large EM image stacks,
      but there were no web-based tools designed for this distributed annotation workflow.
    challenge: >-
      Serving petabyte-scale image data to multiple simultaneous users over the web while supporting precise skeleton tracing
      required a novel architecture for tile streaming, concurrent access, and annotation management.
    action: >-
      Saalfeld et al. developed CATMAID, a web-based collaborative annotation toolkit that streams image tiles on demand and
      supports concurrent skeleton tracing by distributed teams of annotators.
    resolution: >-
      CATMAID became the standard tool for collaborative neuron tracing in several landmark connectomics projects including
      the larval Drosophila brain, pioneering the web-based collaborative annotation model that influenced all subsequent
      tools.
    future_work: >-
      Integrating automated segmentation with manual skeleton tracing and supporting dense (volume-based) annotation alongside
      sparse (skeleton-based) approaches are natural extensions.
