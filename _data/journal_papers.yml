    ocar:
    opportunity: |
      The emergence of a novel pneumonia of unknown etiology in Wuhan, China in late 2019 required rapid identification of the causative pathogen to inform public health response and guide development of diagnostics and countermeasures.
    challenge: |
      Identifying a novel viral pathogen from clinical samples required deep sequencing, comparative genomics, and rapid sharing of findings — all under the time pressure of an emerging outbreak with pandemic potential.
    action: |
      The authors isolated the novel coronavirus (2019-nCoV, later SARS-CoV-2) from bronchoalveolar lavage fluid of patients with unexplained pneumonia, performed full-genome sequencing, phylogenetic analysis, and characterized its receptor binding, finding close relationship to bat coronaviruses and use of ACE2 as entry receptor.
    resolution: |
      The paper identified SARS-CoV-2 as a novel betacoronavirus phylogenetically related to bat SARS-like coronaviruses, with the ability to use human ACE2 for cell entry. This foundational characterization enabled the global scientific response to COVID-19.
    future_work: |
      Questions about the precise origin and spillover pathway of SARS-CoV-2 from bats to humans, as well as the development of broadly protective coronavirus vaccines, remain open.
  plain_language_summary: |
    When a mysterious pneumonia appeared in China in late 2019, scientists quickly identified the new virus responsible — SARS-CoV-2 — by sequencing its genome and tracing its evolutionary family tree. This paper was one of the first to characterize the new coronavirus, setting the foundation for all subsequent COVID-19 research and the global pandemic response.
  summaries:
    beginner: |
        When a new type of pneumonia appeared in China in 2019, scientists needed to identify what was causing it. This paper sequenced the genome of the new virus (now called SARS-CoV-2) and showed it was a coronavirus related to bat viruses, providing the basic information needed to develop tests and treatments.
    intermediate: |
        This paper reports the isolation and genomic characterization of SARS-CoV-2 from patients with severe pneumonia, demonstrating its phylogenetic relationship to bat SARS-like coronaviruses and its use of ACE2 as a receptor. It established the viral identity that underpins all subsequent COVID-19 diagnostics, therapeutics, and vaccine development.
    advanced: |
        This landmark paper from the Wuhan Institute of Virology reports full-genome sequencing and characterization of the index SARS-CoV-2 isolates. Phylogenetic analysis placed the virus within the bat SARS-like CoV clade, and functional receptor binding studies confirmed ACE2 usage. This paper is included in connectomics bibliographies as a high-citation reference appearing in broad citation networks, rather than being directly relevant to neural circuit reconstruction — illustrating the challenge of citation network analysis in identifying domain-specific influential papers.
  discussion_prompts:
  - |
    Why does a COVID-19 virology paper appear in a connectomics citation network, and what does this reveal about how bibliometric methods identify 'influential' papers across fields?
    - |
    What bioinformatics methods used in viral genomics (phylogenetics, genome assembly) have parallels in connectomics (e.g., neuron tracing, lineage analysis)?
    - |
    How should bibliometric tools for domain-specific literature (like connectomics) handle highly-cited papers from tangential fields that appear through citation co-occurrence?
    - id: i-the-structure-of-scientific-revolutions-i
    title: "<i>The Structure of Scientific Revolutions</i>"
    authors: "Kühn, Schlegel"
    year: 1963
    journal: ""
    doi: 10.1063/1.3050879
    dimension: review
    reading_phase: 1_foundations
    composite_score: 0.085
