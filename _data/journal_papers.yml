      - "Fig. 3: volume comparison with conventional FIB-SEM"
      - "Fig. 5: biological samples at isotropic resolution"
    discussion_prompts:
      - "At what volume scale does isotropy outweigh throughput advantage of ATUM-SEM?"
      - "How do you choose between isotropy and volume when designing a connectomics experiment?"
    related_content:
      - /content-library/imaging/em-principles/
      - /content-library/imaging/tissue-preparation/
    summaries:
      beginner: "Regular FIB-SEM produces beautiful 3D images with equal resolution in all directions, but can only image tiny volumes. This paper describes engineering improvements that increased the imageable volume by more than 100-fold, making FIB-SEM practical for imaging entire brain regions."
      intermediate: "Xu et al. describe engineering improvements to FIB-SEM enabling continuous imaging over weeks to months, producing volumes exceeding 10⁶ μm³ at 8 nm isotropic resolution. Key innovations include automated FIB milling error detection, improved beam stability, and optimized sample preparation. This platform produced the Janelia hemibrain dataset."
      advanced: "The engineering contributions — fault recovery, drift compensation, long-term beam stability — enabled the hemibrain and subsequent FIB-SEM connectomics. The system achieves 4-8 nm isotropic voxels over ~10⁶ μm³. Compare: FAFB achieved 10x larger volume at 10x worse z-resolution; the hemibrain achieved 10x better z-resolution at 10x smaller volume."

  - id: hayworth-2015
    title: "Ultrastructurally-smooth thick partitioning and volume stitching for large-scale connectomics"
    authors: "Hayworth KJ, Xu CS, Lu Z, et al."
    year: 2015
    journal: "Nature Methods"
    doi: "10.1038/nmeth.3292"
    dimension: imaging
    tags:
      - imaging:ATUM
      - imaging:serial-section
      - data-storage:pipeline
      - data-storage:alignment
      - methodology:experimental-design
    key_figures:
      - "Fig. 1: hot knife sectioning"
      - "Fig. 2: slab-to-slab stitching"
    discussion_prompts:
      - "What are the error modes specific to slab-to-slab stitching?"
      - "How does this approach change the cost-benefit analysis for very large volumes?"
    related_content:
      - /content-library/infrastructure/reconstruction-pipeline/
      - /content-library/imaging/acquisition-qa/
    summaries:
      beginner: "Cutting brain tissue into thousands of ultra-thin slices is slow and error-prone. This paper developed a method to cut slightly thicker slices, image them from both sides, and computationally stitch the results. This makes it possible to image larger brain volumes faster."
      intermediate: "Hayworth et al. developed 'hot knife' thick-section partitioning: a heated diamond blade cuts resin-embedded tissue into ~20 μm thick slabs with minimal surface damage. Each slab is then sectioned conventionally for ATUM-SEM, and sub-volumes are computationally stitched. This enables parallelized imaging across multiple microscopes."
      advanced: "The volume stitching approach relaxes the single greatest reliability constraint in serial section connectomics — the requirement for unbroken section series. By accepting controlled cuts at ~20 μm intervals, the method tolerates lost sections within slabs and enables multi-microscope parallelism. This approach was used in the MICrONS mm³ volume acquisition pipeline."

