  summaries:
    beginner: >-
      Scikit-learn is a free Python toolkit that provides ready-to-use machine learning methods. Scientists use it to sort
      neurons into types, find patterns in connectivity data, or predict which neurons are active based on their features.
      It is the go-to tool for classical (non-deep-learning) analysis in neuroscience data.
    intermediate: >-
      Scikit-learn's consistent API (fit/predict/transform estimator interface) enables composable pipelines for connectomics
      data analysis. Common applications include: k-means and DBSCAN clustering of cell morphologies, PCA/UMAP dimensionality
      reduction of connectivity vectors, random forest classification of cell types from morphological features, and cross-validation
      of predictive models on connectome graph features. The library's preprocessing tools (StandardScaler, FeatureHasher)
      are also widely used for preparing connectivity matrices for downstream analysis.
    advanced: >-
      Scikit-learn's codebase is notably well-tested (extensive test suite) and consistently documented, making it a reliable
      dependency for reproducible scientific pipelines. Key limitations for connectomics: designed for tabular/vector data,
      not natively suited for graph-structured inputs (requiring feature extraction from graphs before use), and CPU-only
      (for GPU-accelerated analogs, RAPIDS/cuML is preferred). The library's model_selection module (cross_val_score, GridSearchCV)
      is important for avoiding overfitting when fitting cell-type classifiers on small ground-truth neuron sets, a common
      challenge in connectomics studies where labeled examples are scarce.
  ocar:
    opportunity: >-
      Python lacked a cohesive, accessible machine learning library that integrated a broad range of algorithms with a consistent
      API, leaving scientists — including neuroscientists working on connectomics data — to assemble ad hoc collections of
      disparate packages.
    challenge: >-
      Building a library that covered supervised, unsupervised, and model selection methods with uniform interfaces, minimal
      dependencies, cross-platform compatibility, and high-quality documentation required coordinating contributions from
      many developers while maintaining rigorous software engineering standards.
    action: >-
      Pedregosa et al. developed scikit-learn, a Python machine learning library built on NumPy, SciPy, and matplotlib, providing
      implementations of classification, regression, clustering, dimensionality reduction, and model selection algorithms
      with a consistent estimator API and extensive documentation.
    resolution: >-
      Scikit-learn became the dominant Python machine learning library for non-neural-network methods, providing a stable
      foundation for cell-type classification, cluster analysis, dimensionality reduction, and statistical modeling in connectomics
      and computational neuroscience.
    future_work: >-
      Scaling to GPU computation and integrating with deep learning frameworks remain areas where scikit-learn relies on complementary
      tools.
  plain_language_summary: >-
    Scikit-learn is the standard toolkit for machine learning in Python — it includes everything from clustering and dimensionality
    reduction to classification and regression in one consistent package. In connectomics and neuroscience, it is used for
    tasks like classifying neuron types, clustering cells by morphology, and reducing the dimensionality of connectivity matrices
    to find patterns.
