    intermediate: >-
      neuPrint provides a graph-database backend (Neo4j) and a React-based web frontend for querying the hemibrain connectome,
      supporting neuron search by name, body ID, or connectivity pattern, as well as downstream analysis via a Python API
      (neuprint-python). The system stores synapse-level connectivity, morphological skeletons, and cell-type annotations,
      and exposes Cypher queries for advanced users. Its open deployment significantly accelerated secondary analysis of the
      hemibrain dataset.
    advanced: >-
      neuPrint's graph schema represents neurons as nodes with properties (soma location, cell type, neurotransmitter) and
      synaptic connections as weighted edges, enabling efficient traversal queries in Neo4j's Cypher language. A key architectural
      decision was to pre-aggregate synapse counts into connection weights to reduce query latency at scale. Caveats include
      the fact that connectivity data quality depends on proofreading completeness, and neuPrint does not natively support
      multi-connectome comparative queries. The neuprint-python client enables reproducible programmatic analysis and has
      become a standard interface for the Drosophila connectomics community.
  ocar:
    opportunity: >-
      As large-scale EM connectomics datasets such as the Drosophila hemibrain became available, the field lacked an open,
      accessible platform for neuroscientists without bioinformatics expertise to query, visualize, and analyze connectome
      data at scale.
    challenge: >-
      Connectome graphs containing tens of thousands of neurons and millions of synapses require specialized graph database
      infrastructure and web interfaces that are not part of standard neuroscience toolkits, creating a barrier between data
      producers and the broader community.
    action: >-
      The authors developed neuPrint, an open-access web application and API backed by a Neo4j graph database storing neuron
      morphologies, connectivity, and metadata. They implemented query interfaces for connectivity lookup, cell-type analysis,
      and graph exploration, and deployed it publicly for the hemibrain and other datasets.
    resolution: >-
      neuPrint was released as a freely accessible tool that enables any researcher to query the hemibrain connectome through
      a browser or programmatic API without requiring local data downloads or specialized database skills. It has become the
      primary access point for the Janelia hemibrain dataset and has been adopted for other connectomes.
    future_work: >-
      Scaling neuPrint to whole-brain vertebrate connectomes and integrating functional data with structural connectivity
      remain open engineering and scientific challenges.
  plain_language_summary: >-
    Think of a connectome as a massive wiring diagram of the brain — thousands of neurons connected by millions of synapses.
    This paper describes a freely available website and programming interface (neuPrint) that lets scientists explore and
    query that wiring diagram without needing to be database engineers. It is like giving every neuroscientist a Google Maps
    for the fly brain.
