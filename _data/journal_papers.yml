      journal={Frontiers in Neuroinformatics},
      volume={16},
      pages={828787},
      year={2022},
      doi={10.3389/fninf.2022.828787}
    }
  plaintext_citation: "Hider, R. Jr., Kleissas, D., Gion, T., et al. (2022). BossDB: A cloud-native approach for petascale neuroscience discovery. Frontiers in Neuroinformatics, 16, 828787."
  code_url: https://github.com/jhuapl-boss/boss
  data_url: https://bossdb.org/

- id: sanchez-2022-metadata
  title: Connectomics annotation metadata standardization for increased accessibility and queryability
  authors: Sanchez M, Moore D, Johnson EC, Wester B, Lichtman JW, Gray-Roncal W
  year: 2022
  journal: Frontiers in Neuroinformatics
  doi: 10.3389/fninf.2022.828458
  dimension: data-storage
  also_dimensions: [methodology]
  tags:
  - data-storage:metadata
  - data-storage:data-management
  - data-storage:data-format
  - methodology:reproducibility
  - methodology:open-science
  key_figures:
  - 'Fig. 1: annotation metadata schema'
  - 'Fig. 2: cross-dataset query examples'
  discussion_prompts:
  - What metadata standards are needed to enable cross-dataset comparison in connectomics?
  - How should annotation provenance be tracked to support reproducibility?
  related_content:
  - /content-library/infrastructure/provenance-and-versioning/
  - /content-library/infrastructure/data-formats/
  summaries:
    beginner: When different labs create brain wiring diagrams, they often describe their data in
      different ways, making it hard to combine or compare results. This paper proposes a standard
      way to label and describe connectomics annotations so that data from different projects can
      be searched and compared easily.
    intermediate: Sanchez, Gray-Roncal et al. propose standardized annotation metadata types for
      connectomics data, building on the RAMON schema. The standard defines consistent metadata
      fields for neurons, synapses, and other annotations, enabling cross-dataset queries and
      automated quality checks. Applied to multiple EM datasets to demonstrate interoperability.
    advanced: Metadata standardization is a prerequisite for the cross-dataset comparison that
      connectomics increasingly requires. This paper identifies the minimum metadata fields needed
      for annotation interoperability, proposes a schema that balances expressiveness with
      adoption simplicity, and demonstrates cross-dataset queries. The work directly supports
      reproducibility and the FAIR data principles in connectomics.
  ocar:
    opportunity: As multiple connectomics projects produced datasets with different annotation conventions, the lack of standardized metadata made it difficult to search, compare, or combine results across projects.
    challenge: Defining a metadata standard required balancing expressiveness (capturing all relevant information) with simplicity (encouraging adoption), while supporting the diverse annotation types (neurons, synapses, regions) used across connectomics projects.
    action: Sanchez, Gray-Roncal et al. proposed standardized annotation metadata types for connectomics building on the RAMON schema, defining consistent fields for neurons, synapses, and other annotations, and demonstrated cross-dataset queries on multiple EM datasets.
    resolution: The metadata standard enables cross-dataset queries and automated quality checks, directly supporting reproducibility and the FAIR data principles in connectomics by making annotations from different projects searchable and comparable.
    future_work: Achieving broad adoption of the standard across the connectomics community and extending it to support emerging annotation types (e.g., functional data, cell type labels) are ongoing priorities.
  bibtex: >-
    @article{sanchez2022connectomics,
      title={Connectomics annotation metadata standardization for increased accessibility and queryability},
      author={Sanchez, Morgan and Moore, Daniel and Johnson, Erik C and Wester, Brock and Lichtman, Jeff W and Gray-Roncal, William},
      journal={Frontiers in Neuroinformatics},
      volume={16},
      pages={828458},
      year={2022},
      doi={10.3389/fninf.2022.828458}
    }
  plaintext_citation: "Sanchez, M., Moore, D., Johnson, E. C., Wester, B., Lichtman, J. W., & Gray-Roncal, W. (2022). Connectomics annotation metadata standardization for increased accessibility and queryability. Frontiers in Neuroinformatics, 16, 828458."
  code_url: null
  data_url: null
