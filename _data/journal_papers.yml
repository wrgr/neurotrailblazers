  summaries:
    beginner: This paper describes how scientists imaged an entire adult fruit fly brain at nanometer resolution — about 21
      million images stitched together. The fruit fly brain is tiny but contains about 100,000 neurons. This dataset became
      the foundation for mapping the fly's entire wiring diagram.
    intermediate: 'Zheng et al. produced the FAFB dataset using ATUM-SEM: serial sections collected on tape, then imaged across
      multiple SEMs. The dataset spans the entire Drosophila brain at ~4x4x40 nm voxels (~21 million tiles, ~50 TB). Key technical
      achievements include section continuity over ~7,000 sections and multi-microscope parallelization.'
    advanced: 'The FAFB acquisition pipeline illustrates petascale EM challenges: section loss mitigation (only 36 of ~7,000
      sections unusable), tape-based ATUM collection enabling re-imaging, and multi-microscope parallelization. The anisotropic
      voxels create z-resolution limitations for thin-process tracing. Compare with the Janelia hemibrain (FIB-SEM, isotropic
      8 nm, smaller volume, better z-resolution).'
  ocar:
    opportunity: No complete EM volume of an adult insect brain existed, limiting the ability to map whole-brain neural circuits at synaptic resolution. The adult Drosophila brain, with approximately 100,000 neurons, was a key target for comprehensive connectomics.
    challenge: Imaging an entire adult fly brain at nanometer resolution required acquiring and assembling roughly 21 million image tiles across approximately 7,000 serial sections, demanding unprecedented scale in section collection, multi-microscope imaging, and computational stitching.
    action: Zheng et al. used ATUM-SEM to collect serial sections of a complete adult Drosophila brain on tape, imaged them across multiple scanning electron microscopes in parallel, and computationally assembled the resulting ~50 TB dataset (the FAFB volume) at 4x4x40 nm voxel resolution.
    resolution: The FAFB dataset provided the first complete EM volume of an adult brain at synaptic resolution, enabling subsequent whole-brain connectome reconstruction efforts including the FlyWire project. Only 36 of approximately 7,000 sections were unusable.
    future_work: The 10x anisotropy in z-resolution posed challenges for tracing fine processes, motivating future isotropic imaging approaches for similar volumes.
