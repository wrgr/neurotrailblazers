    opportunity: The MICrONS cubic-millimeter connectome dataset offered the first opportunity to classify inhibitory interneurons using both morphological and dense synaptic connectivity features, going beyond what any single modality could achieve alone.
    challenge: Inhibitory neuron subtypes often look morphologically similar, and incomplete proofreading of dendritic and axonal arbors introduces noise into connectivity-based features. Defining robust classification features that tolerate reconstruction errors was a key challenge.
