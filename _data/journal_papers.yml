  title: A deep learning framework for neuroscience
  authors: Richards BA, Lillicrap TP, Beaudoin P, et al.
  year: 2019
  journal: Nature Neuroscience
  doi: 10.1038/s41593-019-0520-2
  dimension: neuroai
  tags:
  - neuroai:deep-learning
  - neuroai:bio-inspired-architecture
  - neuroai:representation-learning
  key_figures:
  - 'Fig. 1: deep learning as neuroscience framework'
  - 'Fig. 2: three levels of understanding'
  discussion_prompts:
  - When should we use deep learning as a model of the brain versus a tool for analyzing brain data?
  - Which deep learning architectures have the strongest biological motivation?
  related_content:
  - /content-library/connectomics/neuroai-bridge/
  summaries:
    beginner: Deep learning has achieved remarkable success in AI. This paper argues it can also serve as a framework for
      understanding real brains — not that the brain is literally a deep neural network, but that the same mathematical principles
      of optimization and representation learning apply.
    intermediate: 'Richards et al. propose that deep learning provides a unifying framework for neuroscience at Marr''s three
      levels: computational (what problems does the brain solve?), algorithmic (what learning rules does it use?), and implementational
      (how are these implemented in neural circuits?). They discuss how connectomics can constrain the implementational level.'
    advanced: 'This paper bridges computational neuroscience and machine learning by arguing that optimization under constraints
      — where connectome architecture provides the constraints — is the right framework for understanding neural computation.
      Key implication for connectomics: wiring diagrams specify the constraint structure that shapes learned representations.'
  ocar:
    opportunity: Deep learning had achieved remarkable success in AI, but neuroscience lacked a coherent framework for using deep learning principles to understand how real brains compute and represent information.
    challenge: Applying deep learning as a model of the brain requires reconciling artificial network properties with biological reality, and specifying which aspects of deep learning are genuinely relevant at each of Marr's three levels of analysis.
    action: Richards et al. proposed that deep learning provides a unifying framework for neuroscience at all three of Marr's levels — computational, algorithmic, and implementational — and argued that connectome architecture provides the constraints under which neural optimization occurs.
    resolution: The paper established the conceptual bridge between deep learning and neuroscience, with the key insight that wiring diagrams from connectomics specify the constraint structure that shapes learned representations, motivating the connectome-constrained modeling approach.
    future_work: Developing methods to extract the relevant architectural constraints from connectomics data and testing whether deep learning models with biological constraints learn more brain-like representations are key next steps.
