      - "Fig. 2: calibration curve"
    discussion_prompts:
      - "Does your automated pipeline account for section-to-section thickness variation?"
      - "What other structures could serve as internal calibration references?"
    related_content:
      - /content-library/imaging/em-principles/
      - /content-library/infrastructure/reconstruction-pipeline/
    summaries:
      beginner: "When scientists cut brain tissue into very thin slices for electron microscopy, they need to know exactly how thick each slice is to build accurate 3D reconstructions. This paper describes a clever method for measuring slice thickness by looking at tube-shaped structures (microtubules) that run through the tissue at known diameters."
      intermediate: "Fiala and Harris present a calibration method exploiting the known ~25 nm diameter of microtubules to estimate section thickness from their elliptical profiles in oblique sections. This addresses a chronic problem in serial section EM: nominal microtome settings often differ from actual section thickness by 10-30%."
      advanced: "This paper is important for anyone working on alignment and voxel calibration in serial section datasets. The statistical framework provides a principled alternative to fold-based or interference-based calibration. Modern connectomics pipelines should incorporate analogous calibration steps, particularly for ATUM-SEM where section thickness variation can be significant."

