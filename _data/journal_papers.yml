- id: zalesky-2010
  title: "Network-based statistic: identifying differences in brain networks"
  authors: Zalesky A, Fornito A, Bullmore ET
  year: 2010
  journal: NeuroImage
  doi: 10.1016/j.neuroimage.2010.06.041
  dimension: network-analysis
  tags:
  - "network-analysis:network-based-statistic"
  - "network-analysis:statistical-testing"
  - "mri-connectomics:functional-connectivity"
  key_figures:
  - "Fig. 1: NBS procedure"
  - "Fig. 3: power comparison with mass univariate"
  discussion_prompts:
  - How should the NBS approach be adapted for EM connectomics with directed, weighted edges?
  - What are the assumptions of NBS, and when might they be violated?
  related_content:
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: >-
      When comparing brain networks between groups (e.g., patients vs. controls), testing each connection individually leads
      to too many false positives. NBS solves this by looking for connected clusters of edges that differ together, controlling
      the overall error rate.
    intermediate: >-
      Zalesky et al. introduce the network-based statistic (NBS) — a method for identifying connected subnetworks that differ
      between groups while controlling family-wise error rate. NBS is more powerful than individual edge testing for detecting
      distributed effects.
    advanced: >-
      NBS adapts cluster-based thresholding from neuroimaging to network analysis. The method tests whether connected components
      of supra-threshold edges are larger than expected by chance. For EM connectomics, NBS could be adapted for comparing
      connectomes across conditions, time points, or genotypes.
  ocar:
    opportunity: >-
      Comparing brain networks between groups (patients vs controls, pre- vs post-treatment) required testing thousands of
      connections simultaneously, but standard approaches either lacked statistical power or produced excessive false positives.
    challenge: >-
      The massive multiple-comparisons problem in network-level testing meant that edge-wise corrections were too conservative,
      while uncorrected tests produced unreliable results. A method was needed that exploited network structure to boost power.
    action: >-
      Zalesky et al. developed the network-based statistic (NBS), which identifies connected subnetworks of edges that differ
      between groups while controlling the family-wise error rate, adapting cluster-based thresholding from neuroimaging to
      graph data.
    resolution: >-
      NBS provides substantially greater statistical power than edge-wise testing for detecting distributed network differences,
      and has become the standard method for group comparison in MRI connectomics studies.
    future_work: >-
