  summaries:
    beginner: The brain can be studied as a network — neurons as dots, connections as lines. This influential review introduces
      basic tools from network science and shows how they apply to brain data. Key ideas include small-world properties, hub
      neurons, and modular communities.
    intermediate: Bullmore and Sporns provide a comprehensive introduction to graph-theoretic analysis of brain networks at
      multiple scales. They cover degree distribution, clustering, path length, betweenness centrality, and modularity, and
      discuss small-world architecture and hub organization.
    advanced: 'While focused on macroscale connectomics, this review established the analytical vocabulary now applied to
      nanoscale EM connectomes. Critical points: the importance of null models, scale dependence of network measures, and
      the call for standardized analysis pipelines.'
