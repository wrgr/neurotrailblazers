- id: li-2011
  title: "RSEM: accurate transcript quantification from RNA-Seq data with or without a reference genome"
  authors: Bo Li, Colin N. Dewey
  year: 2011
  journal: ''
  doi: 10.1186/1471-2105-12-323
  dimension: computer-vision-ml
  tags:
  - "tool:rsem"
  - "method:rna-seq"
  - "method:transcript-quantification"
  - "method:em-algorithm"
  - "data:transcriptomics"
  - "software:open-source"
  discussion_prompts:
  - >-
    When does transcript-level quantification with RSEM provide substantially different conclusions than gene-level count-based
    methods, and in what neuroscience contexts does this matter most?
  - >-
    How should uncertainty in transcript abundance estimates from RSEM be propagated into downstream differential expression
    analyses?
  - >-
    What are the practical differences between RSEM's full probabilistic model and faster pseudoalignment methods like Kallisto
    or Salmon for typical single-cell RNA-seq analyses in neuroscience?
  summaries:
    beginner: >-
      Genes can produce different versions of their RNA, called transcripts. When scientists sequence all the RNA in a cell,
      figuring out how much of each transcript version is present is tricky because many transcripts share overlapping sequences.
      RSEM solves this by using statistics to make the best guess about each transcript's abundance.
    intermediate: >-
      RSEM implements an EM algorithm over a generative model of RNA-Seq read generation, accounting for read start position
      biases, fragment length distributions, and multi-mapping reads that align to multiple transcripts. This provides accurate
      transcript-level (not just gene-level) quantification with uncertainty estimates, which is critical for alternative
      splicing analysis in neuroscience, where isoform diversity is particularly high.
    advanced: >-
      RSEM's generative model explicitly handles multi-mapping reads through fractional assignment based on estimated transcript
      abundances, iterating until convergence. In the context of neuroscience, where the transcriptome has exceptional complexity
      due to alternative splicing (particularly in ion channels and synaptic proteins), transcript-level quantification is
      essential. RSEM's uncertainty estimates (posterior standard deviations of abundance estimates) are often overlooked
      in downstream analyses, representing a source of propagated uncertainty in differential expression studies. Modern pseudoalignment
      methods are faster but sacrifice the principled probabilistic treatment that makes RSEM's estimates more accurate for
      lowly expressed or closely related transcripts.
  ocar:
    opportunity: >-
      Quantifying gene expression levels from RNA sequencing data requires accurate estimation of transcript abundances, including
      from alternatively spliced isoforms, a task for which robust tools were lacking in the early days of RNA-Seq.
    challenge: >-
      Multiple transcript isoforms sharing exons create an identifiability problem — reads mapping to shared regions cannot
      be unambiguously assigned to individual transcripts, requiring probabilistic models to estimate isoform-level abundances.
    action: >-
      The authors developed RSEM, an R/command-line software package that uses expectation-maximization to estimate transcript
      abundances from RNA-Seq reads, working with or without a reference genome and explicitly modeling read mapping uncertainty.
    resolution: >-
      RSEM provides accurate transcript-level quantification with confidence intervals, performs well in benchmarks against
      other quantification tools, and handles the multi-mapping problem more robustly than read-counting approaches. It became
      a widely used tool for transcriptomics in neuroscience and beyond.
    future_work: >-
      Pseudoalignment methods (Kallisto, Salmon) subsequently offered faster approximate quantification; RSEM's full probabilistic
      model remains valuable when accuracy and uncertainty quantification are critical.
  plain_language_summary: >-
    RNA sequencing measures which genes are active in cells, but the raw data doesn't directly tell you how much of each gene's
    different variants (transcripts) are present. RSEM is a software tool that solves this puzzle using probabilistic reasoning,
    accurately estimating the abundance of each transcript even when multiple variants share overlapping sequences.
