    ocar:
    opportunity: |
      Complete synaptic-resolution connectomics of the entire Drosophila brain requires imaging the whole brain with FIB-SEM, but sample preparation methods that preserve ultrastructure while enabling efficient whole-brain FIB-SEM imaging were lacking.
    challenge: |
      FIB-SEM imaging of a whole Drosophila brain requires the specimen to be embedded and mechanically stable over months of continuous milling, while maintaining sufficient heavy-metal staining contrast throughout the entire volume for automated segmentation.
    action: |
      The authors developed an optimized en bloc preparation protocol for Drosophila brains that combines enhanced chemical fixation, heavy metal staining with osmium tetroxide and uranyl acetate, and epoxy embedding designed for high-throughput FIB-SEM imaging, validating the protocol across multiple specimens.
    resolution: |
      The protocol yields reliable, high-contrast specimens suitable for continuous FIB-SEM imaging at the scale of a complete Drosophila brain, enabling the acquisition of the full-brain connectomics datasets used in the Flywire and FAFB projects. The method significantly increased throughput and reproducibility of brain preparation for connectomics.
    future_work: |
      Adapting en bloc preparation protocols to larger nervous systems (larval zebrafish, mouse cortical regions) while maintaining equivalent staining uniformity remains an active sample preparation challenge.
  plain_language_summary: |
    Imaging an entire fly brain with an electron microscope requires the brain to be prepared in a very specific way — chemically preserved, stained with heavy metals, and embedded in plastic. This paper developed an optimized recipe for this preparation that enabled the high-throughput imaging needed to map the complete fly brain connectome.
  summaries:
    beginner: |
        Before imaging a brain with an electron microscope, scientists need to preserve it, stain it with metals so it shows up under the electron beam, and embed it in plastic. This paper describes the best recipe for doing this with fly brains, enabling the kind of large-scale brain mapping that produced the complete fly connectome.
    intermediate: |
        The en bloc preparation protocol described here is critical for whole-brain FIB-SEM connectomics, as contrast quality and staining uniformity throughout the volume directly affect automated segmentation performance. The optimized protocol addresses a key practical bottleneck: many brain preparations fail during multi-month FIB-SEM acquisition due to charging, delamination, or inhomogeneous staining.
    advanced: |
        The protocol combines formaldehyde-glutaraldehyde fixation, reduced osmium tetroxide with potassium ferrocyanide, thiocarbohydrazide enhancement, lead aspartate staining, and Epon embedding — a sequence developed to maximize membrane contrast for automated segmentation. Key technical challenges addressed include achieving uniform staining throughout the entire brain volume (avoiding the staining gradients common in larger specimens) and maintaining sample conductivity to prevent beam charging during months-long FIB-SEM acquisition. The paper's contribution is in reproducible protocol optimization rather than conceptual novelty, but its practical impact on connectomics throughput was substantial.
  discussion_prompts:
  - |
    What are the specific ultrastructural artifacts introduced by suboptimal en bloc preparation, and how do they affect automated segmentation accuracy?
    - |
    How does the en bloc protocol described here compare to cryo-based sample preparation approaches — what are the tradeoffs for large-volume connectomics?
    - |
    What modifications to this protocol would be needed to scale en bloc preparation to larger nervous systems like larval zebrafish or a mouse cortical column?
    - id: an-integrated-encyclopedia-of-dna-elements-in-the-human-geno
    title: "An integrated encyclopedia of DNA elements in the human genome"
    authors: "Foissac"
    year: 2012
    journal: ""
