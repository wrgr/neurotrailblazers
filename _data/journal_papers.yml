    action: Zeng and Sanes provided a comprehensive framework for cell type classification across modalities, arguing that no single modality is sufficient and that classification granularity must be matched to the question.
    resolution: The review established the intellectual framework used to interpret cell type assignments in connectomics datasets, highlighting the critical tension between lumping and splitting.
    future_work: Whether connectivity-defined types from EM data correspond to transcriptomically defined types remains an active and important open question.
