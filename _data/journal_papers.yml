  - /content-library/imaging/tissue-preparation/
  summaries:
    beginner: >-
      This paper invented a new way to image brain tissue in 3D. Instead of cutting tissue into slices separately, the authors
      built a miniature cutting device inside the microscope itself. After imaging the surface, the device shaves off a thin
      layer and images the new surface — repeat thousands of times to build a 3D picture.
    intermediate: >-
      Denk and Horstmann introduced serial block-face SEM (SBEM), where an ultramicrotome inside an SEM chamber iteratively
      sections and images a resin-embedded tissue block. This eliminates section collection and handling, dramatically reducing
      alignment errors. SBEM became one of the two dominant imaging modalities for large-scale connectomics.
    advanced: >-
      The key engineering insight was that back-scattered electron imaging of the block face provides sufficient contrast
      from heavy-metal-stained tissue without requiring transmitted electrons. SBEM provides isotropic-ish voxels but sections
      are destroyed during imaging. Beam damage accumulates in deeper layers. Compare with FIB-SEM for true isotropic voxels
      and ATUM-SEM for section preservation.
  ocar:
    opportunity: >-
      Serial section electron microscopy could reveal neuronal ultrastructure in 3D, but the manual cutting and collection
      of individual sections limited scalability and introduced alignment artifacts between sections.
    challenge: >-
      Combining an ultramicrotome with a scanning electron microscope required solving engineering problems including beam
      damage, section removal inside the vacuum chamber, and maintaining contrast without transmitted electrons.
    action: >-
      Denk and Horstmann built a miniature ultramicrotome inside an SEM chamber that iteratively cut and imaged the block
      face using backscattered electrons from heavy-metal-stained tissue, eliminating manual section handling entirely.
    resolution: >-
      The resulting serial block-face SEM (SBEM) technique automated 3D volume acquisition and became one of the dominant
      imaging modalities for large-scale connectomics, enabling datasets like the retinal connectome.
    future_work: >-
      Key open questions include managing cumulative beam damage in deeper tissue layers and extending the technique to volumes
      large enough for circuit-level analysis in mammalian cortex.
