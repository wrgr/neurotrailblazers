    ocar:
    opportunity: |
      Achieving the imaging throughput required for petabyte-scale connectomics projects — such as mapping large mammalian cortical volumes — demanded automated TEM pipelines far beyond the capacity of existing instruments.
    challenge: |
      Building a petascale TEM imaging pipeline requires parallelizing electron microscope operation, developing automated section loading and sample exchange, and creating data management infrastructure that can reliably sustain continuous terabyte-per-day acquisition over months.
    action: |
      The authors built a multi-TEM imaging pipeline operating in parallel with automated section handling and a custom data management stack, demonstrating sustained petabyte-scale image acquisition for neuronal circuit mapping.
    resolution: |
      The pipeline achieved sustained imaging throughput sufficient for petabyte-scale datasets, demonstrated on large tissue volumes relevant to mammalian cortical connectomics. This established the production-scale infrastructure for projects like the H01 human cortex dataset and MICrONS mouse visual cortex reconstruction.
    future_work: |
      Further throughput increases require multi-beam TEM configurations, improved section handling robotics, and better integration of real-time quality control to minimize data loss during extended acquisition campaigns.
  plain_language_summary: ""
  summaries:
    beginner: |
        Mapping a large piece of brain tissue with an electron microscope requires an extraordinary number of images. This study built a system where multiple electron microscopes work together automatically, handling samples and taking images around the clock, making it possible to collect enough data for very large brain mapping projects.
    intermediate: |
        This paper describes a petascale automated TEM imaging pipeline using parallel multi-microscope operation with automated section handling and data management. The system achieves terabyte-per-day throughput, enabling acquisition of petabyte-scale EM volumes for large mammalian circuit mapping projects, including the MICrONS and H01 datasets.
    advanced: |
        The pipeline combines ATUM-based serial section collection with automated loading into a bank of parallel TEMs, coordinated by a custom LIMS and data management system. Sustained throughput of ~1.2 TB/day per TEM across a multi-TEM farm enables petabyte acquisition over months. Quality monitoring at scale is a key operational challenge — detecting focus, astigmatism, or section defects in real time requires automated image quality assessment integrated into the acquisition loop. The major remaining bottleneck is downstream automated segmentation throughput rather than imaging.
  discussion_prompts:
  - |
    What are the key bottlenecks in a petabyte-scale TEM imaging pipeline beyond the microscope itself, and how does each bottleneck affect the overall throughput?
    - |
    How does the data quality management challenge scale from small to petabyte datasets — what failure modes become dominant at large scale that were negligible before?
    - |
    How does the throughput of the multi-TEM approach described here compare to multi-beam SEM systems, and for which applications is each preferred?
    - id: a-petavoxel-fragment-of-human-cerebral-cortex-reconstructed
    title: |
    A petavoxel fragment of human cerebral cortex reconstructed at nanoscale resolution
    authors: "Shapson-Coe, Januszewski, Berger et al."
    year: 2024
    journal: ""
    doi: 10.1126/science.adk4858
    dimension: connectomics
    reading_phase: 4_frontiers
    composite_score: 0.3047
