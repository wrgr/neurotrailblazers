  ocar:
    opportunity: >-
      Spatial transcriptomics — mapping which genes are expressed where in tissue — required methods that could identify many
      RNA targets simultaneously within intact cells. Existing in situ hybridization methods were limited in multiplexing
      capacity or required reverse transcription steps that introduced complexity.
    challenge: >-
      Achieving highly multiplexed, spatially resolved RNA detection in single cells required a method that could reliably
      identify many target RNAs with low background, without reverse transcription, and with sufficient sensitivity to detect
      low-abundance transcripts across diverse cell and tissue types.
    action: >-
      The authors developed BOLORAMIS (Barcoded Oligonucleotides Ligated On RNA Amplified for Multiplexed and parallel In
      Situ analyses), a reverse-transcription-free method using padlock probes and rolling circle amplification to detect
      specific RNA sequences in situ with barcoded readout. They validated the method in diverse cell types and human cerebral
      organoids.
    resolution: >-
      BOLORAMIS enabled targeted, multiplexed in situ RNA detection with high specificity and sensitivity in both coding and
      non-coding RNAs. The method was validated in human cell lines and brain organoids, providing a tool for spatially resolved
      transcriptomic characterization relevant to cell-type identification in neuroscience.
    future_work: >-
      Scaling BOLORAMIS to genome-wide coverage and integrating it with structural imaging for combined transcriptomic and
      connectomic characterization would extend its impact significantly.
  plain_language_summary: >-
    To understand what type a cell is, scientists look at which genes are active inside it. This paper developed a method
