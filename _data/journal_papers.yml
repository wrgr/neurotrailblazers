- id: lyzinski-2016
  title: "Graph matching: Relax at your own risk"
  authors: Lyzinski V, Fishkind DE, Fiori M, et al.
  year: 2016
  journal: IEEE TPAMI
  doi: 10.1109/TPAMI.2015.2424894
  dimension: network-analysis
  tags:
  - "network-analysis:graph-matching"
  - "network-analysis:statistical-testing"
  - "methodology:benchmark"
  key_figures:
  - "Fig. 1: graph matching formulation"
  - "Fig. 3: relaxation comparison"
  discussion_prompts:
  - What are the computational and statistical tradeoffs between exact and relaxed graph matching?
  - How does graph matching apply to comparing connectomes across individuals or species?
  related_content:
  - /content-library/connectomics/network-analysis-methods/
  summaries:
    beginner: >-
      Given two networks, can you figure out which nodes in one correspond to which nodes in the other? Graph matching solves
      this problem, but it's computationally very hard. This paper analyzes different approaches and their tradeoffs.
    intermediate: >-
      Lyzinski et al. provide a theoretical and empirical analysis of convex relaxation approaches to the graph matching problem.
      They show that relaxed solutions can differ substantially from exact solutions, with implications for matching accuracy
      in connectomics applications.
    advanced: >-
      Graph matching is fundamental for cross-connectome comparison (matching neurons across individuals or hemispheres).
      The paper shows that commonly used relaxations can fail in structured ways. For EM connectomics, where exact matching
      may be computationally feasible for small circuits, the analysis guides when relaxation is safe.
  ocar:
    opportunity: >-
      Graph matching — finding correspondences between nodes in two networks — is essential for comparing connectomes across
      individuals or species, but the computational hardness of the problem necessitates approximations whose quality was
      poorly understood.
    challenge: >-
      Convex relaxation approaches make graph matching tractable but may sacrifice solution quality in structured ways that
      are difficult to predict, requiring both theoretical bounds and empirical evaluation.
    action: >-
      Lyzinski et al. provided theoretical and empirical analysis of convex relaxation approaches to graph matching, characterizing
      when and how relaxed solutions differ from exact solutions.
    resolution: >-
      The analysis showed that commonly used relaxations can fail in structured, predictable ways, providing guidance on when
      relaxation is safe and when exact methods are needed — directly relevant for matching neurons across connectomes.
    future_work: >-
      Developing graph matching methods specifically tailored for connectomics data (incorporating spatial position, morphology,
      and cell type as side information) could improve matching accuracy beyond connectivity alone.
  bibtex: >-
    @article{lyzinski2016graph,
      title={Graph matching: relax at your own risk},
      author={Lyzinski, Vince and Fishkind, Donniell E and Fiori, Marcelo and others},
      journal={IEEE Transactions on Pattern Analysis and Machine Intelligence},
      volume={38},
      number={1},
