    ocar:
    opportunity: |
      Glioblastoma multiforme had a dismal prognosis with radiotherapy alone, and new therapeutic strategies were urgently needed to improve survival in patients with this aggressive brain tumor.
    challenge: |
      Glioblastoma is highly invasive and heterogeneous, making surgical resection incomplete; systemic chemotherapy must cross the blood-brain barrier while sparing normal tissue, and adding chemotherapy to radiotherapy increases toxicity.
    action: |
      The authors conducted a randomized phase III clinical trial comparing radiotherapy alone versus radiotherapy combined with concurrent and adjuvant temozolomide chemotherapy in 573 patients with newly diagnosed glioblastoma.
    resolution: |
      Patients receiving combined radiotherapy and temozolomide had significantly improved median overall survival (14.6 versus 12.1 months) and two-year survival rate (26.5% versus 10.4%) compared to radiotherapy alone, establishing the new standard of care for glioblastoma.
    future_work: |
      Long-term survivors remain rare; identifying predictive biomarkers (such as MGMT promoter methylation) to guide treatment selection and developing next-generation therapies that overcome temozolomide resistance are critical priorities.
  plain_language_summary: |
    Glioblastoma is an aggressive brain tumor with few treatment options. This landmark clinical trial showed that adding a chemotherapy drug (temozolomide) to standard radiation therapy more than doubled the two-year survival rate, establishing a new treatment standard that is still used today.
  summaries:
    beginner: |
        Doctors tested whether adding a chemotherapy pill (temozolomide) to radiation treatment could help people with glioblastoma brain tumors live longer. The trial showed it worked — doubling the proportion of patients surviving two years — and this combination became the standard treatment for this cancer.
    intermediate: |
        This randomized phase III trial by Stupp et al. established temozolomide plus radiotherapy as the standard of care for newly diagnosed glioblastoma, with temozolomide given concurrently during radiation and then as adjuvant therapy. MGMT promoter methylation was identified as a predictive biomarker in subsequent analyses, providing the first molecular stratification tool for glioblastoma treatment.
    advanced: |
        The EORTC-NCIC trial demonstrated a statistically significant overall survival benefit of the temozolomide-radiotherapy combination, with a hazard ratio of 0.63 and median OS improvement from 12.1 to 14.6 months. MGMT promoter methylation, assessed by methylation-specific PCR, was later shown to be the strongest predictor of benefit from temozolomide, raising questions about whether unmethylated patients benefit from the drug. This paper appears in connectomics citation networks as a clinical reference for glioblastoma imaging studies that use connectomic methods to characterize tumor-induced connectivity disruption.
  discussion_prompts:
  - |
    How is glioblastoma altering brain connectivity, and what connectomics methods can quantify tumor-induced disruption of neural circuits?
    - |
    What does MGMT methylation status tell us about the molecular mechanisms of temozolomide response, and how could genomic profiling guide personalized treatment?
    - |
    What are the ethical challenges of running clinical trials in glioblastoma given the poor prognosis and the need for equipoise?
    - id: volume-electron-microscopy-for-neuronal-circuit-reconstructi
    title: "Volume electron microscopy for neuronal circuit reconstruction"
    authors: "Briggman, Bock"
    year: 2011
    journal: ""
    doi: 10.1016/j.conb.2011.10.022
    dimension: image-acquisition
    reading_phase: 0_orientation
    composite_score: 0.067
    role: review
    tags:
    - imaging:SBEM
    - imaging:FIB-SEM
    - imaging:ATUM-SEM
    - method:volume-EM
