- id: friston-1995
  title: Spatial registration and normalization of images
  authors: Karl Friston, John Ashburner, ... R. S. J. Frackowiak
  year: 1995
  journal: ''
  doi: 10.1002/hbm.460030303
  dimension: computer-vision-ml
  tags:
