  summaries:
    beginner: Are human and mouse brains wired the same way at the microscopic level? This study compared cortex from both
      species using EM and found both similarities and important differences, including more synapses per neuron in humans.
    intermediate: Loomba et al. performed dense EM reconstruction of cortical samples from mouse and human temporal cortex.
      Human cortex shows higher synapse density, more inhibitory synapses, and distinct connectivity motifs.
    advanced: 'First systematic connectomic comparison across mammalian species at synaptic resolution. The methodology —
      matching processing and analysis pipelines across species — is a template for cross-species connectomics. Key findings:
      ~2x higher synapse density in human, shifted E/I ratio, and species-specific motifs.'
  ocar:
    opportunity: While mouse connectomics had reached cubic-millimeter scale, no study had systematically compared mouse and human cortical connectivity at synaptic resolution, leaving open whether findings from mouse models generalize to human brain organization.
    challenge: Meaningful cross-species comparison requires matched tissue preparation, imaging, reconstruction, and analysis pipelines applied to both species. Differences in cortical thickness, neuron density, and neuropil composition complicate direct comparison.
    action: Loomba et al. performed dense EM reconstruction of matched cortical samples from mouse and human temporal cortex using identical processing and analysis pipelines, enabling direct quantitative comparison of connectivity features.
    resolution: Human cortex shows approximately 2x higher synapse density per neuron, a shifted excitatory/inhibitory ratio with more inhibitory synapses, and species-specific connectivity motifs. The study established a rigorous methodology for cross-species connectomic comparison.
