- id: zung-2017
  title: An error detection and correction framework for connectomics
  authors: Zung J et al.
  year: 2017
  journal: NeurIPS 2017
  doi: null
  dimension: computer-vision-ml
  tags:
  - "computer-vision-ml:segmentation"
  - "proofreading:merge-error"
  - "proofreading:split-error"
  - "computer-vision-ml:active-learning"
  key_figures:
  - "Fig. 1: error detection network architecture for identifying merge and split errors"
  - "Fig. 2: error correction pipeline integrating detection with targeted re-segmentation"
  - "Fig. 4: accuracy improvement as a function of correction iterations"
  discussion_prompts:
  - >-
    How does framing proofreading as an automated error-detection-and-correction loop change the requirements for initial
    segmentation quality?
  - What types of segmentation errors are hardest for the error detection network to identify, and why?
  related_content:
  - /content-library/proofreading/merge-error/
  - /content-library/proofreading/split-error/
  summaries:
    beginner: >-
      Even the best automatic neuron tracing makes mistakes — sometimes merging two neurons into one or splitting one neuron
      into pieces. This paper trains a second neural network to find these mistakes automatically and then fix them, creating
      a self-correcting pipeline that improves reconstruction quality without human intervention.
    intermediate: >-
      Zung et al. propose a two-stage framework: an error detector network classifies whether segments contain merge or split
      errors, and an error corrector network re-segments flagged regions. The iterative detect-correct loop progressively
      improves segmentation quality. The framework can also prioritize the most impactful errors for human proofreaders, functioning
      as an active learning system.
    advanced: >-
      The error detection network operates on local windows around segment boundaries and outputs merge/split error probabilities.
      The correction module applies targeted re-segmentation only in high-error-probability regions, preserving correct segmentation
      elsewhere. The iterative application converges to improved accuracy, and the error probability scores provide a natural
      priority ordering for human-in-the-loop proofreading, bridging fully automated and semi-automated reconstruction paradigms.
  ocar:
    opportunity: >-
      Even the best automated segmentation produces merge and split errors that must be corrected before a connectome can
      be analyzed. If a second neural network could automatically detect and fix these errors, it would dramatically reduce
      the need for manual proofreading.
    challenge: >-
      Error detection requires the network to distinguish subtle segmentation mistakes from correct but complex morphologies.
      Error correction must re-segment only the problematic regions without disturbing correct segmentation elsewhere, requiring
      precise localization of errors.
    action: >-
      Zung et al. designed a two-stage framework with an error detector network that classifies segments as containing merge
      or split errors, and an error corrector network that applies targeted re-segmentation to flagged regions, iterated until
      convergence.
    resolution: >-
      The iterative detect-correct loop progressively improved segmentation quality without human intervention. The error
      probability scores also provided a natural priority ordering for human proofreaders, creating a practical bridge between
      fully automated and human-in-the-loop reconstruction.
    future_work: >-
      Integrating error detection into the segmentation training loop for self-improving pipelines, extending to more error
      types (e.g., synapse assignment errors), and combining with active learning to optimally allocate human proofreading
      effort.
