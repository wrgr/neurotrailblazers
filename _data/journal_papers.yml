  summaries:
    beginner: >-
      Even when you're not doing anything, different brain regions are still communicating. This pioneering paper discovered
      that you can detect these resting-state connections by measuring correlated brain activity patterns with MRI.
    intermediate: >-
      Biswal et al. demonstrated that low-frequency BOLD signal fluctuations in motor cortex during rest show high correlation
      between bilateral regions, revealing functional connectivity without task performance. This foundational finding launched
      the resting-state fMRI field.
    advanced: >-
      This paper established functional connectivity MRI as a tool for mapping brain networks. The relationship between resting-state
      functional connectivity and underlying structural connectivity (from either tractography or EM) remains an active research
      question with important implications for cross-scale integration.
  ocar:
    opportunity: >-
      Brain connectivity had only been studied during task performance, and it was unknown whether meaningful network organization
      could be detected from the resting brain using non-invasive imaging.
    challenge: >-
      Resting-state BOLD signal fluctuations were considered noise, and demonstrating that correlated low-frequency fluctuations
      reflect genuine neural communication required careful controls to rule out physiological artifacts.
    action: >-
      Biswal et al. measured low-frequency BOLD signal fluctuations during rest in motor cortex and demonstrated that bilateral
      motor regions show high temporal correlation, revealing functional connectivity without any task performance.
    resolution: >-
      This foundational finding launched the entire resting-state fMRI field, establishing functional connectivity MRI as
      a tool for mapping brain networks and enabling population-scale studies of brain network organization.
    future_work: >-
      Understanding the relationship between resting-state functional connectivity and underlying structural connectivity
      from tractography or EM remains an active and important research question.
