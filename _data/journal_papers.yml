  summaries:
    beginner: This study pioneered the idea of first recording neuron activity in a living mouse, then slicing and imaging
      the same brain region with electron microscopy to trace the connections. It showed that a neuron's wiring pattern relates
      to what visual features it responds to.
    intermediate: Bock et al. performed one of the first correlative studies linking in-vivo two-photon calcium imaging with
      post-hoc serial-section EM reconstruction in mouse visual cortex. They traced inhibitory interneurons and found that
      their synaptic targeting was non-random with respect to the functional properties of postsynaptic partners.
    advanced: A methodological milestone establishing the correlative functional-structural pipeline later scaled up by MICrONS.
      The study used ATUM sectioning and manual tracing of ~1,500 synapses from functionally characterized inhibitory neurons.
      Despite the small sample, it demonstrated that connectivity cannot be predicted from spatial proximity alone and that
      functional context is essential for interpreting wiring diagrams.
  ocar:
    opportunity: Understanding whether synaptic connectivity reflects functional properties required combining in vivo activity recordings with synaptic-resolution wiring data from the same neurons, which had not been achieved in mammalian cortex.
    challenge: The correlative approach required performing two-photon calcium imaging in a living mouse and then recovering the same neurons in a post-hoc EM volume, demanding precise co-registration across fundamentally different imaging modalities.
    action: Bock et al. recorded visual responses from neurons in mouse visual cortex using two-photon imaging, then performed serial-section EM (ATUM) and manually traced ~1,500 synapses from functionally characterized inhibitory interneurons.
    resolution: The study demonstrated that inhibitory neurons target postsynaptic partners in a non-random fashion with respect to functional properties, proving that connectivity cannot be predicted from spatial proximity alone and establishing the correlative pipeline later scaled up by MICrONS.
    future_work: Scaling the approach to larger volumes and more cell types, and developing automated co-registration methods, were identified as key needs.
