- id: fiala-2005
  title: "<i>Reconstruct</i>: a free editor for serial section microscopy"
  authors: John C. Fiala
  year: 2005
  journal: ''
  doi: 10.1111/j.1365-2818.2005.01466.x
  dimension: data-storage
  tags:
  - "tool:reconstruct"
