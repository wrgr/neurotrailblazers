- id: hebb-2005
  title: The Organization of Behavior
  authors: D. O. Hebb
  year: 2005
  journal: ''
  doi: 10.4324/9781410612403
  dimension: neuroai
  tags:
  - "method:learning-theory"
  - "neuroai:hebbian-learning"
  - "phase:foundations"
