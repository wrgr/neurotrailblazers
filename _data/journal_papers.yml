      beginner: "This landmark paper describes the MICrONS project, which combined recordings of neural activity in a living mouse with a detailed 3D map of the same brain tissue reconstructed from electron microscopy. The result is the largest dataset that links what neurons do (their activity) to how they are wired together."
      intermediate: "Turner et al. present the MICrONS cubic-millimeter-scale cortical dataset combining in vivo two-photon calcium imaging with post-hoc serial-section EM and automated reconstruction. The pipeline integrates flood-filling network segmentation, automated synapse detection, and multi-scale proofreading to produce a connectome with matched functional data. The dataset enables direct analysis of structure-function relationships in mouse visual cortex."
      advanced: "The MICrONS dataset represents the state of the art in combined functional-structural neuroscience at scale. The reconstruction pipeline chains FFN-based segmentation, CNN-based synapse and organelle detection, and PyChunkedGraph-based proofreading. Key technical contributions include the co-registration of two-photon and EM coordinate spaces, the automation of nucleus and cell-type classification, and the public release of both raw and processed data. The paper demonstrates that connectivity patterns correlate with functional tuning properties, validating the utility of millimeter-scale connectomics."

