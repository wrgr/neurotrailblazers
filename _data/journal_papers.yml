- id: blondel-2008
  title: Fast unfolding of communities in large networks
  authors: Vincent D. Blondel, Jean‐Loup Guillaume, Renaud Lambiotte, Etienne Lefebvre
  year: 2008
  journal: ''
  doi: 10.1088/1742-5468/2008/10/p10008
