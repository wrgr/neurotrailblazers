  - How does the volume limitation of FIB-SEM affect the kinds of connectomics questions you can ask?
  related_content:
  - /content-library/imaging/em-principles/
  - /content-library/imaging/acquisition-qa/
  summaries:
    beginner: >-
      This paper showed how to use a focused beam of ions (like a tiny sandblaster) to slice brain tissue inside an electron
      microscope, producing truly cube-shaped 3D pixels. Previous methods cut thicker slices, making images stretched in one
      direction. With FIB-SEM, every direction has the same resolution.
    intermediate: >-
      Knott et al. demonstrated FIB-SEM for neural tissue, achieving isotropic voxels (~5-10 nm in all dimensions). This isotropic
      resolution is particularly valuable for tracing thin processes that may be missed in anisotropic datasets. The tradeoff
      is dramatically slower acquisition throughput compared with SBEM or ATUM-SEM.
    advanced: >-
      FIB-SEM's isotropic resolution eliminates z-anisotropy that plagues segmentation in serial section datasets. The Knott
      et al. implementation achieves ~5 nm isotropic but at volumes orders of magnitude smaller than SBEM datasets. The choice
      between FIB-SEM and SBEM depends on whether isotropy (spine morphology, organelle quantification) or volume (circuit
      mapping) is prioritized.
  ocar:
    opportunity: >-
      Serial section electron microscopy produced anisotropic voxels with much lower resolution in the cutting direction,
      limiting accurate tracing of fine neuronal processes oriented along the z-axis. An imaging method capable of isotropic
      nanometer-scale resolution in brain tissue was needed.
    challenge: >-
      Existing FIB milling had not been adapted for neural tissue, and achieving stable, artifact-free milling over the hundreds
      of sequential cuts needed for 3D reconstruction of synapses and dendrites was technically demanding.
    action: >-
      Knott et al. applied focused ion beam milling inside a scanning electron microscope to serially remove thin layers of
      resin-embedded adult brain tissue, producing image stacks with isotropic voxels at approximately 5-10 nm resolution.
    resolution: >-
      The method demonstrated that FIB-SEM could produce isotropic 3D volumes of neural tissue suitable for synapse-level
      reconstruction, establishing FIB-SEM as a viable modality for connectomics where z-resolution is critical.
    future_work: >-
      The severely limited imaging volume compared to serial section methods left open the question of whether FIB-SEM could
      scale to circuit-level reconstruction.
