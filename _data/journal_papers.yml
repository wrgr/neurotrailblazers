    intermediate: Pedigo et al. present bisected graph matching — an algorithm that exploits bilateral symmetry to match homologous
      neurons across brain hemispheres. Applied to the larval Drosophila connectome, the method correctly matches >80% of
      neurons using connectivity alone.
    advanced: Bisected graph matching provides a principled approach to the cross-hemisphere neuron matching problem that
      is fundamental to assessing bilateral symmetry and stereotypy. The method's performance quantifies how much information
      about neuron identity is contained in connectivity versus morphology or spatial position.
  ocar:
    opportunity: Bilateral brains have matching neurons on each side, and automatically pairing these homologous neurons is essential for assessing wiring stereotypy, but standard graph matching methods did not exploit the bilateral structure.
    challenge: Graph matching is NP-hard in general, and the problem becomes especially difficult when the two hemispheres have slightly different numbers of neurons and imperfect symmetry in their connectivity.
    action: Pedigo et al. developed bisected graph matching — an algorithm that exploits known bilateral symmetry to improve matching accuracy — and applied it to the larval Drosophila connectome, using only connectivity information.
    resolution: The method correctly matched >80% of neurons across hemispheres using connectivity alone, quantifying how much information about neuron identity is contained in wiring patterns versus other features like morphology or spatial position.
    future_work: Extending the approach to adult Drosophila and other bilateral connectomes, and combining connectivity with morphological features for improved matching, are natural next steps.
