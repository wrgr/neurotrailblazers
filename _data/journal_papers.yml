    summaries:
      beginner: "The tiny worm C. elegans comes in two sexes, and this paper mapped the complete wiring diagram of both. Comparing the two reveals how nervous systems can be rewired to produce different behaviors while sharing most of the same neuron types."
      intermediate: "Cook et al. provide updated whole-animal connectomes for both C. elegans sexes, correcting and extending the original White et al. dataset. The comparison reveals shared core circuitry alongside sex-specific neurons and connections that underlie behavioral dimorphism."
      advanced: "This work addresses longstanding gaps in the original C. elegans connectome by re-sectioning and re-tracing both hermaphrodite and male animals with modern EM. Key contributions include revised synapse counts, newly identified connections, and quantification of wiring differences between sexes — establishing the first cross-sex connectome comparison in any organism."

  - id: takemura-2013
