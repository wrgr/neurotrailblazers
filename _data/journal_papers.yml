  - 'Fig. 3: inhibitory neuron connectivity patterns'
  discussion_prompts:
  - What are the challenges of registering in-vivo functional data to post-hoc EM volumes?
  - How did this early correlative study influence the design of the MICrONS project?
  related_content:
  - /content-library/case-studies/mouse-visual-cortex-correlative/
  - /content-library/imaging/correlative-imaging-methods/
  summaries:
    beginner: This study pioneered the idea of first recording neuron activity in a living mouse, then slicing and imaging
      the same brain region with electron microscopy to trace the connections. It showed that a neuron's wiring pattern relates
      to what visual features it responds to.
    intermediate: Bock et al. performed one of the first correlative studies linking in-vivo two-photon calcium imaging with
      post-hoc serial-section EM reconstruction in mouse visual cortex. They traced inhibitory interneurons and found that
      their synaptic targeting was non-random with respect to the functional properties of postsynaptic partners.
    advanced: A methodological milestone establishing the correlative functional-structural pipeline later scaled up by MICrONS.
      The study used ATUM sectioning and manual tracing of ~1,500 synapses from functionally characterized inhibitory neurons.
      Despite the small sample, it demonstrated that connectivity cannot be predicted from spatial proximity alone and that
      functional context is essential for interpreting wiring diagrams.
- id: witvliet-2021
  title: Connectomes across development reveal principles of brain maturation
  authors: Witvliet D, Mulcahy B, Mitchell JK, et al.
  year: 2021
  journal: Nature
  doi: 10.1038/s41586-021-03778-8
  dimension: case-studies
  tags:
