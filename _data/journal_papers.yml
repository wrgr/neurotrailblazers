  discussion_prompts:
  - >-
    How did the limitations of single-user desktop software like Reconstruct directly motivate the development of web-based
    collaborative platforms like CATMAID and FlyWire?
  - >-
    What aspects of the manual reconstruction workflow in Reconstruct have been successfully automated in modern pipelines,
    and what still requires human judgment?
  - >-
    How do the annotation data structures in Reconstruct (contours, z-traces, objects) map onto the data models used in current
    connectomics databases like CAVE or neuPrint?
  summaries:
    beginner: >-
      Reconstruct is a free software program that lets scientists manually trace and reconstruct neurons from stacks of microscope
      images. Scientists import the images, align them so consecutive sections line up, and then draw the outlines of neurons
      by hand on each image slice to build a 3D model. It was the standard tool for manual connectomics before automated methods
      became available and was used to create many important neural circuit maps.
    intermediate: >-
      Reconstruct implements a complete manual reconstruction workflow: section import and calibration, affine and non-linear
      alignment of consecutive sections, contour-based annotation of structures, and 3D mesh generation. Its flat-file data
      format stores all annotations and transformations. It was widely used for C. elegans, mouse retina, and other landmark
      manual reconstructions. Its limitations — single-user, desktop-only, manual alignment — directly motivated the development
      of web-based collaborative platforms like CATMAID and the current generation of annotation tools.
    advanced: >-
      Reconstruct's architecture reflects the state of computational resources in 2005: single-threaded processing, CPU-only
      rendering, and file-based storage without database backends, which limited it to datasets of a few hundred sections
      manageable by one user. The contour annotation paradigm (2D closed curves per section) differs from the skeleton-based
      annotation of CATMAID and the volumetric agglomeration of modern systems. Importantly, Reconstruct's section alignment
      approach (manual fiducial placement plus affine transforms) established the conceptual framework for automated alignment
      pipelines (SIFT-based, elastic registration) used today. Its data format for synapse annotation was also directly referenced
      in defining annotation schemas for later systems.
  ocar:
    opportunity: >-
      Serial section microscopy for neural circuit reconstruction requires software tools for aligning sections, annotating
      structures, and managing reconstruction data, but no free, comprehensive editor existed for this purpose.
    challenge: >-
      Section alignment, 3D visualization, and annotation of complex branching neural processes from large series of section
      images require specialized interactive tools that are both accurate and accessible to non-programmers in biology labs.
    action: >-
      Fiala developed Reconstruct, a free Windows-based software package for serial section microscopy that provided tools
      for importing image series, aligning sections semi-automatically, annotating objects (contours, traces, z-traces), and
      generating 3D reconstructions. The software handled both TEM and light microscopy datasets.
    resolution: >-
      Reconstruct became the standard tool for manual serial section EM reconstruction in the pre-automated era and was used
      to generate many landmark connectomics datasets. Its data format and workflow influenced subsequent software development
      and remains a reference for defining the annotation objects (contours, synapses, objects) that more modern tools have
      automated.
    future_work: >-
      Scaling Reconstruct-style manual annotation to the large volumes required for modern connectomics required transitioning
      to web-based collaborative platforms (CATMAID, CAVE, neuTube) and automated segmentation backends — limitations that
      motivate the entire current generation of connectomics software.
  plain_language_summary: >-
    Before automated tools existed, scientists reconstructing neurons from electron microscope images needed specialized software
    to line up hundreds of image slices and trace cell boundaries by hand. Reconstruct was a free program that made this process
    manageable — allowing researchers to import image series, align them, draw cell outlines, and build 3D models. It became
    the standard tool for a generation of connectomics researchers and helped produce many important neural circuit datasets.
