  summaries:
    beginner: Once you have a brain network, what can you measure about it? This paper is a practical guide to network measures
      — degree, clustering, path length, modularity, and many more — with clear explanations of what each measure means biologically.
    intermediate: 'Rubinov and Sporns provide the Brain Connectivity Toolbox (BCT) paper: a comprehensive catalog of network
      measures adapted for brain connectivity analysis. For each measure, they describe the computation, interpretation, and
      caveats specific to neural networks.'
    advanced: 'The BCT remains the most widely used toolbox for brain network analysis. Key contributions: systematic treatment
      of binary versus weighted measures, integration versus segregation metrics, and the importance of normalization against
      appropriate null networks. For EM connectomics, the weighted directed measures are most relevant.'
  ocar:
    opportunity: Graph-theoretic measures were being increasingly applied to brain networks, but there was no comprehensive reference explaining how to compute, interpret, and appropriately use these measures for brain connectivity data specifically.
    challenge: Brain networks have unique properties — they are weighted, directed, spatially embedded, and multi-scale — requiring adaptation of standard network measures and careful attention to normalization and null models.
    action: Rubinov and Sporns created the Brain Connectivity Toolbox (BCT) and an accompanying paper cataloging network measures adapted for brain connectivity, with detailed descriptions of computation, biological interpretation, and caveats for each measure.
    resolution: The BCT became the most widely used toolbox for brain network analysis, standardizing the computation of measures like degree, clustering, path length, modularity, and centrality across the connectomics field.
    future_work: Adapting the toolbox for the weighted directed graphs typical of EM connectomics and developing new measures for multi-layer and temporal brain networks are ongoing directions.
