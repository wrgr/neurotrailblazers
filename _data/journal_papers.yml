  summaries:
    beginner: Cutting brain tissue into thousands of ultra-thin slices is slow and error-prone. This paper developed a method
      to cut slightly thicker slices, image them from both sides, and computationally stitch the results. This makes it possible
      to image larger brain volumes faster.
    intermediate: 'Hayworth et al. developed ''hot knife'' thick-section partitioning: a heated diamond blade cuts resin-embedded
      tissue into ~20 μm thick slabs with minimal surface damage. Each slab is then sectioned conventionally for ATUM-SEM,
      and sub-volumes are computationally stitched. This enables parallelized imaging across multiple microscopes.'
    advanced: The volume stitching approach relaxes the single greatest reliability constraint in serial section connectomics
      — the requirement for unbroken section series. By accepting controlled cuts at ~20 μm intervals, the method tolerates
      lost sections within slabs and enables multi-microscope parallelism. This approach was used in the MICrONS mm³ volume
      acquisition pipeline.
  ocar:
    opportunity: Serial section EM required unbroken series of thousands of ultra-thin sections, and any lost section could break neurite continuity. Scaling to millimeter-scale volumes demanded a way to relax this constraint.
    challenge: Cutting thicker slabs introduced surface damage at each cut face, and computationally stitching sub-volumes across slab boundaries required precise alignment despite the disrupted tissue interface.
    action: Hayworth et al. developed hot-knife thick-section partitioning using a heated diamond blade to cut resin-embedded tissue into ~20 um slabs with minimal surface damage, then sectioned each slab conventionally for ATUM-SEM and computationally stitched the results.
    resolution: The method enabled parallelized multi-microscope imaging and tolerated occasional lost sections within slabs, directly enabling the MICrONS cubic-millimeter volume acquisition pipeline.
    future_work: Optimizing slab thickness and stitching algorithms for even larger volumes, and reducing artifacts at slab boundaries, remain active areas of development.
