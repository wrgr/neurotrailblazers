  summaries:
    beginner: >-
      Brain imaging studies often have too few participants to find reliable patterns. ENIGMA solved this by getting over
      1400 scientists worldwide to share data and analyze it together, producing much more reliable findings about how the
      brain changes in mental illness and how genes affect brain structure.
    intermediate: >-
      The ENIGMA Consortium's decade of work demonstrated the power of consortium-scale neuroimaging, identifying genetic
      loci for subcortical and cortical structures, characterizing disease-specific neuroanatomical signatures across psychiatric
      and neurological disorders, and establishing harmonization protocols for multi-site MRI analysis. These methodological
      contributions directly inform large-scale connectomics data sharing efforts.
    advanced: >-
      ENIGMA's contributions span GWAS of brain morphometry, disease-specific meta-analyses, and methodological standards
      for multi-site harmonization. Key limitations include the predominance of European ancestry participants, reliance on
      gross morphometric measures rather than circuit-level connectivity, and potential heterogeneity in clinical diagnoses
      across sites. The consortium's open science and data sharing model directly parallels emerging practices in large-scale
      EM connectomics, such as the IARPA MICrONS program.
  ocar:
    opportunity: >-
      Individual neuroimaging studies were too small to reliably detect genetic and clinical associations with brain structure
      and function; coordinating data across global sites offered statistical power unavailable in any single institution.
    challenge: >-
      Harmonizing neuroimaging data, genetic data, and clinical assessments across 40+ countries with different scanners,
      protocols, and patient populations requires rigorous standardization and meta-analytic frameworks.
    action: >-
      The ENIGMA Consortium coordinated large-scale meta- and mega-analyses of brain imaging and genetics across over 1400
      scientists in 43 countries, systematically investigating neurological and psychiatric conditions using harmonized protocols.
    resolution: >-
      ENIGMA identified robust genetic associations with brain structure, characterized consistent neuroimaging signatures
      across psychiatric disorders, and established best practices for multi-site neuroimaging research. The consortium demonstrated
      that large-scale collaboration is essential for reproducible neuroscience findings.
    future_work: >-
      Greater diversity in ancestry representation, integration with deep phenotyping, and linkage with cellular-resolution
      data from connectomics remain major challenges for the next decade of ENIGMA research.
  plain_language_summary: >-
    A single brain scan study is like tasting one sample from a vineyard — you need to taste thousands to understand the full
    picture. ENIGMA united over 1400 researchers in 43 countries to pool brain imaging and genetic data, creating studies
    large enough to reliably find how genetics and disease affect the brain.
