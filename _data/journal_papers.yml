    ocar:
    opportunity: |
      Reconstructing a whole Drosophila brain connectome from EM data requires proofreading millions of automated segmentation errors, which is impossible for a small expert team but could be accelerated by distributing the task across a broader scientific community.
    challenge: |
      Crowdsourcing connectomics proofreading requires a web platform that non-expert users can navigate in 3D, real-time collaborative editing of a shared segmentation, and quality control systems to catch errors introduced by less experienced annotators.
    action: |
      The authors developed FlyWire, a browser-based platform that presents the full Drosophila whole-brain EM volume with automated segmentation and allows registered users to proofread, merge, and split segments collaboratively in real time. They deployed it to a community of neuroscientists worldwide and gamified contributions to incentivize participation.
    resolution: |
      FlyWire enabled community-scale proofreading of the full adult female Drosophila brain EM dataset, producing a substantially improved whole-brain connectome through contributions from hundreds of users. The platform demonstrated that online community proofreading can scale to whole-brain volumes and accelerated the release of the complete FlyWire connectome.
    future_work: |
      Extending FlyWire-style community proofreading to much larger vertebrate datasets, and improving automated proofreading to reduce the human workload further, remain critical challenges for the field.
  plain_language_summary: |
    Mapping every neuron connection in a whole fly brain from microscope images requires enormous human effort to correct computer errors — too much for any one lab. FlyWire solved this by creating an online platform where scientists worldwide could collaboratively fix those errors in a shared 3D view of the fly brain, like a Wikipedia for brain wiring. This community approach produced a far more complete and accurate fly brain connectome than would otherwise be possible.
  summaries:
    beginner: |
        FlyWire is an online tool that lets scientists from around the world help fix errors in a computer-generated map of the fly brain's connections. Users log on to a website and edit a 3D image of the fly brain, merging or splitting incorrectly segmented neurons like a video game. By crowdsourcing this tedious but important work, the team produced a much more complete and accurate fly brain connectome.
    intermediate: |
        FlyWire is built on the CloudVolume and PyChunkedGraph infrastructure, providing a scalable octree-based volume representation with real-time collaborative editing and version control of segmentation state. Users interact with the EM volume through a WebGL-based 3D interface (Neuroglancer), and contributions are tracked and quality-controlled through automated consistency checks and expert review. The platform enabled proofreading of ~130,000 neurons across the full female adult fly brain, dramatically exceeding what expert-only curation could achieve.
    advanced: |
        The core infrastructure challenge FlyWire solved is maintaining a consistent, version-controlled segmentation graph across thousands of concurrent users editing overlapping regions of a ~100 TB EM volume. PyChunkedGraph stores the agglomeration hierarchy as a chunked graph with atomic leaf supervoxels, enabling O(log n) merge/split operations and full edit history. A key methodological caveat is that proofreading effort is heterogeneous — central brain regions received far more attention than peripheral neuropils — so reconstruction completeness varies across the volume. The FlyWire community proofreading model has become a blueprint for future large-scale connectomics projects, though scaling to vertebrate datasets orders of magnitude larger will require further automation.
  discussion_prompts:
  - |
    How does the quality of proofreading in community-contributed segments compare to expert-only annotation, and what quality control mechanisms are most effective?
    - |
    What incentive structures and user interfaces most effectively engage a non-expert scientific community in large-scale proofreading tasks?
    - |
    How should the incompleteness of proofreading across a whole-brain connectome be accounted for in downstream connectivity analyses?
