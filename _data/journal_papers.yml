  title: "Reading the book of memory: Sparse sampling versus dense mapping of connectomes"
  authors: Seung HS
  year: 2009
  journal: Neuron
  doi: 10.1016/j.neuron.2009.02.021
  dimension: proofreading
  tags:
  - "proofreading:proofreading-strategy"
