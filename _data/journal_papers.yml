  summaries:
    beginner: This paper describes how scientists imaged an entire adult fruit fly brain at nanometer resolution — about 21
      million images stitched together. The fruit fly brain is tiny but contains about 100,000 neurons. This dataset became
      the foundation for mapping the fly's entire wiring diagram.
    intermediate: 'Zheng et al. produced the FAFB dataset using ATUM-SEM: serial sections collected on tape, then imaged across
      multiple SEMs. The dataset spans the entire Drosophila brain at ~4x4x40 nm voxels (~21 million tiles, ~50 TB). Key technical
      achievements include section continuity over ~7,000 sections and multi-microscope parallelization.'
    advanced: 'The FAFB acquisition pipeline illustrates petascale EM challenges: section loss mitigation (only 36 of ~7,000
      sections unusable), tape-based ATUM collection enabling re-imaging, and multi-microscope parallelization. The anisotropic
      voxels create z-resolution limitations for thin-process tracing. Compare with the Janelia hemibrain (FIB-SEM, isotropic
      8 nm, smaller volume, better z-resolution).'
