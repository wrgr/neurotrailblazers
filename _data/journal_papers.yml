    ocar:
    opportunity: |
      Automated segmentation of neurons in EM connectomics images was a critical bottleneck: deep learning had improved segmentation accuracy, but standard architectures could not capture both fine-grained local detail and large-scale contextual information simultaneously at reasonable computational cost.
    challenge: |
      Neuron segmentation in EM images requires distinguishing membrane boundaries with sub-pixel precision across large fields of view with complex, interleaved cell shapes. Standard U-Net architectures lacked sufficient depth and skip connections to achieve the necessary combination of spatial precision and semantic context.
    action: |
      The authors developed FusionNet, a deep fully residual convolutional neural network that combines the skip connections of ResNets with the encoder-decoder architecture of U-Net, adding symmetric skip connections at every resolution level. They trained and evaluated FusionNet on benchmark EM segmentation datasets.
    resolution: |
      FusionNet achieved state-of-the-art performance on connectomics EM segmentation benchmarks, outperforming previous architectures on membrane detection and neurite segmentation tasks. The residual fusion architecture improved gradient flow and enabled training of very deep networks for segmentation.
    future_work: |
      Subsequent architectures (e.g., flood-fill networks, transformer-based segmentation) have further improved connectomics segmentation, particularly for challenging cases like thin axons and closely apposed membranes.
  plain_language_summary: |
    Automatically identifying individual neurons in brain images is like trying to separate intertwined spaghetti strands just from photos — very hard for computers. FusionNet is a deep learning network architecture designed specifically for this task, combining the best features of two powerful design approaches to achieve better accuracy at tracing neuron boundaries in electron microscopy images.
  summaries:
    beginner: |
        To map brain circuits from electron microscope images, computers need to automatically identify where one neuron ends and another begins. FusionNet is a type of artificial neural network designed specifically for this task, achieving higher accuracy than previous methods by combining two proven architectural designs.
    intermediate: |
        FusionNet is a deep fully residual convolutional network for EM image segmentation in connectomics. By combining residual skip connections with a symmetric encoder-decoder structure at every resolution level, it achieves superior membrane detection and neurite segmentation performance compared to standard U-Net architectures, addressing the challenge of jointly capturing local boundary detail and global cell shape context.
    advanced: |
        FusionNet's key innovation is the application of residual connections (preserving gradient flow through identity shortcuts) within a fully symmetric encoder-decoder architecture, enabling training of substantially deeper networks than standard U-Net without degradation. On the SNEMI3D and ISBI 2012 EM segmentation benchmarks, FusionNet demonstrated improved warping error and rand error metrics over prior architectures. Limitations include the fixed receptive field of convolutional architectures relative to the long-range dependencies in neurite geometry, a challenge later addressed by flood-fill networks' recurrent context propagation.
  discussion_prompts:
  - |
    How does FusionNet's residual architecture specifically address the vanishing gradient problem for deep networks, and why is this particularly important for EM segmentation?
    - |
    What are the key remaining failure modes for automated EM segmentation architectures like FusionNet, and how have subsequent methods (flood-fill networks, transformers) addressed them?
    - |
    How should automated segmentation quality be measured for connectomics applications, and do standard computer vision metrics (IoU, rand error) adequately capture what matters for circuit reconstruction?
    - id: functional-connectivity-in-the-resting-brain-a-network-analy
    title: |
    Functional connectivity in the resting brain: A network analysis of the default mode hypothesis
    authors: "Greicius, Krasnow, Reiss et al."
    year: 2002
    journal: ""
