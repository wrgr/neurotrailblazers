  summaries:
    beginner: >-
      This paper teaches a neural network to predict how strongly neighboring pixels belong to the same neuron, then uses
      a classic image-processing technique called watershed to turn those predictions into full neuron segments. A special
      training strategy ensures the network optimizes for final segmentation quality, not just pixel-level accuracy.
    intermediate: >-
      Funke et al. train a CNN to predict local affinities (probabilities that adjacent voxels share the same label) and introduce
      a structured loss that backpropagates through a differentiable approximation of the downstream watershed segmentation.
      This end-to-end-aware training closes the gap between voxel-level prediction accuracy and actual segmentation metrics
      like variation of information.
    advanced: >-
      The structured loss is derived from a PDE relaxation of the discrete segmentation objective, allowing gradient flow
      from segmentation-level metrics back to network weights. The method outperforms per-voxel-loss baselines on CREMI and
      FIB-25 benchmarks and demonstrates that optimizing a surrogate that better approximates the true evaluation metric yields
      consistent gains in adapted Rand index and variation of information.
  ocar:
    opportunity: >-
      Standard voxel-wise loss functions (e.g., cross-entropy) do not directly optimize for the segmentation quality metrics
      that matter in connectomics (variation of information, adapted Rand index), creating a gap between training objective
      and evaluation metric.
    challenge: >-
      Segmentation metrics depend on the global partitioning of voxels into segments, which involves a discrete, non-differentiable
      watershed step. Backpropagating through this step to train the network end-to-end required a mathematical innovation.
    action: >-
      Funke et al. derived a structured loss based on a PDE relaxation of the discrete segmentation objective, enabling gradient
      flow from segmentation-level metrics through a differentiable approximation of the watershed back to the network weights.
    resolution: >-
      The structured loss consistently outperformed per-voxel cross-entropy baselines on CREMI and FIB-25 benchmarks, demonstrating
      that optimizing a surrogate closer to the true evaluation metric yields meaningful gains in segmentation quality.
    future_work: >-
      Extending the structured loss to other post-processing methods beyond watershed, combining with instance segmentation
      approaches like FFNs, and applying the PDE relaxation framework to other discrete optimization problems in connectomics
      pipelines.
