    ocar:
    opportunity: |
      Network neuroscience studies using resting-state fMRI and diffusion MRI often suffer from insufficient statistical power, leading to irreproducible findings about brain connectivity and its relationship to cognition or behavior.
    challenge: |
      Statistical power in network analyses depends on sample size, effect size, and multiple testing burden — all of which are poorly characterized for connectivity-based measures, making it difficult to plan adequately powered studies.
    action: |
      The authors conducted a comprehensive analysis of statistical power in network neuroscience, using large existing datasets to empirically estimate effect sizes for common network measures (functional connectivity, graph metrics) and model power as a function of sample size.
    resolution: |
      Many published network neuroscience studies are severely underpowered, with some requiring thousands of participants to reliably detect modest connectivity-behavior associations. The paper provides power curves and practical guidance for sample size determination in network neuroscience studies.
    future_work: |
      Developing power analysis tools tailored to specific network measures and experimental designs, and establishing shared data resources that enable adequately powered individual-differences studies, are critical needs.
  plain_language_summary: |
    Many brain connectivity studies don't include enough people to reliably detect the patterns they're looking for — like trying to determine an election outcome by polling only 10 people. This paper showed that most published network neuroscience studies were too small to be reliable and provided guidance on how many participants are actually needed.
  summaries:
    beginner: |
        In science, the more people you study, the more reliably you can detect patterns. This paper showed that most brain connectivity studies include far too few participants to reliably find real effects, meaning many published findings may be false positives or exaggerated estimates. It provides guidance on how many people you really need.
    intermediate: |
        The authors used large neuroimaging datasets to empirically estimate effect sizes for connectivity-behavior associations and graph-theoretic network metrics, then computed power curves across typical sample size ranges. The results revealed pervasive underpowering in published literature and identified which network measures require the largest samples due to low effect sizes and high multiple testing burden.
    advanced: |
        The paper provides a rigorous empirical framework for power analysis in network neuroscience, estimating effect sizes from large consortium datasets (HCP, UK Biobank) and demonstrating that associations between functional connectivity and cognitive traits require N > 1000 for 80% power at conservative significance thresholds. Key methodological nuances include the dependence of power estimates on the specific network measure, the correction strategy for multiple comparisons, and the extent of non-Gaussianity in connectivity distributions. These power considerations apply directly to connectomics studies seeking to relate structural circuit features to behavioral phenotypes.
  discussion_prompts:
  - |
    What sample sizes are needed for adequate statistical power when relating structural connectome features to behavioral or cognitive traits, and how does this compare to functional connectivity studies?
    - |
    How should multiple testing corrections be applied in network neuroscience analyses, and what tradeoffs exist between familywise error rate and false discovery rate approaches?
    - |
    How can the connectomics field address statistical power concerns given that full EM reconstruction of even a single animal is extremely costly?
    - id: cortical-column-and-whole-brain-imaging-with-molecular-contr
    title: |
    Cortical column and whole-brain imaging with molecular contrast and nanoscale resolution
    authors: "Gao, Asano, Upadhyayula et al."
    year: 2019
    journal: ""
    doi: 10.1126/science.aau8302
    dimension: image-acquisition
    reading_phase: 2_core_methods
    composite_score: 0.0611
    role: methods
