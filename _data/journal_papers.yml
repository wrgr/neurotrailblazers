  ocar:
    opportunity: >-
      Rapid advances in single-cell transcriptomics, electrophysiology, morphological reconstruction, and connectivity mapping
      created the possibility of building the first truly comprehensive, multimodal cell type atlas of a mammalian brain region.
    challenge: >-
      Each measurement modality captures a different aspect of cell identity, and integrating data across modalities — with
      different sampling biases, noise characteristics, and resolutions — requires principled cross-modal alignment and consensus
      methods.
    action: >-
      The BICCN consortium applied transcriptomics, chromatin accessibility, electrophysiology, morphological reconstruction,
      and projection mapping to mouse primary motor cortex, then integrated these modalities using computational methods to
      define a consensus cell type taxonomy.
    resolution: >-
      The study identified approximately 100 consensus cell types with cross-modal correspondences, demonstrating that transcriptomic
      types often align with morphological and electrophysiological distinctions. The atlas provides a reference framework
      for interpreting data from any single modality.
