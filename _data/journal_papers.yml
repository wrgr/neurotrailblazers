    ocar:
    opportunity: |
      Despite advances in mapping neural circuit anatomy via connectomics, the molecular identities and gene expression profiles of specific neuron types within those circuits were largely unknown, limiting mechanistic interpretation.
    challenge: |
      Linking circuit-level connectivity with molecular properties requires simultaneous knowledge of cell type identity and gene expression at single-cell resolution, which is technically demanding in complex tissues like the Drosophila visual system.
    action: |
      The authors characterized gene expression patterns in distinct neural cell types of the Drosophila visual system using intersectional genetic lines to access individual cell populations. They combined transcriptomic profiling, genetic tools, and connectomic data to build a multi-modal resource.
    resolution: |
      The study produced an integrated genetic, genomic, and computational resource linking cell type identity, transcriptomic signatures, and circuit anatomy in the Drosophila visual system. This resource enables researchers to probe molecular mechanisms underlying circuit function using existing genetic tools.
    future_work: |
      Extending this multi-modal approach to other Drosophila brain regions and integrating with whole-brain connectome data would further enhance its utility for mechanistic circuit studies.
  plain_language_summary: ""
  summaries:
    beginner: |
        Scientists studying the fly visual system wanted to know not just how neurons are connected, but also what genes each type of neuron turns on. This paper created a combined database linking cell identity, gene expression, and circuit wiring for fly visual neurons.
    intermediate: |
        This paper addresses the disconnect between connectomic anatomy and molecular biology by profiling gene expression in genetically isolated Drosophila visual system neuron types. Using cell-type-specific genetic lines, the authors generated transcriptomic data that can be cross-referenced with connectivity data from existing EM datasets, providing a multi-layered resource for the community.
    advanced: |
        The resource integrates intersectional genetic driver lines with single-cell or population-level transcriptomics to assign molecular identities to neurons already characterized at the circuit level in Drosophila visual system connectomes. Key caveats include the reliance on sparse genetic access (which may not achieve pure cell-type isolation) and the challenge of reconciling transcriptomic clusters with morphologically or connectivity-defined cell types. The computational resource component facilitates cross-referencing with connectomic databases like the hemibrain.
  discussion_prompts:
  - |
    How were cell types defined in this study — morphologically, transcriptomically, or by genetic driver — and how do these definitions compare across the three modalities?
    - |
    What new circuit hypotheses can be generated by combining gene expression profiles with known connectivity from the hemibrain or FAFB connectomes?
    - |
    How should the community handle cases where transcriptomic clusters and morphology-defined cell types disagree, and what does that tell us about the nature of 'cell type'?
    - id: connectomes-across-development-reveal-principles-of-brain-ma
    title: "Connectomes across development reveal principles of brain maturation"
    authors: "Witvliet, Mulcahy, Mitchell et al."
    year: 2021
