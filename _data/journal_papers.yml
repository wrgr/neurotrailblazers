- id: fiala-harris-2001
  title: Cylindrical Diameters Method for Calibrating Section Thickness in Serial Electron Microscopy
  authors: Fiala JC, Harris KM
  year: 2001
  journal: Journal of Microscopy
  doi: 10.1046/j.1365-2818.2001.00926.x
  dimension: neuroanatomy
  tags:
  - "imaging:serial-section"
  - "imaging:electron-microscopy"
  - "methodology:benchmark"
  - "neuroanatomy:microtubule"
  - "data-storage:alignment"
  key_figures:
  - "Fig. 1: geometry of oblique microtubule sections"
  - "Fig. 2: calibration curve"
  discussion_prompts:
  - Does your automated pipeline account for section-to-section thickness variation?
  - What other structures could serve as internal calibration references?
  related_content:
  - /content-library/imaging/em-principles/
  - /content-library/infrastructure/reconstruction-pipeline/
  summaries:
    beginner: >-
      When scientists cut brain tissue into very thin slices for electron microscopy, they need to know exactly how thick
      each slice is to build accurate 3D reconstructions. This paper describes a clever method for measuring slice thickness
      by looking at tube-shaped structures (microtubules) that run through the tissue at known diameters.
    intermediate: >-
      Fiala and Harris present a calibration method exploiting the known ~25 nm diameter of microtubules to estimate section
      thickness from their elliptical profiles in oblique sections. This addresses a chronic problem in serial section EM:
      nominal microtome settings often differ from actual section thickness by 10-30%.
    advanced: >-
      This paper is important for anyone working on alignment and voxel calibration in serial section datasets. The statistical
      framework provides a principled alternative to fold-based or interference-based calibration. Modern connectomics pipelines
      should incorporate analogous calibration steps, particularly for ATUM-SEM where section thickness variation can be significant.
  ocar:
    opportunity: >-
      Accurate 3D reconstruction from serial section EM requires precise knowledge of section thickness, but nominal microtome
      settings often differ from actual thickness by 10-30%, introducing systematic errors in morphological measurements.
    challenge: >-
      Existing calibration methods based on section folds or thin-film interference were imprecise and difficult to apply
      consistently. An internal calibration standard within the tissue itself was needed.
    action: >-
      Fiala and Harris developed a calibration method that exploits the known ~25 nm diameter of microtubules, using their
      elliptical profiles in oblique sections to estimate actual section thickness with a statistical framework.
    resolution: >-
      The method provided a principled, tissue-internal calibration standard that could be applied to any serial section EM
      dataset containing microtubules, improving the accuracy of 3D reconstructions and volumetric measurements.
    future_work: >-
      Extending calibration approaches to modern ATUM-SEM datasets where section thickness variation can be significant, and
      developing analogous internal standards for non-neural tissues.
  bibtex: >-
    @article{fiala2001cylindrical,
      title={Cylindrical diameters method for calibrating section thickness in serial electron microscopy},
      author={Fiala, John C and Harris, Kristen M},
      journal={Journal of Microscopy},
      volume={202},
      number={3},
      pages={468--472},
      year={2001},
      doi={10.1046/j.1365-2818.2001.00926.x}
    }
  plaintext_citation: >-
    Fiala, J. C., & Harris, K. M. (2001). Cylindrical diameters method for calibrating section thickness in serial electron
    microscopy. Journal of Microscopy, 202(3), 468-472.
