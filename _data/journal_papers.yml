    intermediate: >-
      BOLORAMIS uses padlock probe hybridization and rolling circle amplification to detect and barcode specific RNA targets
      in situ, without reverse transcription. Validated in human cell lines and cerebral organoids, it provides a multiplexed
      spatial transcriptomics approach relevant to cell-type identification in neuroscience tissues — complementing structural
      connectomics with molecular characterization.
    advanced: >-
      The BOLORAMIS method exploits the specificity of padlock probe ligation (requiring perfect complementarity at the probe
      junction) combined with rolling circle amplification to generate bright, localizable fluorescent signals from individual
      RNA molecules in situ. The approach avoids reverse transcription, reducing false positives from genomic DNA and simplifying
      the protocol. For connectomics, spatial transcriptomics methods like BOLORAMIS are increasingly important for linking
      EM-identified neuron morphologies and connectivity to transcriptomically-defined cell types — a key step toward a unified
