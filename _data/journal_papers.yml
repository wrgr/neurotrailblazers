      shapes, electrical recordings, and connectivity — creating the most comprehensive cell type atlas ever made.
    intermediate: >-
      The flagship BICCN publication presents an integrated multimodal cell census combining transcriptomics, chromatin accessibility,
      morphological reconstruction, electrophysiology, and projection mapping. The study identifies ~100 consensus types and
      maps cross-modal correspondences.
    advanced: >-
      Establishes the gold standard for multimodal cell type classification. For connectomics: morphological features alone
      distinguish major classes but not fine subtypes, connectivity-defined subtypes often correspond to transcriptomic subtypes,
