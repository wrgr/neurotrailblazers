      enhancement, lead aspartate staining, and Epon embedding — a sequence developed to maximize membrane contrast for automated
      segmentation. Key technical challenges addressed include achieving uniform staining throughout the entire brain volume
      (avoiding the staining gradients common in larger specimens) and maintaining sample conductivity to prevent beam charging
      during months-long FIB-SEM acquisition. The paper's contribution is in reproducible protocol optimization rather than
