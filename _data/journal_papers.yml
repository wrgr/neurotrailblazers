  discussion_prompts:
  - >-
    How does surface-based registration in FreeSurfer improve cross-subject alignment of cortical areas compared to volumetric
    registration, and where does it still fail?
  - >-
    How are FreeSurfer-derived parcellations used as node definitions in structural connectomics studies, and what assumptions
    does this introduce?
  - >-
    What would a connectomics-informed cortical surface parcellation look like, and would it differ substantially from parcellations
    derived from MRI morphology or function?
  summaries:
    beginner: >-
      The outer layer of the brain is folded like a crumpled piece of paper. To compare the same brain region across different
      people, scientists need to 'unfold' those surfaces into a standard map. This paper developed the FreeSurfer software
      to automatically reconstruct, inflate, and register brain surfaces from MRI scans.
    intermediate: >-
      This paper describes cortical surface-based analysis methods implemented in FreeSurfer, including automated surface
      reconstruction from MRI, cortical flattening, spherical registration for cross-subject alignment, and surface-based
      analysis of cortical thickness and functional data. Surface-based approaches substantially improve the alignment of
      homologous cortical areas compared to volumetric registration.
    advanced: >-
      FreeSurfer's cortical reconstruction pipeline uses deformable surface models optimized by intensity gradients at the
      white-gray and pial boundaries, followed by surface inflation and spherical registration to a population average template.
      The resulting surface representations enable vertex-wise statistical analysis of cortical morphology and function. In
      connectomics contexts, FreeSurfer-derived cortical parcellations (e.g., Desikan-Killiany) are used to define nodes in
      structural and functional connectivity analyses. Key limitations include sensitivity to MRI acquisition quality and
      the use of intensity-based segmentation without a priori knowledge of cytoarchitecture.
  ocar:
    opportunity: >-
      The highly folded human cerebral cortex made comparison of cortical anatomy and function across subjects difficult,
      as homologous cortical regions are not spatially aligned in volumetric MRI. A surface-based representation was needed
      to enable accurate cross-subject registration and analysis of cortical structure and function.
    challenge: >-
      Reconstructing the cortical surface from MRI requires accurate segmentation of white and gray matter, followed by surface
      inflation and registration to a common template sphere — all while preserving accurate topological relationships and
      enabling meaningful comparison of curvature, thickness, and functional data across subjects.
    action: >-
      Dale, Fischl, and Sereno developed FreeSurfer, providing algorithms for automated cortical surface reconstruction, inflation,
      and spherical registration. They validated surface-based analysis of cortical thickness, curvature, and functional data
      by comparing to manual measurements and demonstrating improved cross-subject alignment.
    resolution: >-
      FreeSurfer's cortical surface reconstruction and analysis pipeline became the standard for human neuroimaging studies,
      enabling accurate cross-subject comparison of cortical anatomy and function. Surface-based registration substantially
      improved alignment of cortical areas compared to volumetric methods.
    future_work: >-
      Extensions to subcortical segmentation, quantitative MRI, and multi-modal surface parcellation continue to extend FreeSurfer's
      capabilities, and deep learning-based surface reconstruction is an active area.
  plain_language_summary: >-
    The brain's outer layer is heavily folded, making it hard to compare the same region across different people's brains.
    This paper developed FreeSurfer, a software tool that unfolds the brain's surface into a map — like unfolding a crumpled
    piece of paper — allowing accurate comparison of brain regions across people and enabling precise mapping of where functions
    and structures are located.
