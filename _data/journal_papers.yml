    intermediate: >-
      Using array tomography with multiplexed immunofluorescence, the authors profiled ~5 billion excitatory synapses across
      the whole mouse brain from birth through aging at single-synapse resolution. The resulting atlas captures region-specific
      trajectories of synaptic maturation and molecular diversification, providing a foundational reference for studying how
      synaptic composition relates to neural circuit function and disease.
    advanced: >-
      This study leverages high-throughput array tomography to generate an unprecedented molecular atlas of excitatory synapses
      brain-wide and across the lifespan. Key findings include region-specific synaptogenesis peaks, molecularly distinct
      synaptic subtypes with non-uniform spatial distributions, and age-dependent shifts in postsynaptic density composition.
      A key caveat is that the protein targets are limited to a panel of scaffold and receptor proteins, and the 2D array
      sections require careful alignment; also, the approach does not capture inhibitory or modulatory synapses.
  ocar:
    opportunity: >-
      How the molecular composition and density of synapses changes across brain regions and over the lifespan — from neonatal
      development through aging — was not known at single-synapse resolution brain-wide.
    challenge: >-
      Profiling billions of synapses across the entire brain at multiple ages requires scalable, high-throughput methods that
      can capture both molecular identity and spatial location of individual synaptic structures without relying on EM.
    action: >-
      The authors used array tomography combined with immunofluorescence multiplexing to quantify the molecular and morphological
      diversity of ~5 billion excitatory synapses at single-synapse resolution across the mouse brain from birth to old age,
      generating a comprehensive brain-wide synaptic atlas.
    resolution: >-
      The atlas revealed dramatic region-specific and age-dependent changes in synaptic molecular composition, including distinct
      trajectories of synaptic maturation and aging across cortical layers and subcortical structures. This provides a comprehensive
      reference for understanding how synaptic diversity supports brain function across the lifespan.
    future_work: >-
      Extending the atlas to inhibitory synapses and other neurotransmitter systems, and linking molecular synapse diversity
      to functional circuit properties, are important future directions.
