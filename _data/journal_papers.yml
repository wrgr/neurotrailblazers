- id: sheridan-2023
  title: Local shape descriptors for neuron segmentation
  authors: Sheridan A et al.
  year: 2023
  journal: Nature Methods
  doi: 10.1038/s41592-022-01711-z
  dimension: computer-vision-ml
  tags:
  - "computer-vision-ml:segmentation"
  - "computer-vision-ml:agglomeration"
  - "computer-vision-ml:self-supervised"
  - "methodology:benchmark"
  key_figures:
  - "Fig. 1: local shape descriptor (LSD) prediction as an auxiliary task"
  - "Fig. 2: segmentation improvement across datasets with LSD embeddings"
  - "Fig. 4: generalization to new tissue types without retraining"
  discussion_prompts:
  - >-
    Why does predicting local shape descriptors as an auxiliary task improve boundary prediction, even though shape information
    is not used at test time?
  - >-
    How does the self-supervised nature of LSD training affect the method's ability to generalize across species and brain
    regions?
  related_content:
  - /content-library/computer-vision-ml/segmentation/
  - /content-library/methodology/benchmark/
  summaries:
    beginner: >-
      This paper gives a segmentation network an extra training task: predicting the local shape (size, orientation, elongation)
      of the neuron at each point. Even though this shape information is discarded at test time, the extra task forces the
      network to learn better internal representations, resulting in more accurate neuron tracings.
    intermediate: >-
      Sheridan et al. propose local shape descriptors (LSDs) — statistics of the local neuron shape at each voxel — as an
      auxiliary self-supervised training target for affinity-based segmentation networks. The LSD task requires no additional
      manual labels since descriptors are computed from existing ground-truth masks. Adding LSDs consistently improves segmentation
      across multiple EM datasets and reduces the domain gap when transferring to new tissue.
    advanced: >-
      LSDs encode six local statistics (mean offset, covariance eigenvalues, orientation) at each voxel, providing a dense
      self-supervised signal that regularizes intermediate feature representations. The method is architecture-agnostic and
      complements both affinity and direct segmentation approaches. Benchmark experiments on zebrafish, fly, and mouse EM
      data show consistent improvements in VOI and ERL, and the learned features transfer better across domains than networks
      trained on affinities alone.
  ocar:
    opportunity: >-
      Segmentation networks for connectomics required large amounts of manually annotated training data, which is expensive
      and slow to produce. Self-supervised auxiliary tasks could potentially improve segmentation quality without additional
      manual labels.
    challenge: >-
      Finding an auxiliary signal that is both informative for segmentation and computable without extra annotation effort.
      The auxiliary task must regularize learned features in a way that generalizes across different tissue types and species.
    action: >-
      Sheridan et al. proposed local shape descriptors (LSDs) — six statistics describing the local neuron shape at each voxel
      — as a self-supervised auxiliary training target computed automatically from existing ground-truth segmentation masks.
    resolution: >-
      Adding LSD prediction as an auxiliary task consistently improved segmentation accuracy (VOI and ERL) across zebrafish,
      fly, and mouse EM datasets, and the learned features transferred better across domains than networks trained on affinities
      alone, reducing the need for domain-specific retraining.
    future_work: >-
      Combining LSDs with other self-supervised objectives, exploring whether shape descriptors can enable few-shot adaptation
      to entirely new tissue types, and integrating LSD features into downstream analysis tasks like cell type classification.
