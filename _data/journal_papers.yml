- id: shepherd-harris-1998
  title: Three-Dimensional Structure and Composition of CA3→CA1 Axons in Rat Hippocampal Slices
  authors: Shepherd GM, Harris KM
  year: 1998
  journal: Journal of Neuroscience
  doi: 10.1523/JNEUROSCI.18-20-08300.1998
  dimension: neuroanatomy
  tags:
  - "neuroanatomy:axon"
  - "neuroanatomy:bouton"
  - "neuroanatomy:vesicle"
  - "neuroanatomy:mitochondria"
  - "imaging:serial-section"
  - "case-studies:hippocampus"
  key_figures:
  - "Fig. 2: 3D axon reconstructions"
  - "Fig. 4: bouton composition quantification"
  - "Fig. 6: multi-synapse bouton examples"
  discussion_prompts:
  - >-
    How would you validate whether modern automated segmentation correctly identifies the bouton features measured in this
    study?
  - What does the multi-synapse bouton finding imply for how we weight edges in a connectome graph?
  related_content:
  - /content-library/neuroanatomy/axon-biology/
  - /content-library/neuroanatomy/synapse-classification/
  summaries:
    beginner: >-
      This paper used serial electron microscopy to reconstruct the fine branches of axons in the hippocampus in 3D. The authors
      showed that the small swellings (boutons) along axons, where synapses form, are highly variable in size and contents.
      It's an early example of the kind of detailed wiring analysis that modern connectomics does at larger scales.
    intermediate: >-
      Shepherd and Harris performed serial section EM reconstruction of Schaffer collateral axons in rat CA1, providing quantitative
      data on bouton volumes, vesicle counts, mitochondria presence, and multi-synapse bouton frequencies. They found that
      only ~40% of boutons contain mitochondria, with important implications for sustained transmission.
    advanced: >-
      This study established quantitative priors that remain useful for validating automated reconstructions: mean bouton
      volume (~0.1 μm³), vesicle density (~200 per bouton), and the fraction of en passant versus terminal boutons. The finding
      that multi-synapse boutons synapse onto different postsynaptic neurons has implications for how edge weights should
      be computed in connectome graphs.
  ocar:
    opportunity: >-
      Quantitative data on the ultrastructure and composition of individual axonal boutons was sparse, limiting the ability
      to validate automated reconstruction of presynaptic structures and to model synaptic transmission.
    challenge: >-
      Reconstructing complete axons in 3D from serial section EM was extremely labor-intensive, and the variability in bouton
      size and contents made it unclear how many reconstructions were needed for statistically meaningful conclusions.
    action: >-
      Shepherd and Harris performed serial section EM reconstruction of Schaffer collateral axons in rat hippocampal CA1,
      quantifying bouton volumes, vesicle counts, mitochondria presence, and the frequency of multi-synapse boutons.
    resolution: >-
      The study established quantitative priors for bouton morphology (mean volume ~0.1 um3, ~200 vesicles per bouton, ~40%
      containing mitochondria) that remain useful benchmarks for validating automated segmentation and for modeling synaptic
      transmission capacity.
    future_work: >-
      The finding that multi-synapse boutons contact different postsynaptic neurons raises questions about how edge weights
      should be computed in connectome graphs and whether bouton-level features can predict connection strength.
  bibtex: >-
    @article{shepherd1998three,
      title={Three-dimensional structure and composition of {CA3}$\to${CA1} axons in rat hippocampal slices},
      author={Shepherd, Gordon M and Harris, Kristen M},
      journal={Journal of Neuroscience},
      volume={18},
      number={20},
      pages={8300--8310},
      year={1998},
      doi={10.1523/JNEUROSCI.18-20-08300.1998}
    }
  plaintext_citation: >-
    Shepherd, G. M., & Harris, K. M. (1998). Three-dimensional structure and composition of CA3->CA1 axons in rat hippocampal
    slices. Journal of Neuroscience, 18(20), 8300-8310.
