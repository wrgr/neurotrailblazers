    ocar:
    opportunity: |
      Connectomes provide structural wiring diagrams but lack information about synaptic sign (excitatory vs. inhibitory), a fundamental missing piece that prevents inferring circuit function from anatomy alone.
    challenge: |
      Determining neurotransmitter identity from EM images is challenging because synaptic vesicle morphology alone is not sufficient to classify all transmitter types, and biochemical assays are incompatible with the EM processing required for connectomics.
    action: |
      The authors trained convolutional neural networks to predict the neurotransmitter type released at individual synapses in Drosophila melanogaster directly from EM image patches of synaptic sites, using a training set where transmitter identity was known from genetic and immunohistochemical data.
    resolution: |
      The CNNs successfully classified multiple neurotransmitter types — including acetylcholine, GABA, glutamate, dopamine, serotonin, and octopamine — from EM images with high accuracy. This method can be applied to existing EM datasets to add synaptic sign information to connectomes without additional experimental labeling.
    future_work: |
      Extending the approach to mammalian systems where transmitter-EM correlates differ, and improving accuracy for rare transmitter types, are important future directions.
  plain_language_summary: ""
  summaries:
    beginner: |
        When neurons communicate, they release chemical signals called neurotransmitters, and knowing which chemical a neuron uses tells us if it's exciting or inhibiting its partners. Electron microscopy gives us beautiful images of neural connections but doesn't reveal the chemistry. This paper trained AI to predict the chemical identity of synapses just from looking at their EM images.
    intermediate: |
        The authors trained convolutional neural networks on annotated synaptic sites in Drosophila EM data to predict neurotransmitter identity from image features. By leveraging known genetic cell type labels as ground truth, they achieved multi-class transmitter prediction (ACh, GABA, Glu, DA, 5-HT, Oct) with high accuracy. Applied to whole-brain datasets, this transforms connectomes from pure wiring diagrams into signed graphs with excitatory/inhibitory labels.
    advanced: |
        This work addresses a fundamental limitation of connectomics by using deep learning to infer neurotransmitter phenotype from ultrastructural image features at synaptic profiles. The key insight is that transmitter-specific differences in vesicle morphology, active zone structure, and cytoplasmic texture are learnable by CNNs even when not obvious to human annotators. A critical caveat is that the approach was validated in Drosophila where transmitter-to-cell-type mappings are relatively stereotyped; generalization to mammals, where cotransmission and plasticity-dependent changes in transmitter expression are more common, requires careful evaluation.
  discussion_prompts:
  - |
    What ultrastructural features does the CNN appear to use for transmitter classification, and are these features interpretable in terms of known biology (e.g., vesicle size, shape, density)?
    - |
    How does neurotransmitter prediction accuracy vary across transmitter classes, and what biological or imaging factors contribute to the harder-to-predict cases?
    - |
    What new circuit analyses become possible when synaptic sign is added to a connectome, and what classic neuroscience questions could be revisited with signed whole-brain graphs?
