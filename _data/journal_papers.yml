    summaries:
      beginner: "This paper reconstructed every single neuron, synapse, and glial cell in a tiny cube of mouse brain. By mapping everything, the authors could count how many synapses each neuron makes and see patterns that would be invisible if only a few cells were traced."
      intermediate: "Kasthuri et al. performed 'saturated' (dense) reconstruction of a 1,500 μm³ volume of mouse somatosensory cortex using ATUM-SEM. They identified all neuronal and glial profiles, mapped all synapses, and quantified connectivity patterns. The dataset became an important benchmark for segmentation algorithms."
      advanced: "This paper established methodological standards for dense reconstruction: the concept of 'saturation,' quantitative reporting of completeness, and the systematic comparison of human annotation consistency. The volume size limitations and the question of whether observations generalize to larger volumes remain active discussion points."

