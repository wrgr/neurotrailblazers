      intermediate: "Januszewski et al. introduce flood-filling networks (FFNs) that perform instance segmentation by iteratively predicting an object mask centered on a moving field of view. The recurrent architecture accumulates context as it grows, naturally handling complex branching morphology. On multiple EM datasets the method achieves near-human accuracy with substantially reduced proofreading burden."
      advanced: "FFNs reformulate segmentation as sequential decision-making: a 3D convolutional network predicts voxel-level membership probabilities conditioned on the already-segmented region. This removes the need for a separate agglomeration step and shifts the error profile toward split errors (missed branches) rather than merges. The paper benchmarks on the songbird area X and Drosophila datasets, reporting large reductions in expected run length (ERL) error."

