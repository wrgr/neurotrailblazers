          x: 80
          y: 35
      correct_id: A
      correct_feedback: "Correct. That region reflects the artifact pattern targeted by QA gates."
      incorrect_feedback: "Not yet. Focus on the region showing likely acquisition irregularity."
  module04:
    task:
      title: "Pipeline Architecture Microtask"
      prompt: "Which feature is most critical for reconstruction reliability?"
      options:
        - "Dataset lineage with rollback-capable releases"
        - "Single-script processing with no versioning"
        - "Manual file renaming"
      correct_index: 0
      correct_feedback: "Correct. Lineage and rollback are core infrastructure requirements."
      incorrect_feedback: "Try again. Reliable pipelines require lineage and release discipline."
    annotation:
      title: "Pipeline Stage Annotation"
      prompt: "Click the hotspot representing the highest-leverage control point for reproducible reconstruction."
      image: "/assets/images/technical-training/04-volume-reconstruction-infrastructure/FIG-SRC-MODULE14_LESSON1-S12-01.png"
