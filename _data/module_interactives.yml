      title: "Process ID Microtask"
      prompt: "To distinguish axon vs dendrite reliably, prioritize:"
      options:
        - "Multiple cues across morphology and context"
        - "Single visual cue in one slice"
        - "Random choice then post hoc justification"
      correct_index: 0
      correct_feedback: "Correct. Multi-cue decisions reduce classification error."
      incorrect_feedback: "Try again. Use multiple converging cues."
    annotation:
