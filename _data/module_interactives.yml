      incorrect_feedback: "Try again. Look for where lineage and release policy are anchored."
  module05:
    task:
      title: "Ultrastructure Interpretation Microtask"
      prompt: "Best response to an ambiguous ultrastructure cue?"
      options:
        - "Label uncertainty and request second-pass review"
        - "Force a confident label"
        - "Delete the region"
      correct_index: 0
      correct_feedback: "Correct. Ambiguity should be explicit and reviewable."
      incorrect_feedback: "Try again. Do not force labels when evidence is ambiguous."
    annotation:
      title: "Ultrastructure Feature Annotation"
      prompt: "Select the hotspot most consistent with synaptic ultrastructure evidence."
      image: "/assets/images/technical-training/05-neuronal-ultrastructure/FIG-RIV-ULTRA-S20-01.png"
