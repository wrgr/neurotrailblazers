default:
  quiz:
    title: "Checkpoint Quiz"
    pass_score: 2
    questions:
      - prompt: "Which output most clearly demonstrates module competency?"
        options:
          - "A measurable artifact linked to an explicit method"
          - "A general reflection about interest in neuroscience"
          - "A list of future goals without evidence"
        correct_index: 0
        explanation: "Competency is shown through measurable, method-linked evidence."
      - prompt: "What should always accompany a technical claim in this curriculum?"
        options:
          - "A limitation or uncertainty statement"
          - "A motivational quote"
          - "A citation count"
        correct_index: 0
        explanation: "Every claim should include boundaries and uncertainty."
      - prompt: "What is the best next step after identifying a gap in understanding?"
        options:
          - "Define a concrete practice task and verification criterion"
          - "Skip to a harder module"
          - "Ignore the gap if progress is slow"
        correct_index: 0
        explanation: "Progress improves when gaps become explicit practice targets."
  task:
    title: "Microtask Decision"
    prompt: "Choose the action that best improves scientific reliability."
    options:
      - "Record method, version, and decision rationale before sharing results"
      - "Share results quickly and document details later"
      - "Rely on memory for why decisions were made"
    correct_index: 0
    correct_feedback: "Correct. Traceability and rationale improve reliability and reproducibility."
    incorrect_feedback: "Try again. Prioritize traceability and explicit rationale."
  annotation:
    title: "Annotation Challenge"
    prompt: "Click the hotspot with the strongest evidence for the requested feature."
    image: "/assets/images/homepage.jpg"
    image_alt: "Connectomics training scene"
    hotspots:
      - id: A
        label: A
        x: 24
        y: 44
      - id: B
        label: B
        x: 50
        y: 52
      - id: C
        label: C
        x: 76
        y: 40
    correct_id: A
    correct_feedback: "Correct. You selected the target hotspot."
    incorrect_feedback: "Not quite. Re-evaluate local context and try another hotspot."
  progress_steps:
    - "Read capability target"
    - "Complete studio activity"
    - "Review assessment rubric"
    - "Pass checkpoint quiz"
    - "Complete microtask"
    - "Complete annotation challenge"

modules:
  module01:
    quiz:
      title: "Why Map the Brain Checkpoint"
      pass_score: 2
      questions:
        - prompt: "A strong connectomics question should include:"
          options:
            - "A measurable structural output"
            - "Only a broad societal motivation"
            - "A guaranteed clinical impact claim"
          correct_index: 0
          explanation: "Questions should map to measurable structural outcomes."
        - prompt: "Which statement reflects good evidence discipline?"
          options:
            - "Structure constrains hypotheses but does not prove all function"
            - "A connectome alone explains all behavior"
            - "Any high-resolution image proves mechanism"
          correct_index: 0
          explanation: "Structure informs mechanism but does not fully prove it alone."
        - prompt: "Best non-claim for an early-stage module 01 question:"
          options:
            - "This map alone does not establish causal dynamics"
            - "This map proves memory formation"
            - "No limitations are needed"
          correct_index: 0
          explanation: "A non-claim should explicitly mark evidence boundaries."
    task:
      title: "Question Framing Microtask"
      prompt: "Pick the best study question for a first connectomics project."
      options:
        - "Which synapse-density differences appear between two defined hippocampal subregions?"
        - "How does consciousness emerge from the entire brain?"
        - "Can one EM volume explain all cognition?"
      correct_index: 0
      correct_feedback: "Correct. It is scoped, measurable, and testable."
      incorrect_feedback: "Not yet. Choose the option with clear scope and measurable outputs."
    annotation:
      title: "Motivation-to-Question Annotation"
      prompt: "Click the region that most strongly supports the case for high-resolution connectomics."
      image: "/assets/images/technical-training/01-why-map-the-brain/FIG-SRC-21_02388_X_TECHTALK_-S10-01.png"
      image_alt: "Why map the brain figure"
      hotspots:
        - id: A
          label: A
          x: 19
          y: 36
        - id: B
          label: B
          x: 52
          y: 58
        - id: C
          label: C
          x: 84
          y: 43
      correct_id: B
      correct_feedback: "Correct. That region contains the primary evidence cue for this framing task."
      incorrect_feedback: "Try again. Prefer the region tied to measurable structural evidence."
  module02:
    task:
      title: "Scale Selection Microtask"
      prompt: "Your question needs synapse-level evidence across a small region. Best approach?"
      options:
        - "High-resolution EM in a bounded volume with compute/storage planning"
        - "Whole-brain low-resolution imaging only"
        - "No data constraints until analysis"
      correct_index: 0
      correct_feedback: "Correct. Match scale to required evidence and budget."
      incorrect_feedback: "Try again. Scale, resolution, and compute constraints must align with the question."
    annotation:
      title: "Scale-Matching Annotation"
      prompt: "Select the hotspot that best represents synapse-resolving scale rather than meso-scale context."
      image: "/assets/images/technical-training/02-brain-data-across-scales/FIG-SRC-MODULE12_LESSON2-S05-01.png"
      image_alt: "Brain data across scales figure"
      hotspots:
        - id: A
          label: A
          x: 22
          y: 42
        - id: B
          label: B
          x: 50
          y: 48
        - id: C
          label: C
          x: 78
          y: 52
      correct_id: C
      correct_feedback: "Correct. That hotspot aligns with the highest-detail evidence target."
      incorrect_feedback: "Try again. Choose the hotspot with microstructural, synapse-scale detail."
  module03:
    task:
      title: "Artifact Triage Microtask"
      prompt: "What should happen before reconstruction starts?"
      options:
        - "Apply artifact QA gates and record pass/fail decisions"
        - "Start segmentation immediately"
        - "Skip QA if images appear mostly clean"
      correct_index: 0
      correct_feedback: "Correct. Upstream QA prevents downstream compounding errors."
      incorrect_feedback: "Try again. QA gates are required before reconstruction."
    annotation:
      title: "Artifact QA Annotation"
      prompt: "Identify the hotspot most consistent with imaging artifact risk requiring QA triage."
      image: "/assets/images/technical-training/03-em-prep-and-imaging/FIG-SRC-MODULE13_LESSON2-S09-01.png"
      image_alt: "EM prep and imaging figure"
      hotspots:
