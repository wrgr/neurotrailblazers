  module08:
    task:
      title: "Proofreading Triage Microtask"
      prompt: "How should correction queues be prioritized?"
      options:
        - "By expected scientific impact and error severity"
        - "By oldest timestamp only"
        - "By easiest edits only"
      correct_index: 0
      correct_feedback: "Correct. Impact-aware triage improves release quality."
      incorrect_feedback: "Try again. Prioritize impact, not convenience."
