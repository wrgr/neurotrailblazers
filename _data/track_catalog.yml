tracks:
  - slug: core-concepts-methods
    title: Core Concepts & Methods
    short_title: Core & Methods
    description: Build scientific and technical fluency in nanoscale connectomics from motivation through analysis methods.
    about: "This track builds the foundational knowledge and technical skills needed to work with nanoscale connectomics data. Starting from scientific question-framing and progressing through neuroanatomy, EM imaging, segmentation, and circuit analysis, it provides the conceptual toolkit for working with Mouse Connectome Project and other CONNECTS datasets. It maps directly onto the Technical Training Course units and is the recommended starting point for most learners in the program."
    fadel_alignment:
      - Knowledge
      - Skills
    pathways:
      - technical foundation
      - methods depth
      - analytical reasoning
    module_numbers: [1, 3, 4, 5, 6, 7, 8, 9, 10, 11]
    resources:
      - title: Technical Training Course Hub
        url: /technical-training/
        summary: Canonical connectomics sequence from imaging to NeuroAI.
      - title: Technical Slides and Lecture Drafts
        url: /technical-training/slides/
        summary: Lecture-ready sequence with slide-source links.
      - title: Journal Club Reading List
        url: /technical-training/journal-club/
        summary: Required and optional readings aligned to the technical sequence.
      - title: Connectomics Dictionary
        url: /technical-training/dictionary/
        summary: Shared vocabulary for methods, quality, and analysis.
      - title: Datasets
        url: /datasets/
        summary: Data resources for training and research, including the MouseConnects dataset.

  - slug: research-in-action
    title: Research in Action
    short_title: Research Practice
    description: Apply concepts in practical workflows, quality control, tools, and reproducible research operations.
    about: "This track focuses on applying connectomics knowledge to real research workflows: running analyses on petascale datasets, applying machine learning and computer vision to EM data, maintaining reproducibility, and producing publication-ready outputs. Resources connect directly to the MouseConnects dataset, the Connectome Quality tool, and the workflow pipeline from acquisition through circuit interpretation. Learners should have completed the Core Concepts & Methods foundation before focusing here."
    fadel_alignment:
      - Skills
      - Meta-learning
    pathways:
      - research workflow
      - reproducibility
      - project execution
    module_numbers: [6, 7, 12, 13, 14, 15, 16, 18, 20, 21]
    resources:
      - title: Workflow Overview
        url: /datasets/workflow/
        summary: End-to-end process from acquisition through interpretation.
      - title: Connectome Quality Guide
        url: /tools/connectome-quality/
        summary: Quality criteria and practical checks for robust outputs.
      - title: Ask-an-Expert
        url: /ask-an-expert/
        summary: Structured support for technical troubleshooting from Dr. Jeff Lichtman.
      - title: Technical Training Units 08-09
        url: /technical-training/08-segmentation-and-proofreading/
        summary: Proofreading and analysis-heavy units for applied practice.
      - title: Frameworks
        url: /frameworks/
        summary: Research and teaching frameworks to operationalize practice.

  - slug: career-and-community
    title: Career & Community
    short_title: Pathways & Community
    description: Navigate hidden curriculum, mentorship, professional growth, and inclusive research identity development.
    about: "This track supports the professional and personal development dimensions of research training, with explicit attention to the hidden curriculum—the unwritten norms, expectations, and social dynamics that shape who succeeds in science. It covers scientific communication, peer review, ethics, career planning, and portfolio development, grounded in the NIH CONNECTS mentorship model and equity-centered program design. It is relevant at every stage of training, not only at the end."
    fadel_alignment:
      - Character
      - Meta-learning
    pathways:
      - mentoring
      - professional growth
      - hidden curriculum
    module_numbers: [1, 2, 17, 19, 22, 23, 24, 25]
    resources:
