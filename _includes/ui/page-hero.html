{% if page.use_layout_hero == true %}
<section class="hero hero-spaced hero-rounded">
  <div class="hero-content">
    <h1 class="hero-title-impact">{{ page.title }}</h1>
    {% if page.description %}
      <p class="hero-subtitle">{{ page.description }}</p>
    {% endif %}
  </div>
</section>
{% endif %}
